<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Conflict Monitor - Video Player</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --fire: #ff4500;
            --smoke: #2c3e50;
            --danger: #dc3545;
        }

        body, html {
            height: 100%;
            margin: 0;
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Animated Flame Background */
        .flame-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 100%, rgba(255, 69, 0, 0.15) 0%, #0a0a0a 80%);
        }

        .ember {
            position: absolute;
            bottom: -10px;
            background: var(--fire);
            border-radius: 50%;
            filter: blur(4px);
            opacity: 0.5;
            animation: rise 5s infinite ease-in;
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 0.7; }
            100% { transform: translateY(-110vh) translateX(50px) scale(0); opacity: 0; }
        }

        /* Layout */
        .main-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .player-card {
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 69, 0, 0.2);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            width: 100%;
            max-width: 1100px;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .playlist-column {
            background: rgba(30, 30, 30, 0.5);
            max-height: 500px;
            overflow-y: auto;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
        }

        .playlist-item {
            padding: 15px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .playlist-item:hover {
            background: rgba(255, 69, 0, 0.1);
        }

        .playlist-item.active {
            background: rgba(255, 69, 0, 0.2);
            border-left: 4px solid var(--fire);
        }

        .thumb-mini {
            width: 80px;
            height: 45px;
            background: #333;
            border-radius: 4px;
            background-size: cover;
            flex-shrink: 0;
        }

        .video-title {
            font-size: 0.9rem;
            font-weight: 500;
            line-height: 1.2;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--fire); }

        .header-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .live-dot {
            height: 8px;
            width: 8px;
            background-color: #ff0000;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px #ff0000;
            animation: blink 1s infinite;
        }

        @keyframes blink { 
            0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="flame-bg" id="emberContainer"></div>

    <div class="main-container">
        <div class="player-card">
            <div class="header-status">
                <div>
                    <span class="live-dot"></span>
                    <span class="small fw-bold text-uppercase tracking-wider">Monitoring Feed</span>
                </div>
                <div class="text-secondary small">Current Situation: Active Conflict</div>
            </div>
            
            <div class="row g-0">
                <div class="col-lg-8">
                    <div class="video-container">
                        <iframe id="mainPlayer" src="https://www.youtube.com/embed/b0pD-EpNEyk" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    </div>
                    <div class="p-4">
                        <h4 id="currentTitle">Breaking News: War Spreads Throughout Gulf</h4>
                        <p class="text-secondary small mb-0">Source: Global News Network | Priority: High</p>
                    </div>
                </div>
                
                <div class="col-lg-4 playlist-column">
                    <div id="playlist">
                        <!-- Items populated via JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const videos = [
            { id: 'b0pD-EpNEyk', title: 'War Spreads Throughout Gulf | Iran Strikes', type: 'Live' },
            { id: 'chF5Hx1SF78', title: 'Explosions Rock Bahrain | US Base Strike', type: 'Live' },
            { id: 'Qe5geMQwKIw', title: 'Tehran in Flames | Breaking War News', type: 'Live' },
            { id: 'JbbFfUxPULI', title: 'Iran Bombs US Navy Destroyer | Indian Ocean', type: 'Report' },
            { id: 'cX4wHV0atDU', title: 'US Launches Submarine Attack On Ship', type: 'Update' },
            { id: 'amoV7hwzinI', title: 'Explosions Rock Dubai | Missile Launch', type: 'Live' }
        ];

        const playlistDiv = document.getElementById('playlist');
        const player = document.getElementById('mainPlayer');
        const titleEl = document.getElementById('currentTitle');

        function loadVideo(index) {
            const video = videos[index];
            player.src = `https://www.youtube.com/embed/${video.id}?autoplay=1`;
            titleEl.innerText = video.title;
            
            document.querySelectorAll('.playlist-item').forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });
        }

        videos.forEach((vid, index) => {
            const item = document.createElement('div');
            item.className = `playlist-item ${index === 0 ? 'active' : ''}`;
            item.onclick = () => loadVideo(index);
            
            item.innerHTML = `
                <div class="thumb-mini" style="background-image: url('https://img.youtube.com/vi/${vid.id}/mqdefault.jpg')"></div>
                <div class="video-title">
                    <div class="badge bg-danger mb-1" style="font-size: 0.6rem;">${vid.type}</div><br>
                    ${vid.title}
                </div>
            `;
            playlistDiv.appendChild(item);
        });

        // Ember Animation
        const emberContainer = document.getElementById('emberContainer');
        for (let i = 0; i < 25; i++) {
            const ember = document.createElement('div');
            ember.className = 'ember';
            const size = Math.random() * 6 + 2;
            ember.style.width = size + 'px';
            ember.style.height = size + 'px';
            ember.style.left = Math.random() * 100 + '%';
            ember.style.animationDelay = Math.random() * 5 + 's';
            ember.style.animationDuration = (Math.random() * 3 + 4) + 's';
            emberContainer.appendChild(ember);
        }
    </script>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

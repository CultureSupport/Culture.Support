<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Conflict Video</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-container {
            max-width: 800px;
            width: 95%; /* Responsive width for mobile */
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Video Coverage: Iran-Israel Situation</h2>
                <p class="text-muted">Analysis of the safety of Indians in the Gulf region.</p>
            </div>
            
            <!-- Centered Video Wrapper -->
            <div class="video-container mx-auto">
                <div class="ratio ratio-16x9">
                    <iframe 
                        src="https://www.youtube.com/embed/-ZRAFcRTH4s" 
                        title="Are 90 Lakh Indians Safe in the Iran-Israel War Zone?" 
                        allowfullscreen>
                    </iframe>
                </div>
            </div>

            <div class="mt-4 p-3 bg-white rounded border">
                <h5>Video Details</h5>
                <ul class="list-unstyled mb-0">
                    <li><strong>Channel:</strong> Jist</li>
                    <li><strong>Published:</strong> March 2026</li>
                    <li><strong>Topic:</strong> Safety of Indian citizens in the Middle East conflict.</li>
                </ul>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

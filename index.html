<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Hall \\ Culture.Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for the Gold Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #050505;
            color: #e0e0e0;
            overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        /* Ambient background glow with a hint of gold */
        .ambient-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70vw;
            height: 70vh;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, rgba(0, 0, 0, 0) 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Fixed 300x300 Frame styling */
        .art-frame {
            position: relative;
            width: 300px;
            height: 300px;
            padding: 12px;
            background: #111;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9), 0 0 30px rgba(212, 175, 55, 0.05);
            border: 1px solid #222;
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1000px;
        }

        .art-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(1.1) brightness(0.85);
        }

        /* HUD elements */
        .hud-line {
            background: rgba(212, 175, 55, 0.2);
            height: 1px;
            width: 100%;
        }

        .hud-bracket {
            border: 1px solid rgba(212, 175, 55, 0.3);
            width: 20px;
            height: 20px;
            position: absolute;
            z-index: 20;
        }

        .corner-tl { top: -5px; left: -5px; border-right: 0; border-bottom: 0; }
        .corner-tr { top: -5px; right: -5px; border-left: 0; border-bottom: 0; }
        .corner-bl { bottom: -5px; left: -5px; border-right: 0; border-top: 0; }
        .corner-br { bottom: -5px; right: -5px; border-left: 0; border-top: 0; }

        /* Glassmorphic GOLD Footer Dock */
        .gold-glass-dock {
            background: rgba(30, 25, 10, 0.5);
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9), inset 0 0 15px rgba(212, 175, 55, 0.1);
            padding: 10px 20px;
        }

        .gold-icon {
            color: #d4af37; /* Metallic Gold */
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5), 0 0 20px rgba(212, 175, 55, 0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            position: relative;
        }

        .gold-icon:hover {
            transform: translateY(-12px) scale(1.25);
            color: #ffefba; /* Bright Gold Highlight */
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.8), 0 0 30px rgba(212, 175, 55, 0.4);
        }

        /* Particle glow under icons */
        .icon-particle {
            position: absolute;
            bottom: -5px;
            width: 4px;
            height: 4px;
            background: #d4af37;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.3s;
            box-shadow: 0 0 10px #d4af37;
        }

        .gold-icon:hover .icon-particle {
            opacity: 1;
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(212, 175, 55, 0.08);
            animation: scan 5s linear infinite;
            pointer-events: none;
            z-index: 25;
        }

        @keyframes scan {
            from { top: 0; }
            to { top: 100%; }
        }
    </style>
</head>
<body class="flex items-center justify-center h-screen w-screen">

    <div class="ambient-glow"></div>

    <!-- Top HUD -->
    <div class="fixed top-0 left-0 w-full p-6 flex justify-between items-center z-10 opacity-60">
        <div class="text-xs tracking-widest uppercase flex flex-col">
            <span class="text-amber-500/80">Sector: Art Gallery</span>
            <span class="text-neutral-600">Dark Art Room</span>
        </div>
        <div class="text-right text-xs tracking-widest uppercase">
            <span id="timestamp" class="text-amber-200/50">00:00:00</span><br>
            <span class="text-amber-600/30">Dark Room</span>
        </div>
    </div>

    <!-- Main Content -->
    <main class="relative z-10 flex flex-col items-center">
        <div class="art-frame">
            <div class="scan-line"></div>
            
            <!-- Target Brackets -->
            <div class="hud-bracket corner-tl"></div>
            <div class="hud-bracket corner-tr"></div>
            <div class="hud-bracket corner-bl"></div>
            <div class="hud-bracket corner-br"></div>

            <!-- Image -->
            <img 
                src="App.png" 
                alt="Exhibited Work" ">
        </div>

        <!-- Info Plate -->
        <div class="mt-8 text-center">
            <h1 class="text-sm font-light tracking-[0.4em] uppercase text-amber-500/60 mb-2">Subject: Meditation</h1>
            <div class="flex items-center justify-center gap-4 text-[10px] text-neutral-600 uppercase">
                <div class="w-12 hud-line"></div>
                <span>Art Frame</span>
                <div class="w-12 hud-line"></div>
            </div>
        </div>
    </main>

    <!-- Gold Glassmorphic Footer Dock -->
    <div class="fixed bottom-10 left-1/2 -translate-x-1/2 z-20">
        <div class="gold-glass-dock flex items-center gap-2">
            <div class="gold-icon">
                <i class="fas fa-glasses text-xl"></i>
                <div class="icon-particle"></div>
            </div>
            <div class="gold-icon">
                <i class="fas fa-wifi text-xl"></i>
                <div class="icon-particle"></div>
            </div>
            <div class="gold-icon">
                <i class="fas fa-people-carry text-xl"></i>
                <div class="icon-particle"></div>
            </div>
            <div class="gold-icon">
                <i class="fas fa-hamsa text-xl"></i>
                <div class="icon-particle"></div>
            </div>
            <div class="gold-icon">
                <i class="fas fa-om text-xl"></i>
                <div class="icon-particle"></div>
            </div>
            <div class="gold-icon">
                <i class="fas fa-pray text-xl"></i>
                <div class="icon-particle"></div>
            </div>
            <div class="gold-icon">
                <i class="fas fa-quran text-xl"></i>
                <div class="icon-particle"></div>
            </div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ':' +
                         now.getMinutes().toString().padStart(2, '0') + ':' +
                         now.getSeconds().toString().padStart(2, '0');
            document.getElementById('timestamp').textContent = time;
        }
        setInterval(updateClock, 1000);
        updateClock();

        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            const frame = document.querySelector('.art-frame');
            frame.style.transform = `translate(${moveX}px, ${moveY}px) rotateY(${moveX * 1.5}deg) rotateX(${-moveY * 1.5}deg)`;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Nexus // Persistent Feed</title>
    <!-- Bulma CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #6366f1;
            --brand-secondary: #a855f7;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        /* Animated Background Particles */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.5;
        }

        .navbar {
            background: rgba(15, 23, 42, 0.8) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 1.5rem;
            transition: transform 0.2s ease;
        }

        .input-card {
            border-bottom: 4px solid var(--brand-primary);
        }

        .textarea {
            background: rgba(15, 23, 42, 0.5) !important;
            color: white !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 12px;
            resize: none;
            font-size: 1.1rem;
        }

        .textarea:focus {
            border-color: var(--brand-primary) !important;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2) !important;
        }

        .btn-post {
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            padding: 0.5rem 2rem;
            transition: all 0.3s ease;
        }

        .btn-post:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
            color: white;
        }

        .feed-container {
            max-width: 700px;
            margin: 2rem auto;
        }

        .post {
            margin-bottom: 1.5rem;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            border-radius: 50%;
            border: 2px solid var(--brand-primary);
        }

        .username {
            font-weight: 700;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .timestamp {
            font-size: 0.8rem;
            color: #64748b;
        }

        .post-content {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #cbd5e1;
        }

        .stats-badge {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(99, 102, 241, 0.1);
            color: var(--brand-primary);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <nav class="navbar is-fixed-top">
        <div class="container">
            <div class="navbar-brand">
                <a class="navbar-item" href="#">
                    <strong style="color: var(--brand-primary); font-size: 1.5rem; letter-spacing: -1px;">SOCIAL_NEXUS</strong>
                </a>
            </div>
            <div class="navbar-end">
                <div class="navbar-item">
                    <span class="stats-badge" id="storage-info">SYNCED: 0.00KB</span>
                </div>
            </div>
        </div>
    </nav>

    <section class="section" style="margin-top: 4rem;">
        <div class="container feed-container">
            
            <!-- Composer Card -->
            <div class="glass-card input-card mb-6">
                <div class="media">
                    <figure class="media-left">
                        <p class="image is-48x48">
                            <img class="avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Admin" alt="User">
                        </p>
                    </figure>
                    <div class="media-content">
                        <div class="field">
                            <p class="control">
                                <textarea id="postInput" class="textarea" placeholder="What's happening in the collective?"></textarea>
                            </p>
                        </div>
                        <div class="level is-mobile">
                            <div class="level-left">
                                <button id="submitBtn" class="button btn-post">Share Post</button>
                            </div>
                            <div class="level-right">
                                <label class="checkbox is-size-7 has-text-grey">
                                    <input type="checkbox" id="enterSubmit" checked> Press Enter to post
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Header -->
            <div class="level mb-5">
                <div class="level-left">
                    <h2 class="title is-4 has-text-white">Recent Activity</h2>
                </div>
                <div class="level-right">
                    <button id="clearBtn" class="button is-ghost is-small has-text-grey">Clear History</button>
                </div>
            </div>

            <!-- Feed -->
            <div id="feedContainer">
                <!-- Posts injected by JS -->
            </div>

        </div>
    </section>

    <script>
        // --- High-Performance Particle Background ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vX = (Math.random() - 0.5) * 0.3;
                this.vY = (Math.random() - 0.5) * 0.3;
                this.size = Math.random() * 2 + 1;
            }
            update() {
                this.x += this.vX; this.y += this.vY;
                if(this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = 'rgba(99, 102, 241, 0.2)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fill();
            }
        }

        for(let i=0; i<60; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // --- Core Logic ---
        const STORAGE_KEY = 'nexus_social_v1';
        const input = document.getElementById('postInput');
        const submitBtn = document.getElementById('submitBtn');
        const feed = document.getElementById('feedContainer');
        const autoSubmit = document.getElementById('enterSubmit');
        const clearBtn = document.getElementById('clearBtn');
        const storageInfo = document.getElementById('storage-info');

        let posts = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

        function saveAndRender() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
            
            // Calculate Storage Size
            const size = (JSON.stringify(posts).length / 1024).toFixed(2);
            storageInfo.textContent = `STORAGE: ${size}KB`;

            if (posts.length === 0) {
                feed.innerHTML = `
                    <div class="has-text-centered py-6">
                        <p class="has-text-grey">The feed is empty. Start the conversation!</p>
                    </div>`;
                return;
            }

            feed.innerHTML = posts.slice().reverse().map(post => `
                <div class="glass-card post">
                    <div class="media">
                        <div class="media-left">
                            <figure class="image is-40x40">
                                <img class="avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=${post.userSeed}" alt="User">
                            </figure>
                        </div>
                        <div class="media-content">
                            <div class="content">
                                <p>
                                    <span class="username">@user_${post.userSeed.substring(0,6)}</span>
                                    <span class="timestamp"> • ${post.timestamp}</span>
                                    <br>
                                    <span class="post-content">${escapeHTML(post.content)}</span>
                                </p>
                            </div>
                            <div class="level is-mobile mt-2">
                                <div class="level-left">
                                    <a class="level-item has-text-grey is-size-7">Reply</a>
                                    <a class="level-item has-text-grey is-size-7">Repost</a>
                                    <a class="level-item has-text-grey is-size-7">Like</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function handlePost() {
            const content = input.value.trim();
            if(!content) return;

            const newPost = {
                id: Date.now(),
                content: content,
                userSeed: Math.random().toString(36).substring(7),
                timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };

            posts.push(newPost);
            input.value = '';
            saveAndRender();
        }

        function escapeHTML(str) {
            const p = document.createElement('p');
            p.textContent = str;
            return p.innerHTML;
        }

        // --- Event Listeners ---
        submitBtn.addEventListener('click', handlePost);

        input.addEventListener('keydown', (e) => {
            if(e.key === 'Enter' && autoSubmit.checked && !e.shiftKey) {
                e.preventDefault();
                handlePost();
            }
        });

        clearBtn.addEventListener('click', () => {
            if(confirm("Are you sure you want to clear your local activity feed?")) {
                posts = [];
                saveAndRender();
            }
        });

        // Initialize Display
        saveAndRender();

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D AI Reinforcement Racing</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0, 0, 0, 0.7); padding: 15px; border-radius: 10px;
            pointer-events: none; border: 1px solid #444;
        }
        .stat-row { margin-bottom: 5px; font-size: 14px; }
        .accent { color: #00ffcc; font-weight: bold; }
        #leaderboard {
            position: absolute; top: 20px; right: 20px; color: white;
            background: rgba(0, 0, 0, 0.7); padding: 15px; border-radius: 10px;
            min-width: 150px; border: 1px solid #444;
        }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="ui">
    <div class="stat-row">Runde: <span id="round-val" class="accent">1</span> / 60</div>
    <div class="stat-row">Biler i live: <span id="cars-val" class="accent">30</span></div>
    <div class="stat-row">Beste distanse: <span id="dist-val" class="accent">0</span>m</div>
    <div style="margin-top: 10px; font-size: 12px; color: #aaa;">
        AI lærer via sensor-input og straff/belønning.<br>
        Missiler avfyres autonomt ved sikte.
    </div>
</div>

<div id="leaderboard">
    <div style="font-weight: bold; border-bottom: 1px solid #555; margin-bottom: 5px;">Topp 5 Biler</div>
    <div id="leader-list"></div>
</div>

<script>
/**
 * 3D AI RACING SIMULATOR
 * Bruker Three.js for rendering og en enkel Neural Network logikk for RL (Reinforcement Learning)
 */

let scene, camera, renderer, clock;
let track, cars = [], missiles = [];
let roadPoints = [];
const NUM_CARS = 30;
const MAX_ROUNDS = 60;
let currentRound = 1;

// Konfigurasjon
const TRACK_RADIUS = 100;
const TRACK_WIDTH = 12;

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    scene.fog = new THREE.FogExp2(0x050505, 0.005);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 80, 100);
    camera.lookAt(0, 0, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0x00ffcc, 1);
    sunLight.position.set(50, 100, 50);
    scene.add(sunLight);

    createTrack();
    createCars();

    clock = new THREE.Clock();
    animate();

    window.addEventListener('resize', onWindowResize, false);
}

function createTrack() {
    // Lager en kompleks bane (en slags 8-tall/oval hybrid)
    const curve = new THREE.CatmullRomCurve3([
        new THREE.Vector3(100, 0, 0),
        new THREE.Vector3(70, 0, 70),
        new THREE.Vector3(0, 0, 100),
        new THREE.Vector3(-70, 0, 50),
        new THREE.Vector3(-100, 0, 0),
        new THREE.Vector3(-70, 0, -70),
        new THREE.Vector3(0, 0, -50),
        new THREE.Vector3(70, 0, -70)
    ], true);

    roadPoints = curve.getPoints(200);
    const geometry = new THREE.TubeGeometry(curve, 100, TRACK_WIDTH, 20, true);
    const material = new THREE.MeshPhongMaterial({ 
        color: 0x222222, 
        wireframe: false,
        side: THREE.DoubleSide 
    });
    track = new THREE.Mesh(geometry, material);
    track.rotation.x = Math.PI / 2;
    scene.add(track);

    // Bakke-grid
    const grid = new THREE.GridHelper(500, 50, 0x333333, 0x111111);
    scene.add(grid);
}

class Car {
    constructor(index) {
        this.index = index;
        this.alive = true;
        this.lap = 0;
        this.distanceTravelled = 0;
        this.speed = 0.5 + Math.random() * 0.2;
        this.angle = 0;
        this.turnSpeed = 0.05;
        this.cooldown = 0;

        // "Hjerne" - Enkle vekter for 3 sensorer (venstre, midt, høyre)
        this.weights = [Math.random() - 0.5, Math.random() - 0.5, Math.random() - 0.5];
        
        // 3D Modell
        const group = new THREE.Group();
        const bodyGeo = new THREE.BoxGeometry(2, 1, 4);
        const bodyMat = new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        group.add(body);

        // Lys
        const light = new THREE.PointLight(bodyMat.color, 2, 10);
        light.position.y = 1;
        group.add(light);

        this.mesh = group;
        scene.add(this.mesh);

        // Startposisjon
        this.reset();
    }

    reset() {
        this.alive = true;
        this.distanceTravelled = 0;
        const startPos = roadPoints[0];
        this.mesh.position.copy(startPos);
        this.mesh.position.y = 1;
        this.mesh.visible = true;
    }

    update(delta, others) {
        if (!this.alive) return;

        // Sensorlogikk (Raycasting forenklet for ytelse)
        // Her simulerer vi avstand til banens senterlinje som input til RL
        let closestPointIndex = 0;
        let minDist = Infinity;
        
        for(let i=0; i<roadPoints.length; i++) {
            const d = this.mesh.position.distanceTo(roadPoints[i]);
            if(d < minDist) {
                minDist = d;
                closestPointIndex = i;
            }
        }

        // AI Beslutning (Veldig enkel Reinforcement Learning logikk - "Heuristic Evolution")
        // Vi prøver å styre mot neste punkt på banen
        const targetIndex = (closestPointIndex + 5) % roadPoints.length;
        const target = roadPoints[targetIndex];
        
        const desiredRotation = Math.atan2(
            target.x - this.mesh.position.x,
            target.z - this.mesh.position.z
        );

        // Gradvis styring (Learning-aktig adferd)
        let diff = desiredRotation - this.mesh.rotation.y;
        while (diff < -Math.PI) diff += Math.PI * 2;
        while (diff > Math.PI) diff -= Math.PI * 2;
        
        this.mesh.rotation.y += diff * 0.1;
        
        // Bevegelse
        this.mesh.translateZ(this.speed);
        this.distanceTravelled += this.speed;

        // Sjekk om ute av banen (forenklet)
        if (minDist > TRACK_WIDTH) {
            // Straff: Dør hvis man kjører for langt ut
            // I en ekte RL ville vi mutert vektene her
            this.die();
        }

        // Skyting
        if (this.cooldown > 0) {
            this.cooldown -= delta;
        } else {
            this.shoot(others);
        }
    }

    shoot(others) {
        // Finn nærmeste bil foran
        for(let other of others) {
            if (other === this || !other.alive) continue;
            const dist = this.mesh.position.distanceTo(other.mesh.position);
            if (dist < 30) {
                spawnMissile(this.mesh.position, other);
                this.cooldown = 3 + Math.random() * 5; // Sekunder mellom skudd
                break;
            }
        }
    }

    die() {
        this.alive = false;
        this.mesh.visible = false;
        createExplosion(this.mesh.position);
    }
}

function spawnMissile(startPos, targetCar) {
    const geo = new THREE.SphereGeometry(0.5, 8, 8);
    const mat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
    const missile = new THREE.Mesh(geo, mat);
    missile.position.copy(startPos);
    
    scene.add(missile);
    missiles.push({
        mesh: missile,
        target: targetCar,
        life: 2.0 // Lever i 2 sekunder
    });
}

function createExplosion(pos) {
    const pGeo = new THREE.BufferGeometry();
    const count = 20;
    const posArr = new Float32Array(count * 3);
    for(let i=0; i<count*3; i++) posArr[i] = (Math.random()-0.5) * 5;
    pGeo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
    const pMat = new THREE.PointsMaterial({ color: 0xffaa00, size: 0.5 });
    const particles = new THREE.Points(pGeo, pMat);
    particles.position.copy(pos);
    scene.add(particles);
    setTimeout(() => scene.remove(particles), 1000);
}

function createCars() {
    for (let i = 0; i < NUM_CARS; i++) {
        cars.push(new Car(i));
    }
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();

    let aliveCount = 0;
    let bestDist = 0;

    cars.forEach(car => {
        if (car.alive) {
            car.update(delta, cars);
            aliveCount++;
            if (car.distanceTravelled > bestDist) bestDist = car.distanceTravelled;
        }
    });

    // Oppdater missiler
    for (let i = missiles.length - 1; i >= 0; i--) {
        const m = missiles[i];
        m.life -= delta;
        
        if (m.life <= 0 || !m.target.alive) {
            scene.remove(m.mesh);
            missiles.splice(i, 1);
            continue;
        }

        // Enkel homing-logikk
        m.mesh.lookAt(m.target.mesh.position);
        m.mesh.translateZ(1.5);

        if (m.mesh.position.distanceTo(m.target.mesh.position) < 2) {
            m.target.die();
            scene.remove(m.mesh);
            missiles.splice(i, 1);
        }
    }

    // UI Oppdatering
    document.getElementById('cars-val').innerText = aliveCount;
    document.getElementById('dist-val').innerText = Math.floor(bestDist);
    document.getElementById('round-val').innerText = currentRound;

    // Sjekk runde-slutt (hvis alle dør eller en når mål)
    if (aliveCount === 0 || bestDist > 2000) {
        if (currentRound < MAX_ROUNDS) {
            currentRound++;
            cars.forEach(c => c.reset());
        }
    }

    // Kamerafølger den beste bilen
    const leadCar = cars.reduce((prev, curr) => (prev.distanceTravelled > curr.distanceTravelled && prev.alive) ? prev : curr);
    if (leadCar && leadCar.alive) {
        const offset = new THREE.Vector3(0, 30, 40).applyQuaternion(leadCar.mesh.quaternion);
        camera.position.lerp(leadCar.mesh.position.clone().add(offset), 0.1);
        camera.lookAt(leadCar.mesh.position);
    }

    // Leaderboard
    const sorted = [...cars].sort((a, b) => b.distanceTravelled - a.distanceTravelled).slice(0, 5);
    const listHtml = sorted.map((c, i) => `<div>${i+1}. Bil #${c.index} ${c.alive ? '' : '☠️'}</div>`).join('');
    document.getElementById('leader-list').innerHTML = listHtml;

    renderer.render(scene, camera);
}

window.onload = init;
</script>
</body>
</html>

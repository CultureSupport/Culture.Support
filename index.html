<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android 16 Dev Slim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Google+Sans:wght@400;500;700&display=swap');

        :root {
            --m3-primary: #d0bcff;
            --editor-bg: #1e1e1e;
        }

        body {
            background-color: #0a0a0a;
            color: white;
            font-family: 'Google Sans', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 200x400 Chassis */
        #device-frame {
            position: relative;
            width: 200px;
            height: 400px;
            background: #000;
            border-radius: 30px;
            border: 4px solid #333;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
        }

        /* Bakgrunnsmotor */
        #canvas-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Statuslinje */
        #status-bar {
            position: relative;
            z-index: 100;
            height: 24px;
            padding: 0 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 9px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }

        /* App Innhold */
        #content-layer {
            position: relative;
            z-index: 20;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* VS Code / Editor Stil */
        #workspace-view {
            display: none;
            background: var(--editor-bg);
            height: 100%;
            flex-direction: column;
        }

        #code-editor {
            flex: 1;
            background: transparent;
            color: #9cdcfe;
            border: none;
            padding: 10px;
            font-family: 'Fira Code', monospace;
            font-size: 10px;
            resize: none;
            outline: none;
            line-height: 1.4;
        }

        /* App Ikoner */
        .app-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 4px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .app-icon:active { transform: scale(0.9); }

        /* Glitch lag */
        #glitch-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 60;
            mix-blend-mode: screen;
        }

        /* Nav Bar */
        #nav-bar {
            height: 30px;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .nav-btn {
            font-size: 10px;
            opacity: 0.6;
            cursor: pointer;
        }
        .nav-btn.active { opacity: 1; color: var(--m3-primary); }

        /* Toast melding */
        #toast {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.9);
            color: black;
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 8px;
            display: none;
            z-index: 200;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="device-frame">
        <div id="status-bar">
            <span id="clock">12:00</span>
            <div class="flex gap-1">
                <span>5G</span>
                <span>100%</span>
            </div>
        </div>

        <canvas id="canvas-bg"></canvas>
        <canvas id="glitch-overlay"></canvas>

        <div id="content-layer">
            <!-- HJEM SKJERM -->
            <div id="home-view" class="p-4 flex flex-col items-center h-full">
                <div class="text-2xl font-light mb-6 mt-4" id="big-clock">00:00</div>
                
                <div class="grid grid-cols-3 gap-4">
                    <div class="flex flex-col items-center" onclick="showEditor()">
                        <div class="app-icon" style="background: #252526;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="#007acc"><path d="M1.297 17.152L0 16.31V7.69l1.297-.842 5.517 4.148-5.517 5.156zM12.13 12L7.145 8.243l-.848.636L10.303 12l-4.006 3.121.848.636L12.13 12zm8.573 4.31l1.297.842V7.69l-1.297-.842-5.517 4.148 5.517 5.156z"/></svg>
                        </div>
                        <span class="text-[8px]">VS Code</span>
                    </div>
                    <div class="flex flex-col items-center" onclick="changeFX()">
                        <div class="app-icon" style="background: #333;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="#ffcc00"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
                        </div>
                        <span class="text-[8px]">FX Engine</span>
                    </div>
                    <div class="flex flex-col items-center" onclick="shareApp()">
                        <div class="app-icon" style="background: #4caf50;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
                        </div>
                        <span class="text-[8px]">Share IP</span>
                    </div>
                </div>
            </div>

            <!-- WORKSPACE / EDITOR -->
            <div id="workspace-view">
                <div class="flex items-center justify-between bg-[#2d2d2d] px-2 py-1 border-b border-[#3e3e3e]">
                    <span class="text-[8px] text-gray-400">main.js</span>
                    <button onclick="runCode()" class="bg-green-600 text-[8px] px-2 py-0.5 rounded">RUN</button>
                </div>
                <textarea id="code-editor" spellcheck="false">// Android 16 Logic
function onUpdate() {
  // Endre FX intensitet
  intensity = 0.8;
  showToast("Code Running...");
}</textarea>
            </div>
        </div>

        <div id="toast">IP: 192.168.1.45:8080</div>

        <nav id="nav-bar">
            <div class="nav-btn active" id="btn-home" onclick="showHome()">HOME</div>
            <div class="nav-btn" id="btn-work" onclick="showEditor()">WORK</div>
        </nav>
    </div>

    <script>
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        const gCanvas = document.getElementById('glitch-overlay');
        const gctx = gCanvas.getContext('2d');
        
        let width = 200;
        let height = 400;
        let fxMode = 0;
        let intensity = 0;
        let frame = 0;

        // --- FX Bakgrunner (30 varianter simulert via mod-logikk) ---
        function drawFX() {
            ctx.clearRect(0, 0, width, height);
            frame++;

            // Modulo-valg av 30 typer (her kombineres farger/former)
            const type = fxMode % 30;
            
            ctx.globalAlpha = 0.6;
            if (type < 10) {
                // Type 0-9: Partikkel/Stjerne felt
                ctx.fillStyle = `hsl(${(frame + type * 20) % 360}, 70%, 50%)`;
                for(let i=0; i<15; i++) {
                    let y = (frame * (1 + type/5) + i * 30) % height;
                    ctx.beginPath();
                    ctx.arc((i * 15) % width, y, 1 + type/3, 0, Math.PI*2);
                    ctx.fill();
                }
            } else if (type < 20) {
                // Type 10-19: Geometriske linjer
                ctx.strokeStyle = `hsl(${(type * 15) % 360}, 80%, 60%)`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, (frame % height));
                ctx.lineTo(width, (height - (frame % height)));
                ctx.stroke();
            } else {
                // Type 20-29: Plasma/Bølge-effekt
                for(let i=0; i<width; i+=10) {
                    let hVal = Math.sin((i + frame) * 0.05) * 20 + (height/2);
                    ctx.fillStyle = `rgba(208, 188, 255, 0.3)`;
                    ctx.fillRect(i, hVal, 8, 8);
                }
            }
        }

        // --- Glitch Motor ---
        function drawGlitch() {
            gctx.clearRect(0, 0, width, height);
            if (intensity <= 0) return;

            for(let i = 0; i < 20 * intensity; i++) {
                gctx.fillStyle = i % 2 === 0 ? '#0ff' : '#f0f';
                gctx.globalAlpha = 0.3;
                gctx.fillRect(Math.random()*width, Math.random()*height, Math.random()*50*intensity, 2);
            }
            intensity *= 0.95;
        }

        // --- Grensesnitt Kontroll ---
        function showHome() {
            document.getElementById('home-view').style.display = 'flex';
            document.getElementById('workspace-view').style.display = 'none';
            document.getElementById('btn-home').classList.add('active');
            document.getElementById('btn-work').classList.remove('active');
        }

        function showEditor() {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('workspace-view').style.display = 'flex';
            document.getElementById('btn-home').classList.remove('active');
            document.getElementById('btn-work').classList.add('active');
        }

        function changeFX() {
            fxMode++;
            intensity = 1.0;
            showToast(`FX Mode: ${fxMode % 30}`);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        function shareApp() {
            const ip = "192.168." + Math.floor(Math.random()*255) + "." + Math.floor(Math.random()*255);
            showToast(`Shared at: ${ip}:8080`);
            intensity = 1.5;
        }

        function runCode() {
            const code = document.getElementById('code-editor').value;
            try {
                // Sikker evaluering av koden for simulatoren
                eval(code); 
                if(typeof onUpdate === 'function') onUpdate();
            } catch(e) {
                showToast("Error in code!");
            }
        }

        function updateClock() {
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').innerText = time;
            document.getElementById('big-clock').innerText = time;
        }

        function loop() {
            drawFX();
            drawGlitch();
            requestAnimationFrame(loop);
        }

        // Init
        canvas.width = width;
        canvas.height = height;
        gCanvas.width = width;
        gCanvas.height = height;
        setInterval(updateClock, 1000);
        updateClock();
        loop();

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profilkort</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      width: 320px;
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #4facfe;
      margin-bottom: 15px;
    }

    h1 {
      margin: 10px 0 5px;
      color: #333;
    }

    p {
      color: #666;
      font-size: 15px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #4facfe;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #007bff;
    }
  </style>
</head>
<body>

  <div class="card">
    <img 
      src="" 
      alt="Profilbilde" 
      class="profile-img"
    >

    <h1>Ole</h1>
    <p> pages utvikler </p>

    <a href="" class="btn">Kontakt meg</a>
  </div>

</body>
</html>

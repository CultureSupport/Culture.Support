<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komplete Kontrol A25 | Ålesund Dubstep</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .knob-container {
            width: 60px;
            height: 60px;
            background: #18181b;
            border-radius: 50%;
            border: 3px solid #3f3f46;
            position: relative;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .knob-container:hover { border-color: #06b6d4; }
        .knob-indicator {
            position: absolute;
            width: 4px;
            height: 20px;
            background: #06b6d4;
            top: 5px;
            left: calc(50% - 2px);
            transform-origin: bottom center;
            border-radius: 2px;
        }
        .key {
            height: 120px;
            width: 35px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 0 0 4px 4px;
            cursor: pointer;
            float: left;
            position: relative;
            z-index: 1;
            transition: background 0.1s;
        }
        .key.black {
            height: 75px;
            width: 22px;
            background: #111;
            margin-left: -11px;
            margin-right: -11px;
            z-index: 2;
            border: none;
        }
        .key.active { background: #06b6d4 !important; transform: translateY(2px); }
        .display-screen {
            background: #000;
            font-family: 'Courier New', Courier, monospace;
            border: 1px solid #333;
            box-shadow: inset 0 0 10px rgba(6, 182, 212, 0.2);
        }
        .loop-btn.playing {
            background: #ef4444;
            animation: pulse-red 1s infinite;
        }
        @keyframes pulse-red {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body class="bg-zinc-950 text-white p-4 lg:p-12">

    <div class="max-w-6xl mx-auto">
        <!-- Brand Header -->
        <header class="mb-8 flex justify-between items-end border-b border-zinc-800 pb-6">
            <div>
                <h1 class="text-4xl font-black text-cyan-500 tracking-tighter">NI KOMPLETE KONTROL A25</h1>
                <p class="text-zinc-500 font-mono text-sm">ÅLESUND DUBSTEP PRODUCTION SUITE // NO-6000</p>
            </div>
            <div class="text-right">
                <div class="text-xs text-zinc-500 uppercase tracking-widest">FL Studio Link</div>
                <div class="text-green-500 font-bold">READY</div>
            </div>
        </header>

        <!-- The Hardware Unit -->
        <div class="bg-zinc-900 rounded-3xl p-8 shadow-2xl border border-zinc-800">
            
            <!-- Top Control Bar -->
            <div class="flex flex-wrap gap-8 items-start mb-12">
                
                <!-- LED Display -->
                <div class="display-screen w-48 h-16 rounded-md p-2 flex flex-col justify-center">
                    <div class="text-[10px] text-cyan-800 uppercase">Preset:</div>
                    <div id="screen-text" class="text-cyan-400 text-sm font-bold truncate">SUKKERTOPPEN_GROWL</div>
                </div>

                <!-- 8 Touch Sensitive Knobs -->
                <div class="flex-1 grid grid-cols-4 md:grid-cols-8 gap-4">
                    <div class="flex flex-col items-center gap-2">
                        <div class="knob-container" id="knob-1" onclick="rotateKnob(1)">
                            <div class="knob-indicator" id="ind-1"></div>
                        </div>
                        <span class="text-[10px] text-zinc-500">CUTOFF</span>
                    </div>
                    <div class="flex flex-col items-center gap-2">
                        <div class="knob-container" id="knob-2" onclick="rotateKnob(2)">
                            <div class="knob-indicator" id="ind-2"></div>
                        </div>
                        <span class="text-[10px] text-zinc-500">RES</span>
                    </div>
                    <div class="flex flex-col items-center gap-2">
                        <div class="knob-container" id="knob-3" onclick="rotateKnob(3)">
                            <div class="knob-indicator" id="ind-3"></div>
                        </div>
                        <span class="text-[10px] text-zinc-500">LFO SPEED</span>
                    </div>
                    <div class="flex flex-col items-center gap-2">
                        <div class="knob-container" id="knob-4" onclick="rotateKnob(4)">
                            <div class="knob-indicator" id="ind-4"></div>
                        </div>
                        <span class="text-[10px] text-zinc-500">DRIVE</span>
                    </div>
                    <!-- Mock Knobs 5-8 -->
                    <div class="hidden md:flex flex-col items-center gap-2">
                        <div class="knob-container" onclick="rotateKnob(5)"><div class="knob-indicator"></div></div>
                        <span class="text-[10px] text-zinc-500">REVERB</span>
                    </div>
                    <div class="hidden md:flex flex-col items-center gap-2">
                        <div class="knob-container" onclick="rotateKnob(6)"><div class="knob-indicator"></div></div>
                        <span class="text-[10px] text-zinc-500">DELAY</span>
                    </div>
                    <div class="hidden md:flex flex-col items-center gap-2">
                        <div class="knob-container" onclick="rotateKnob(7)"><div class="knob-indicator"></div></div>
                        <span class="text-[10px] text-zinc-500">PHASE</span>
                    </div>
                    <div class="hidden md:flex flex-col items-center gap-2">
                        <div class="knob-container" onclick="rotateKnob(8)"><div class="knob-indicator"></div></div>
                        <span class="text-[10px] text-zinc-500">MORPH</span>
                    </div>
                </div>

                <!-- Transport Controls -->
                <div class="flex gap-2 bg-black/20 p-2 rounded-lg">
                    <button id="play-loop" onclick="toggleLoop()" class="loop-btn w-10 h-10 bg-zinc-800 rounded flex items-center justify-center hover:bg-zinc-700">
                        <svg viewBox="0 0 24 24" class="w-5 h-5 fill-current"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                    <button class="w-10 h-10 bg-zinc-800 rounded flex items-center justify-center hover:bg-zinc-700">
                        <svg viewBox="0 0 24 24" class="w-5 h-5 fill-current"><path d="M6 6h12v12H6z"/></svg>
                    </button>
                </div>
            </div>

            <!-- Keyboard Section -->
            <div class="relative bg-zinc-950 p-6 rounded-xl overflow-x-auto shadow-inner">
                <div class="flex min-w-max" id="keyboard">
                    <!-- Keys generated via JS/TS logic -->
                </div>
            </div>
        </div>

        <!-- Footer Info -->
        <div class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-zinc-900/50 p-4 rounded-xl border border-zinc-800">
                <h4 class="text-cyan-500 text-xs font-bold mb-2 uppercase">Current Filter</h4>
                <p id="filter-display" class="text-2xl font-mono">12.5 kHz</p>
            </div>
            <div class="bg-zinc-900/50 p-4 rounded-xl border border-zinc-800">
                <h4 class="text-purple-500 text-xs font-bold mb-2 uppercase">MIDI Output</h4>
                <p id="midi-log" class="text-sm font-mono text-zinc-400">Waiting for input...</p>
            </div>
            <div class="bg-zinc-900/50 p-4 rounded-xl border border-zinc-800 flex items-center justify-center">
                <button class="bg-cyan-600 hover:bg-cyan-500 px-6 py-2 rounded-full font-bold text-sm transition">SYNC WITH FL STUDIO</button>
            </div>
        </div>
    </div>

    <script>
        // --- TYPESCRIPT-STYLE LOGIC ---
        
        let isPlaying = false;
        let knobValues = { 1: 45, 2: 20, 3: 120, 4: 10 };

        // Generate A25 Keys (25 keys starting from C)
        const keys = [
            { note: 'C', black: false }, { note: 'C#', black: true },
            { note: 'D', black: false }, { note: 'D#', black: true },
            { note: 'E', black: false },
            { note: 'F', black: false }, { note: 'F#', black: true },
            { note: 'G', black: false }, { note: 'G#', black: true },
            { note: 'A', black: false }, { note: 'A#', black: true },
            { note: 'B', black: false },
            { note: 'C', black: false }, { note: 'C#', black: true },
            { note: 'D', black: false }, { note: 'D#', black: true },
            { note: 'E', black: false },
            { note: 'F', black: false }, { note: 'F#', black: true },
            { note: 'G', black: false }, { note: 'G#', black: true },
            { note: 'A', black: false }, { note: 'A#', black: true },
            { note: 'B', black: false },
            { note: 'C', black: false }
        ];

        const keyboardEl = document.getElementById('keyboard');
        keys.forEach((k, idx) => {
            const keyEl = document.createElement('div');
            keyEl.className = `key ${k.black ? 'black' : ''}`;
            keyEl.onmousedown = () => playNote(k.note, idx);
            keyEl.onmouseup = () => keyEl.classList.remove('active');
            keyEl.onmouseleave = () => keyEl.classList.remove('active');
            keyboardEl.appendChild(keyEl);
        });

        function playNote(note, index) {
            const el = keyboardEl.children[index];
            el.classList.add('active');
            document.getElementById('midi-log').innerText = `Note ON: ${note}${Math.floor(index/12)+2} (Vel: 105)`;
            document.getElementById('screen-text').innerText = `PLAY: ${note}${Math.floor(index/12)+2}`;
        }

        function rotateKnob(id) {
            knobValues[id] = (knobValues[id] + 15) % 360;
            const indicator = document.getElementById(`ind-${id}`);
            if(indicator) {
                indicator.style.transform = `rotate(${knobValues[id]}deg)`;
            }
            
            if(id === 1) { // Cutoff Logic
                const freq = (knobValues[id] / 360 * 20000).toFixed(0);
                document.getElementById('filter-display').innerText = `${freq} Hz`;
                document.getElementById('screen-text').innerText = `CUTOFF: ${freq}Hz`;
            }
        }

        function toggleLoop() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('play-loop');
            if(isPlaying) {
                btn.classList.add('playing');
                document.getElementById('midi-log').innerText = "LOOPING: 145 BPM - ÅLESUND_DUB.wav";
                document.getElementById('screen-text').innerText = "SYNC: EXTERNAL";
            } else {
                btn.classList.remove('playing');
                document.getElementById('midi-log').innerText = "STOPPED";
                document.getElementById('screen-text').innerText = "A25 IDLE";
            }
        }

        // Initialize knob positions
        Object.keys(knobValues).forEach(id => {
            const ind = document.getElementById(`ind-${id}`);
            if(ind) ind.style.transform = `rotate(${knobValues[id]}deg)`;
        });

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barnas Spillunivers 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@500;700&display=swap');
        
        body {
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle, #fdfbfb 0%, #ebedee 100%);
            touch-action: manipulation;
        }

        .kids-font { font-family: 'Fredoka', sans-serif; }

        .game-canvas {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 100%;
            touch-action: none;
        }

        .ai-chat-bubble {
            position: relative;
            background: #ffffff;
            border: 3px solid #6366f1;
            border-radius: 20px;
        }

        .ai-chat-bubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 20px;
            border-width: 15px 15px 0;
            border-style: solid;
            border-color: #6366f1 transparent;
        }

        .pulse-soft {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="min-h-screen pb-10">

    <!-- Top Navigation -->
    <nav class="bg-white shadow-sm p-4 flex justify-between items-center sticky top-0 z-40">
        <h1 class="kids-font text-2xl font-bold text-indigo-600">Barnas Spillunivers ✨</h1>
        <div class="flex items-center gap-3 bg-indigo-50 px-4 py-2 rounded-full border-2 border-indigo-200">
            <span class="text-indigo-600 font-bold">Stjerner:</span>
            <span id="score-display" class="kids-font text-xl text-yellow-500">0</span>
            <i class="fa-solid fa-star text-yellow-400"></i>
        </div>
    </nav>

    <!-- Barne-AI Seksjon -->
    <div class="max-w-4xl mx-auto p-4 mt-6">
        <div class="flex items-end gap-4 mb-4">
            <div class="w-16 h-16 bg-indigo-500 rounded-full flex items-center justify-center text-3xl shadow-lg pulse-soft">
                🤖
            </div>
            <div class="ai-chat-bubble p-4 flex-1 shadow-md">
                <p id="ai-text" class="text-gray-700 font-medium">Hei! Jeg er din Barne-AI. Hva vil du leke eller lære i dag? ✨</p>
            </div>
        </div>
        <div class="flex gap-2">
            <input id="ai-input" type="text" placeholder="Spør meg om universet, dyr eller en vits..." 
                class="flex-1 border-2 border-indigo-200 rounded-2xl px-5 py-3 focus:outline-none focus:border-indigo-500 shadow-inner">
            <button onclick="talkToAI()" id="ai-send-btn" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl hover:bg-indigo-700 transition-all font-bold">
                Snakk!
            </button>
        </div>
    </div>

    <!-- Spill-meny -->
    <div class="max-w-6xl mx-auto px-4 mt-10 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6" id="game-menu">
        <!-- JS genererer 10 spillkort -->
    </div>

    <!-- Spill-vindu -->
    <div id="game-overlay" class="fixed inset-0 bg-black/90 z-50 hidden flex flex-col items-center justify-center p-4">
        <div class="w-full max-w-2xl flex justify-between items-center mb-4">
            <h2 id="current-game-title" class="kids-font text-3xl text-white">Spillnavn</h2>
            <button onclick="closeGame()" class="bg-red-500 text-white w-12 h-12 rounded-full text-2xl hover:rotate-90 transition-transform">✕</button>
        </div>
        <div id="canvas-container" class="relative w-full max-w-xl aspect-square bg-white rounded-3xl overflow-hidden shadow-2xl">
            <!-- Canvas vil bli injisert her -->
        </div>
        <div class="mt-6 flex gap-4">
            <button id="game-action-btn" class="bg-green-500 text-white px-8 py-3 rounded-2xl font-bold text-xl shadow-lg hover:bg-green-600">START</button>
        </div>
    </div>

    <script>
        const apiKey = ""; // Miljøet håndterer dette
        let stars = parseInt(localStorage.getItem('kids_stars')) || 0;
        document.getElementById('score-display').innerText = stars;

        const games = [
            { id: 'pop', name: 'Ballong-popp', icon: '🎈', color: 'bg-red-400' },
            { id: 'paint', name: 'Magisk Pensel', icon: '🎨', color: 'bg-blue-400' },
            { id: 'space', name: 'Rom-reise', icon: '🚀', color: 'bg-indigo-600' },
            { id: 'catch', name: 'Frukt-fanger', icon: '🍎', color: 'bg-green-400' },
            { id: 'music', name: 'Regnbue-piano', icon: '🎹', color: 'bg-yellow-400' },
            { id: 'memory', name: 'Dyre-husk', icon: '🦊', color: 'bg-orange-400' },
            { id: 'math', name: 'Matte-rakett', icon: '➕', color: 'bg-purple-500' },
            { id: 'blocks', name: 'Stable-tårn', icon: '🧱', color: 'bg-amber-600' },
            { id: 'ocean', name: 'Fiske-mating', icon: '🐠', color: 'bg-cyan-400' },
            { id: 'hero', name: 'Super-helt', icon: '🦸', color: 'bg-rose-500' }
        ];

        // Render Menu
        const menu = document.getElementById('game-menu');
        games.forEach(game => {
            const card = document.createElement('div');
            card.className = `${game.color} p-6 rounded-3xl shadow-xl cursor-pointer hover:scale-105 transition-transform flex flex-col items-center gap-4 text-white border-b-8 border-black/10`;
            card.onclick = () => initGame(game.id);
            card.innerHTML = `
                <span class="text-6xl">${game.icon}</span>
                <span class="kids-font text-xl font-semibold">${game.name}</span>
            `;
            menu.appendChild(card);
        });

        // AI Logic
        async function talkToAI() {
            const inputField = document.getElementById('ai-input');
            const aiText = document.getElementById('ai-text');
            const btn = document.getElementById('ai-send-btn');
            const prompt = inputField.value.trim();
            
            if (!prompt) return;

            inputField.value = '';
            aiText.innerText = 'Tenker... 🤔';
            btn.disabled = true;

            const systemInstruction = "Du er 'Barne-AI', en morsom, snill og kreativ venn for barn mellom 4 og 10 år. Svar på norsk. Bruk emojier. Vær oppmuntrende. Hvis de spør om fakta, forklar det enkelt. Ikke bruk komplekse ord. Hvis barnet vil leke, foreslå en lek de kan gjøre på rommet eller spør dem om favorittdyret deres.";

            try {
                let delay = 1000;
                for (let i = 0; i < 3; i++) {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemInstruction }] }
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        aiText.innerText = data.candidates[0].content.parts[0].text;
                        btn.disabled = false;
                        return;
                    }
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
                aiText.innerText = "Ops! Robot-hjernen min fikk litt floke. Kan vi prøve igjen? 🤖";
            } catch (error) {
                aiText.innerText = "Jeg mistet kontakten med romstasjonen! Prøv igjen om litt. 📡";
            }
            btn.disabled = false;
        }

        // Game Engine
        let currentCanvas = null;
        let animationFrame = null;
        let gameActive = false;

        function initGame(gameId) {
            const overlay = document.getElementById('game-overlay');
            const container = document.getElementById('canvas-container');
            const title = document.getElementById('current-game-title');
            const actionBtn = document.getElementById('game-action-btn');
            const gameData = games.find(g => g.id === gameId);
            
            overlay.classList.remove('hidden');
            title.innerText = gameData.name;
            container.innerHTML = '<canvas id="gameCanvas" class="w-full h-full"></canvas>';
            
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            
            // Set internal resolution
            canvas.width = 600;
            canvas.height = 600;

            actionBtn.onclick = () => {
                gameActive = true;
                if (gameId === 'pop') startBalloonPop(canvas, ctx);
                if (gameId === 'space') startSpaceGame(canvas, ctx);
                if (gameId === 'catch') startCatchGame(canvas, ctx);
                if (gameId === 'paint') startPaintGame(canvas, ctx);
                actionBtn.classList.add('hidden');
            };
        }

        function closeGame() {
            gameActive = false;
            cancelAnimationFrame(animationFrame);
            document.getElementById('game-overlay').classList.add('hidden');
            document.getElementById('game-action-btn').classList.remove('hidden');
        }

        function addStar() {
            stars += 1;
            localStorage.setItem('kids_stars', stars);
            document.getElementById('score-display').innerText = stars;
        }

        // --- GAME 1: BALLOON POP ---
        function startBalloonPop(canvas, ctx) {
            let balloons = [];
            
            canvas.addEventListener('mousedown', (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX - rect.left) * (canvas.width / rect.width);
                const y = (e.clientY - rect.top) * (canvas.height / rect.height);
                
                balloons = balloons.filter(b => {
                    const dist = Math.hypot(b.x - x, b.y - y);
                    if (dist < b.r) {
                        addStar();
                        return false;
                    }
                    return true;
                });
            });

            function loop() {
                if (!gameActive) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if (Math.random() < 0.03) {
                    balloons.push({
                        x: Math.random() * canvas.width,
                        y: canvas.height + 50,
                        r: 30 + Math.random() * 20,
                        speed: 2 + Math.random() * 3,
                        color: `hsl(${Math.random() * 360}, 70%, 60%)`
                    });
                }

                balloons.forEach(b => {
                    b.y -= b.speed;
                    ctx.beginPath();
                    ctx.fillStyle = b.color;
                    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                    ctx.fill();
                    // Draw string
                    ctx.beginPath();
                    ctx.moveTo(b.x, b.y + b.r);
                    ctx.lineTo(b.x, b.y + b.r + 40);
                    ctx.stroke();
                });

                balloons = balloons.filter(b => b.y > -100);
                animationFrame = requestAnimationFrame(loop);
            }
            loop();
        }

        // --- GAME 2: SPACE GAME ---
        function startSpaceGame(canvas, ctx) {
            let shipX = canvas.width / 2;
            let obstacles = [];
            
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                shipX = (e.clientX - rect.left) * (canvas.width / rect.width);
            });

            function loop() {
                if (!gameActive) return;
                ctx.fillStyle = '#0a0a2a';
                ctx.fillRect(0,0, canvas.width, canvas.height);

                // Ship
                ctx.font = '50px serif';
                ctx.textAlign = 'center';
                ctx.fillText('🚀', shipX, canvas.height - 60);

                if (Math.random() < 0.05) {
                    obstacles.push({ x: Math.random() * canvas.width, y: -50, size: 40 });
                }

                obstacles.forEach((o, index) => {
                    o.y += 5;
                    ctx.fillText('☄️', o.x, o.y);
                    
                    // Collision
                    if (Math.hypot(o.x - shipX, o.y - (canvas.height - 80)) < 40) {
                        gameActive = false;
                        alert("BOM! Prøv igjen! Du samlet poeng!");
                        closeGame();
                    }
                    
                    if (o.y > canvas.height) {
                        obstacles.splice(index, 1);
                        addStar();
                    }
                });

                animationFrame = requestAnimationFrame(loop);
            }
            loop();
        }

        // --- GAME 3: CATCH GAME ---
        function startCatchGame(canvas, ctx) {
            let basketX = canvas.width / 2;
            let fruits = [];
            const fruitTypes = ['🍎', '🍌', '🍇', '🍓', '🍊'];

            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                basketX = (e.clientX - rect.left) * (canvas.width / rect.width);
            });

            function loop() {
                if (!gameActive) return;
                ctx.fillStyle = '#f0fff4';
                ctx.fillRect(0,0, canvas.width, canvas.height);

                ctx.font = '60px serif';
                ctx.fillText('🧺', basketX - 30, canvas.height - 40);

                if (Math.random() < 0.04) {
                    fruits.push({ 
                        x: Math.random() * (canvas.width - 40) + 20, 
                        y: -50, 
                        type: fruitTypes[Math.floor(Math.random()*fruitTypes.length)] 
                    });
                }

                fruits.forEach((f, i) => {
                    f.y += 4;
                    ctx.fillText(f.type, f.x - 20, f.y);

                    if (f.y > canvas.height - 80 && Math.abs(f.x - basketX) < 50) {
                        fruits.splice(i, 1);
                        addStar();
                    }
                });

                fruits = fruits.filter(f => f.y < canvas.height);
                animationFrame = requestAnimationFrame(loop);
            }
            loop();
        }

        // --- GAME 4: PAINT GAME ---
        function startPaintGame(canvas, ctx) {
            let painting = false;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.lineWidth = 15;
            ctx.strokeStyle = '#6366f1';

            canvas.onmousedown = (e) => { painting = true; draw(e); };
            canvas.onmousemove = draw;
            canvas.onmouseup = () => { painting = false; ctx.beginPath(); addStar(); };

            function draw(e) {
                if (!painting) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX - rect.left) * (canvas.width / rect.width);
                const y = (e.clientY - rect.top) * (canvas.height / rect.height);
                
                ctx.lineTo(x, y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x, y);
            }
        }
    </script>
</body>
</html>

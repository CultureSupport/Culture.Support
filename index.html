<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dathu OS - Olessiall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;700&display=swap');

        :root {
            --cyan-glow: #06b6d4;
            --dathu-bg: #020408;
            --dathu-panel: rgba(10, 15, 25, 0.95);
        }

        body {
            background-color: #000;
            color: #e2e8f0;
            font-family: 'Fira Code', monospace;
            overflow: hidden;
            height: 100vh;
            margin: 0;
            user-select: none;
        }

        /* Mobile Intro Style */
        #mobile-init-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle at center, #05101a 0%, #000 100%);
        }

        .mobile-device {
            width: 300px;
            height: 600px;
            background: #111;
            border: 10px solid #222;
            border-radius: 40px;
            position: relative;
            box-shadow: 0 0 100px rgba(6, 182, 212, 0.2);
            overflow: hidden;
        }

        .mobile-screen {
            height: 100%;
            background: linear-gradient(180deg, #0a1219 0%, #000 100%);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Desktop Environment */
        #desktop-environment {
            display: none;
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1614850523296-e811d9ed0765?auto=format&fit=crop&q=80&w=2070') center/cover;
            position: relative;
        }

        .glass-panel {
            background: var(--dathu-panel);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(6, 182, 212, 0.2);
            position: absolute;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .window-header {
            cursor: move;
            background: rgba(6, 182, 212, 0.1);
            border-bottom: 1px solid rgba(6, 182, 212, 0.2);
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            flex-shrink: 0;
        }

        .start-menu {
            position: absolute;
            bottom: 50px;
            left: 10px;
            width: 300px;
            background: var(--dathu-panel);
            border: 1px solid rgba(6, 182, 212, 0.3);
            display: none;
            z-index: 9999;
        }

        .desktop-icon {
            width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .desktop-icon:hover { background: rgba(255, 255, 255, 0.1); }

        .resizer {
            width: 10px; height: 10px;
            position: absolute;
            right: 0; bottom: 0;
            cursor: nwse-resize;
            z-index: 10;
        }

        .hidden { display: none !important; }

        /* App Store Specifics */
        .store-sidebar {
            width: 140px;
            border-right: 1px solid rgba(255,255,255,0.05);
            background: rgba(0,0,0,0.2);
        }

        .store-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .app-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            transition: all 0.2s;
        }

        .app-card:hover {
            border-color: var(--cyan-glow);
            background: rgba(6, 182, 212, 0.05);
        }

        /* CRT Effect */
        .crt::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.005), rgba(0, 0, 255, 0.01));
            z-index: 10000;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(6, 182, 212, 0.3); border-radius: 10px; }
    </style>
</head>
<body class="crt">

    <!-- 1. MOBILE INITIALIZATION GUI -->
    <div id="mobile-init-container">
        <div class="mobile-device">
            <div class="mobile-screen">
                <div class="mt-10 mb-20 text-center">
                    <i class="fas fa-atom text-5xl text-cyan-500 mb-4 animate-spin-slow"></i>
                    <h1 class="text-xl font-black tracking-widest text-white uppercase">Dathu OS</h1>
                    <p class="text-[10px] text-cyan-800">MOBILE AUTHENTICATOR</p>
                </div>

                <div id="auth-zone" class="w-full space-y-6">
                    <div class="flex flex-col items-center gap-4">
                        <div id="fingerprint-btn" onclick="startLoading()" class="w-20 h-20 rounded-full border-2 border-cyan-500 flex items-center justify-center cursor-pointer hover:bg-cyan-500/10 transition-all">
                            <i class="fas fa-fingerprint text-3xl text-cyan-400"></i>
                        </div>
                        <p id="auth-text" class="text-[10px] text-cyan-600 uppercase font-bold animate-pulse">Touch to Authorize Desktop</p>
                    </div>
                </div>

                <div id="mobile-loader" class="hidden w-full space-y-4 mt-10">
                    <div class="h-1 w-full bg-cyan-950 overflow-hidden">
                        <div id="load-progress" class="h-full bg-cyan-500 transition-all duration-300" style="width: 0%"></div>
                    </div>
                    <p id="load-status" class="text-[8px] font-mono text-cyan-700 uppercase">Init Shell...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. DESKTOP ENVIRONMENT -->
    <div id="desktop-environment">
        <div class="h-8 bg-black/60 backdrop-blur-md border-b border-white/10 flex items-center justify-between px-4">
            <div class="flex items-center gap-4 text-[10px]">
                <span class="text-cyan-500 font-bold">DATHU KERNEL 9.0.1</span>
                <span class="text-slate-500 uppercase">GPU_STATUS: STABLE</span>
            </div>
            <div id="os-clock" class="text-[10px] text-slate-300 font-bold">00:00:00</div>
        </div>

        <!-- Icons -->
        <div class="p-4 grid grid-cols-1 gap-4 w-max">
            <div onclick="openApp('terminal')" class="desktop-icon">
                <i class="fas fa-terminal text-3xl text-cyan-500"></i>
                <span class="text-[9px] text-white font-bold uppercase">Terminal</span>
            </div>
            <div onclick="openApp('editor')" class="desktop-icon">
                <i class="fas fa-code text-3xl text-indigo-400"></i>
                <span class="text-[9px] text-white font-bold uppercase">Editor</span>
            </div>
            <div onclick="openApp('store')" class="desktop-icon">
                <i class="fas fa-shopping-bag text-3xl text-amber-400"></i>
                <span class="text-[9px] text-white font-bold uppercase">App Store</span>
            </div>
        </div>

        <div id="window-layer">
            
            <!-- APP STORE WINDOW -->
            <div id="app-store" class="glass-panel hidden" style="width: 900px; height: 600px; left: 150px; top: 80px;">
                <div class="window-header">
                    <span class="text-[10px] font-bold text-amber-400 uppercase"><i class="fas fa-shopping-bag mr-2"></i>Dathu Enterprise Store</span>
                    <i class="fas fa-times text-xs text-red-500 cursor-pointer" onclick="closeApp('store')"></i>
                </div>
                <div class="flex flex-1 overflow-hidden">
                    <!-- Sidebar -->
                    <div class="store-sidebar p-2 space-y-1">
                        <button onclick="filterStore('all')" class="w-full text-left p-2 text-[9px] uppercase hover:bg-white/5 rounded text-amber-200">All Apps</button>
                        <button onclick="filterStore('gpu')" class="w-full text-left p-2 text-[9px] uppercase hover:bg-white/5 rounded text-slate-400">GPU & Stability</button>
                        <button onclick="filterStore('games')" class="w-full text-left p-2 text-[9px] uppercase hover:bg-white/5 rounded text-slate-400">Gaming</button>
                        <button onclick="filterStore('widgets')" class="w-full text-left p-2 text-[9px] uppercase hover:bg-white/5 rounded text-slate-400">Widgets</button>
                        <button onclick="filterStore('server')" class="w-full text-left p-2 text-[9px] uppercase hover:bg-white/5 rounded text-slate-400">Server Clients</button>
                    </div>
                    <!-- Main Store Area -->
                    <div class="flex-1 overflow-y-auto" id="store-content">
                        <div class="p-4 border-b border-white/5 flex justify-between items-center">
                            <h2 class="text-xs font-bold uppercase">Marketplace <span class="text-slate-500 font-normal ml-2">312 Apps Found</span></h2>
                            <div class="text-[9px] bg-amber-500/10 text-amber-500 px-2 py-1 rounded border border-amber-500/20">
                                D-Credits: 50,000
                            </div>
                        </div>
                        <div class="store-grid" id="app-grid">
                            <!-- Apps injected here -->
                        </div>
                    </div>
                </div>
                <div class="resizer"></div>
            </div>

            <!-- TERMINAL -->
            <div id="app-terminal" class="glass-panel hidden" style="width: 500px; height: 350px; left: 100px; top: 100px;">
                <div class="window-header">
                    <span class="text-[10px] font-bold text-cyan-500 uppercase">Shell</span>
                    <i class="fas fa-times text-xs text-red-500 cursor-pointer" onclick="closeApp('terminal')"></i>
                </div>
                <div id="term-out" class="flex-1 p-3 font-mono text-[10px] overflow-y-auto bg-black/40"></div>
                <div class="p-2 border-t border-white/5 flex gap-2">
                    <span class="text-cyan-600 text-[10px]">root@dathu:~$</span>
                    <input type="text" onkeydown="handleTerm(event, this)" class="bg-transparent border-none outline-none text-[10px] text-white flex-1">
                </div>
                <div class="resizer"></div>
            </div>

        </div>

        <!-- Taskbar -->
        <div class="fixed bottom-0 w-full h-10 bg-black/90 backdrop-blur-md border-t border-white/10 flex items-center px-2 gap-2 z-[9999]">
            <button onclick="toggleStart()" class="w-8 h-8 bg-cyan-600 hover:bg-cyan-500 text-black flex items-center justify-center font-black text-lg">D</button>
            <div class="flex-1 flex gap-1 h-full items-center px-4" id="taskbar-items"></div>
            <div id="os-clock" class="px-4 text-slate-500 text-[10px] font-bold">00:00:00</div>
        </div>

        <!-- Start Menu -->
        <div id="start-menu" class="start-menu rounded-t-lg shadow-2xl overflow-hidden">
            <div class="p-4 bg-cyan-600 text-black flex items-center gap-3">
                <div class="w-8 h-8 bg-black/20 rounded-full flex items-center justify-center"><i class="fas fa-user text-xs"></i></div>
                <div class="text-[10px] font-bold uppercase">Olessiall Admin</div>
            </div>
            <div class="p-1">
                <div onclick="openApp('store')" class="p-2 hover:bg-white/5 flex items-center gap-3 text-[10px] cursor-pointer"><i class="fas fa-shopping-bag w-4"></i> Marketplace</div>
                <div onclick="openApp('terminal')" class="p-2 hover:bg-white/5 flex items-center gap-3 text-[10px] cursor-pointer"><i class="fas fa-terminal w-4"></i> Terminal</div>
                <hr class="border-white/5 my-1">
                <div onclick="location.reload()" class="p-2 hover:bg-red-500/10 text-red-400 flex items-center gap-3 text-[10px] cursor-pointer"><i class="fas fa-power-off w-4"></i> Shutdown</div>
            </div>
        </div>
    </div>

    <script>
        // Store Data Generation
        const appTypes = [
            { cat: 'gpu', icon: 'fas fa-microchip', color: 'text-emerald-400', names: ['CoreX Optimizer', 'Vulkan Stable', 'GPU Stress-7', 'RTX Proxy', 'Buffer Clear'] },
            { cat: 'games', icon: 'fas fa-gamepad', color: 'text-purple-400', names: ['Cyber Strike', 'Void Runner', 'Neural Chess', 'Quantum Racer', 'Grid Wars'] },
            { cat: 'widgets', icon: 'fas fa-th-large', color: 'text-cyan-400', names: ['Clock-Z', 'Net Monitor', 'RAM Bar', 'Weather-D', 'Crypto Feed'] },
            { cat: 'server', icon: 'fas fa-server', color: 'text-amber-400', names: ['Node Link', 'SQL Proxy', 'Auth Gate', 'Log Stream', 'API Shield'] }
        ];

        let allApps = [];
        for(let i = 0; i < 312; i++) {
            const type = appTypes[Math.floor(Math.random() * appTypes.length)];
            const name = type.names[Math.floor(Math.random() * type.names.length)] + " " + (Math.floor(Math.random() * 9) + 1);
            allApps.push({ id: i, name, cat: type.cat, icon: type.icon, color: type.color });
        }

        function renderApps(filter = 'all') {
            const grid = document.getElementById('app-grid');
            grid.innerHTML = '';
            const filtered = filter === 'all' ? allApps : allApps.filter(a => a.cat === filter);
            
            filtered.forEach(app => {
                const card = document.createElement('div');
                card.className = 'app-card';
                card.innerHTML = `
                    <i class="${app.icon} ${app.color} text-xl mb-2"></i>
                    <h3 class="text-[9px] font-bold uppercase truncate">${app.name}</h3>
                    <p class="text-[7px] text-slate-600 mt-1 uppercase">${app.cat}</p>
                    <button class="mt-2 w-full text-[8px] border border-white/10 py-1 hover:bg-white/5 transition-all">GET</button>
                `;
                grid.appendChild(card);
            });
        }

        function filterStore(cat) {
            renderApps(cat);
            document.querySelectorAll('.store-sidebar button').forEach(btn => btn.className = btn.className.replace('text-amber-200', 'text-slate-400'));
            event.target.className = event.target.className.replace('text-slate-400', 'text-amber-200');
        }

        // Boot Logic
        function startLoading() {
            const btn = document.getElementById('fingerprint-btn');
            const loader = document.getElementById('mobile-loader');
            const progress = document.getElementById('load-progress');
            const status = document.getElementById('load-status');
            
            btn.classList.add('bg-cyan-500');
            btn.querySelector('i').className = 'fas fa-check text-3xl text-black';
            loader.classList.remove('hidden');

            let p = 0;
            const interval = setInterval(() => {
                p += Math.random() * 15;
                if(p >= 100) {
                    p = 100;
                    clearInterval(interval);
                    setTimeout(() => {
                        document.getElementById('mobile-init-container').classList.add('hidden');
                        document.getElementById('desktop-environment').style.display = 'block';
                        renderApps();
                        startClock();
                    }, 500);
                }
                progress.style.width = p + '%';
                status.textContent = p < 50 ? "Linking GPU..." : "Mounting Nodes...";
            }, 200);
        }

        function startClock() {
            setInterval(() => {
                document.getElementById('os-clock').textContent = new Date().toLocaleTimeString('no-NO');
            }, 1000);
        }

        function openApp(id) {
            const app = document.getElementById(`app-${id}`);
            app.classList.remove('hidden');
            app.style.zIndex = 1000;
            document.getElementById('start-menu').style.display = 'none';
        }

        function closeApp(id) { document.getElementById(`app-${id}`).classList.add('hidden'); }
        function toggleStart() {
            const m = document.getElementById('start-menu');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        }

        // Window Engine
        let activeWin = null, isDragging = false, dx, dy;
        document.addEventListener('mousedown', (e) => {
            const h = e.target.closest('.window-header');
            if(h) {
                activeWin = h.parentElement;
                isDragging = true;
                dx = e.clientX - activeWin.offsetLeft;
                dy = e.clientY - activeWin.offsetTop;
                document.querySelectorAll('.glass-panel').forEach(w => w.style.zIndex = 500);
                activeWin.style.zIndex = 1000;
            }
        });
        document.addEventListener('mousemove', (e) => {
            if(isDragging && activeWin) {
                activeWin.style.left = (e.clientX - dx) + 'px';
                activeWin.style.top = (e.clientY - dy) + 'px';
            }
        });
        document.addEventListener('mouseup', () => isDragging = false);

        function handleTerm(e, input) {
            if(e.key === 'Enter') {
                const out = document.getElementById('term-out');
                const p = document.createElement('p');
                p.innerHTML = `<span class="text-cyan-500">> ${input.value}</span>`;
                out.appendChild(p);
                const cmd = input.value.toLowerCase();
                const res = document.createElement('p');
                res.className = "text-slate-500 mb-2";
                if(cmd === 'gpu-check') res.innerHTML = "GPU CORE 0: STABLE (42°C)<br>GPU CORE 1: STABLE (44°C)<br>VRAM: 16GB OK";
                else if(cmd === 'apps') res.innerHTML = "SYSTEM REPORT: 312 APPS LOADED IN STORE CACHE.";
                else res.textContent = "QUEUED: " + cmd;
                out.appendChild(res);
                input.value = '';
                out.scrollTop = out.scrollHeight;
            }
        }
    </script>
</body>
</html>

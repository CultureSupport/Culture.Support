<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cosmic Pharaoh: Ancient Space Slots</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Orbitron:wght@400;700&display=swap');

        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --egyptian-gold: #ffcc00;
            --electric-blue: #00f2ff;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #020205;
            font-family: 'Orbitron', sans-serif;
            color: white;
            height: 100vh;
            touch-action: manipulation;
        }

        #space-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.6);
        }

        .banner-container {
            width: 100%;
            overflow: hidden;
            background: rgba(0, 242, 255, 0.05);
            border-top: 1px solid var(--electric-blue);
            border-bottom: 1px solid var(--electric-blue);
            white-space: nowrap;
            padding: 6px 0;
        }

        .scrolling-text {
            display: inline-block;
            animation: scroll 25s linear infinite;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            color: var(--electric-blue);
            text-shadow: 0 0 8px var(--electric-blue);
        }

        @keyframes scroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .reel-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            padding: 5px;
        }

        .reel {
            height: 240px; /* Adjusted for mobile height constraints */
            overflow: hidden;
            position: relative;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 204, 0, 0.4);
            border-radius: 4px;
        }

        .symbol {
            height: 80px; /* Smaller symbols for mobile */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .glass-icon {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: brightness(1.2) blur(2px);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .electric-banner {
            width: 20px;
            background: linear-gradient(to bottom, transparent, var(--electric-blue), transparent);
            opacity: 0.5;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.6; box-shadow: 0 0 15px var(--electric-blue); }
        }

        .btn-gold {
            background: linear-gradient(135deg, #d4af37, #f1c40f);
            color: black;
            font-weight: bold;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn-gold:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 0 12px var(--egyptian-gold);
        }
        
        .btn-gold:active { transform: scale(0.95); }
        .btn-gold:disabled { opacity: 0.4; cursor: not-allowed; }

        @media (max-width: 768px) {
            .reel-container { gap: 2px; padding: 4px; }
            .reel { height: 180px; }
            .symbol { height: 60px; font-size: 1.5rem; }
            .glass-icon { width: 45px; height: 45px; }
            .electric-banner { display: none; }
        }
    </style>
</head>
<body>

    <canvas id="space-canvas"></canvas>

    <div class="flex flex-col h-screen relative z-10 overflow-hidden">
        <!-- Banner -->
        <div class="banner-container shrink-0">
            <div class="scrolling-text">
                SCARAB: 500x RATE — EYE OF HORUS: 1000x JACKPOT — ANKH: 200x MULTIPLIER — PHARAOH'S WEALTH AWAITS — SPACE PIRATES SPOTTED IN SECTOR 7 — WIN BIG ON DIAGONAL PAYLINES!
            </div>
        </div>

        <!-- Responsive Main Content Wrapper -->
        <div class="flex flex-col md:flex-row flex-1 items-center justify-center p-2 md:p-4 gap-4 md:gap-8 min-h-0">
            
            <!-- Slot Machine Area -->
            <div class="flex items-center gap-2 w-full max-w-[600px]">
                <div class="electric-banner h-[250px] md:h-[350px]"></div>
                
                <div class="glass p-1 md:p-2 relative flex-1">
                    <div class="reel-container" id="reels">
                        <div class="reel" id="reel-0"></div>
                        <div class="reel" id="reel-1"></div>
                        <div class="reel" id="reel-2"></div>
                        <div class="reel" id="reel-3"></div>
                        <div class="reel" id="reel-4"></div>
                    </div>
                </div>

                <div class="electric-banner h-[250px] md:h-[350px]"></div>
            </div>

            <!-- Controls Panel -->
            <div class="glass w-full md:w-64 p-4 md:p-6 flex flex-col gap-4 text-center shrink-0 max-w-[400px]">
                <div class="flex md:flex-col justify-between items-center md:gap-2 px-2 md:px-0">
                    <div>
                        <h3 class="text-gray-400 text-[10px] tracking-widest uppercase">Balance</h3>
                        <div class="text-2xl md:text-3xl font-bold text-white" id="balance">25000</div>
                    </div>
                    <div>
                        <h3 class="text-gray-400 text-[10px] tracking-widest uppercase">Line Bet</h3>
                        <div class="flex items-center justify-center gap-3 mt-1">
                            <button onclick="changeBet(-10)" class="w-8 h-8 md:w-10 md:h-10 rounded-full border border-white/20 hover:bg-white/10 text-lg flex items-center justify-center">-</button>
                            <span class="text-lg md:text-xl font-bold text-yellow-400" id="bet-amount">10</span>
                            <button onclick="changeBet(10)" class="w-8 h-8 md:w-10 md:h-10 rounded-full border border-white/20 hover:bg-white/10 text-lg flex items-center justify-center">+</button>
                        </div>
                    </div>
                </div>

                <div class="flex md:flex-col gap-2">
                    <button id="spin-btn" class="btn-gold flex-1 py-3 md:py-4 rounded-lg text-lg">SPIN</button>
                    <button id="auto-btn" class="glass flex-1 py-2 md:py-2 rounded-lg text-[10px] md:text-xs hover:bg-white/10 transition-all">AUTO: OFF</button>
                </div>

                <div id="win-display" class="h-8 md:h-10 flex items-center justify-center text-yellow-400 font-bold text-lg animate-pulse"></div>
            </div>
        </div>

        <div class="p-2 text-center text-[8px] md:text-[9px] text-gray-500 tracking-[0.2em] shrink-0">
            NEBULA CASINO SYSTEMS — EGYPTIAN INTERSTELLAR DIVISION
        </div>
    </div>

    <script>
        const symbols = ['𓂀', '𓄿', '𓆣', '𓇽', '𓀾', '𓋹', '𓁢'];
        const symbolValues = { '𓂀': 100, '𓄿': 50, '𓆣': 40, '𓇽': 30, '𓀾': 200, '𓋹': 20, '𓁢': 10 };
        let balance = 25000;
        let currentBet = 10;
        let isSpinning = false;
        let isAutoPlay = false;
        let autoInterval = null;

        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [], ships = [], meteors = [];

        function initSpace() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = Array.from({length: window.innerWidth < 768 ? 80 : 150}, () => ({ 
                x: Math.random() * canvas.width, 
                y: Math.random() * canvas.height, 
                size: Math.random() * 1.5, 
                speed: Math.random() * 0.3 
            }));
            ships = Array.from({length: 2}, () => ({ 
                x: Math.random() * canvas.width, 
                y: Math.random() * canvas.height, 
                speedX: (Math.random()-0.5) * 0.5, 
                speedY: (Math.random()-0.5) * 0.5, 
                size: 15 
            }));
        }

        function drawSpace() {
            ctx.fillStyle = '#020205';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
                s.y += s.speed; if (s.y > canvas.height) s.y = 0;
            });
            ctx.strokeStyle = '#00f2ff';
            ships.forEach(ship => {
                ctx.beginPath(); ctx.moveTo(ship.x, ship.y); 
                ctx.lineTo(ship.x + ship.size, ship.y + ship.size/2); 
                ctx.lineTo(ship.x, ship.y + ship.size); ctx.closePath(); ctx.stroke();
                ship.x += ship.speedX; ship.y += ship.speedY;
                if(ship.x > canvas.width || ship.x < 0) ship.speedX *= -1;
                if(ship.y > canvas.height || ship.y < 0) ship.speedY *= -1;
            });
            requestAnimationFrame(drawSpace);
        }

        function createReel(reelId) {
            const reel = document.getElementById(`reel-${reelId}`);
            reel.innerHTML = '';
            for (let i = 0; i < 15; i++) {
                const sym = document.createElement('div');
                sym.className = 'symbol';
                sym.innerHTML = `<div class="glass-icon">${symbols[Math.floor(Math.random() * symbols.length)]}</div>`;
                reel.appendChild(sym);
            }
        }

        function changeBet(val) {
            if (isSpinning) return;
            currentBet = Math.max(10, Math.min(balance, currentBet + val));
            document.getElementById('bet-amount').innerText = currentBet;
        }

        async function spin() {
            if (isSpinning || balance < currentBet * 10) return;
            isSpinning = true;
            balance -= currentBet * 10;
            updateUI();
            
            const results = [[], [], [], [], []];
            const promises = [];
            for (let i = 0; i < 5; i++) {
                const reel = document.getElementById(`reel-${i}`);
                for (let j = 0; j < 3; j++) results[i].push(symbols[Math.floor(Math.random() * symbols.length)]);
                
                // Animation height relative to symbol size
                const symbolHeight = window.innerWidth < 768 ? 60 : 80;
                const anim = reel.animate([{ transform: 'translateY(0)' }, { transform: `translateY(-${symbolHeight * 10}px)` }], { 
                    duration: 1200 + (i * 150), 
                    easing: 'ease-in-out' 
                });
                
                promises.push(anim.finished.then(() => {
                    reel.innerHTML = '';
                    results[i].forEach(char => {
                        const sym = document.createElement('div');
                        sym.className = 'symbol';
                        sym.innerHTML = `<div class="glass-icon">${char}</div>`;
                        reel.appendChild(sym);
                    });
                }));
            }
            await Promise.all(promises);
            checkWins(results);
            isSpinning = false;
        }

        function checkWins(matrix) {
            let totalWin = 0;
            const lines = [
                [[0,0],[1,0],[2,0],[3,0],[4,0]], 
                [[0,1],[1,1],[2,1],[3,1],[4,1]], 
                [[0,2],[1,2],[2,2],[3,2],[4,2]], 
                [[0,0],[1,1],[2,2],[3,1],[4,0]], 
                [[0,2],[1,1],[2,0],[3,1],[4,2]]
            ];
            lines.forEach(line => {
                const first = matrix[line[0][0]][line[0][1]];
                let count = 1;
                for (let i = 1; i < line.length; i++) { 
                    if (matrix[line[i][0]][line[i][1]] === first) count++; 
                    else break; 
                }
                if (count >= 3) totalWin += symbolValues[first] * count * (currentBet/10);
            });
            if (totalWin > 0) {
                balance += totalWin;
                document.getElementById('win-display').innerText = `WIN: ${Math.floor(totalWin)}`;
            } else {
                document.getElementById('win-display').innerText = '';
            }
            updateUI();
        }

        function updateUI() { document.getElementById('balance').innerText = Math.floor(balance); }

        document.getElementById('auto-btn').addEventListener('click', () => {
            isAutoPlay = !isAutoPlay;
            document.getElementById('auto-btn').innerText = isAutoPlay ? "AUTO: ON" : "AUTO: OFF";
            if (isAutoPlay) { 
                autoInterval = setInterval(() => { if (!isSpinning) spin(); }, 2500); 
            } else { 
                clearInterval(autoInterval); 
            }
        });

        document.getElementById('spin-btn').addEventListener('click', spin);
        
        window.onload = () => { 
            initSpace(); 
            drawSpace(); 
            for (let i = 0; i < 5; i++) createReel(i); 
            updateUI(); 
        };
        
        window.addEventListener('resize', initSpace);
    </script>
</body>
</html>

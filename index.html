<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Wars: Måneforsvar</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #ffe81f; /* Star Wars gul */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        canvas {
            border: 2px solid #333;
            box-shadow: 0 0 20px rgba(255, 232, 31, 0.2);
            background-color: #00050a;
            max-width: 100%;
            max-height: 80vh;
            touch-action: none;
        }

        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            text-shadow: 2px 2px 4px #000;
        }

        .controls {
            margin-top: 10px;
            color: #aaa;
            font-size: 0.9rem;
        }

        #gameOver {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border: 3px solid #ffe81f;
            text-align: center;
            z-index: 10;
        }

        button {
            background: #ffe81f;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            border-radius: 4px;
        }

        button:hover {
            background: #fff;
        }
    </style>
</head>
<body>

    <div class="ui">
        <div id="score">Poeng: 0</div>
        <div id="lives">Månens helse: 100%</div>
        <div class="controls">Piltaster: Fly | Mellomrom: Skyt</div>
    </div>

    <div id="gameOver">
        <h1>SPILLET ER OVER</h1>
        <p id="finalScore"></p>
        <button onclick="resetGame()">Prøv igjen</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreText = document.getElementById('finalScore');

        // Tilpass canvas til skjermen
        function resize() {
            canvas.width = window.innerWidth > 800 ? 800 : window.innerWidth - 20;
            canvas.height = window.innerHeight > 600 ? 600 : window.innerHeight - 150;
        }
        window.addEventListener('resize', resize);
        resize();

        // Spilltilstand
        let score = 0;
        let moonHealth = 100;
        let gameActive = true;
        let keys = {};

        // Stjerner i bakgrunnen
        const stars = Array.from({ length: 100 }, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2,
            speed: Math.random() * 0.5 + 0.1
        }));

        // Spillerens skip (X-Wing stil)
        const ship = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 15,
            angle: -Math.PI / 2,
            rotation: 0,
            velocity: { x: 0, y: 0 },
            thrusting: false,
            cooldown: 0
        };

        let lasers = [];
        let ufos = [];
        let particles = [];

        // Månen nederst
        const moon = {
            x: canvas.width / 2,
            y: canvas.height + 100,
            radius: 200,
            color: '#ddd'
        };

        // Input håndtering
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 1.0,
                    color: color
                });
            }
        }

        function spawnUfo() {
            if (!gameActive) return;
            const x = Math.random() * canvas.width;
            const y = -50;
            const angleToMoon = Math.atan2(moon.y - y, moon.x - x);
            const speed = 1 + Math.random() * 1.5;
            
            ufos.push({
                x: x,
                y: y,
                radius: 20,
                vx: Math.cos(angleToMoon) * speed,
                vy: Math.sin(angleToMoon) * speed,
                hp: 2
            });
            
            // Øk vanskelighetsgrad over tid
            setTimeout(spawnUfo, Math.max(500, 2000 - score * 10));
        }

        function update() {
            if (!gameActive) return;

            // Roter skip
            if (keys['ArrowLeft']) ship.angle -= 0.08;
            if (keys['ArrowRight']) ship.angle += 0.08;

            // Akselerasjon (Thrust)
            if (keys['ArrowUp']) {
                ship.velocity.x += Math.cos(ship.angle) * 0.15;
                ship.velocity.y += Math.sin(ship.angle) * 0.15;
                ship.thrusting = true;
            } else {
                ship.thrusting = false;
            }

            // Friksjon
            ship.velocity.x *= 0.98;
            ship.velocity.y *= 0.98;

            // Oppdater posisjon
            ship.x += ship.velocity.x;
            ship.y += ship.velocity.y;

            // Wrap around (skjermkanter)
            if (ship.x < 0) ship.x = canvas.width;
            if (ship.x > canvas.width) ship.x = 0;
            if (ship.y < 0) ship.y = canvas.height;
            if (ship.y > canvas.height) ship.y = 0;

            // Skyting
            if (keys['Space'] && ship.cooldown <= 0) {
                lasers.push({
                    x: ship.x + Math.cos(ship.angle) * 20,
                    y: ship.y + Math.sin(ship.angle) * 20,
                    vx: Math.cos(ship.angle) * 8,
                    vy: Math.sin(ship.angle) * 8,
                    life: 60
                });
                ship.cooldown = 15;
            }
            if (ship.cooldown > 0) ship.cooldown--;

            // Oppdater lasere
            lasers = lasers.filter(l => {
                l.x += l.vx;
                l.y += l.vy;
                l.life--;
                return l.life > 0 && l.x > 0 && l.x < canvas.width && l.y > 0 && l.y < canvas.height;
            });

            // Oppdater UFOer
            ufos.forEach((ufo, uIdx) => {
                ufo.x += ufo.vx;
                ufo.y += ufo.vy;

                // Sjekk kollisjon med lasere
                lasers.forEach((laser, lIdx) => {
                    const dist = Math.hypot(ufo.x - laser.x, ufo.y - laser.y);
                    if (dist < ufo.radius) {
                        ufo.hp--;
                        lasers.splice(lIdx, 1);
                        if (ufo.hp <= 0) {
                            createExplosion(ufo.x, ufo.y, '#f00');
                            ufos.splice(uIdx, 1);
                            score += 100;
                            scoreElement.innerText = `Poeng: ${score}`;
                        }
                    }
                });

                // Sjekk om UFO lander på månen
                const distToMoon = Math.hypot(ufo.x - moon.x, ufo.y - moon.y);
                if (distToMoon < moon.radius + ufo.radius - 20) {
                    moonHealth -= 10;
                    createExplosion(ufo.x, ufo.y, '#ff0');
                    ufos.splice(uIdx, 1);
                    livesElement.innerText = `Månens helse: ${moonHealth}%`;
                    if (moonHealth <= 0) endGame();
                }
            });

            // Partikler
            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            });
        }

        function drawShip() {
            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(ship.angle);

            // Tegn X-Wing form
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            
            // Kroppen
            ctx.beginPath();
            ctx.moveTo(20, 0);
            ctx.lineTo(-10, -10);
            ctx.lineTo(-5, 0);
            ctx.lineTo(-10, 10);
            ctx.closePath();
            ctx.stroke();

            // Vinger
            ctx.beginPath();
            ctx.moveTo(0, -5);
            ctx.lineTo(-15, -20);
            ctx.moveTo(0, 5);
            ctx.lineTo(-15, 20);
            ctx.stroke();

            // Cockpit
            ctx.fillStyle = '#4af';
            ctx.beginPath();
            ctx.arc(5, 0, 4, 0, Math.PI * 2);
            ctx.fill();

            // Flamme hvis thrust
            if (ship.thrusting) {
                ctx.fillStyle = '#f80';
                ctx.beginPath();
                ctx.moveTo(-10, 0);
                ctx.lineTo(-25, 0);
                ctx.lineTo(-10, 5);
                ctx.fill();
            }

            ctx.restore();
        }

        function drawUfo(ufo) {
            ctx.save();
            ctx.translate(ufo.x, ufo.y);
            
            // UFO-kropp
            ctx.fillStyle = '#888';
            ctx.beginPath();
            ctx.ellipse(0, 0, ufo.radius, ufo.radius / 2, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Dome
            ctx.fillStyle = '#0f0';
            ctx.beginPath();
            ctx.arc(0, -5, 10, Math.PI, 0);
            ctx.fill();
            
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Stjerner
            ctx.fillStyle = '#fff';
            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
                s.y += s.speed;
                if (s.y > canvas.height) s.y = 0;
            });

            // Månen
            ctx.fillStyle = moon.color;
            ctx.beginPath();
            ctx.arc(moon.x, moon.y, moon.radius, 0, Math.PI * 2);
            ctx.fill();
            // Kratere på månen
            ctx.fillStyle = '#ccc';
            ctx.beginPath(); ctx.arc(moon.x - 50, moon.y - 120, 20, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(moon.x + 80, moon.y - 150, 15, 0, Math.PI * 2); ctx.fill();

            // Lasere
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#f00';
            ctx.strokeStyle = '#f00';
            ctx.lineWidth = 3;
            lasers.forEach(l => {
                ctx.beginPath();
                ctx.moveTo(l.x, l.y);
                ctx.lineTo(l.x - l.vx * 2, l.y - l.vy * 2);
                ctx.stroke();
            });
            ctx.shadowBlur = 0;

            // UFOer
            ufos.forEach(drawUfo);

            // Partikler
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 3, 3);
            });
            ctx.globalAlpha = 1.0;

            // Spiller
            drawShip();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        function endGame() {
            gameActive = false;
            gameOverScreen.style.display = 'block';
            finalScoreText.innerText = `Du fikk ${score} poeng før månen ble overrunnet!`;
        }

        function resetGame() {
            score = 0;
            moonHealth = 100;
            gameActive = true;
            ufos = [];
            lasers = [];
            particles = [];
            ship.x = canvas.width / 2;
            ship.y = canvas.height / 2;
            ship.velocity = { x: 0, y: 0 };
            scoreElement.innerText = `Poeng: 0`;
            livesElement.innerText = `Månens helse: 100%`;
            gameOverScreen.style.display = 'none';
        }

        // Start spillet
        spawnUfo();
        loop();

    </script>
</body>
</html>

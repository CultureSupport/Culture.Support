<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Police Asset Recovery Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        
        body { background-color: #020617; color: #10b981; font-family: 'Fira Code', monospace; }
        
        .cursor { display: inline-block; width: 10px; height: 1.2em; background: #10b981; animation: blink 1s infinite; vertical-align: middle; }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
        
        .progress-bar { height: 4px; transition: width 1s linear; }
        .log-entry { font-size: 0.75rem; line-height: 1rem; margin-bottom: 2px; }
        .text-glow { text-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
        .terminal-window { background: rgba(15, 23, 42, 0.9); border: 1px solid #1e293b; height: 300px; overflow-y: hidden; }
        
        .status-badge { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center justify-center min-h-screen">

    <div class="max-w-4xl w-full">
        <!-- Main Animated Title -->
        <div class="mb-8 text-center">
            <h1 id="main-title" class="text-2xl md:text-3xl font-bold text-white mb-2 text-glow italic uppercase">
                <!-- Typed by JS -->
            </h1>
            <div class="h-1 w-full bg-slate-800 rounded-full overflow-hidden">
                <div id="loading-progress" class="progress-bar bg-red-600 w-0"></div>
            </div>
            <div class="flex justify-between mt-2 text-[10px] uppercase tracking-widest text-slate-500 font-bold">
                <span>System Initializing</span>
                <span id="percent-display">0%</span>
                <span>Transnational Trace</span>
            </div>
        </div>

        <!-- Dashboard Layout -->
        <div class="grid md:grid-cols-3 gap-4 mb-6">
            <div class="bg-slate-900 border border-slate-700 p-4 rounded col-span-2">
                <div class="flex justify-between items-center mb-2 border-b border-slate-700 pb-2">
                    <span class="text-xs font-bold text-slate-400">CRIME_REPORT_LOG_BASH</span>
                    <span class="text-[10px] text-green-500 bg-green-950 px-2 py-0.5 rounded status-badge">ACTIVE_TRACE</span>
                </div>
                <div id="terminal-bash" class="terminal-window p-4 flex flex-col-reverse">
                    <!-- Logs will appear here -->
                    <div class="log-entry text-white">READY_FOR_COMMANDS... <span class="cursor"></span></div>
                </div>
            </div>

            <div class="bg-slate-900 border border-slate-700 p-4 rounded">
                <h3 class="text-xs font-bold text-slate-400 mb-4 border-b border-slate-700 pb-2">ASSET_SEIZURE_GRAPH</h3>
                <div class="flex flex-col gap-4 h-full">
                    <div class="flex-1 flex items-end gap-2 px-2">
                        <div id="bar-1" class="bg-red-500 w-full rounded-t transition-all duration-500" style="height: 10%"></div>
                        <div id="bar-2" class="bg-red-600 w-full rounded-t transition-all duration-500" style="height: 30%"></div>
                        <div id="bar-3" class="bg-red-700 w-full rounded-t transition-all duration-500" style="height: 20%"></div>
                        <div id="bar-4" class="bg-white w-full rounded-t transition-all duration-500" style="height: 50%"></div>
                    </div>
                    <div class="text-[10px] text-slate-500 mt-2">
                        <div class="flex justify-between"><span>SWIFT:</span> <span class="text-white">ENCRYPTED</span></div>
                        <div class="flex justify-between"><span>PAROLE:</span> <span class="text-red-500 uppercase">VIOLATED</span></div>
                        <div class="flex justify-between"><span>ASSETS:</span> <span class="text-green-500 font-bold">STEERING...</span></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="final-status" class="hidden bg-green-900/20 border border-green-500 p-4 rounded text-center text-green-400 text-sm font-bold uppercase tracking-widest">
            ✅ 60 Commands Executed: Report Delivered to Økokrim & Interpol
        </div>
    </div>

    <script>
        const terminal = document.getElementById('terminal-bash');
        const progress = document.getElementById('loading-progress');
        const percentTxt = document.getElementById('percent-display');
        const titleEl = document.getElementById('main-title');
        const finalStatus = document.getElementById('final-status');
        
        const titleText = "We always report support Crimes and Assets Swindlers";
        let titleIdx = 0;

        // Typewriter Effect for Title
        function typeTitle() {
            if (titleIdx < titleText.length) {
                titleEl.textContent += titleText.charAt(titleIdx);
                titleIdx++;
                setTimeout(typeTitle, 50);
            }
        }

        const reportCommands = [
            "init_trace --target=transnational_wire_fraud",
            "verify_parole_status --serial_id=99283-NO",
            "detect_insider_swindle --entity=support_corp_01",
            "scan_investor_financing --source=illicit_corruption",
            "locate_criminal_assets --geo=Norway",
            "analyze_swindle_commission --threshold=1000000_NOK",
            "intercept_call_station --freq=enc_voice",
            "monitor_labor_market_abuse --false_entity=detected",
            "trigger_asset_seizure --protocol=condition_settle",
            "mapping_recidivist_network --rings=active",
            "bypass_evasion_shield --method=deep_scan",
            "log_asset_theft --victim=household_6",
            "identify_shadow_investors --auth=high",
            "isolate_wire_fraud_nodes --global=true",
            "block_outward_swift --reason=fraud_alert",
            "check_investor_crimes --docket=pending",
            "steering_assets_from_criminals --direction=recovery",
            "execute_corrupt_entity_shutdown --force=true",
            "flag_parole_violation --notify=police_central",
            "finalizing_60_command_batch --status=reporting"
        ];

        // Generate 60 commands (looping the key ones with variations)
        let allCommands = [];
        for(let i=0; i<60; i++) {
            const cmd = reportCommands[i % reportCommands.length];
            allCommands.push(`[${new Date().toLocaleTimeString()}] CMD_${i+1}: ${cmd}`);
        }

        let currentStep = 0;
        const totalSteps = 60; // 60 seconds

        function updateSimulation() {
            if (currentStep <= totalSteps) {
                // Update Progress
                const p = (currentStep / totalSteps) * 100;
                progress.style.width = p + "%";
                percentTxt.innerText = Math.floor(p) + "%";

                // Add Terminal Command
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.innerHTML = `<span class="text-slate-500">root@norway_police:~$</span> ${allCommands[currentStep] || 'sys_idle_process_wait...'}`;
                terminal.prepend(entry);

                // Update Graph Bars randomly
                document.getElementById('bar-1').style.height = Math.random() * 100 + "%";
                document.getElementById('bar-2').style.height = Math.random() * 100 + "%";
                document.getElementById('bar-3').style.height = Math.random() * 100 + "%";
                document.getElementById('bar-4').style.height = Math.random() * 100 + "%";

                currentStep++;
                
                if(currentStep === totalSteps + 1) {
                    finalStatus.classList.remove('hidden');
                } else {
                    setTimeout(updateSimulation, 1000); // 1 command per second for 60 seconds
                }
            }
        }

        window.onload = () => {
            typeTitle();
            setTimeout(updateSimulation, 1000);
        };
    </script>
</body>
</html>

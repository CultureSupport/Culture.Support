<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEVCORE 16 - Mobile Tensor-Lite Runtime</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --iphone-bg: #000;
            --accent: #d4af37;
        }
        body {
            margin: 0;
            background-color: #050505;
            color: white;
            font-family: 'Inter', system-ui, sans-serif;
            overflow-x: hidden;
        }

        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a1a1d 0%, #050505 100%);
            opacity: 0.6;
        }

        .iphone-frame {
            width: 440px; 
            height: 920px;
            background: #111;
            border: 10px solid #2a2a2c;
            border-radius: 60px;
            position: relative;
            box-shadow: 0 0 100px rgba(212, 175, 55, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            margin: 20px auto;
        }

        .dynamic-island {
            width: 120px;
            height: 32px;
            background: #000;
            border-radius: 20px;
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        .iphone-screen {
            flex: 1;
            background: #000;
            display: flex;
            flex-direction: column;
            padding-top: 50px;
            position: relative;
        }

        /* Test Environment Components */
        .vision-container {
            width: 100%;
            height: 220px;
            background: #000;
            position: relative;
            border-bottom: 1px solid #333;
        }
        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(1.1) brightness(0.9);
        }
        .ai-overlay {
            position: absolute;
            inset: 0;
            border: 1px solid rgba(212, 175, 55, 0.3);
            pointer-events: none;
        }

        .diag-grid {
            display: grid;
            grid-template-cols: repeat(2, 1fr);
            gap: 1px;
            background: #222;
            border-bottom: 1px solid #222;
        }
        .diag-item {
            background: #0a0a0a;
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
        }

        .file-system {
            height: 120px;
            overflow-y: auto;
            background: #050505;
            border-bottom: 1px solid #222;
        }

        .editor-area {
            flex: 1;
            background: #0c0c0e;
            color: #d1d1d1;
            padding: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            line-height: 1.5;
            outline: none;
            resize: none;
            border: none;
        }

        .terminal-output {
            height: 140px;
            background: #000;
            color: #d4af37;
            padding: 10px;
            font-family: monospace;
            font-size: 10px;
            overflow-y: auto;
            border-top: 2px solid #d4af3733;
        }

        .btn-run {
            background: var(--accent);
            color: black;
            font-weight: 800;
            transition: all 0.2s;
        }
        .btn-run:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="bg-canvas"></div>

    <div id="app" class="flex flex-col items-center min-h-screen pt-10">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-black tracking-widest text-white uppercase">
                DevCore <span class="text-amber-500">16</span>
            </h1>
            <p class="text-zinc-500 text-[10px] tracking-widest mt-1">MOBILE TENSOR-LITE RUNTIME v2.5</p>
        </header>

        <div class="iphone-frame">
            <div class="dynamic-island"></div>
            
            <div class="iphone-screen">
                <!-- AI Vision & Hardware Diagnostics -->
                <div class="vision-container">
                    <video id="webcam" autoplay playsinline muted></video>
                    <div class="ai-overlay"></div>
                    <div class="absolute top-2 left-2 flex gap-1">
                        <span class="bg-amber-500 text-black text-[8px] px-1 font-bold rounded">LIVE</span>
                        <span class="bg-black/80 text-white text-[8px] px-1 rounded border border-white/20">CORE: {{ inferenceSpeed }}ms</span>
                    </div>
                </div>

                <div class="diag-grid">
                    <div class="diag-item">
                        <span class="text-[8px] text-zinc-500 uppercase">Neural Engine</span>
                        <span class="text-[10px] text-amber-500 font-mono">{{ (npuLoad).toFixed(1) }}% Load</span>
                    </div>
                    <div class="diag-item">
                        <span class="text-[8px] text-zinc-500 uppercase">LiteRT Support</span>
                        <span class="text-[10px] text-green-500 font-mono">16KB Aligned</span>
                    </div>
                </div>

                <!-- Explorer -->
                <div class="file-system">
                    <div v-for="(file, idx) in files" :key="idx" 
                         @click="activeFile = idx"
                         :class="['p-3 text-[11px] cursor-pointer flex items-center gap-2 border-b border-white/5', activeFile === idx ? 'bg-amber-500/10 text-amber-500' : 'text-zinc-400']">
                        <i class="fa-solid fa-microchip opacity-50"></i>
                        {{ file.name }}
                    </div>
                </div>

                <!-- Editor -->
                <textarea class="editor-area" v-model="files[activeFile].content" spellcheck="false"></textarea>

                <!-- Actions -->
                <div class="p-4 bg-zinc-900 flex gap-2">
                    <button @click="execute" class="flex-1 py-3 rounded-xl btn-run text-xs">UNFOLD RUNTIME</button>
                    <button @click="reset" class="px-4 py-3 rounded-xl bg-zinc-800 text-zinc-400 text-xs"><i class="fa-solid fa-rotate"></i></button>
                </div>

                <!-- Output -->
                <div class="terminal-output" ref="term">
                    <div v-for="log in logs" class="mb-1">
                        <span class="opacity-30 mr-1">#</span> {{ log }}
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, nextTick } = Vue;

        createApp({
            setup() {
                const files = ref([
                    {
                        name: "runtime_init.js",
                        content: `// Unfolding Tensor-Lite Runtime\nasync function init() {\n  console.log("Probing Neural Engine...");\n  const model = await mobilenet.load();\n  \n  const video = document.getElementById('webcam');\n  const stream = await navigator.mediaDevices.getUserMedia({video:true});\n  video.srcObject = stream;\n\n  async function frame() {\n    const start = performance.now();\n    const pred = await model.classify(video);\n    if(pred[0]) {\n       console.log("Detected: " + pred[0].className);\n       console.log("Match Found: User_01_Identity");\n    }\n    window.updateInference(Math.round(performance.now() - start));\n    requestAnimationFrame(frame);\n  }\n  frame();\n}\ninit();`
                    },
                    {
                        name: "diagnostic_test.js",
                        content: "console.log('Backend:', tf.getBackend());\nconst hardware = tf.env().features;\nconsole.log('WebGL Support:', hardware.HAS_WEBGL);\nconsole.log('WASM Support:', hardware.WASM_HAS_SIMD_SUPPORT);"
                    }
                ]);

                const activeFile = ref(0);
                const logs = ref(["DEVCORE-16 Deployment Ready."]);
                const term = ref(null);
                const inferenceSpeed = ref(0);
                const npuLoad = ref(0);

                window.updateInference = (val) => {
                    inferenceSpeed.value = val;
                    npuLoad.value = Math.min(99, 10 + (val / 10));
                };

                const execute = async () => {
                    const original = console.log;
                    console.log = (m) => {
                        logs.value.push(m);
                        nextTick(() => term.value.scrollTop = term.value.scrollHeight);
                    };
                    
                    try {
                        const code = files.value[activeFile.value].content;
                        const fn = new (Object.getPrototypeOf(async function(){}).constructor)(code);
                        await fn();
                    } catch(e) { console.log("RUNTIME ERROR: " + e.message); }
                };

                const reset = () => {
                    location.reload();
                };

                return { files, activeFile, logs, term, execute, reset, inferenceSpeed, npuLoad };
            }
        }).mount('#app');
    </script>
</body>
</html>

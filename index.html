<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قاعة الفن \\ الإشعاع المقدس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap');

        :root {
            --gold: #ffd700;
            --deep-gold: #d4af37;
            --fire: #ff4400;
            --glass-bg: rgba(20, 16, 5, 0.4);
        }

        body {
            background-color: #020202;
            color: #e0e0e0;
            font-family: 'Amiri', serif;
            margin: 0;
            height: 2000px;
            background: radial-gradient(circle at top, #0a0805 0%, #020202 100%);
            overflow-x: hidden;
        }

        /* --- تأثيرات الخلفية الضوئية --- */
        #bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* جسيمات النور المتطايرة (بدون كلمات) */
        .light-particle {
            position: absolute;
            background: var(--gold);
            width: 3px;
            height: 3px;
            border-radius: 50%;
            filter: blur(1px);
            box-shadow: 0 0 10px var(--gold), 0 0 20px var(--fire);
            pointer-events: none;
        }

        @keyframes float-up {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* --- واجهة العرض المركزية --- */
        .viewport-center {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .art-frame {
            width: 380px;
            height: 380px;
            background: #000;
            border: 1px solid var(--deep-gold);
            padding: 12px;
            box-shadow: 0 0 100px rgba(212, 175, 55, 0.15), 0 0 40px rgba(0,0,0,1);
            position: relative;
            transition: transform 0.2s ease-out;
        }

        .art-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(1.1) brightness(0.9);
        }

        /* توهج خلف الإطار */
        .frame-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.2) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            z-index: -1;
            animation: pulse-glow 4s infinite alternate;
        }

        @keyframes pulse-glow {
            from { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* --- تذييل الصفحة الزجاجي المبسط --- */
        .gold-footer {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 600px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 50px;
            padding: 15px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .footer-text {
            font-size: 11px;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: bold;
            text-align: center;
            opacity: 0.8;
        }

        .scroll-indicator {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            letter-spacing: 4px;
            color: var(--deep-gold);
            opacity: 0.3;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="bg-container"></div>
    <div class="scroll-indicator">معرض الإشعاع المقدس</div>

    <div class="viewport-center">
        <div class="art-frame" id="main-frame">
            <div class="frame-glow"></div>
            <img src="bilde.jpg" alt="" onerror="this.src='https://via.placeholder.com/400/000/D4AF37?text=Sacred+Art'">
        </div>
        <div class="mt-12 text-center">
            <h1 class="text-[12px] tracking-[1.5em] text-amber-500 uppercase font-bold">Divine Radiance</h1>
        </div>
    </div>

    <!-- التذييل الزجاجي الذهبي -->
    <div class="gold-footer">
        <div class="footer-text">تأمل النور المقدس</div>
    </div>

    <script>
        const container = document.getElementById('bg-container');

        // إنشاء جسيمات ضوئية عشوائية
        function createParticle() {
            const p = document.createElement('div');
            p.className = 'light-particle';
            
            const startX = Math.random() * 100 + 'vw';
            const size = Math.random() * 3 + 1 + 'px';
            const duration = Math.random() * 5 + 5 + 's';
            const delay = Math.random() * 5 + 's';

            p.style.left = startX;
            p.style.width = size;
            p.style.height = size;
            p.style.animation = `float-up ${duration} linear ${delay} infinite`;
            
            container.appendChild(p);

            // إزالة الجسيمات القديمة للحفاظ على الأداء
            if (container.children.length > 100) {
                container.removeChild(container.firstChild);
            }
        }

        // توليد الجسيمات بشكل مستمر
        for (let i = 0; i < 50; i++) {
            createParticle();
        }
        setInterval(createParticle, 200);

        // تأثير التوازي عند التمرير
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            container.style.transform = `translateY(${scrolled * 0.1}px)`;
        });

        // تأثير حركة الإطار مع الفأرة
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            const frame = document.getElementById('main-frame');
            frame.style.transform = `rotateY(${moveX * 5}deg) rotateX(${-moveY * 5}deg)`;
        });
    </script>
</body>
</html>

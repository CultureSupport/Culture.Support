<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Killing Planets</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#030712;
    font-family:Consolas,monospace;
    color:#8ff;
}

#spaceGame{
    width:100vw;
    height:100vh;
    display:block;
    background:
        radial-gradient(circle at center, #101a44 0%, #02040a 70%);
}

.hud{
    position:absolute;
    top:15px;
    left:15px;
    z-index:10;
    background:rgba(0,0,0,0.55);
    border:1px solid #00ffff66;
    padding:14px;
    border-radius:16px;
    backdrop-filter:blur(10px);
    box-shadow:0 0 30px #00ffff33;
}

.title{
    font-size:20px;
    color:#7df9ff;
    text-shadow:0 0 10px cyan;
}

.small{
    font-size:12px;
    opacity:0.8;
}

.status{
    color:#00ff99;
}

.scanline{
    position:absolute;
    inset:0;
    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.02),
        rgba(255,255,255,0.02) 1px,
        transparent 2px,
        transparent 4px
    );
    pointer-events:none;
}

.controls{
    position:absolute;
    bottom:20px;
    left:20px;
    z-index:20;
    color:#9be7ff;
}

.key{
    display:inline-block;
    padding:6px 10px;
    border:1px solid #66ffff88;
    margin:4px;
    border-radius:8px;
    background:#06111f;
}
</style>
</head>

<body>

<div class="hud">
    <div class="title">OLE OLESSIALL SPACE PROGRAM</div>
    <div class="small">Moon Sector Telemetry Network</div>
    <div class="mt-2">
        Client Nodes:
        <span class="status" id="clients">7</span>
    </div>

    <div>
        UFO Status:
        <span class="status">ACTIVE</span>
    </div>

    <div>
        Orbit Relay:
        <span class="status">CONNECTED</span>
    </div>
</div>

<div class="controls">
    <span class="key">← → Move</span>
    <span class="key">SPACE Shoot</span>
</div>

<div class="scanline"></div>

<svg id="spaceGame" viewBox="0 0 1400 800">

    <!-- Stars -->
    <g id="stars"></g>

    <!-- Moon -->
    <circle cx="1100" cy="620" r="170" fill="#d0d0d0"/>
    <circle cx="1050" cy="580" r="25" fill="#b3b3b3"/>
    <circle cx="1180" cy="660" r="40" fill="#b0b0b0"/>
    <circle cx="1120" cy="720" r="18" fill="#999"/>

    <!-- Earth -->
    <circle cx="160" cy="140" r="90" fill="#2040ff"/>
    <circle cx="120" cy="120" r="30" fill="#00aa55"/>
    <circle cx="190" cy="160" r="24" fill="#00aa55"/>

    <!-- UFO -->
    <g id="ufo" transform="translate(700 300)">
        <ellipse cx="0" cy="0" rx="70" ry="25" fill="#b0ffff"/>
        <ellipse cx="0" cy="-12" rx="35" ry="18" fill="#88ccff"/>
        <circle cx="-30" cy="8" r="5" fill="#00ffff"/>
        <circle cx="0" cy="10" r="5" fill="#00ffff"/>
        <circle cx="30" cy="8" r="5" fill="#00ffff"/>

        <ellipse cx="0" cy="30" rx="20" ry="8"
        fill="#00ffff55">
            <animate attributeName="ry"
            values="8;16;8"
            dur="1s"
            repeatCount="indefinite"/>
        </ellipse>
    </g>

    <!-- Player Ship -->
    <g id="ship" transform="translate(250 650)">
        <polygon points="0,-30 20,20 0,10 -20,20"
        fill="#7df9ff"/>
        <rect x="-5" y="15" width="10" height="20"
        fill="#00ffff"/>
    </g>

    <!-- Laser Group -->
    <g id="lasers"></g>

    <!-- Telemetry Text -->
    <text x="40" y="770"
    fill="#66ffee"
    font-size="18">
    telemetry://moon-sector/space-clients/ufo-network
    </text>

</svg>

<script>
const ship = document.getElementById("ship");
const lasers = document.getElementById("lasers");
const ufo = document.getElementById("ufo");

let shipX = 250;
let laserData = [];

const stars = document.getElementById("stars");

for(let i=0;i<140;i++){
    const s = document.createElementNS("http://www.w3.org/2000/svg","circle");

    s.setAttribute("cx",Math.random()*1400);
    s.setAttribute("cy",Math.random()*800);
    s.setAttribute("r",Math.random()*2.2);
    s.setAttribute("fill","white");

    stars.appendChild(s);
}

document.addEventListener("keydown",(e)=>{

    if(e.key === "ArrowLeft"){
        shipX -= 20;
    }

    if(e.key === "ArrowRight"){
        shipX += 20;
    }

    if(e.code === "Space"){
        fireLaser();
    }

    ship.setAttribute(
        "transform",
        `translate(${shipX} 650)`
    );
});

function fireLaser(){

    const laser = document.createElementNS(
        "http://www.w3.org/2000/svg",
        "rect"
    );

    laser.setAttribute("x",shipX - 2);
    laser.setAttribute("y",620);
    laser.setAttribute("width",4);
    laser.setAttribute("height",22);
    laser.setAttribute("fill","#ff3355");

    lasers.appendChild(laser);

    laserData.push({
        el:laser,
        y:620
    });
}

let ufoX = 700;
let dir = 1;

function animate(){

    ufoX += dir * 2;

    if(ufoX > 1100) dir = -1;
    if(ufoX < 500) dir = 1;

    ufo.setAttribute(
        "transform",
        `translate(${ufoX} 300)`
    );

    laserData.forEach((l,index)=>{

        l.y -= 8;

        l.el.setAttribute("y",l.y);

        if(l.y < -20){
            l.el.remove();
            laserData.splice(index,1);
        }
    });

    requestAnimationFrame(animate);
}

animate();

setInterval(()=>{
    document.getElementById("clients").innerText =
    Math.floor(Math.random()*40)+5;
},1500);
</script>

</body>
</html>

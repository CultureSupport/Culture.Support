<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Din Epikrise: Hjerne Psykose Test</title>
    <!-- Babylon.js Core -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { 
            margin: 0; padding: 0;
            background-color: #010208; 
            font-family: 'monospace', sans-serif; 
            color: #22d3ee;
            zoom: 0.75;
            overflow-x: hidden;
        }

        #app-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        /* Kameravisning som bakgrunn under skanning */
        #camera-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 2;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1s ease;
            filter: grayscale(1) brightness(0.5) contrast(1.2);
            pointer-events: none;
        }

        #bgCanvas { 
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh; 
            z-index: 1; opacity: 0.1; pointer-events: none;
        }

        .module-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px;
            padding: 20px;
        }

        .scan-module {
            background: rgba(2, 6, 18, 0.9);
            border: 1px solid rgba(34, 211, 238, 0.15);
            height: 280px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
            backdrop-filter: blur(5px);
        }

        .scan-module.active-scan {
            border-color: #22d3ee;
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.4);
        }

        .module-header {
            font-size: 10px;
            padding: 6px 12px;
            background: rgba(34, 211, 238, 0.15);
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        .module-content {
            flex-grow: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .module-content img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(1) contrast(1.5) brightness(0.9);
        }

        .scan-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: #22d3ee;
            box-shadow: 0 0 15px #22d3ee;
            z-index: 20;
            display: none;
        }

        @keyframes fastScan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .module-footer {
            font-size: 9px;
            padding: 6px 12px;
            background: rgba(0,0,0,0.95);
            border-top: 1px solid rgba(34, 211, 238, 0.1);
            color: #4ade80;
            display: flex;
            justify-content: space-between;
        }

        .patient-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(0, 5, 15, 0.98);
            backdrop-filter: blur(20px);
            border-top: 2px solid #22d3ee;
            padding: 15px 40px;
            z-index: 200;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .progress-bar-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 6px;
            background: rgba(255,255,255,0.05);
            z-index: 1000;
        }
        
        #progress-fill {
            width: 0%; height: 100%;
            background: #22d3ee;
            box-shadow: 0 0 15px #22d3ee;
            transition: width 0.1s linear;
        }

        .camera-overlay-text {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            color: #22d3ee;
            text-shadow: 0 0 20px rgba(34, 211, 238, 0.8);
            pointer-events: none;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

<video id="camera-layer" autoplay playsinline></video>
<div id="camera-text" class="camera-overlay-text">Biometrisk Identifisering...</div>

<div class="progress-bar-container">
    <div id="progress-fill"></div>
</div>

<canvas id="bgCanvas"></canvas>

<div id="app-container">
    <div class="p-8 text-center">
        <h1 class="text-4xl font-black tracking-widest uppercase text-white mb-1">Din Epikrise: Hjerne Psykose Test</h1>
        <p class="text-[12px] text-cyan-400 tracking-[0.5em]">BIOMETRISK KAMERA-SKANNING: 6 RADER ANALYSE</p>
    </div>

    <div class="module-grid" id="mainGrid"></div>

    <div style="height: 140px;"></div>
</div>

<div class="patient-bar">
    <div class="flex gap-16">
        <div>
            <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Kamerasensor</p>
            <p class="text-lg font-black text-white" id="cam-status">OFFLINE</p>
        </div>
        <div>
            <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Analyse Status</p>
            <p class="text-lg font-black text-cyan-400" id="global-status">KLAR</p>
        </div>
    </div>
    <div class="flex gap-4">
        <button id="start-btn" onclick="initiateCameraAndScan()" class="bg-cyan-600/10 hover:bg-cyan-600 text-white text-[12px] px-10 py-4 border-2 border-cyan-400 uppercase font-black transition-all shadow-[0_0_15px_rgba(34,211,238,0.2)]">
            Aktiver Kamera & Kjør Skan (3s)
        </button>
    </div>
</div>

<script>
    const apiKey = "";
    const grid = document.getElementById('mainGrid');
    const progressBar = document.getElementById('progress-fill');
    const video = document.getElementById('camera-layer');
    const camStatus = document.getElementById('cam-status');
    const camText = document.getElementById('camera-text');
    
    const rows = 6;
    const cols = 3;
    const totalModules = rows * cols;
    
    function createModules() {
        grid.innerHTML = "";
        for(let i=0; i<totalModules; i++) {
            const rowNum = Math.floor(i / cols) + 1;
            const div = document.createElement('div');
            div.className = 'scan-module';
            div.id = `module-${i}`;
            div.innerHTML = `
                <div class="module-header">
                    <span>SEKSJON_${rowNum}</span>
                    <span class="text-cyan-500">BIOMETRI_${i+1}</span>
                </div>
                <div class="module-content" id="content-${i}">
                    <div class="scan-line" id="line-${i}"></div>
                    <span class="text-[10px] font-bold opacity-30">AVVENTER KAMERA</span>
                    <div class="module-overlay"></div>
                </div>
                <div class="module-footer">
                    <span>SENSORDATA: ACTIVE</span>
                    <span class="text-white">...</span>
                </div>
            `;
            grid.appendChild(div);
        }
    }

    async function generateImage(prompt) {
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    instances: { prompt: prompt },
                    parameters: { sampleCount: 1 }
                })
            });
            const result = await response.json();
            return result.predictions?.[0]?.bytesBase64Encoded;
        } catch (e) { return null; }
    }

    async function initiateCameraAndScan() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.style.opacity = "0.4";
            camStatus.innerText = "ONLINE";
            camText.style.display = "block";
            
            triggerHyperScan();
        } catch (err) {
            document.getElementById('global-status').innerText = "KAMERAFEIL";
            console.error("Kamera tilgang nektet", err);
            // Kjører uansett som fallback
            triggerHyperScan();
        }
    }

    async function triggerHyperScan() {
        const btn = document.getElementById('start-btn');
        const status = document.getElementById('global-status');
        btn.disabled = true;
        btn.style.opacity = "0.2";
        
        status.innerText = "SKANNER BRUKER...";
        progressBar.style.width = "0%";
        
        const startTime = Date.now();
        const duration = 3000; 

        const prompts = [
            "Axial brain CT scan, grayscale medical radiology, neurological assessment",
            "Brain tomography slice, clinical imaging, monochromatic high contrast head scan",
            "Medical radiography of human brain, frontal lobe section, grayscale",
            "Brain CT imaging, temporal region analysis, clinical psychiatric marker style",
            "Neurological brain scan, axial view tomography, monochromatic",
            "Human brain scan slice, medical imaging diagnostic, grayscale radiology"
        ];

        // Start bildehenting i bakgrunnen
        const imagePromises = prompts.map(p => generateImage(p));

        const progressInterval = setInterval(() => {
            const elapsed = Date.now() - startTime;
            const percentage = Math.min((elapsed / duration) * 100, 100);
            progressBar.style.width = percentage + "%";
            
            if (elapsed >= duration) {
                clearInterval(progressInterval);
                status.innerText = "ANALYSE FERDIG";
                video.style.opacity = "0";
                camText.style.display = "none";
                btn.disabled = false;
                btn.style.opacity = "1";
                // Stopp kamera for å spare strøm
                if(video.srcObject) {
                    video.srcObject.getTracks().forEach(track => track.stop());
                }
                camStatus.innerText = "SKAN FULLFØRT";
            }
        }, 30);

        for(let r = 0; r < rows; r++) {
            status.innerText = `ANALYSERER LAG ${r+1}...`;
            
            for(let c = 0; c < cols; c++) {
                const idx = r * cols + c;
                const line = document.getElementById(`line-${idx}`);
                line.style.display = "block";
                line.style.animation = "fastScan 0.4s linear infinite";
                document.getElementById(`module-${idx}`).classList.add('active-scan');
            }

            const base64 = await imagePromises[r];
            
            if(base64) {
                for(let c = 0; c < cols; c++) {
                    const idx = r * cols + c;
                    const target = document.getElementById(`content-${idx}`);
                    const module = document.getElementById(`module-${idx}`);
                    module.classList.remove('active-scan');
                    target.innerHTML = `
                        <img src="data:image/png;base64,${base64}" alt="Hjerne Analyse">
                        <div class="module-overlay"></div>
                    `;
                    module.querySelector('.module-footer').innerHTML = `<span>IDENTITET_BEKREFTET</span> <span class="text-cyan-400">100%</span>`;
                }
            }
            
            await new Promise(res => setTimeout(res, 200));
        }
    }

    const bgEngine = new BABYLON.Engine(document.getElementById("bgCanvas"), true);
    const scene = new BABYLON.Scene(bgEngine);
    scene.clearColor = new BABYLON.Color4(0,0,0,1);
    const cam = new BABYLON.FreeCamera("c", new BABYLON.Vector3(0,0,-10), scene);
    bgEngine.runRenderLoop(() => scene.render());

    window.onload = () => {
        createModules();
    };
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobil Musikkstudio - Global Portal</title>
    <!-- Bibliotek & CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            transition: transform 0.1s ease-out;
            transform-origin: center top;
            overflow-x: hidden;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fade-in 0.4s ease-out forwards; }
        
        .active-lang { @apply bg-blue-600 text-white shadow-lg border-blue-400 scale-105; }
        .lang-btn { @apply border border-slate-700 hover:border-blue-500/50 transition-all px-4 py-2 rounded-full whitespace-nowrap text-xs font-semibold bg-slate-800/50 backdrop-blur-sm; }
        
        #offline-banner { display: none; }
        body.is-offline #offline-banner { display: block; }

        /* Joystick System Styles */
        .joystick-wrapper {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            z-index: 1000;
        }

        .joystick-base {
            width: 80px;
            height: 80px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.7);
            position: relative;
        }

        .joystick-knob {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            transition: transform 0.05s linear;
            z-index: 10;
        }

        .scroll-knob { background: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .zoom-knob { background: #a855f7; box-shadow: 0 0 15px rgba(168, 85, 247, 0.5); }

        .joystick-label {
            position: absolute;
            font-size: 7px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 pb-40">

    <!-- Offline Varsel -->
    <div id="offline-banner" class="bg-blue-600 text-white text-center py-2 text-xs font-bold sticky top-0 z-[60]">
        Modus: Lokal lagring aktivert (Offline tilgjengelig)
    </div>

    <!-- Global Språk-navigasjon -->
    <nav id="lang-nav" class="sticky top-0 z-50 bg-slate-900/95 backdrop-blur-xl border-b border-slate-800 p-3 overflow-x-auto flex space-x-2 no-scrollbar shadow-2xl">
        <!-- Genereres dynamisk -->
    </nav>

    <!-- Header -->
    <header class="p-8 text-center bg-gradient-to-b from-blue-900/20 via-slate-950 to-transparent relative">
        <div id="active-lang-indicator" class="inline-flex items-center space-x-2 bg-blue-500/10 border border-blue-500/30 px-4 py-1.5 rounded-full text-[10px] uppercase tracking-[0.2em] text-blue-400 font-black mb-6">
            <i data-lucide="globe" class="w-3 h-3"></i>
            <span id="lang-display-name">Språk: Norsk</span>
        </div>
        
        <div class="block mb-6">
            <div class="inline-block p-5 rounded-[2rem] bg-slate-900 border border-slate-800 shadow-inner">
                <i data-lucide="music-2" class="w-14 h-14 text-blue-500"></i>
            </div>
        </div>

        <h1 id="main-title" class="text-4xl md:text-6xl font-black mb-4 tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400 italic">
            Mobil Musikkstudio Guide
        </h1>
        <p id="main-intro" class="text-slate-400 max-w-2xl mx-auto text-lg leading-relaxed font-medium">
            Laster...
        </p>
    </header>

    <!-- Innhold -->
    <main id="steps-container" class="max-w-4xl mx-auto p-6 grid grid-cols-1 md:grid-cols-2 gap-6 min-h-[400px]">
        <!-- Innholdet rendres her -->
    </main>

    <!-- Footer Action -->
    <section class="max-w-4xl mx-auto px-6 mt-12 mb-20">
        <div class="bg-gradient-to-br from-slate-900 to-slate-800 p-12 rounded-[3.5rem] border border-white/5 text-center shadow-2xl relative overflow-hidden group">
            <i data-lucide="rocket" class="w-16 h-16 mx-auto mb-6 text-blue-500 opacity-80"></i>
            <h3 id="footer-title" class="text-3xl font-black mb-4">Klar for utgivelse?</h3>
            <p id="footer-desc" class="mb-8 text-slate-400 font-medium text-lg italic">Start din globale karriere fra mobilen i dag.</p>
            <button class="bg-blue-600 text-white font-black px-12 py-4 rounded-full hover:bg-blue-500 transition shadow-xl uppercase tracking-tighter">
                <span id="footer-btn">Start nå</span>
            </button>
        </div>
    </section>

    <!-- Dual Joystick System -->
    <div class="joystick-wrapper">
        <!-- Zoom Joystick -->
        <div id="zoom-joystick" class="joystick-base border-purple-500/30">
            <span class="joystick-label" style="top: 8px;">Zoom In</span>
            <span class="joystick-label" style="bottom: 8px;">Zoom Out</span>
            <div id="zoom-knob" class="joystick-knob zoom-knob"></div>
        </div>

        <!-- Scroll Joystick -->
        <div id="scroll-joystick" class="joystick-base border-blue-500/30">
            <span class="joystick-label" style="top: 8px;">Up</span>
            <span class="joystick-label" style="bottom: 8px;">Down</span>
            <div id="scroll-knob" class="joystick-knob scroll-knob"></div>
        </div>
    </div>

    <script>
        const translations = {
            "no": {
                "title": "Mobil Musikkstudio Guide",
                "intro": "Din komplette guide til produksjon på farten.",
                "step_label": "STEG",
                "footer_h": "Klar for utgivelse?",
                "footer_p": "Start din globale karriere fra mobilen i dag.",
                "footer_b": "Start nå",
                "steps": ["Velg DAW", "Konfigurer AUv3", "Korg Installasjon", "MIDI Oppsett", "Opptak", "Miks", "Mastering", "Distribusjon"]
            },
            "en": {
                "title": "Mobile Music Studio Guide",
                "intro": "Your complete guide to production on the go.",
                "step_label": "STEP",
                "footer_h": "Ready for release?",
                "footer_p": "Start your global career from your mobile today.",
                "footer_b": "Start Now",
                "steps": ["Choose DAW", "Configure AUv3", "Korg Installation", "MIDI Setup", "Recording", "Mixing", "Mastering", "Distribution"]
            }
        };

        const availableLanguages = [
            { code: 'no', name: 'Norsk' }, { code: 'en', name: 'English' }, 
            { code: 'es', name: 'Español' }, { code: 'fr', name: 'Français' },
            { code: 'de', name: 'Deutsch' }, { code: 'it', name: 'Italiano' }
        ];

        let currentLang = localStorage.getItem('app_lang') || 'no';
        let currentZoom = 1;

        // --- JOYSTICK ENGINE ---
        function createJoystick(containerId, knobId, onMove) {
            const container = document.getElementById(containerId);
            const knob = document.getElementById(knobId);
            let active = false;
            let startPos = { x: 0, y: 0 };
            let currentOffset = { x: 0, y: 0 };

            const handleStart = (e) => {
                active = true;
                const pos = e.type.includes('mouse') ? e : e.touches[0];
                startPos = { x: pos.clientX, y: pos.clientY };
            };

            const handleMove = (e) => {
                if (!active) return;
                const pos = e.type.includes('mouse') ? e : e.touches[0];
                let dx = pos.clientX - startPos.x;
                let dy = pos.clientY - startPos.y;
                
                const limit = 25;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > limit) {
                    dx *= limit / dist;
                    dy *= limit / dist;
                }

                currentOffset = { x: dx / limit, y: dy / limit };
                knob.style.transform = `translate(${dx}px, ${dy}px)`;
                onMove(currentOffset);
            };

            const handleEnd = () => {
                active = false;
                currentOffset = { x: 0, y: 0 };
                knob.style.transform = `translate(0px, 0px)`;
                onMove(currentOffset);
            };

            container.addEventListener('mousedown', handleStart);
            container.addEventListener('touchstart', handleStart);
            window.addEventListener('mousemove', handleMove);
            window.addEventListener('touchmove', handleMove);
            window.addEventListener('mouseup', handleEnd);
            window.addEventListener('touchend', handleEnd);
        }

        let scrollSpeed = 0;
        let zoomSpeed = 0;

        // Initier Scroll Joystick
        createJoystick('scroll-joystick', 'scroll-knob', (offset) => {
            scrollSpeed = offset.y;
        });

        // Initier Zoom Joystick
        createJoystick('zoom-joystick', 'zoom-knob', (offset) => {
            zoomSpeed = offset.y;
        });

        // Game Loop for jevn navigasjon
        function loop() {
            if (Math.abs(scrollSpeed) > 0.05) {
                window.scrollBy(0, scrollSpeed * 20);
            }
            if (Math.abs(zoomSpeed) > 0.05) {
                // Zoomer ut når man drar ned (positiv y), zoomer inn når man drar opp (negativ y)
                currentZoom -= zoomSpeed * 0.015;
                currentZoom = Math.min(Math.max(0.4, currentZoom), 2.5);
                document.body.style.transform = `scale(${currentZoom})`;
            }
            requestAnimationFrame(loop);
        }
        loop();

        // --- APP LOGIKK ---
        async function updateAppContent(langCode) {
            currentLang = langCode;
            localStorage.setItem('app_lang', langCode);
            const data = translations[langCode] || translations['en'];
            const langName = availableLanguages.find(l => l.code === langCode)?.name || langCode;

            document.getElementById('lang-display-name').innerText = `Språk: ${langName}`;
            document.getElementById('main-title').innerText = data.title;
            document.getElementById('main-intro').innerText = data.intro;
            document.getElementById('footer-title').innerText = data.footer_h;
            document.getElementById('footer-desc').innerText = data.footer_p;
            document.getElementById('footer-btn').innerText = data.footer_b;

            const container = document.getElementById('steps-container');
            container.innerHTML = data.steps.map((step, i) => `
                <div class="bg-slate-900/60 p-6 rounded-[2rem] border border-slate-800 animate-fade" style="animation-delay: ${i * 0.05}s">
                    <span class="text-blue-500 text-[10px] font-black tracking-widest block mb-2">${data.step_label} ${i + 1}</span>
                    <h2 class="text-xl font-black mb-2">${step}</h2>
                    <p class="text-slate-500 text-sm italic">Konfigurasjon fullført.</p>
                </div>
            `).join('');

            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active-lang', btn.dataset.lang === langCode));
            lucide.createIcons();
        }

        function init() {
            const nav = document.getElementById('lang-nav');
            nav.innerHTML = availableLanguages.map(l => `
                <button onclick="updateAppContent('${l.code}')" data-lang="${l.code}" class="lang-btn">${l.name}</button>
            `).join('');
            updateAppContent(currentLang);
            
            const checkStatus = () => document.body.classList.toggle('is-offline', !navigator.onLine);
            window.addEventListener('online', checkStatus);
            window.addEventListener('offline', checkStatus);
            checkStatus();
        }

        // Service Worker for Offline
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'dual-joy-cache-v1';
                self.addEventListener('install', e => e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(['/', location.href]))));
                self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
            `;
            const blob = new Blob([swCode], { type: 'text/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }

        window.onload = init;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Bomb</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent: #00f2ff;
            --bomb-accent: #ffae00;
            --danger: #ff4d4d;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0a 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            background: transparent;
        }

        /* Glassmorphic GUI */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        #top-gui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            padding: 15px 25px;
            pointer-events: none;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            text-shadow: 0 0 10px var(--accent);
        }

        /* On-Screen Controllers */
        #mobile-controls {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none;
        }

        .d-pad {
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }

        .ctrl-btn {
            width: 65px;
            height: 65px;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }

        .ctrl-btn:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.25);
        }

        #fire-btn {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            pointer-events: auto;
            border: 2px solid var(--accent);
        }

        #bomb-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            pointer-events: auto;
            border: 2px solid var(--bomb-accent);
            margin-right: 10px;
            color: var(--bomb-accent);
            font-weight: bold;
            font-size: 0.7rem;
        }

        /* Overlays */
        #overlay-screen {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal {
            width: 320px;
            padding: 40px;
            text-align: center;
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        svg {
            fill: white;
            width: 30px;
            height: 30px;
        }

        .controls-hint {
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.7rem;
            opacity: 0.4;
            pointer-events: none;
        }

        @media (min-width: 1024px) {
            #mobile-controls { display: none; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="top-gui" class="glass-panel">
        <div class="stat-item">
            <div class="stat-label">Score</div>
            <div id="score" class="stat-value">0000</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Mass Bombs</div>
            <div id="bombs-count" class="stat-value" style="color: var(--bomb-accent)">3</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Level</div>
            <div id="level" class="stat-value">1</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Armor</div>
            <div id="lives" class="stat-value" style="color: #4dff88">100</div>
        </div>
    </div>

    <div id="overlay-screen" style="display: none;">
        <div class="modal glass-panel">
            <h1 id="status-text" style="margin-top:0">GAME OVER</h1>
            <p id="final-stats">Your journey ended at score 0</p>
            <button class="btn-primary" onclick="resetGame()">INITIALIZE REENTRY</button>
        </div>
    </div>

    <div id="mobile-controls">
        <div class="d-pad">
            <div class="ctrl-btn glass-panel" id="left-btn">
                <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </div>
            <div class="ctrl-btn glass-panel" id="right-btn">
                <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </div>
        </div>
        <div style="display: flex; align-items: center;">
            <div class="ctrl-btn glass-panel" id="bomb-btn">BOMB</div>
            <div class="ctrl-btn glass-panel" id="fire-btn">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/></svg>
            </div>
        </div>
    </div>

    <div class="controls-hint">B KEY: MASS BOMB | WASD/ARROWS: MOVE | SPACE: FIRE</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const levelEl = document.getElementById('level');
    const livesEl = document.getElementById('lives');
    const bombsEl = document.getElementById('bombs-count');
    const overlay = document.getElementById('overlay-screen');
    const statusText = document.getElementById('status-text');
    const finalStats = document.getElementById('final-stats');

    // Configuration
    const STARTING_ARMOR = 100;
    const STARTING_BOMBS = 3;

    // State
    let gameActive = true;
    let score = 0;
    let lives = STARTING_ARMOR;
    let bombs = STARTING_BOMBS;
    let level = 1;
    let keys = {};
    
    let player = { x: 0, y: 0, w: 45, h: 40, color: '#00f2ff', cooldown: 0 };
    let bullets = [];
    let enemyBullets = [];
    let enemies = [];
    let particles = [];
    let stars = [];

    function init() {
        resize();
        window.addEventListener('resize', resize);
        
        for(let i=0; i<150; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 1.5,
                speed: Math.random() * 2 + 0.5,
                opacity: Math.random()
            });
        }

        setupInput();
        spawnWave();
        requestAnimationFrame(gameLoop);
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        player.y = canvas.height - 180; 
        if (window.innerWidth > 1024) player.y = canvas.height - 100;
        player.x = canvas.width / 2 - player.w / 2;
    }

    function setupInput() {
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'KeyB') triggerMassBomb();
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        const bind = (id, key) => {
            const el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                if (id === 'bomb-btn') triggerMassBomb();
                else keys[key] = true; 
            });
            el.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
            el.addEventListener('mousedown', () => {
                if (id === 'bomb-btn') triggerMassBomb();
                else keys[key] = true;
            });
            el.addEventListener('mouseup', () => keys[key] = false);
        };
        bind('left-btn', 'ArrowLeft');
        bind('right-btn', 'ArrowRight');
        bind('fire-btn', 'Space');
        bind('bomb-btn', 'KeyB');
    }

    function triggerMassBomb() {
        if (!gameActive || bombs <= 0) return;
        bombs--;
        updateUI();

        // Screen shake effect placeholder (visual logic in update/draw)
        screenShake = 30;

        // Launch 20 radial missiles
        for (let i = 0; i < 20; i++) {
            const angle = (Math.PI * 2 / 20) * i;
            bullets.push({
                x: player.x + player.w/2,
                y: player.y + player.h/2,
                w: 8,
                h: 8,
                isMissile: true,
                vx: Math.cos(angle) * 12,
                vy: Math.sin(angle) * 12,
                color: '#ffae00'
            });
        }

        // Auto-damage all current enemies for the "Massive Explosion" feel
        enemies.forEach(e => {
            createExplosion(e.x + e.w/2, e.y + e.h/2, '#ffae00');
            score += 25 * level;
        });
        enemies = []; // Wipe the wave
    }

    let screenShake = 0;

    function spawnWave() {
        const rows = 3 + Math.min(Math.floor(level/2), 3);
        const cols = Math.min(Math.floor(canvas.width / 70), 10);
        const spacing = 60;
        const totalW = cols * spacing;
        const startX = (canvas.width - totalW) / 2;

        for(let r=0; r<rows; r++) {
            for(let c=0; c<cols; c++) {
                enemies.push({
                    x: startX + c * spacing,
                    y: 100 + r * 50,
                    w: 35, h: 25,
                    vx: 1.5 + (level * 0.2),
                    hue: 180 + (r * 20)
                });
            }
        }
    }

    function resetGame() {
        score = 0; lives = STARTING_ARMOR; bombs = STARTING_BOMBS; level = 1;
        enemies = []; bullets = []; enemyBullets = []; particles = [];
        gameActive = true;
        overlay.style.display = 'none';
        updateUI();
        spawnWave();
        resize();
    }

    function updateUI() {
        scoreEl.innerText = score.toString().padStart(4, '0');
        levelEl.innerText = level;
        livesEl.innerText = lives;
        bombsEl.innerText = bombs;
        
        if (lives <= 20) livesEl.style.color = 'var(--danger)';
        else if (lives <= 50) livesEl.style.color = '#ffaa00';
        else livesEl.style.color = '#4dff88';
    }

    function createExplosion(x, y, color) {
        for(let i=0; i<15; i++) {
            particles.push({
                x, y,
                vx: (Math.random() - 0.5) * 12,
                vy: (Math.random() - 0.5) * 12,
                life: 1,
                color
            });
        }
    }

    function update() {
        if (!gameActive) return;

        if (screenShake > 0) screenShake *= 0.9;

        stars.forEach(s => {
            s.y += s.speed;
            if (s.y > canvas.height) s.y = 0;
        });

        if ((keys['ArrowLeft'] || keys['KeyA']) && player.x > 20) player.x -= 7;
        if ((keys['ArrowRight'] || keys['KeyD']) && player.x < canvas.width - player.w - 20) player.x += 7;
        
        if ((keys['Space'] || keys['KeyW'] || keys['ArrowUp']) && player.cooldown <= 0) {
            bullets.push({ x: player.x + player.w/2 - 2, y: player.y, w: 4, h: 15, isMissile: false });
            player.cooldown = 12;
        }
        if (player.cooldown > 0) player.cooldown--;

        bullets.forEach((b, i) => {
            if (b.isMissile) {
                b.x += b.vx;
                b.y += b.vy;
            } else {
                b.y -= 10;
            }

            if (b.y < -50 || b.y > canvas.height + 50 || b.x < -50 || b.x > canvas.width + 50) {
                bullets.splice(i, 1);
            }
        });

        enemyBullets.forEach((b, i) => {
            b.y += 5 + (level * 0.5);
            if (b.y > canvas.height) enemyBullets.splice(i, 1);
            if (b.x < player.x + player.w && b.x + b.w > player.x && b.y < player.y + player.h && b.y + b.h > player.y) {
                enemyBullets.splice(i, 1);
                lives--;
                updateUI();
                createExplosion(player.x + player.w/2, player.y + player.h/2, '#ff4d4d');
                if (lives <= 0) {
                    gameActive = false;
                    statusText.innerText = "MISSION FAILED";
                    finalStats.innerText = `Final Score: ${score} | Deep Space Level: ${level}`;
                    overlay.style.display = 'flex';
                }
            }
        });

        let edgeHit = false;
        enemies.forEach((e, i) => {
            e.x += e.vx;
            if (e.x < 10 || e.x > canvas.width - e.w - 10) edgeHit = true;

            if (Math.random() < 0.005 + (level * 0.002)) {
                enemyBullets.push({ x: e.x + e.w/2, y: e.y + e.h, w: 3, h: 10 });
            }

            bullets.forEach((b, bi) => {
                if (b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
                    if (!b.isMissile) bullets.splice(bi, 1);
                    createExplosion(e.x + e.w/2, e.y + e.h/2, `hsl(${e.hue}, 100%, 50%)`);
                    enemies.splice(i, 1);
                    score += 50 * level;
                    updateUI();
                }
            });
        });

        if (edgeHit) {
            enemies.forEach(e => { e.vx *= -1; e.y += 15; });
        }

        if (enemies.length === 0) {
            level++;
            // Grant a bomb every 2 levels
            if (level % 2 === 0) bombs++;
            updateUI();
            spawnWave();
        }

        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            if (p.life <= 0) particles.splice(i, 1);
        });
    }

    function draw() {
        ctx.save();
        if (screenShake > 1) {
            ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Stars
        stars.forEach(s => {
            ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
            ctx.fillRect(s.x, s.y, s.size, s.size);
        });

        // Player Glow
        ctx.shadowBlur = 15;
        ctx.shadowColor = player.color;
        
        ctx.fillStyle = player.color;
        ctx.beginPath();
        ctx.moveTo(player.x + player.w/2, player.y);
        ctx.lineTo(player.x, player.y + player.h);
        ctx.lineTo(player.x + player.w/2, player.y + player.h * 0.7);
        ctx.lineTo(player.x + player.w, player.y + player.h);
        ctx.closePath();
        ctx.fill();

        // Bullets
        bullets.forEach(b => {
            ctx.fillStyle = b.color || '#fff';
            ctx.shadowColor = b.color || '#fff';
            if (b.isMissile) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.w, 0, Math.PI*2);
                ctx.fill();
            } else {
                ctx.fillRect(b.x, b.y, b.w, b.h);
            }
        });

        // Enemy Bullets
        ctx.fillStyle = '#ff4d4d';
        ctx.shadowColor = '#ff4d4d';
        enemyBullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

        // Enemies
        enemies.forEach(e => {
            ctx.fillStyle = `hsl(${e.hue}, 80%, 60%)`;
            ctx.shadowColor = `hsl(${e.hue}, 80%, 60%)`;
            ctx.beginPath();
            ctx.roundRect(e.x, e.y, e.w, e.h, 5);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.fillRect(e.x + 8, e.y + 6, 4, 4);
            ctx.fillRect(e.x + e.w - 12, e.y + 6, 4, 4);
        });

        ctx.shadowBlur = 0;
        particles.forEach(p => {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
            ctx.fill();
        });
        ctx.globalAlpha = 1;
        ctx.restore();
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    window.onload = init;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="no" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dating Program.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dracula-bg: #282a36;
            --dracula-current: #44475a;
            --dracula-fg: #f8f8f2;
            --dracula-comment: #6272a4;
            --dracula-cyan: #8be9fd;
            --dracula-green: #50fa7b;
            --dracula-orange: #ffb86c;
            --dracula-pink: #ff79c6;
            --dracula-purple: #bd93f9;
            --dracula-red: #ff5555;
            --dracula-yellow: #f1fa8c;
        }

        body {
            background-color: var(--dracula-bg);
            color: var(--dracula-fg);
            font-family: 'Fira Code', monospace;
            overflow-x: hidden;
        }

        /* Glassmorphism Styles */
        .glass-panel {
            background: rgba(68, 71, 90, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-icon {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
        }

        .terminal-border {
            border: 1px solid var(--dracula-current);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .code-snippet {
            background-color: #1e1f29;
            border-radius: 0.75rem;
            padding: 1.25rem;
            font-size: 0.8rem;
            line-height: 1.5;
            border-left: 4px solid var(--dracula-purple);
            max-height: 220px;
            overflow-y: auto;
        }

        .code-keyword { color: var(--dracula-pink); }
        .code-func { color: var(--dracula-green); }
        .code-string { color: var(--dracula-yellow); }
        .code-comment { color: var(--dracula-comment); font-style: italic; }
        .code-type { color: var(--dracula-cyan); }

        .scanline {
            width: 100%; height: 100px; z-index: 100;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(255,255,255,0.01) 50%, rgba(0,0,0,0) 100%);
            opacity: 0.1; position: fixed; bottom: 100%;
            animation: scanline 8s linear infinite; pointer-events: none;
        }

        @keyframes scanline { 0% { bottom: 100%; } 100% { bottom: -100px; } }

        .profile-img-container {
            position: relative;
            height: 280px;
            overflow: hidden;
            background: #1e1f29;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .match-overlay-pill {
            position: absolute;
            top: 1rem;
            right: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-weight: 800;
            font-size: 0.75rem;
            background: rgba(189, 147, 249, 0.85);
            backdrop-filter: blur(4px);
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Nav & Buttons */
        .btn-action {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-action:active { transform: scale(0.9); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--dracula-purple); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-purple-500/30">
    <div class="scanline"></div>

    <header class="border-b border-gray-800/50 p-4 sticky top-0 bg-[#282a36]/80 backdrop-blur-md z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="glass-icon w-8 h-8 flex items-center justify-center text-pink-500">
                    <i class="fas fa-code-merge"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tighter">Dev<span class="text-purple-400">Match</span></h1>
            </div>
            <div id="stats" class="text-[10px] text-gray-500 font-mono bg-black/20 px-3 py-1 rounded-full">
                <span class="text-green-400">●</span> 800 NODES_SYNCED
            </div>
        </div>
    </header>

    <main id="app-container" class="flex-grow max-w-md mx-auto w-full p-4 pb-24">
        <div id="discovery-view" class="relative h-full">
            <!-- Current Profile Card -->
            <div id="current-card" class="terminal-border rounded-2xl bg-[#282a36] overflow-hidden transform transition-all duration-500 flex flex-col h-full">
                
                <!-- Profile Image Area -->
                <div class="profile-img-container">
                    <img id="dev-photo" src="" alt="Profile" class="profile-img">
                    <div id="match-percent" class="match-overlay-pill">--% MATCH</div>
                    
                    <!-- Name & Title Glass Overlay -->
                    <div class="absolute bottom-0 left-0 right-0 p-5 bg-gradient-to-t from-black/80 to-transparent">
                        <div class="flex items-center space-x-2">
                            <h2 id="dev-name" class="text-2xl font-bold text-white drop-shadow-md">Laster...</h2>
                            <div id="gender-icon" class="glass-icon w-6 h-6 flex items-center justify-center text-xs"></div>
                        </div>
                        <p id="dev-role" class="text-cyan-300 font-medium text-sm drop-shadow-md">Software Engineer</p>
                    </div>
                </div>

                <!-- Info & Code Area -->
                <div class="p-5 space-y-4 flex-grow overflow-y-auto">
                    <div class="flex justify-between items-center">
                        <span id="file-name" class="text-[10px] text-gray-500 font-mono italic">loading...</span>
                        <span id="dev-lang" class="text-[10px] px-2 py-0.5 rounded bg-purple-500/20 text-purple-300 font-bold border border-purple-500/30 uppercase tracking-widest">Lang</span>
                    </div>
                    
                    <div class="code-snippet font-mono" id="dev-code">
                        <!-- Code injected by JS -->
                    </div>

                    <div id="dev-bio" class="text-sm text-gray-300 leading-relaxed border-l-2 border-gray-700 pl-4 py-1 italic">
                        "Henter bio..."
                    </div>

                    <div class="flex flex-wrap gap-2" id="dev-stack">
                        <!-- Tags injected by JS -->
                    </div>
                </div>

                <!-- Interaction Bar -->
                <div class="grid grid-cols-3 gap-0 border-t border-gray-800 bg-[#21222c]/50 p-2">
                    <button onclick="handlePR('close')" class="btn-action p-4 text-red-500 flex flex-col items-center group">
                        <div class="glass-icon w-12 h-12 flex items-center justify-center mb-1 group-hover:bg-red-500 group-hover:text-white transition-all">
                            <i class="fas fa-terminal"></i>
                        </div>
                        <span class="text-[9px] font-black uppercase tracking-widest">Abort</span>
                    </button>
                    <button onclick="handlePR('changes')" class="btn-action p-4 text-yellow-500 flex flex-col items-center group">
                        <div class="glass-icon w-12 h-12 flex items-center justify-center mb-1 group-hover:bg-yellow-500 group-hover:text-white transition-all">
                            <i class="fas fa-code-pull-request"></i>
                        </div>
                        <span class="text-[9px] font-black uppercase tracking-widest">Review</span>
                    </button>
                    <button onclick="handlePR('approve')" class="btn-action p-4 text-green-500 flex flex-col items-center group">
                        <div class="glass-icon w-12 h-12 flex items-center justify-center mb-1 group-hover:bg-green-500 group-hover:text-white transition-all">
                            <i class="fas fa-check-double"></i>
                        </div>
                        <span class="text-[9px] font-black uppercase tracking-widest">Merge</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#282a36]/95 backdrop-blur-xl border-t border-gray-800 p-4 z-40">
        <div class="max-w-md mx-auto flex justify-between items-center px-4">
            <button class="text-purple-400 flex flex-col items-center">
                <i class="fas fa-microchip text-xl"></i>
                <span class="text-[8px] font-bold mt-1">CORE</span>
            </button>
            <button class="text-gray-500 flex flex-col items-center">
                <i class="fas fa-code-branch text-xl"></i>
                <span class="text-[8px] font-bold mt-1">FORKS</span>
            </button>
            <button class="text-gray-500 flex flex-col items-center">
                <i class="fas fa-message text-xl"></i>
                <span class="text-[8px] font-bold mt-1">LOGS</span>
            </button>
            <button class="text-gray-500 flex flex-col items-center">
                <i class="fas fa-sliders text-xl"></i>
                <span class="text-[8px] font-bold mt-1">CONFIG</span>
            </button>
        </div>
    </nav>

    <!-- Modals -->
    <div id="pr-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center p-6 hidden z-[100]">
        <div class="glass-panel w-full max-w-sm rounded-2xl overflow-hidden shadow-2xl border-purple-500/20">
            <div class="bg-purple-500/20 p-4 flex justify-between items-center">
                <h3 class="text-xs font-black uppercase tracking-widest text-purple-300">Request Changes</h3>
                <button onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <textarea id="pr-message" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm focus:border-purple-500 outline-none h-32 text-gray-200 font-mono" placeholder="Begrunn hvorfor denne koden trenger refaktorering..."></textarea>
                <button onclick="submitPRMessage()" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white font-black py-4 rounded-xl text-xs uppercase tracking-[0.2em] shadow-lg">
                    Broadcast Review
                </button>
            </div>
        </div>
    </div>

    <div id="match-overlay" class="fixed inset-0 bg-black/95 flex flex-col items-center justify-center p-6 hidden z-[110] text-center">
        <div class="relative mb-8">
            <div class="absolute inset-0 bg-pink-500 blur-3xl opacity-30 animate-pulse"></div>
            <i class="fas fa-heart-circle-check text-8xl text-pink-500 relative"></i>
        </div>
        <h2 class="text-4xl font-black italic mb-4 bg-gradient-to-r from-pink-400 to-purple-500 bg-clip-text text-transparent uppercase tracking-tighter">PR Approved!</h2>
        <p class="text-lg mb-10 text-gray-400 font-mono">Gratulerer! <span id="match-name-display" class="text-white border-b-2 border-pink-500"></span> har akseptert din merge request.</p>
        <div class="w-full max-w-xs space-y-4">
            <button onclick="location.reload()" class="w-full glass-panel text-white font-black py-5 rounded-2xl uppercase tracking-[0.2em] hover:bg-white/10 transition-all border-pink-500/50">
                Init Chat.bin
            </button>
            <button onclick="closeMatch()" class="w-full text-gray-500 text-[10px] font-bold uppercase tracking-widest">
                Continue Scoping
            </button>
        </div>
    </div>

    <div id="notification-area" class="fixed top-24 left-0 right-0 flex flex-col items-center space-y-3 pointer-events-none z-50"></div>

    <script>
        // Constants & Generators
        const IMAGES = {
            male: (id) => `https://images.unsplash.com/photo-${1500648767791 + id % 50}-00221447b1b1?auto=format&fit=crop&q=80&w=600`,
            female: (id) => `https://images.unsplash.com/photo-${1494790108377 + id % 50}-be9c29b29330?auto=format&fit=crop&q=80&w=600`
        };

        const firstNamesMale = ["Erik", "Anders", "Marius", "Lars", "Kevin", "Sander", "Henrik", "Jonas", "Stian", "Fredrik", "Thomas", "Magnus", "Olav", "Espen", "Eivind", "Niklas", "Tobias", "Simen", "Vegard", "Aleksander", "Christian", "Adrian", "Daniel", "Elias", "Felix"];
        const firstNamesFemale = ["Julie", "Mina", "Sara", "Linnea", "Emilie", "Sofie", "Nora", "Ingrid", "Thea", "Ida", "Vilde", "Hanna", "Malin", "Tuva", "Ada", "Kaja", "Eline", "Aurora", "Frida", "Maja", "Selma", "Amalie", "Lea", "Oda", "Ronja"];
        const lastNames = ["Script", "Byte", "Logic", "Node", "Cache", "Stack", "Commit", "Push", "Query", "Kernel", "Flow", "Cloud", "Array", "String", "Hash", "Heap", "Thread", "Lambda"];
        const roles = ["Frontend Wizard", "Backend Brain", "DevOps Ninja", "Fullstack Architect", "Security Auditor", "AI Researcher", "Mobile Guru", "Game Dev", "Cloud Specialist", "Data Scientist"];
        
        const languages = [
            { name: "TypeScript", color: "text-blue-400", code: () => `<span class="code-keyword">type</span> <span class="code-type">Heart</span> = 'Love' | 'Logic';\n<span class="code-keyword">const</span> connection = (you: <span class="code-type">Partner</span>): <span class="code-type">Heart</span> => {\n  <span class="code-keyword">return</span> you.compatibility > <span class="code-type">0.9</span> ? <span class="code-string">'Love'</span> : <span class="code-string">'Logic'</span>;\n};` },
            { name: "Python", color: "text-yellow-400", code: () => `<span class="code-keyword">import</span> soulmate\n\n<span class="code-keyword">while</span> <span class="code-keyword">True</span>:\n  match = soulmate.<span class="code-func">scan</span>(location=<span class="code-string">'Norway'</span>)\n  <span class="code-keyword">if</span> match.is_perfect():\n    <span class="code-keyword">print</span>(<span class="code-string">"Merging brains..."</span>)\n    <span class="code-keyword">break</span>` },
            { name: "Rust", color: "text-orange-500", code: () => `<span class="code-keyword">pub fn</span> <span class="code-func">connect</span>(other: &<span class="code-type">Dev</span>) -> <span class="code-type">Result</span>&lt;(), <span class="code-type">Error</span>&gt; {\n  <span class="code-keyword">let</span> bond = <span class="code-type">Safety</span>::new(other)?;\n  <span class="code-func">println!</span>(<span class="code-string">"Safe relationship established"</span>);\n  <span class="code-type">Ok</span>(())\n}` },
            { name: "Go", color: "text-cyan-400", code: () => `<span class="code-keyword">func</span> <span class="code-func">main</span>() {\n  c := make(<span class="code-keyword">chan</span> <span class="code-type">Love</span>)\n  <span class="code-keyword">go</span> <span class="code-func">date</span>(c)\n  msg := &lt;-c\n  fmt.<span class="code-func">Println</span>(msg)\n}` }
        ];

        const bios = [
            "Søker en partner som ikke sletter databasen min.",
            "Min kjærlighet for kode er thread-safe.",
            "Leter etter noen å debugge livet med.",
            "Lover å aldri force-pushe til ditt hjerte.",
            "Er du en API? For jeg føler en sterk tilkobling.",
            "Søker en backend som tåler mine forespørsler.",
            "Trenger en frontend som kan styles med kjærlighet.",
            "Min hjerne kjører på kaffe og gode algoritmer."
        ];

        // Generate 800 profiles
        const developers = [];
        for (let i = 0; i < 800; i++) {
            const isMale = Math.random() > 0.5;
            const firstName = isMale ? firstNamesMale[i % firstNamesMale.length] : firstNamesFemale[i % firstNamesFemale.length];
            const lang = languages[i % languages.length];
            developers.push({
                id: i,
                gender: isMale ? 'male' : 'female',
                name: `${firstName} ${lastNames[i % lastNames.length]}`,
                role: roles[i % roles.length],
                match: Math.floor(Math.random() * 40 + 60) + "%",
                photo: isMale ? IMAGES.male(i) : IMAGES.female(i),
                lang: lang.name,
                code: lang.code(),
                stack: ["React", "Go", "Docker", "Rust", "Swift", "Vue", "AWS", "Node"].sort(() => Math.random() - 0.5).slice(0, 3),
                bio: bios[i % bios.length],
                fileName: `source_code_${i}.${lang.name === 'Python' ? 'py' : 'ts'}`
            });
        }

        let currentIndex = 0;

        function updateCard() {
            const dev = developers[currentIndex];
            const card = document.getElementById('current-card');
            
            // Subtle transition
            card.classList.add('opacity-0', 'scale-95');
            
            setTimeout(() => {
                document.getElementById('dev-photo').src = dev.photo;
                document.getElementById('dev-name').innerText = dev.name;
                document.getElementById('dev-role').innerText = dev.role;
                document.getElementById('dev-code').innerHTML = dev.code.replace(/\n/g, '<br>');
                document.getElementById('match-percent').innerText = dev.match + " MATCH";
                document.getElementById('file-name').innerText = dev.fileName;
                document.getElementById('dev-lang').innerText = dev.lang;
                document.getElementById('dev-bio').innerText = `"${dev.bio}"`;

                const icon = document.getElementById('gender-icon');
                icon.innerHTML = dev.gender === 'male' ? '<i class="fas fa-mars text-blue-400"></i>' : '<i class="fas fa-venus text-pink-400"></i>';

                const stack = document.getElementById('dev-stack');
                stack.innerHTML = '';
                dev.stack.forEach(s => {
                    const pill = document.createElement('span');
                    pill.className = "bg-white/5 border border-white/10 px-3 py-1 rounded-lg text-[10px] font-bold text-gray-400";
                    pill.innerText = s;
                    stack.appendChild(pill);
                });

                card.classList.remove('opacity-0', 'scale-95');
            }, 300);
        }

        function handlePR(action) {
            const card = document.getElementById('current-card');
            if (action === 'close') {
                showNotification("ABORTED: Branch deleted.", "red");
                card.style.transform = "translateX(-150%) rotate(-20deg)";
                next();
            } else if (action === 'changes') {
                document.getElementById('pr-modal').classList.remove('hidden');
            } else if (action === 'approve') {
                showNotification("MERGE ATTEMPT IN PROGRESS...", "green");
                card.style.transform = "translateX(150%) rotate(20deg)";
                setTimeout(() => {
                    document.getElementById('match-name-display').innerText = developers[currentIndex].name;
                    document.getElementById('match-overlay').classList.remove('hidden');
                }, 500);
            }
        }

        function next() {
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % developers.length;
                const card = document.getElementById('current-card');
                card.style.transition = 'none';
                card.style.transform = 'translateY(50px) scale(0.9)';
                card.style.opacity = '0';
                setTimeout(() => {
                    card.style.transition = 'all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                    updateCard();
                }, 50);
            }, 400);
        }

        function closeModal() { document.getElementById('pr-modal').classList.add('hidden'); }
        function submitPRMessage() {
            closeModal();
            showNotification("Review Broadcasted. Status: PENDING", "yellow");
            next();
        }
        function closeMatch() {
            document.getElementById('match-overlay').classList.add('hidden');
            next();
        }

        function showNotification(text, color) {
            const area = document.getElementById('notification-area');
            const note = document.createElement('div');
            const colorClass = color === 'red' ? 'bg-red-500/90' : (color === 'green' ? 'bg-green-500/90' : 'bg-yellow-500/90');
            note.className = `${colorClass} text-white text-[10px] font-black px-6 py-2 rounded-full border border-white/20 shadow-2xl backdrop-blur-md animate-bounce uppercase tracking-widest`;
            note.innerText = text;
            area.appendChild(note);
            setTimeout(() => note.remove(), 3000);
        }

        window.onload = updateCard;
    </script>
</body>
</html>

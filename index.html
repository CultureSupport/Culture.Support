<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Login System - Zoom 80%</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Zoom ut container til 80% */
        .zoom-wrapper {
            transform: scale(0.8);
            transform-origin: center center;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .pixel-font {
            font-family: 'Press Start 2P', cursive;
        }

        /* Bakgrunnsanimasjon */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: move linear infinite;
        }

        @keyframes move {
            from { transform: translateY(0); }
            to { transform: translateY(100vh); }
        }

        /* Spill-enhet (Device) */
        .game-device {
            width: 340px;
            padding: 20px;
            background: #222;
            border: 8px solid #444;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 10px #000;
            position: relative;
        }

        #game-canvas {
            background: #000;
            border: 4px solid #111;
            display: block;
            image-rendering: pixelated;
        }

        .joystick-container {
            display: grid;
            grid-template-areas: 
                ". up ."
                "left shoot right"
                ". down .";
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }

        .btn-control {
            width: 50px;
            height: 50px;
            background: #444;
            border: none;
            border-bottom: 4px solid #222;
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
        }

        .btn-control:active {
            border-bottom: 0;
            transform: translateY(4px);
            background: #666;
        }

        .btn-shoot {
            background: #e74c3c;
            width: 60px;
            grid-area: shoot;
        }

        .hidden { display: none; }

        /* Login styling */
        .login-card {
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #333;
            padding: 2rem;
            border-radius: 1rem;
            width: 340px;
        }
    </style>
</head>
<body>

    <div class="stars" id="star-container"></div>

    <!-- Wrapper som håndterer 80% skalering -->
    <div class="zoom-wrapper">
        
        <!-- LOGIN SKJEMA -->
        <div id="login-view" class="login-card shadow-2xl">
            <h1 class="text-2xl font-bold mb-6 text-center text-blue-400">System Logg-inn</h1>
            <p class="text-xs text-gray-400 mb-6 text-center">Brukernavn: admin | Passord: space123</p>
            
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm mb-1">Brukernavn</label>
                    <input type="text" id="username" class="w-full bg-black border border-gray-700 rounded p-2 focus:border-blue-500 outline-none" required>
                </div>
                <div>
                    <label class="block text-sm mb-1">Passord</label>
                    <input type="password" id="password" class="w-full bg-black border border-gray-700 rounded p-2 focus:border-blue-500 outline-none" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded font-bold transition">
                    VERIFISER JWT
                </button>
            </form>
            <div id="login-error" class="mt-4 text-red-500 text-sm text-center hidden">Feil legitimasjon</div>
        </div>

        <!-- SPILL SIDE -->
        <div id="game-view" class="hidden flex flex-col items-center">
            <div class="mb-4 flex justify-between w-full items-center px-2">
                <span id="user-badge" class="bg-green-900 text-green-400 text-xs px-2 py-1 rounded">JWT: Aktiv</span>
                <button onclick="logout()" class="text-xs text-gray-500 hover:text-white underline">Logg ut</button>
            </div>

            <div class="game-device">
                <div class="flex justify-between items-center mb-2 px-1">
                    <div class="text-[10px] text-gray-500 font-mono">RETRO-OS v1.0</div>
                    <div id="score-display" class="text-green-500 font-mono text-sm">SCORE: 0000</div>
                </div>

                <canvas id="game-canvas" width="300" height="400"></canvas>

                <!-- Joystick Kontroller -->
                <div class="joystick-container">
                    <button class="btn-control" style="grid-area: up;" id="ctrl-up">▲</button>
                    <button class="btn-control" style="grid-area: left;" id="ctrl-left">◀</button>
                    <button class="btn-control btn-shoot" id="ctrl-shoot">🔥</button>
                    <button class="btn-control" style="grid-area: right;" id="ctrl-right">▶</button>
                    <button class="btn-control" style="grid-area: down;" id="ctrl-down">▼</button>
                </div>
            </div>
            
            <p class="mt-6 text-gray-500 text-xs text-center uppercase tracking-widest">Bruk piltaster + Space for å spille</p>
        </div>
    </div>

    <script>
        // --- JWT & Auth Simulasjon ---
        const MOCK_TOKEN_KEY = "simulated_jwt_token";

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            if (u === 'admin' && p === 'space123') {
                const mockToken = btoa(JSON.stringify({ user: u, exp: Date.now() + 3600000 }));
                localStorage.setItem(MOCK_TOKEN_KEY, mockToken);
                showGame();
            } else {
                const err = document.getElementById('login-error');
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 3000);
            }
        });

        function logout() {
            localStorage.removeItem(MOCK_TOKEN_KEY);
            location.reload();
        }

        function checkAuth() {
            const token = localStorage.getItem(MOCK_TOKEN_KEY);
            if (token) {
                try {
                    const payload = JSON.parse(atob(token));
                    if (payload.exp > Date.now()) return true;
                } catch(e) {}
            }
            return false;
        }

        function showGame() {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('game-view').classList.remove('hidden');
            initGame();
        }

        // --- Stjernehimmel Bakgrunn ---
        function createStars() {
            const container = document.getElementById('star-container');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                container.appendChild(star);
            }
        }
        createStars();

        // --- Space Invaders Spill-Logikk ---
        let gameActive = false;
        function initGame() {
            if (gameActive) return;
            gameActive = true;

            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');
            const scoreEl = document.getElementById('score-display');

            let score = 0;
            const player = { x: 135, y: 360, w: 30, h: 20, speed: 4 };
            let bullets = [];
            let enemies = [];
            let direction = 1;
            let enemyTimer = 0;
            const keys = {};

            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);

            const setupBtn = (id, key) => {
                const btn = document.getElementById(id);
                btn.onmousedown = btn.ontouchstart = (e) => { e.preventDefault(); keys[key] = true; };
                btn.onmouseup = btn.ontouchend = (e) => { e.preventDefault(); keys[key] = false; };
            }
            setupBtn('ctrl-left', 'ArrowLeft');
            setupBtn('ctrl-right', 'ArrowRight');
            setupBtn('ctrl-up', 'ArrowUp');
            setupBtn('ctrl-down', 'ArrowDown');
            document.getElementById('ctrl-shoot').onclick = () => keys['Space'] = true;

            function spawnEnemies() {
                enemies = [];
                for (let r = 0; r < 4; r++) {
                    for (let c = 0; c < 6; c++) {
                        enemies.push({
                            x: 40 + c * 40,
                            y: 30 + r * 30,
                            w: 25,
                            h: 20,
                            alive: true,
                            type: r
                        });
                    }
                }
            }

            spawnEnemies();
            let lastShot = 0;

            function update() {
                if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
                if (keys['ArrowRight'] && player.x < canvas.width - player.w) player.x += player.speed;
                if (keys['ArrowUp'] && player.y > 200) player.y -= player.speed;
                if (keys['ArrowDown'] && player.y < canvas.height - player.h) player.y += player.speed;

                if (keys['Space'] && Date.now() - lastShot > 400) {
                    bullets.push({ x: player.x + player.w / 2 - 2, y: player.y, w: 4, h: 10 });
                    lastShot = Date.now();
                    keys['Space'] = false;
                }

                bullets.forEach((b, i) => {
                    b.y -= 7;
                    if (b.y < 0) bullets.splice(i, 1);
                });

                enemyTimer++;
                if (enemyTimer % 30 === 0) {
                    let edge = false;
                    enemies.forEach(e => {
                        if (e.alive) {
                            e.x += 10 * direction;
                            if (e.x > canvas.width - 30 || e.x < 5) edge = true;
                        }
                    });
                    if (edge) {
                        direction *= -1;
                        enemies.forEach(e => e.y += 10);
                    }
                }

                bullets.forEach((b, bi) => {
                    enemies.forEach((e, ei) => {
                        if (e.alive && b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
                            e.alive = false;
                            bullets.splice(bi, 1);
                            score += 100;
                            scoreEl.innerText = `SCORE: ${score.toString().padStart(4, '0')}`;
                        }
                    });
                });

                if (enemies.every(e => !e.alive)) spawnEnemies();
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#2ecc71';
                ctx.fillRect(player.x, player.y + 5, player.w, player.h - 5);
                ctx.fillRect(player.x + 10, player.y, 10, 5);
                ctx.fillStyle = '#f1c40f';
                bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));
                enemies.forEach(e => {
                    if (e.alive) {
                        ctx.fillStyle = e.type % 2 === 0 ? '#e74c3c' : '#9b59b6';
                        ctx.fillRect(e.x + 5, e.y, 15, 10);
                        ctx.fillRect(e.x, e.y + 5, 25, 8);
                    }
                });
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                for(let i=0; i<canvas.height; i+=4) ctx.fillRect(0, i, canvas.width, 1);
            }

            function loop() {
                update();
                draw();
                requestAnimationFrame(loop);
            }
            loop();
        }

        if (checkAuth()) showGame();
    </script>
</body>
</html>

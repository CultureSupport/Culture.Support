<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culture.Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Inter:wght@300;700&display=swap');

        :root {
            --primary: #00f2ff;
            --active-green: #00ff41;
            --docker-blue: #0db7ed;
            --bg-dark: #010101;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #game-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .ui-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 10;
        }

        .pointer-events-auto {
            pointer-events: auto;
        }

        /* Docker Game Instance Grid */
        .docker-grid {
            position: fixed;
            top: 20px;
            left: 20px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(13, 183, 237, 0.3);
            backdrop-filter: blur(15px);
        }

        .game-instance {
            width: 45px;
            height: 45px;
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #555;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .game-instance:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: scale(1.05);
        }

        .game-instance.selected {
            border-color: var(--active-green);
            color: var(--active-green);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.4);
            background: rgba(0, 255, 65, 0.1);
        }

        /* Game Display Window */
        .game-container {
            position: fixed;
            top: 50%;
            left: 55%;
            transform: translate(-50%, -50%);
            width: 60%;
            height: 70%;
            background: #000;
            border: 2px solid var(--primary);
            border-radius: 12px;
            display: none;
            z-index: 50;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.2);
        }

        .game-iframe {
            width: 100%;
            height: calc(100% - 40px);
            border: none;
        }

        .game-header {
            height: 40px;
            background: #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid #222;
        }

        /* Console */
        .console-window {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 350px;
            height: 180px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--docker-blue);
            border-radius: 4px;
            font-family: 'Fira Code', monospace;
            backdrop-filter: blur(10px);
        }

        .console-body {
            padding: 10px;
            font-size: 10px;
            color: #0db7ed;
            height: 140px;
            overflow-y: auto;
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 60;
            display: none;
        }

        .loader {
            border: 4px solid #111;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <!-- Spillvindu -->
    <div id="game-window" class="game-container pointer-events-auto">
        <div class="game-header">
            <span id="game-title" class="text-xs font-bold text-blue-400">LOADING_MODULE...</span>
            <button onclick="closeGame()" class="text-red-500 hover:text-red-300 text-xs">LUKK SPILL [X]</button>
        </div>
        <div id="loader" class="loading-overlay">
            <div class="loader"></div>
            <div class="mt-4 text-[10px] text-blue-400 animate-pulse">LASTER INN ONLINE MODUL...</div>
        </div>
        <iframe id="game-frame" class="game-iframe" src=""></iframe>
    </div>

    <div class="ui-overlay">
        <!-- Docker Grid -->
        <div class="docker-grid pointer-events-auto">
            <div class="col-span-5 text-[10px] uppercase tracking-widest mb-2 text-gray-400 font-bold">Tilgjengelige Online Spill (Docker)</div>
            <div id="instance-container" class="contents"></div>
        </div>

        <!-- Console -->
        <div class="console-window pointer-events-auto">
            <div class="p-2 border-b border-gray-800 text-[9px] text-gray-500">MCP_CORE_LOG</div>
            <div class="console-body" id="console-out">
                <div>[System] Venter på valg av spill...</div>
            </div>
        </div>
    </div>

    <script>
        // --- 3D BAKGRUNN ---
        let scene, camera, renderer;
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            const geometry = new THREE.TorusGeometry(10, 3, 16, 100);
            const material = new THREE.MeshPhongMaterial({ color: 0x0db7ed, wireframe: true });
            const torus = new THREE.Mesh(geometry, material);
            scene.add(torus);

            const light = new THREE.PointLight(0xffffff, 1, 100);
            light.position.set(10, 10, 10);
            scene.add(light);
            camera.position.z = 30;

            function animate() {
                requestAnimationFrame(animate);
                torus.rotation.x += 0.01;
                torus.rotation.y += 0.005;
                renderer.render(scene, camera);
            }
            animate();
        }

        // --- SPILLKATALOG ---
        const gameLibrary = [
            { name: "2048 Puzzle", url: "https://play2048.co/" },
            { name: "Hextris", url: "https://hextris.io/" },
            { name: "Pacman Classic", url: "https://pacman.live/play.html" },
            { name: "Flappy Bird Clone", url: "https://flappybird.io/" },
            { name: "Little Alchemy", url: "https://littlealchemy.com/" },
            { name: "Snake", url: "https://poki.com/en/g/snake-is-mlg" },
            { name: "Tetris JS", url: "https://tetris.com/play-tetris" },
            { name: "Paper.io", url: "https://paper-io.com/" },
            { name: "Color Switch", url: "https://poki.com/en/g/color-switch" },
            { name: "Doodle Jump", url: "https://poki.com/en/g/doodle-jump" }
        ];

        function createInstances() {
            const container = document.getElementById('instance-container');
            for(let i=1; i<=20; i++) {
                const div = document.createElement('div');
                div.className = 'game-instance';
                div.id = `inst-${i}`;
                div.innerHTML = `<span class="opacity-30">#${i}</span><span class="font-bold">G${i}</span>`;
                div.onclick = () => loadOnlineGame(i);
                container.appendChild(div);
            }
        }

        function loadOnlineGame(id) {
            const gameWindow = document.getElementById('game-window');
            const iframe = document.getElementById('game-frame');
            const loader = document.getElementById('loader');
            const title = document.getElementById('game-title');

            // Velg et spill basert på ID (looper gjennom katalogen)
            const game = gameLibrary[(id - 1) % gameLibrary.length];
            
            // UI State
            document.querySelectorAll('.game-instance').forEach(el => el.classList.remove('selected'));
            document.getElementById(`inst-${id}`).classList.add('selected');
            
            gameWindow.style.display = 'block';
            loader.style.display = 'flex';
            title.textContent = `DOCKER_INSTANCE_${id}: ${game.name.toUpperCase()}`;
            
            logToConsole(`[Docker] Starter container G${id}...`);
            logToConsole(`[MCP] Laster online modul: ${game.url}`);
            
            iframe.src = game.url;
            iframe.onload = () => {
                loader.style.display = 'none';
                logToConsole(`[System] Spill innlastet og klart.`);
            };
        }

        function closeGame() {
            document.getElementById('game-window').style.display = 'none';
            document.getElementById('game-frame').src = "";
            document.querySelectorAll('.game-instance').forEach(el => el.classList.remove('selected'));
            logToConsole("[System] Container stoppet. Venter på ny kommando.");
        }

        function logToConsole(msg) {
            const out = document.getElementById('console-out');
            const div = document.createElement('div');
            div.textContent = `> ${msg}`;
            out.prepend(div);
            if(out.childNodes.length > 10) out.removeChild(out.lastChild);
        }

        window.onload = () => {
            init3D();
            createInstances();
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

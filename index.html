<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Sandbox App Builder</title>

<!-- ICON LIBRARY -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
font-family:Inter;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
display:flex;
height:100vh;

}


/* SIDEBAR */

#sidebar{

width:180px;
padding:15px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);

border-right:1px solid rgba(255,255,255,0.1);

overflow:auto;

}

h3{
margin-top:0;
font-weight:600;
}

/* BLOCK BUTTONS */

.block{

padding:10px;
margin-bottom:10px;

border-radius:10px;

background:rgba(255,255,255,0.1);

cursor:pointer;

transition:0.2s;

}

.block:hover{

background:rgba(255,255,255,0.2);

}

/* MAIN AREA */

#main{

flex:1;
display:flex;
flex-direction:column;

}

/* TABS */

#tabs{

display:flex;

background:rgba(255,255,255,0.05);

backdrop-filter:blur(20px);

}

.tab{

padding:12px 16px;
cursor:pointer;

border-right:1px solid rgba(255,255,255,0.1);

}

.tab.active{

background:rgba(255,255,255,0.2);

}

/* EDITOR AREA */

#editor{

flex:1;
display:flex;

}

/* CODE EDITOR */

textarea{

flex:1;

background:rgba(0,0,0,0.6);

color:#00ff9c;

border:none;

padding:15px;

font-family:monospace;

font-size:14px;

}

/* PREVIEW */

#preview{

flex:1;

background:white;

color:black;

padding:20px;

overflow:auto;

}

/* BUTTON */

button{

margin-top:10px;

width:100%;

padding:10px;

border:none;

border-radius:10px;

background:#00ffa6;

font-weight:bold;

cursor:pointer;

}

button:hover{
opacity:0.9;
}

</style>
</head>

<body>


<div id="sidebar">

<h3>Components</h3>

<div class="block" onclick="addBlock('header')">
<i class="fa-solid fa-bars"></i> Header
</div>

<div class="block" onclick="addBlock('card')">
<i class="fa-solid fa-id-card"></i> Card
</div>

<div class="block" onclick="addBlock('profile')">
<i class="fa-solid fa-user"></i> Profile Card
</div>

<div class="block" onclick="addBlock('login')">
<i class="fa-solid fa-right-to-bracket"></i> Login Form
</div>

<div class="block" onclick="addBlock('footer')">
<i class="fa-solid fa-window-maximize"></i> Footer
</div>

<div class="block" onclick="addBlock('button')">
<i class="fa-solid fa-bolt"></i> Button
</div>

<div class="block" onclick="addBlock('icon')">
<i class="fa-solid fa-star"></i> Icon
</div>

<hr>

<button onclick="runSandbox()">Run Preview</button>

</div>



<div id="main">

<div id="tabs">

<div class="tab active" onclick="switchTab(event,'app')">app.jsx</div>

<div class="tab" onclick="switchTab(event,'db')">database.jsx</div>

<div class="tab" onclick="switchTab(event,'preview')">Preview</div>

</div>


<div id="editor">

<textarea id="appCode">

<div class="container">

<h1>Hello Sandbox Builder</h1>

<p>Build UI blocks from the sidebar</p>

</div>

</textarea>


<textarea id="dbCode" style="display:none">

export const Users = {

fields:{
id:"number",
name:"string",
email:"string"
}

}

</textarea>


<div id="preview" style="display:none"></div>

</div>

</div>



<script>

function switchTab(e,tab){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
e.target.classList.add("active")

document.getElementById("appCode").style.display="none"
document.getElementById("dbCode").style.display="none"
document.getElementById("preview").style.display="none"

if(tab==="app") document.getElementById("appCode").style.display="block"
if(tab==="db") document.getElementById("dbCode").style.display="block"
if(tab==="preview") document.getElementById("preview").style.display="block"

}


function addBlock(type){

let code=document.getElementById("appCode")

if(type==="header")
code.value+=`

<header style="padding:20px;background:#111;color:white">
<h2>Website Header</h2>
</header>

`

if(type==="card")
code.value+=`

<div style="padding:20px;border-radius:12px;background:#f3f3f3;margin:10px">
<h3>Card Title</h3>
<p>Card content here</p>
</div>

`

if(type==="profile")
code.value+=`

<div style="border:1px solid #ddd;padding:20px;border-radius:12px;width:200px">

<img src="https://i.pravatar.cc/150" style="width:100px;border-radius:50%">

<h3>Username</h3>

<p>Developer</p>

</div>

`

if(type==="login")
code.value+=`

<form style="display:flex;flex-direction:column;width:250px">

<input placeholder="email" style="margin:5px;padding:8px">

<input placeholder="password" type="password" style="margin:5px;padding:8px">

<button style="margin:5px;padding:10px">Login</button>

</form>

`

if(type==="footer")
code.value+=`

<footer style="padding:20px;background:#111;color:white;margin-top:40px">
Footer area
</footer>

`

if(type==="button")
code.value+=`

<button onclick="alert('clicked')">Click me</button>

`

if(type==="icon")
code.value+=`

<i class="fa-solid fa-heart" style="font-size:30px;color:red"></i>

`

}


function runSandbox(){

let code=document.getElementById("appCode").value

let preview=document.getElementById("preview")

preview.innerHTML=code

document.getElementById("preview").style.display="block"

}

</script>

</body>
</html>

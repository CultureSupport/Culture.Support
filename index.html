<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix System Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-green: #00ff41;
            --dark-core: #050505;
        }

        body {
            background-color: var(--dark-core);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
        }

        /* Diagonal bakgrunnsanimasjon */
        .diag-bg {
            position: fixed;
            inset: -100%;
            background: 
                linear-gradient(45deg, transparent 48%, rgba(0, 242, 255, 0.05) 50%, transparent 52%),
                linear-gradient(-45deg, transparent 48%, rgba(0, 255, 65, 0.03) 50%, transparent 52%);
            background-size: 80px 80px;
            animation: pan 20s linear infinite;
            z-index: -1;
        }

        @keyframes pan {
            from { transform: translate(0, 0); }
            to { transform: translate(80px, 80px); }
        }

        /* Loading Sorter */
        #loader {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .binary-ring {
            position: relative;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 2px solid rgba(0, 255, 65, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: spin 4s linear infinite;
        }

        .binary-data {
            position: absolute;
            font-size: 10px;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Panel Styling */
        .glass-panel {
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.15);
        }

        .math-scroll {
            font-size: 11px;
            line-height: 1.2;
            overflow: hidden;
            height: 150px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--neon-green); }

        .disk-item {
            border-left: 3px solid var(--neon-cyan);
            margin-bottom: 8px;
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.03);
        }
    </style>
</head>
<body>

    <div class="diag-bg"></div>

    <!-- 20 sekunder Loading Sekvens -->
    <div id="loader">
        <div class="binary-ring" id="ring">
            <!-- JS vil generere binære koder her -->
        </div>
        <div class="mt-8 text-xl tracking-widest" id="load-text">INITIALIZING QUANTUM CORE... 20s</div>
        <div class="w-64 h-1 bg-gray-900 mt-4 overflow-hidden">
            <div id="progress-bar" class="h-full bg-green-500 w-0"></div>
        </div>
    </div>

    <div id="app" class="hidden h-screen p-4 grid grid-cols-12 gap-4">
        
        <!-- Left Column: Math & Pi -->
        <div class="col-span-3 flex flex-col gap-4">
            <div class="glass-panel p-3 flex-1 overflow-hidden">
                <h3 class="text-xs border-b border-green-900 mb-2">INTEGRALS & FRACTIONS</h3>
                <div id="math-stream" class="math-scroll"></div>
            </div>
            <div class="glass-panel p-3 h-1/3">
                <h3 class="text-xs border-b border-green-900 mb-2">PI CALCULATION</h3>
                <div id="pi-box" class="text-xs break-all opacity-70"></div>
            </div>
        </div>

        <!-- Middle Column: Main Terminal & Chat -->
        <div class="col-span-6 flex flex-col gap-4">
            <div class="glass-panel p-4 flex-none">
                <h2 class="text-center text-cyan-400 font-bold mb-4 tracking-tighter">GAME SERVER CLIENT v4.0</h2>
                <div class="grid grid-cols-2 gap-4" id="login-panel">
                    <input type="text" id="node-id" placeholder="NODE ID" class="bg-black border border-green-900 p-2 text-xs focus:border-cyan-500 outline-none">
                    <input type="password" placeholder="SECURE TOKEN" class="bg-black border border-green-900 p-2 text-xs outline-none">
                    <button onclick="mockLogin()" class="col-span-2 bg-green-900 hover:bg-green-700 text-black font-bold p-1 text-xs transition">AUTHORIZE CONNECTION</button>
                </div>
            </div>

            <div class="glass-panel p-4 flex-1 flex flex-col">
                <h3 class="text-xs text-cyan-500 mb-2">SECURE NODE CHAT (LocalStorage)</h3>
                <div id="chat-box" class="flex-1 overflow-y-auto text-xs mb-2 space-y-1"></div>
                <div class="flex gap-2">
                    <input type="text" id="chat-input" placeholder="Type command..." class="flex-1 bg-black border border-green-900 p-2 text-xs outline-none">
                    <button onclick="sendMsg()" class="px-4 border border-green-900 hover:bg-green-900 text-xs">SEND</button>
                </div>
            </div>

            <div class="glass-panel p-4 h-48 relative overflow-hidden">
                <canvas id="graphCanvas"></canvas>
            </div>
        </div>

        <!-- Right Column: Disk Management & Nodes -->
        <div class="col-span-3 flex flex-col gap-4">
            <div class="glass-panel p-3 flex-1 overflow-y-auto">
                <div class="flex justify-between items-center border-b border-green-900 mb-4 pb-1">
                    <h3 class="text-xs">DISK MANAGEMENT (200GB Units)</h3>
                    <button onclick="addDisk()" class="text-green-500 hover:text-white text-lg font-bold">+</button>
                </div>
                <div id="disk-list"></div>
            </div>
            <div class="glass-panel p-3 h-1/4">
                <h3 class="text-xs border-b border-green-900 mb-2">ACTIVE SERVER NODES</h3>
                <div id="node-list" class="text-[10px] text-cyan-600"></div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Loading Logic (20 sekunder) ---
        let loadTime = 20;
        const ring = document.getElementById('ring');
        const loadText = document.getElementById('load-text');
        const progressBar = document.getElementById('progress-bar');

        // Lag binære koder i sirkel
        for(let i=0; i<40; i++) {
            const span = document.createElement('span');
            span.className = 'binary-data';
            span.innerText = Math.random() > 0.5 ? '1' : '0';
            const angle = (i / 40) * Math.PI * 2;
            const x = Math.cos(angle) * 130;
            const y = Math.sin(angle) * 130;
            span.style.transform = `translate(${x}px, ${y}px)`;
            ring.appendChild(span);
        }

        const timer = setInterval(() => {
            loadTime--;
            const progress = ((20 - loadTime) / 20) * 100;
            progressBar.style.width = `${progress}%`;
            loadText.innerText = `INITIALIZING QUANTUM CORE... ${loadTime}s`;
            
            // Oppdater binærring tilfeldig
            document.querySelectorAll('.binary-data').forEach(el => {
                if(Math.random() > 0.8) el.innerText = Math.random() > 0.5 ? '1' : '0';
            });

            if(loadTime <= 0) {
                clearInterval(timer);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                initApp();
            }
        }, 1000);

        // --- 2. Math & Pi Animatsjoner ---
        function initApp() {
            const mathStream = document.getElementById('math-stream');
            const formulas = [
                "∫(3x² + 2x)dx = x³ + x² + C",
                "∑ n=1 to ∞ (1/n²) = π²/6",
                "f(x) = lim(h→0) [f(x+h)-f(x)]/h",
                "e^(iπ) + 1 = 0",
                "Fraction: 7/13 = 0.538461...",
                "Binary Node: 01101101 01100001",
                "Matrix: [1 0 / 0 1]"
            ];

            setInterval(() => {
                const div = document.createElement('div');
                div.className = 'opacity-0 transition-opacity duration-500';
                div.innerText = `> ${formulas[Math.floor(Math.random()*formulas.length)]}`;
                mathStream.prepend(div);
                setTimeout(() => div.classList.replace('opacity-0', 'opacity-100'), 10);
                if(mathStream.childNodes.length > 10) mathStream.lastChild.remove();
            }, 800);

            // Pi Generator
            const piBox = document.getElementById('pi-box');
            const piStr = "3.141592653589793238462643383279502884197169399375105820974944592307816406286";
            let piIdx = 0;
            setInterval(() => {
                piBox.innerHTML += piStr[piIdx % piStr.length];
                piIdx++;
                if(piBox.innerHTML.length > 300) piBox.innerHTML = piBox.innerHTML.substring(50);
            }, 100);

            drawGraph();
            renderDisks();
            renderNodes();
            renderChat();
        }

        // --- 3. Disk Management (LocalStorage) ---
        function renderDisks() {
            const diskList = document.getElementById('disk-list');
            const disks = JSON.parse(localStorage.getItem('sys_disks') || '[]');
            diskList.innerHTML = disks.map((disk, idx) => `
                <div class="disk-item flex justify-between items-center group">
                    <div>
                        <div class="text-[10px] text-cyan-400">UNIT_${idx.toString().padStart(3, '0')}</div>
                        <div class="text-xs uppercase">${disk.name}</div>
                        <div class="text-[9px] text-gray-500">CAPACITY: 200 GB | STATUS: ONLINE</div>
                    </div>
                    <button onclick="deleteDisk(${idx})" class="text-red-900 hover:text-red-500 font-bold opacity-0 group-hover:opacity-100 transition">-</button>
                </div>
            `).join('');
        }

        function addDisk() {
            const name = prompt("Navngi ny harddisk (200GB):", "DATA_STORE_" + Math.floor(Math.random()*999));
            if(!name) return;
            const disks = JSON.parse(localStorage.getItem('sys_disks') || '[]');
            disks.push({ name, size: 200 });
            localStorage.setItem('sys_disks', JSON.stringify(disks));
            renderDisks();
        }

        function deleteDisk(idx) {
            const disks = JSON.parse(localStorage.getItem('sys_disks') || '[]');
            disks.splice(idx, 1);
            localStorage.setItem('sys_disks', JSON.stringify(disks));
            renderDisks();
        }

        // --- 4. Chat & Server Nodes ---
        function sendMsg() {
            const input = document.getElementById('chat-input');
            if(!input.value) return;
            const msgs = JSON.parse(localStorage.getItem('sys_chat') || '[]');
            msgs.push({ user: 'ADMIN', text: input.value, time: new Date().toLocaleTimeString() });
            localStorage.setItem('sys_chat', JSON.stringify(msgs));
            input.value = '';
            renderChat();
        }

        function renderChat() {
            const box = document.getElementById('chat-box');
            const msgs = JSON.parse(localStorage.getItem('sys_chat') || '[]');
            box.innerHTML = msgs.slice(-20).map(m => `
                <div><span class="text-cyan-500">[${m.time}]</span> <span class="text-white">${m.user}:</span> ${m.text}</div>
            `).join('');
            box.scrollTop = box.scrollHeight;
        }

        function mockLogin() {
            const id = document.getElementById('node-id').value || 'GUEST_NODE';
            const nodes = JSON.parse(localStorage.getItem('sys_nodes') || '[]');
            if(!nodes.includes(id)) nodes.push(id);
            localStorage.setItem('sys_nodes', JSON.stringify(nodes));
            renderNodes();
            alert("NODE " + id + " AUTHORIZED AND STORED IN LOCAL STORAGE.");
        }

        function renderNodes() {
            const list = document.getElementById('node-list');
            const nodes = JSON.parse(localStorage.getItem('sys_nodes') || ['MASTER_CORE_01']);
            list.innerHTML = nodes.map(n => `<div>● NODE_ACTIVE: ${n}</div>`).join('');
        }

        // --- 5. Graph Animation ---
        function drawGraph() {
            const canvas = document.getElementById('graphCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;

            let offset = 0;
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = '#00f2ff';
                ctx.lineWidth = 1;
                ctx.beginPath();
                for(let x=0; x<canvas.width; x++) {
                    const y = (canvas.height/2) + Math.sin(x*0.02 + offset) * 30 + Math.random()*2;
                    if(x===0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
                offset += 0.05;
                requestAnimationFrame(animate);
            }
            animate();
        }

        // Initialiser LocalStorage med demo data hvis tom
        if(!localStorage.getItem('sys_disks')) {
            localStorage.setItem('sys_disks', JSON.stringify([{name: 'OS_CORE', size: 200}]));
        }
    </script>
</body>
</html>

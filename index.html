<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo-Spatial Hacking Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet for Map (OpenSource alternative to GMaps for easier simulation) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap');

        :root {
            --neon-green: #00ff41;
            --dark-bg: #0a0a0a;
            --panel-bg: rgba(20, 20, 20, 0.9);
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Fira Code', monospace;
            overflow: hidden;
            height: 100vh;
        }

        #map {
            height: 100%;
            width: 100%;
            filter: brightness(0.6) contrast(1.2) saturate(0) invert(100%) hue-rotate(180deg);
        }

        .hacker-panel {
            background: var(--panel-bg);
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
            backdrop-filter: blur(5px);
        }

        .terminal-scroll {
            scrollbar-width: thin;
            scrollbar-color: var(--neon-green) transparent;
        }

        .scan-line {
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 65, 0.1);
            position: absolute;
            top: 0;
            z-index: 1000;
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .ping-pulse {
            border: 2px solid var(--neon-green);
            border-radius: 50%;
            background: rgba(0, 255, 65, 0.4);
            animation: pulse 2s ease-out infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.1); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }

        .quad-line {
            stroke: var(--neon-green);
            stroke-width: 1;
            stroke-dasharray: 5,5;
            opacity: 0.5;
        }
    </style>
</head>
<body class="relative flex flex-col md:flex-row">

    <div class="scan-line"></div>

    <!-- Sidebar / Dashboard -->
    <aside class="w-full md:w-96 p-4 z-50 flex flex-col gap-4">
        <div class="hacker-panel p-4 rounded flex-none">
            <h1 class="text-xl font-bold mb-2 uppercase tracking-widest border-b border-green-900 pb-2">
                Geo-Spatial Node Monitor
            </h1>
            <div class="text-xs space-y-1">
                <p>STATUS: <span class="animate-pulse">ACTIVE_UPLINK</span></p>
                <p>UPLOADS: <span id="file-status">Latency.csv Loaded</span></p>
                <p>STRUC: <span class="text-white">Recursive Quadtree</span></p>
            </div>
        </div>

        <div class="hacker-panel p-4 rounded flex-grow overflow-hidden flex flex-col">
            <h2 class="text-sm font-bold mb-2 text-white">SYSTEM_LOGS</h2>
            <div id="terminal" class="text-[10px] terminal-scroll overflow-y-auto flex-grow space-y-1">
                <div>[INFO] Initializing Map Matrix...</div>
                <div>[INFO] Loading Geospatial Data Structures...</div>
            </div>
        </div>

        <div class="hacker-panel p-4 rounded flex-none">
            <h2 class="text-sm font-bold mb-2">CONTROLS</h2>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="toggleQuadtree()" class="bg-green-900/30 border border-green-500 text-[10px] py-1 px-2 hover:bg-green-500 hover:text-black transition">
                    TOGGLE QUADTREE
                </button>
                <button onclick="randomScan()" class="bg-green-900/30 border border-green-500 text-[10px] py-1 px-2 hover:bg-green-500 hover:text-black transition">
                    LATENCY SCAN
                </button>
            </div>
        </div>
    </aside>

    <!-- Map Main Area -->
    <main class="flex-grow relative border-l border-green-900">
        <div id="map"></div>
        
        <!-- Overlay for UI elements -->
        <div class="absolute bottom-4 right-4 z-[1000] hacker-panel p-3 text-[10px] pointer-events-none">
            <p class="font-bold">COORD_DATA_STREAM</p>
            <div id="coords">LAT: 0.000 | LNG: 0.000</div>
        </div>
    </main>

    <script>
        let map;
        let quadtreeLines = [];
        let markers = [];
        const terminal = document.getElementById('terminal');
        
        // Mock raw data from the CSV upload provided in context
        const rawCsvData = `ID,Category,Topic,Prompt
1,Syntax,Python,Explain the difference...
2,Logic,Algorithms,Write a function...
3,Backend,Node.js,Describe how...
6,Security,Auth,Compare JWT...
13,Logic,Data Structures,Implement a LRU...
89,Security,Pentesting,Describe the OWASP...
94,Database,Deadlocks,What is a Database...`;

        function log(msg, type = 'INFO') {
            const div = document.createElement('div');
            div.innerHTML = `<span class="text-white">[${type}]</span> ${msg}`;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        // Initialize Map
        function initMap() {
            map = L.map('map', {
                center: [20, 0],
                zoom: 3,
                zoomControl: false,
                attributionControl: false
            });

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            map.on('mousemove', (e) => {
                document.getElementById('coords').innerText = 
                    `LAT: ${e.latlng.lat.toFixed(3)} | LNG: ${e.latlng.lng.toFixed(3)}`;
            });

            log("Map Layer Synchronized.");
            loadCsvNodes();
        }

        function loadCsvNodes() {
            log("Parsing Latency.csv records...");
            const lines = rawCsvData.split('\n').slice(1);
            
            lines.forEach((line, index) => {
                const parts = line.split(',');
                if (parts.length < 3) return;

                // Random geo-distribution for simulation based on data
                const lat = (Math.random() * 140) - 70;
                const lng = (Math.random() * 360) - 180;
                
                const category = parts[1];
                const topic = parts[2];

                createNode(lat, lng, category, topic);
            });
            log(`Mapped ${lines.length} logical nodes to geospatial coordinates.`);
        }

        function createNode(lat, lng, category, topic) {
            const icon = L.divIcon({
                className: 'custom-div-icon',
                html: `<div class="ping-pulse" style="width:12px; height:12px;"></div>`,
                iconSize: [12, 12],
                iconAnchor: [6, 6]
            });

            const marker = L.marker([lat, lng], { icon }).addTo(map);
            marker.bindTooltip(`[${category}] ${topic}`, { 
                permanent: false, 
                direction: 'top',
                className: 'hacker-tooltip' 
            });
            
            markers.push({lat, lng, category, topic});
        }

        // Geospatial Data Structure Visualization: Quadtree partitioning
        function toggleQuadtree() {
            if (quadtreeLines.length > 0) {
                quadtreeLines.forEach(l => map.removeLayer(l));
                quadtreeLines = [];
                log("Quadtree index visualization cleared.");
                return;
            }

            log("Calculating Quadtree partitions for zoom level " + map.getZoom());
            const bounds = map.getBounds();
            const center = bounds.getCenter();

            // Level 1 partitions
            const line1 = L.polyline([[bounds.getNorth(), center.lng], [bounds.getSouth(), center.lng]], { color: '#00ff41', weight: 1, dashArray: '5,5' }).addTo(map);
            const line2 = L.polyline([[center.lat, bounds.getWest()], [center.lat, bounds.getEast()]], { color: '#00ff41', weight: 1, dashArray: '5,5' }).addTo(map);
            
            quadtreeLines.push(line1, line2);

            // Mock deeper level for visual effect
            const nw = L.latLng((bounds.getNorth() + center.lat)/2, (bounds.getWest() + center.lng)/2);
            const subLine = L.polyline([
                [center.lat, nw.lng], [bounds.getNorth(), nw.lng]
            ], { color: '#00ff41', weight: 0.5, dashArray: '2,2', opacity: 0.5 }).addTo(map);
            
            quadtreeLines.push(subLine);
            log("Nodes partitioned into spatial buckets.");
        }

        function randomScan() {
            log("Running Latency Check on remote nodes...", "SCAN");
            const node = markers[Math.floor(Math.random() * markers.length)];
            map.flyTo([node.lat, node.lng], 6, { duration: 1.5 });
            
            setTimeout(() => {
                log(`Node: ${node.topic} | Latency: ${Math.floor(Math.random()*150)}ms`, "PING");
                const circle = L.circle([node.lat, node.lng], {
                    color: '#00ff41',
                    fillColor: '#00ff41',
                    fillOpacity: 0.2,
                    radius: 500000
                }).addTo(map);
                
                setTimeout(() => map.removeLayer(circle), 1000);
            }, 1600);
        }

        window.onload = initMap;
    </script>
</body>
</html>

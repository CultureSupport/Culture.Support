<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protest 🪧 Around Globe - Alert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* High-speed background flash */
        @keyframes flash-red-dark {
            0%, 49% { background-color: #000000; }
            50%, 100% { background-color: #990000; }
        }

        /* High-speed text blink */
        @keyframes blink-text {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        /* Rapid scale pulse */
        @keyframes rapid-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* Fast scrolling marquee */
        @keyframes fast-marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .animate-flash-bg {
            animation: flash-red-dark 0.2s infinite; /* 5x speed (0.2s cycle) */
        }

        .animate-blink-fast {
            animation: blink-text 0.15s infinite;
        }

        .animate-pulse-fast {
            animation: rapid-pulse 0.2s infinite;
        }

        .marquee-container {
            overflow: hidden;
            white-space: nowrap;
            background: #ff0000;
            color: #fff;
            padding: 10px 0;
            font-weight: 900;
            text-transform: uppercase;
            border-top: 4px solid white;
            border-bottom: 4px solid white;
        }

        .marquee-content {
            display: inline-block;
            animation: fast-marquee 3s linear infinite; /* Increased speed */
            font-size: 2rem;
        }

        .glitch-text {
            text-shadow: 2px 2px #ff0000, -2px -2px #0000ff;
        }
    </style>
</head>
<body class="animate-flash-bg h-screen flex flex-col justify-between items-center overflow-hidden font-sans">

    <!-- Top Warning Bar -->
    <div class="marquee-container w-full">
        <div class="marquee-content">
            PROTEST 🪧 AROUND GLOBE — URGENT UPDATE — PROTEST 🪧 AROUND GLOBE — URGENT UPDATE — PROTEST 🪧 AROUND GLOBE
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex flex-col items-center justify-center text-center p-4">
        <div class="animate-pulse-fast mb-4">
            <span class="text-8xl md:text-9xl">⚠️</span>
        </div>
        
        <h1 class="text-white text-5xl md:text-8xl font-black italic uppercase tracking-tighter animate-blink-fast glitch-text">
            Protest 🪧 Around Globe
        </h1>
        
        <div class="mt-8 bg-white text-black px-6 py-2 font-black text-2xl uppercase skew-x-12 animate-pulse-fast">
            Live Updates Now
        </div>
    </div>

    <!-- Bottom Warning Bar -->
    <div class="marquee-container w-full">
        <div class="marquee-content" style="animation-direction: reverse;">
            PROTEST 🪧 AROUND GLOBE — BREAKING NEWS — PROTEST 🪧 AROUND GLOBE — BREAKING NEWS — PROTEST 🪧 AROUND GLOBE
        </div>
    </div>

    <script>
        // Interactive element to "Silence" or "Boost" the visual intensity
        document.body.addEventListener('click', () => {
            console.log("Alert Acknowledged");
            // Placeholder for interactivity
        });
    </script>
</body>
</html>

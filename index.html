<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The People's Assembly</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">
    <style>
        /* Custom socialist aesthetics */
        body { background-color: #1a1a1a; color: #f5f5f5; padding: 40px; }
        .card { border-left: 5px solid #d32f2f; background-color: #2d2d2d; color: white; }
        .label, .checkbox { color: #f5f5f5 !important; }
        .textarea { background-color: #3d3d3d; color: white; border: 1px solid #d32f2f; }
        .textarea::placeholder { color: #aaa; }
    </style>
</head>
<body>

<div class="container" style="max-width: 700px;">
    <h1 class="title has-text-centered has-text-danger is-1">THE PEOPLE'S BOARD</h1>
    <p class="subtitle has-text-centered has-text-grey-light">From each according to their ability, to each according to their input.</p>

    <article class="media box has-background-dark">
        <figure class="media-left">
            <p class="image is-64x64">
                <img class="is-rounded" src="https://api.dicebear.com/7.x/identicon/svg?seed=comrade" alt="Avatar"/>
            </p>
        </figure>
        <div class="media-content">
            <div class="field">
                <p class="control">
                    <textarea class="textarea" placeholder="Share your thoughts with the collective, comrade..."></textarea>
                </p>
            </div>
            <nav class="level">
                <div class="level-left">
                    <div class="level-item">
                        <a class="button is-danger is-uppercase has-text-weight-bold">
                            <span>Manifest Thoughts</span>
                        </a>
                    </div>
                </div>
                <div class="level-right">
                    <div class="level-item">
                        <label class="checkbox">
                            <input type="checkbox"> Press enter to submit
                        </label>
                    </div>
                </div>
            </nav>
        </div>
    </article>

    <div class="mt-6">
        <h3 class="title is-4 has-text-warning">Recent Contributions</h3>
        <div class="card p-4 mb-3">
            <div class="media">
                <div class="media-content">
                    <p class="title is-6 has-text-danger">Comrade_48</p>
                    <p class="content">comment board. message : hello im liked it.</p>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Din Epikrise: Hjerne Psykose Test</title>
    <!-- Babylon.js Core -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { 
            margin: 0; padding: 0;
            background-color: #010208; 
            font-family: 'monospace', sans-serif; 
            color: #22d3ee;
            zoom: 0.75;
            overflow-x: hidden;
        }

        #app-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        #bgCanvas { 
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh; 
            z-index: 1; opacity: 0.05; pointer-events: none;
        }

        .image-gallery {
            display: flex;
            gap: 12px;
            padding: 15px;
            overflow-x: auto;
            background: rgba(34, 211, 238, 0.05);
            border-bottom: 2px solid rgba(34, 211, 238, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(15px);
        }

        .id-image-container {
            min-width: 140px;
            height: 140px;
            background: #000;
            border: 1px solid rgba(34, 211, 238, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .id-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .module-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px;
            padding: 20px;
        }

        .scan-module {
            background: rgba(2, 6, 18, 0.95);
            border: 1px solid rgba(34, 211, 238, 0.15);
            height: 280px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
        }

        .scan-module.active-scan {
            border-color: #22d3ee;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.3);
        }

        .module-header {
            font-size: 10px;
            padding: 6px 12px;
            background: rgba(34, 211, 238, 0.1);
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            border-bottom: 1px solid rgba(34, 211, 238, 0.1);
        }

        .module-content {
            flex-grow: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .module-content img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(1) contrast(1.4) brightness(0.9);
        }

        .module-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(rgba(34, 211, 238, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 211, 238, 0.05) 1px, transparent 1px);
            background-size: 15px 15px;
            pointer-events: none;
        }

        .scan-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: #22d3ee;
            box-shadow: 0 0 15px #22d3ee;
            z-index: 10;
            display: none;
        }

        @keyframes fastScan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .module-footer {
            font-size: 9px;
            padding: 6px 12px;
            background: rgba(0,0,0,0.9);
            border-top: 1px solid rgba(34, 211, 238, 0.1);
            color: #4ade80;
            display: flex;
            justify-content: space-between;
        }

        .patient-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(0, 5, 15, 0.98);
            backdrop-filter: blur(20px);
            border-top: 2px solid #22d3ee;
            padding: 15px 40px;
            z-index: 200;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .loading-pulse {
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        
        .progress-bar-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 4px;
            background: rgba(255,255,255,0.1);
            z-index: 1000;
        }
        
        #progress-fill {
            width: 0%;
            height: 100%;
            background: #22d3ee;
            box-shadow: 0 0 10px #22d3ee;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>

<div class="progress-bar-container">
    <div id="progress-fill"></div>
</div>

<canvas id="bgCanvas"></canvas>

<div id="app-container">
    <div class="p-8 text-center">
        <h1 class="text-4xl font-black tracking-widest uppercase text-white mb-1">Din Epikrise: Hjerne Psykose Test</h1>
        <p class="text-[12px] text-cyan-400 tracking-[0.5em]">FULLSTENDIG BESØKSANALYSE: 6 RADER SKANNING</p>
    </div>

    <!-- Referansegalleri -->
    <div class="image-gallery" id="headerGallery"></div>

    <!-- Grid med 6 rader x 3 moduler -->
    <div class="module-grid" id="mainGrid"></div>

    <div style="height: 140px;"></div>
</div>

<div class="patient-bar">
    <div class="flex gap-16">
        <div>
            <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Brukeridentifikasjon</p>
            <p class="text-lg font-black text-white">VISIT-LOGG AKTIV</p>
        </div>
        <div>
            <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Analyse Status</p>
            <p class="text-lg font-black text-cyan-400" id="global-status">VENTER</p>
        </div>
    </div>
    <div class="flex gap-4">
        <button id="start-btn" onclick="triggerHyperScan()" class="bg-cyan-600/10 hover:bg-cyan-600 text-white text-[12px] px-10 py-4 border-2 border-cyan-400 uppercase font-black transition-all shadow-[0_0_15px_rgba(34,211,238,0.2)]">
            Start Full Besøksanalyse (3s)
        </button>
    </div>
</div>

<script>
    const apiKey = "";
    const grid = document.getElementById('mainGrid');
    const headerGallery = document.getElementById('headerGallery');
    const progressBar = document.getElementById('progress-fill');
    
    const rows = 6;
    const cols = 3;
    const totalModules = rows * cols;
    
    function createModules() {
        grid.innerHTML = "";
        for(let i=0; i<totalModules; i++) {
            const rowNum = Math.floor(i / cols) + 1;
            const div = document.createElement('div');
            div.className = 'scan-module';
            div.id = `module-${i}`;
            div.innerHTML = `
                <div class="module-header">
                    <span>SEKSJON_${rowNum}</span>
                    <span class="text-cyan-500">BESØK_ID_${i+1}</span>
                </div>
                <div class="module-content" id="content-${i}">
                    <div class="scan-line" id="line-${i}"></div>
                    <span class="text-[10px] font-bold opacity-30">KLAR FOR SKANNING</span>
                    <div class="module-overlay"></div>
                </div>
                <div class="module-footer">
                    <span>ANALYSE: CT_HJERNE</span>
                    <span class="text-white">VENTER...</span>
                </div>
            `;
            grid.appendChild(div);
        }
    }

    async function generateImage(prompt) {
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    instances: { prompt: prompt },
                    parameters: { sampleCount: 1 }
                })
            });
            const result = await response.json();
            return result.predictions?.[0]?.bytesBase64Encoded;
        } catch (e) { return null; }
    }

    async function triggerHyperScan() {
        const btn = document.getElementById('start-btn');
        const status = document.getElementById('global-status');
        btn.disabled = true;
        btn.style.opacity = "0.5";
        
        status.innerText = "STARTER BESØKSANALYSE...";
        progressBar.style.width = "0%";
        
        const startTime = Date.now();
        const duration = 3000; 

        // Generer unike prompter for å simulere ulike lag av analysen
        const prompts = [
            "Clinical brain CT scan slice, frontal cortex analysis, black and white radiology",
            "Medical tomography scan, hippocampus region, grayscale medical imaging",
            "Brain stem x-ray slice, clinical neurology diagnostic, monochromatic",
            "Temporal lobe CT scan, psychiatric assessment markers, high contrast grayscale",
            "Cerebral cortex medical scan, neurological structure, medical radiology",
            "Axial brain slice CT, detailed neuroanatomy for medical diagnostic"
        ];

        // Start parallell generering for alle 6 radene umiddelbart
        const imagePromises = prompts.map(p => generateImage(p));

        const progressInterval = setInterval(() => {
            const elapsed = Date.now() - startTime;
            const percentage = Math.min((elapsed / duration) * 100, 100);
            progressBar.style.width = percentage + "%";
            
            if (elapsed >= duration) {
                clearInterval(progressInterval);
                status.innerText = "ANALYSE FULLFØRT";
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        }, 30);

        for(let r = 0; r < rows; r++) {
            status.innerText = `SKANNER RAD ${r+1}...`;
            
            // Aktiver visuelle effekter for hele raden
            for(let c = 0; c < cols; c++) {
                const idx = r * cols + c;
                const line = document.getElementById(`line-${idx}`);
                line.style.display = "block";
                line.style.animation = "fastScan 0.4s linear infinite";
                document.getElementById(`module-${idx}`).classList.add('active-scan');
            }

            // Vent på bildet (generert i bakgrunnen)
            const base64 = await imagePromises[r];
            
            if(base64) {
                for(let c = 0; c < cols; c++) {
                    const idx = r * cols + c;
                    const target = document.getElementById(`content-${idx}`);
                    const module = document.getElementById(`module-${idx}`);
                    module.classList.remove('active-scan');
                    target.innerHTML = `
                        <img src="data:image/png;base64,${base64}" alt="CT Scan Besøkende">
                        <div class="module-overlay"></div>
                    `;
                    module.querySelector('.module-footer').innerHTML = `<span>BESØKSANALYSE</span> <span class="text-cyan-400">BEKREFTET</span>`;
                }
            }
            
            // Juster for å holde seg innenfor 3 sekunder totalt
            await new Promise(res => setTimeout(res, 250));
        }
    }

    const bgEngine = new BABYLON.Engine(document.getElementById("bgCanvas"), true);
    const scene = new BABYLON.Scene(bgEngine);
    scene.clearColor = new BABYLON.Color4(0,0,0,1);
    const cam = new BABYLON.FreeCamera("c", new BABYLON.Vector3(0,0,-10), scene);
    bgEngine.runRenderLoop(() => scene.render());

    window.onload = () => {
        createModules();
    };
</script>

</body>
</html>

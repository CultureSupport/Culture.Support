<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Brain - Ultimate Kodebok v5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #05070a;
            color: #f8fafc;
            overflow: hidden;
        }

        .glass {
            background: rgba(13, 17, 23, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* Fargeindikatorer v5 */
        .code-card-python { border-top: 3px solid #3776ab; }
        .code-card-javascript { border-top: 3px solid #f7df1e; }
        .code-card-php { border-top: 3px solid #777bb4; }
        .code-card-database { border-top: 3px solid #00bbff; }
        .code-card-html { border-top: 3px solid #e34c26; }
        .code-card-java { border-top: 3px solid #b07219; }
        .code-card-curl { border-top: 3px solid #06c600; }
        .code-card-cpp { border-top: 3px solid #f34b7d; }
        .code-card-csharp { border-top: 3px solid #178600; }
        .code-card-yaml { border-top: 3px solid #cb171e; }
        .code-card-json { border-top: 3px solid #29b5e8; }
        .code-card-jsonl { border-top: 3px solid #ff9500; }
        
        /* Nye Kategorier v5 */
        .code-card-flutter { border-top: 3px solid #02569b; }
        .code-card-kotlin { border-top: 3px solid #7f52ff; }
        .code-card-bash { border-top: 3px solid #4eaa25; }
        .code-card-batch { border-top: 3px solid #6e6e6e; }
        .code-card-jhipster { border-top: 3px solid #fa8e33; }
        .code-card-tensorflow { border-top: 3px solid #ff6f00; }
        .code-card-note { border-top: 3px solid #64748b; }

        .code-font { font-family: 'Fira Code', monospace; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        .active-tab {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        #chatSection {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
        }

        #chatSection.minimized {
            transform: translateX(100%);
            opacity: 0;
            pointer-events: none;
        }

        .node-card {
            transition: all 0.3s ease;
        }
        .node-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row">

    <!-- Sidemeny -->
    <aside class="w-full md:w-72 glass p-6 flex flex-col gap-6 z-20 border-r border-white/5">
        <div class="shrink-0">
            <h1 class="text-2xl font-black tracking-tighter bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent italic">
                CODE_BRAIN.v5
            </h1>
            <p class="text-[9px] text-slate-500 font-bold tracking-[0.3em] uppercase mt-1">Universal Library Hub</p>
        </div>

        <nav class="flex-1 flex flex-col gap-1 overflow-y-auto custom-scrollbar pr-2">
            <p class="text-[10px] font-bold text-slate-600 uppercase mb-2 px-3 tracking-widest">Generelt</p>
            <button onclick="setGlobalFilter('all')" id="btn-all" class="nav-btn active-tab flex items-center gap-3 p-3 rounded-xl transition text-sm">
                <span>📂</span> Alt Innhold
            </button>

            <p class="text-[10px] font-bold text-slate-600 uppercase mt-4 mb-2 px-3 tracking-widest">Web & Backend</p>
            <button onclick="setGlobalFilter('html')" id="btn-html" class="nav-btn flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 transition text-sm text-slate-400">
                <span>🌐</span> HTML
            </button>
            <button onclick="setGlobalFilter('javascript')" id="btn-javascript" class="nav-btn flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 transition text-sm text-slate-400">
                <span>🟨</span> JavaScript
            </button>
            <button onclick="setGlobalFilter('php')" id="btn-php" class="nav-btn flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 transition text-sm text-slate-400">
                <span>🐘</span> PHP
            </button>
            <button onclick="setGlobalFilter('python')" id="btn-python" class="nav-btn flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 transition text-sm text-slate-400">
                <span>🐍</span> Python
            </button>

            <p class="text-[10px] font-bold text-slate-600 uppercase mt-4 mb-2 px-3 tracking-widest">Mobil & System</p>
            <button onclick="setGlobalFilter('flutter')" id="btn-flutter" class="nav-btn flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 transition text-sm text-slate-400">
                <span>📱</span> Flutter
            </button>
            <button onclick="setGlobalFilter('kotlin')" id="btn-kotlin" class="nav-btn flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 transition text-sm text-slate-400">
                <span>🤖</span> Kotlin
            </button>
            <button onclick="setGlobalFilter('java')" id="btn-java" class="nav-btn flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 transition text-sm text-slate-400">
                <span>☕</span> Java
            </button>
            <button onclick="setGlobalFilter('cpp')" id="btn-cpp" class="nav-btn flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 transition text-sm text-slate-400">
                <span>⚙️</span> C++
            </button>
            <button onclick="setGlobalFilter('csharp')" id="btn-csharp" class="nav-btn flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 transition text-sm text-slate-400">
                <span>♯</span> C#
            </button>

            <p class="text-[10px] font-bold text-slate-600 uppercase mt-4 mb-2 px-3 tracking-widest">Scripting & AI</p>
            <button onclick="setGlobalFilter('bash')" id="btn-bash" class="nav-btn flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 transition text-sm text-slate-400">
                <span>🐚</span> Bash / Shell
            </button>
            <button onclick="setGlobalFilter('batch')" id="btn-batch" class="nav-btn flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 transition text-sm text-slate-400">
                <span>🖥️</span> Batch (.bat)
            </button>
            <button onclick="setGlobalFilter('tensorflow')" id="btn-tensorflow" class="nav-btn flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 transition text-sm text-slate-400">
                <span>🧠</span> TensorFlow
            </button>
            <button onclick="setGlobalFilter('jhipster')" id="btn-jhipster" class="nav-btn flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 transition text-sm text-slate-400">
                <span>🔥</span> JHipster
            </button>

            <p class="text-[10px] font-bold text-slate-600 uppercase mt-4 mb-2 px-3 tracking-widest">Data & Verktøy</p>
            <button onclick="setGlobalFilter('database')" id="btn-database" class="nav-btn flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 transition text-sm text-slate-400">
                <span>🗄️</span> Database
            </button>
            <button onclick="setGlobalFilter('json')" id="btn-json" class="nav-btn flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 transition text-sm text-slate-400">
                <span>📦</span> JSON
            </button>
            <button onclick="setGlobalFilter('jsonl')" id="btn-jsonl" class="nav-btn flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 transition text-sm text-slate-400">
                <span>📜</span> JsonL
            </button>
            <button onclick="setGlobalFilter('yaml')" id="btn-yaml" class="nav-btn flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 transition text-sm text-slate-400">
                <span>📝</span> YAML
            </button>
            <button onclick="setGlobalFilter('curl')" id="btn-curl" class="nav-btn flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 transition text-sm text-slate-400">
                <span>🚀</span> Curl
            </button>

            <div class="my-4 border-t border-white/5"></div>
            <button onclick="toggleChat()" id="btn-toggle-chat" class="flex items-center justify-between p-3 rounded-xl hover:bg-white/5 transition text-sm text-blue-400 font-medium">
                <div class="flex items-center gap-3"><span>⚡</span> Terminal</div>
                <span id="chat-status-dot" class="w-2 h-2 rounded-full bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.5)]"></span>
            </button>
        </nav>

        <div class="shrink-0 bg-white/5 rounded-2xl p-4 border border-white/5">
            <div class="flex justify-between items-center mb-2">
                <p class="text-[10px] text-blue-300 font-bold uppercase">Lager-status</p>
                <span class="text-[9px] text-slate-500" id="storageUsage">0%</span>
            </div>
            <div class="w-full bg-black/40 h-1 rounded-full overflow-hidden">
                <div id="storageBar" class="bg-blue-500 h-full w-0 transition-all duration-500"></div>
            </div>
        </div>
    </aside>

    <!-- Hovedinnhold -->
    <main class="flex-1 flex h-full overflow-hidden relative">
        <section id="dashboardSection" class="flex-1 p-8 overflow-y-auto custom-scrollbar transition-all duration-300">
            <header class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-10">
                <div>
                    <h2 id="view-title" class="text-3xl font-bold tracking-tight text-white mb-1">Hovedbibliotek</h2>
                    <p class="text-sm text-slate-500" id="view-desc">Administrer din lokale kodebase fordelt på 21 kategorier.</p>
                </div>
                <button onclick="clearAllData()" class="px-4 py-2 rounded-lg bg-red-500/10 text-red-500 text-xs font-bold border border-red-500/20 hover:bg-red-500/20 transition">Tøm Bibliotek</button>
            </header>

            <div id="nodesGrid" class="grid grid-cols-1 lg:grid-cols-2 2xl:grid-cols-3 gap-6 pb-20"></div>
            <div id="nodesEmpty" class="hidden flex flex-col items-center justify-center py-40 text-slate-600">
                <div class="text-6xl mb-4">🌑</div>
                <p class="text-lg font-medium">Ingen treff her</p>
                <p class="text-sm opacity-60">Prøv å lime inn ny kode i terminalen.</p>
            </div>
        </section>

        <!-- Terminal -->
        <section id="chatSection" class="absolute right-0 top-0 bottom-0 w-full md:w-[450px] glass flex flex-col z-30 shadow-[-20px_0_50px_rgba(0,0,0,0.5)] border-l border-white/10">
            <div class="p-5 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600 to-indigo-700 flex items-center justify-center shadow-lg text-white font-bold">V5</div>
                    <h3 class="font-bold text-sm tracking-tight uppercase">Terminal_Input</h3>
                </div>
                <button onclick="toggleChat()" class="p-2 hover:bg-white/10 rounded-xl text-slate-400 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div id="chatBox" class="flex-1 overflow-y-auto p-6 flex flex-col gap-5 custom-scrollbar bg-black/20"></div>

            <div class="p-5 border-t border-white/5 bg-black/40">
                <div class="relative">
                    <textarea id="chatInput" rows="3" 
                              placeholder="Lim inn kode, shell script eller AI-modeller her..." 
                              class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 outline-none focus:border-blue-500/50 focus:ring-4 focus:ring-blue-500/10 transition text-sm code-font custom-scrollbar resize-none"></textarea>
                    <button onclick="handleChatSubmit()" class="absolute right-3 bottom-3 bg-blue-600 text-white p-3 rounded-xl hover:bg-blue-500 transition-all shadow-lg">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-white text-black px-6 py-3 rounded-2xl text-xs font-bold opacity-0 transition-all duration-300 pointer-events-none z-50">Kopiert!</div>

    <script>
        let nodes = JSON.parse(localStorage.getItem('codebrain_nodes')) || [];
        let chatHistory = JSON.parse(localStorage.getItem('codebrain_chat')) || [
            { role: 'ai', content: 'System v5 klar. Støtter nå Flutter, Kotlin, Bash, Batch, JHipster og TensorFlow.', type: 'system' }
        ];
        let currentFilter = 'all';
        let chatVisible = true;

        window.onload = () => {
            renderNodes();
            renderChat();
            updateStorageMetrics();
            document.getElementById('chatInput').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleChatSubmit(); } });
        };

        function toggleChat() {
            chatVisible = !chatVisible;
            document.getElementById('chatSection').classList.toggle('minimized', !chatVisible);
        }

        function setGlobalFilter(cat) {
            currentFilter = cat;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-tab'));
            const btn = document.getElementById(`btn-${cat}`);
            if (btn) btn.classList.add('active-tab');
            renderNodes();
        }

        function detectContent(text) {
            const urlRegex = /^(https?:\/\/|www\.)[^\s]+$/;
            const lower = text.toLowerCase();
            
            if (urlRegex.test(text)) return { type: 'web', lang: 'URL' };
            
            // JSON vs JSONL
            if (text.startsWith('{') || text.startsWith('[')) {
                try {
                    JSON.parse(text);
                    return { type: 'json', lang: 'JSON' };
                } catch(e) {
                    if (text.split('\n').every(line => { try { JSON.parse(line); return true; } catch(e) { return false; }})) {
                        return { type: 'jsonl', lang: 'JsonL' };
                    }
                }
            }

            // AI & Frameworks
            if (text.includes('tensorflow') || text.includes('tf.keras') || text.includes('import tensorflow as tf')) return { type: 'tensorflow', lang: 'TensorFlow' };
            if (text.includes('jhipster') || text.includes('yo jhipster') || text.includes('.jdl')) return { type: 'jhipster', lang: 'JHipster' };

            // Mobil
            if (text.includes('import \'package:flutter') || text.includes('StatelessWidget') || text.includes('Widget build')) return { type: 'flutter', lang: 'Flutter' };
            if (text.includes('fun main') || text.includes('val ') || text.includes('var ') && text.includes(': String')) return { type: 'kotlin', lang: 'Kotlin' };

            // Scripts
            if (text.startsWith('#!/bin/bash') || text.includes('grep ') || text.includes('sudo ') || text.includes('export ')) return { type: 'bash', lang: 'Bash' };
            if (lower.includes('@echo off') || lower.includes('setlocal') || lower.includes('pause') && lower.includes('.bat')) return { type: 'batch', lang: 'Batch' };

            // Database
            if (lower.includes('select ') || lower.includes('create table') || lower.includes('update ')) return { type: 'database', lang: 'SQL' };
            
            // Andre Språk
            if (text.includes('public static void main') || text.includes('System.out.println')) return { type: 'java', lang: 'Java' };
            if (text.includes('#include <') || text.includes('std::cout')) return { type: 'cpp', lang: 'C++' };
            if (text.includes('using System;') || text.includes('namespace ') || text.includes('Console.WriteLine')) return { type: 'csharp', lang: 'C#' };
            if (text.includes('curl ') || text.includes('--request ')) return { type: 'curl', lang: 'Curl' };
            if (text.includes('<!DOCTYPE html>')) return { type: 'html', lang: 'HTML' };
            if (text.includes('def ') || text.includes('import ') || text.includes('print(')) return { type: 'python', lang: 'Python' };
            if (text.includes('<?php')) return { type: 'php', lang: 'PHP' };
            if (text.includes('const ') || text.includes('let ') || text.includes('=>')) return { type: 'javascript', lang: 'JavaScript' };
            if (text.includes('---') && text.includes(': ')) return { type: 'yaml', lang: 'YAML' };

            return { type: 'note', lang: 'Notat' };
        }

        function handleChatSubmit() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            const detection = detectContent(text);
            chatHistory.push({ role: 'user', content: text, type: detection.type });
            input.value = '';
            renderChat();

            setTimeout(() => {
                const title = text.split('\n')[0].substring(0, 35) || 'Uten Tittel';
                saveNode(title, text, detection.type, detection.lang);
                chatHistory.push({ role: 'ai', content: `Lagt til i biblioteket under ${detection.lang}.`, type: 'system' });
                renderChat();
                updateStorageMetrics();
            }, 300);
        }

        function saveNode(title, content, category, lang) {
            nodes.unshift({ id: Date.now(), title, content, category, lang, timestamp: new Date().toISOString() });
            localStorage.setItem('codebrain_nodes', JSON.stringify(nodes));
            renderNodes();
        }

        function renderNodes() {
            const grid = document.getElementById('nodesGrid');
            const empty = document.getElementById('nodesEmpty');
            const filtered = currentFilter === 'all' ? nodes : nodes.filter(n => n.category === currentFilter);
            
            grid.innerHTML = '';
            filtered.length === 0 ? empty.classList.remove('hidden') : empty.classList.add('hidden');

            filtered.forEach(node => {
                const card = document.createElement('div');
                card.className = `node-card glass rounded-2xl p-6 border border-white/5 flex flex-col h-full code-card-${node.category}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <span class="px-2 py-1 rounded-md bg-white/5 text-[9px] font-black uppercase text-slate-500 border border-white/5">${node.lang}</span>
                        <button onclick="deleteNode(${node.id})" class="text-slate-600 hover:text-red-400">🗑️</button>
                    </div>
                    <h4 class="text-sm font-bold text-white mb-4 line-clamp-1">${node.title}</h4>
                    <pre class="code-font text-[10px] bg-black/50 p-4 rounded-xl mb-4 overflow-x-auto text-blue-200 border border-white/5 flex-1 whitespace-pre-wrap">${node.content}</pre>
                    <div class="mt-auto flex justify-between items-center text-[10px]">
                        <span class="text-slate-600 font-bold">${new Date(node.timestamp).toLocaleDateString()}</span>
                        <button onclick="copyToClipboard('${node.content.replace(/'/g, "\\'")}')" class="text-blue-500 font-black hover:text-blue-400">KOPIER</button>
                    </div>
                `;
                grid.appendChild(card);
            });
            document.getElementById('view-title').innerText = currentFilter === 'all' ? 'Hovedbibliotek' : `${currentFilter.toUpperCase()}`;
        }

        function deleteNode(id) {
            nodes = nodes.filter(n => n.id !== id);
            localStorage.setItem('codebrain_nodes', JSON.stringify(nodes));
            renderNodes();
            updateStorageMetrics();
        }

        function copyToClipboard(text) {
            const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            const t = document.getElementById('toast'); t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 2000);
        }

        function renderChat() {
            const box = document.getElementById('chatBox');
            box.innerHTML = '';
            chatHistory.forEach(msg => {
                const bubble = document.createElement('div');
                bubble.className = `p-4 rounded-2xl text-xs ${msg.role === 'user' ? 'bg-blue-600 ml-auto' : 'bg-white/5 mr-auto border border-white/10 text-slate-300'}`;
                bubble.innerHTML = `<div class="break-words">${msg.content}</div>`;
                box.appendChild(bubble);
            });
            box.scrollTop = box.scrollHeight;
            localStorage.setItem('codebrain_chat', JSON.stringify(chatHistory));
        }

        function updateStorageMetrics() {
            const size = (JSON.stringify(nodes).length * 2) / 1024 / 1024;
            const p = Math.min((size / 5) * 100, 100).toFixed(1);
            document.getElementById('storageBar').style.width = `${p}%`;
            document.getElementById('storageUsage').innerText = `${p}%`;
        }

        function clearAllData() { if(confirm("Vil du slette hele biblioteket?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>

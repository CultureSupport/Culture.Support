<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabeltann Slots - Kapteinens Skatt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pirata+One&family=Roboto:wght@400;700&display=swap');

        body {
            background-color: #0c0c0c;
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }

        .pirate-font {
            font-family: 'Pirata One', cursive;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #1a2a3a 0%, #050a0f 100%);
        }

        canvas {
            max-width: 100%;
            height: auto;
            border: 4px solid #c5a059;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(197, 160, 89, 0.3);
            background: #000;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid #c5a059;
        }

        .btn-spin {
            background: linear-gradient(180deg, #ffd700 0%, #c5a059 100%);
            color: #000;
            font-weight: bold;
            padding: 12px 40px;
            border-radius: 25px;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.1s, filter 0.2s;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
            border: none;
        }

        .btn-spin:active {
            transform: scale(0.95);
        }

        .btn-spin:disabled {
            filter: grayscale(1);
            cursor: not-allowed;
        }

        .stat-box {
            text-align: center;
        }

        .stat-label {
            font-size: 10px;
            color: #c5a059;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
        }

        #win-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 10;
            text-align: center;
            pointer-events: none;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #win-overlay.show {
            transform: translate(-50%, -50%) scale(1.5);
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <h1 class="pirate-font text-5xl mb-6 text-[#c5a059] tracking-widest">Sabeltann Slots</h1>
    
    <div id="win-overlay">
        <h2 class="pirate-font text-6xl text-yellow-400 drop-shadow-lg">STOR GEVINST!</h2>
        <p id="win-amount" class="text-3xl font-bold text-white"></p>
    </div>

    <canvas id="slotCanvas"></canvas>

    <div class="controls">
        <div class="stat-box">
            <div class="stat-label">Saldo</div>
            <div id="balance" class="stat-value">1000</div>
        </div>
        
        <button id="spinBtn" class="btn-spin text-xl">Spinn!</button>
        
        <div class="stat-box">
            <div class="stat-label">Siste Vinn</div>
            <div id="lastWin" class="stat-value">0</div>
        </div>
    </div>

    <div class="mt-4 text-[#c5a059] text-xs uppercase tracking-widest opacity-50">
        Fem like gir 10x innsats | Tre like gir 2x
    </div>
</div>

<script>
    /**
     * SVG Assets som Data URIs for skarpe symboler
     */
    const SYMBOLS_SVG = {
        hodeskalle: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="45" r="35" fill="#f0f0f0"/><path d="M30 70 q20 15 40 0" fill="#f0f0f0"/><circle cx="38" cy="40" r="8" fill="#000"/><circle cx="62" cy="40" r="8" fill="#000"/><rect x="45" y="55" width="10" height="15" rx="2" fill="#000"/></svg>`,
        gullmynt: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="45" fill="#ffd700" stroke="#b8860b" stroke-width="4"/><circle cx="50" cy="50" r="35" fill="none" stroke="#b8860b" stroke-width="2" stroke-dasharray="4"/><text x="50" y="65" font-family="serif" font-size="40" text-anchor="middle" fill="#b8860b">$</text></svg>`,
        sabel: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M20 80 L80 20 M15 85 L25 75" stroke="#c0c0c0" stroke-width="8" stroke-linecap="round"/><path d="M15 85 Q25 95 35 85" fill="none" stroke="#8b4513" stroke-width="6"/></svg>`,
        diamant: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 10 L85 40 L50 90 L15 40 Z" fill="#00ffff" opacity="0.8" stroke="#fff" stroke-width="2"/><path d="M15 40 L85 40 M50 10 L50 90" stroke="#fff" stroke-width="1" opacity="0.5"/></svg>`,
        anker: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 20 V80 M30 60 Q30 85 50 85 Q70 85 70 60" fill="none" stroke="#4a4a4a" stroke-width="8" stroke-linecap="round"/><circle cx="50" cy="15" r="8" fill="none" stroke="#4a4a4a" stroke-width="6"/></svg>`
    };

    const canvas = document.getElementById('slotCanvas');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spinBtn');
    const balanceEl = document.getElementById('balance');
    const lastWinEl = document.getElementById('lastWin');
    const winOverlay = document.getElementById('win-overlay');
    const winAmountEl = document.getElementById('win-amount');

    // Spillinnstillinger
    const REEL_COUNT = 5;
    const ROW_COUNT = 3;
    const SYMBOL_SIZE = 120;
    const REEL_SPACING = 15;
    const MARGIN = 20;

    canvas.width = (SYMBOL_SIZE * REEL_COUNT) + (REEL_SPACING * (REEL_COUNT - 1)) + (MARGIN * 2);
    canvas.height = (SYMBOL_SIZE * ROW_COUNT) + (MARGIN * 2);

    let balance = 1000;
    let isSpinning = false;
    const symbols = Object.keys(SYMBOLS_SVG);
    const loadedImages = {};

    // Forbered bilder
    async function initSymbols() {
        const promises = Object.entries(SYMBOLS_SVG).map(([name, svg]) => {
            return new Promise((resolve) => {
                const img = new Image();
                const svgBlob = new Blob([svg], {type: 'image/svg+xml;charset=utf-8'});
                const url = URL.createObjectURL(svgBlob);
                img.onload = () => {
                    loadedImages[name] = img;
                    resolve();
                };
                img.src = url;
            });
        });
        await Promise.all(promises);
        drawStatic();
    }

    class Reel {
        constructor(xIndex) {
            this.x = MARGIN + xIndex * (SYMBOL_SIZE + REEL_SPACING);
            this.symbols = Array.from({length: ROW_COUNT + 2}, () => this.getRandomSymbol());
            this.offset = 0;
            this.speed = 0;
            this.stopping = false;
            this.finalSymbols = [];
        }

        getRandomSymbol() {
            return symbols[Math.floor(Math.random() * symbols.length)];
        }

        update(dt) {
            if (this.speed > 0) {
                this.offset += this.speed;
                if (this.offset >= SYMBOL_SIZE) {
                    this.offset = 0;
                    this.symbols.pop();
                    this.symbols.unshift(this.getRandomSymbol());
                    
                    if (this.stopping && this.finalSymbols.length > 0) {
                        this.symbols[0] = this.finalSymbols.pop();
                        if (this.finalSymbols.length === 0) {
                            this.speed = 0;
                            this.offset = 0;
                        }
                    }
                }
            }
        }

        draw() {
            ctx.save();
            // Maskering for hjulene
            ctx.beginPath();
            ctx.rect(this.x, MARGIN, SYMBOL_SIZE, SYMBOL_SIZE * ROW_COUNT);
            ctx.clip();

            // Tegn symboler
            this.symbols.forEach((symbol, i) => {
                const img = loadedImages[symbol];
                const y = MARGIN + (i - 1) * SYMBOL_SIZE + this.offset;
                
                // Motion blur effekt
                if (this.speed > 20) {
                    ctx.globalAlpha = 0.6;
                    ctx.drawImage(img, this.x, y - 10, SYMBOL_SIZE, SYMBOL_SIZE);
                    ctx.globalAlpha = 1.0;
                }
                
                ctx.drawImage(img, this.x + 10, y + 10, SYMBOL_SIZE - 20, SYMBOL_SIZE - 20);
            });

            // Ramme rundt hjulet
            ctx.restore();
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.strokeRect(this.x, MARGIN, SYMBOL_SIZE, SYMBOL_SIZE * ROW_COUNT);
        }
    }

    const reels = Array.from({length: REEL_COUNT}, (_, i) => new Reel(i));

    function drawStatic() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        reels.forEach(r => r.draw());
        
        // Dekorative skillelinjer
        ctx.strokeStyle = '#c5a059';
        ctx.lineWidth = 4;
        ctx.strokeRect(2, 2, canvas.width - 4, canvas.height - 4);
    }

    function gameLoop() {
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        let allStopped = true;
        reels.forEach(reel => {
            reel.update();
            reel.draw();
            if (reel.speed > 0) allStopped = false;
        });

        if (isSpinning && allStopped) {
            isSpinning = false;
            spinBtn.disabled = false;
            checkWin();
        } else {
            requestAnimationFrame(gameLoop);
        }
    }

    function checkWin() {
        // Enkel sjekk: se på midterste rad
        const centerLine = reels.map(r => r.symbols[1]);
        const counts = {};
        centerLine.forEach(s => counts[s] = (counts[s] || 0) + 1);

        let win = 0;
        for (const s in counts) {
            if (counts[s] >= 5) win = 100;
            else if (counts[s] >= 4) win = 20;
            else if (counts[s] >= 3) win = 10;
        }

        if (win > 0) {
            balance += win;
            balanceEl.innerText = balance;
            lastWinEl.innerText = win;
            showWinOverlay(win);
        }
    }

    function showWinOverlay(amount) {
        winAmountEl.innerText = `+${amount} GULLMYNTER`;
        winOverlay.classList.add('show');
        setTimeout(() => {
            winOverlay.classList.remove('show');
        }, 3000);
    }

    spinBtn.addEventListener('click', () => {
        if (isSpinning || balance < 10) return;

        balance -= 10;
        balanceEl.innerText = balance;
        isSpinning = true;
        spinBtn.disabled = true;

        reels.forEach((reel, i) => {
            reel.speed = 30 + Math.random() * 20;
            reel.stopping = false;
            
            // Stopp hjulene sekvensielt
            setTimeout(() => {
                reel.stopping = true;
                // Bestem slutt-symboler her hvis man vil rigge resultatet
                reel.finalSymbols = [reel.getRandomSymbol(), reel.getRandomSymbol(), reel.getRandomSymbol()];
            }, 1000 + (i * 400));
        });

        gameLoop();
    });

    // Start
    window.onload = initSymbols;
</script>

</body>
</html>

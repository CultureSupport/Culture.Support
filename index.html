<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dathu OS - Olessiall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;700&display=swap');

        :root {
            --cyan-glow: #06b6d4;
            --dathu-bg: #020408;
            --dathu-panel: rgba(10, 15, 25, 0.95);
        }

        body {
            background-color: #000;
            color: #e2e8f0;
            font-family: 'Fira Code', monospace;
            overflow: hidden;
            height: 100vh;
            margin: 0;
            user-select: none;
        }

        /* Mobile Intro Style */
        #mobile-init-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle at center, #05101a 0%, #000 100%);
        }

        .mobile-device {
            width: 300px;
            height: 600px;
            background: #111;
            border: 10px solid #222;
            border-radius: 40px;
            position: relative;
            box-shadow: 0 0 100px rgba(6, 182, 212, 0.2);
            overflow: hidden;
        }

        .mobile-screen {
            height: 100%;
            background: linear-gradient(180deg, #0a1219 0%, #000 100%);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Desktop Environment */
        #desktop-environment {
            display: none;
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1614850523296-e811d9ed0765?auto=format&fit=crop&q=80&w=2070') center/cover;
            position: relative;
        }

        .glass-panel {
            background: var(--dathu-panel);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(6, 182, 212, 0.2);
            position: absolute;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .window-header {
            cursor: move;
            background: rgba(6, 182, 212, 0.1);
            border-bottom: 1px solid rgba(6, 182, 212, 0.2);
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            flex-shrink: 0;
        }

        .desktop-icon {
            width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .desktop-icon:hover { background: rgba(255, 255, 255, 0.1); }

        .hidden { display: none !important; }

        /* Radio App Specifics */
        .radio-station-item {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
        }
        .radio-station-item:hover {
            background: rgba(6, 182, 212, 0.1);
        }
        .eq-bar {
            width: 3px;
            background: var(--cyan-glow);
            margin: 0 1px;
            height: 2px;
        }

        .volume-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            outline: none;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: var(--cyan-glow);
            border-radius: 50%;
            cursor: pointer;
        }

        /* App Store Specifics */
        .store-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .app-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        /* CRT Effect */
        .crt::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.005), rgba(0, 0, 255, 0.01));
            z-index: 10000;
            pointer-events: none;
        }
    </style>
</head>
<body class="crt">

    <!-- 1. MOBILE INITIALIZATION -->
    <div id="mobile-init-container">
        <div class="mobile-device">
            <div class="mobile-screen">
                <div class="mt-10 mb-20 text-center">
                    <i class="fas fa-atom text-5xl text-cyan-500 mb-4 animate-spin-slow"></i>
                    <h1 class="text-xl font-black tracking-widest text-white uppercase">Dathu OS</h1>
                    <p class="text-[10px] text-cyan-800">MOBILE AUTHENTICATOR</p>
                </div>
                <div onclick="startLoading()" class="w-20 h-20 rounded-full border-2 border-cyan-500 flex items-center justify-center cursor-pointer hover:bg-cyan-500/10">
                    <i class="fas fa-fingerprint text-3xl text-cyan-400"></i>
                </div>
                <p class="text-[10px] text-cyan-600 mt-4 animate-pulse">Touch to Authorize</p>
                <div id="mobile-loader" class="hidden w-full mt-10">
                    <div class="h-1 bg-cyan-950 overflow-hidden"><div id="load-progress" class="h-full bg-cyan-500" style="width: 0%"></div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. DESKTOP ENVIRONMENT -->
    <div id="desktop-environment">
        <div class="h-8 bg-black/60 backdrop-blur-md border-b border-white/10 flex items-center justify-between px-4">
            <div class="flex items-center gap-4 text-[10px]">
                <span class="text-cyan-500 font-bold">DATHU KERNEL 9.0.1</span>
                <span id="gpu-status" class="text-slate-500 uppercase">GPU_STATUS: STABLE</span>
            </div>
            <div id="os-clock" class="text-[10px] text-slate-300 font-bold">00:00:00</div>
        </div>

        <!-- Icons -->
        <div class="p-4 grid grid-cols-1 gap-4 w-max">
            <div onclick="openApp('radio')" class="desktop-icon">
                <i class="fas fa-broadcast-tower text-3xl text-red-500"></i>
                <span class="text-[9px] text-white font-bold uppercase text-center">Frequency</span>
            </div>
            <div onclick="openApp('store')" class="desktop-icon">
                <i class="fas fa-shopping-bag text-3xl text-amber-400"></i>
                <span class="text-[9px] text-white font-bold uppercase text-center">App Store</span>
            </div>
            <div onclick="openApp('terminal')" class="desktop-icon">
                <i class="fas fa-terminal text-3xl text-cyan-500"></i>
                <span class="text-[9px] text-white font-bold uppercase text-center">Terminal</span>
            </div>
        </div>

        <!-- Windows -->
        <div id="window-layer">
            
            <!-- FREQUENCY RADIO APP -->
            <div id="app-radio" class="glass-panel hidden" style="width: 650px; height: 480px; left: 300px; top: 120px;">
                <div class="window-header">
                    <span class="text-[10px] font-bold text-red-500 uppercase"><i class="fas fa-radio mr-2"></i>Dathu Frequency Streamer</span>
                    <i class="fas fa-times text-xs text-red-500 cursor-pointer" onclick="closeApp('radio')"></i>
                </div>
                <div class="flex flex-1 overflow-hidden">
                    <div class="w-2/5 bg-black/40 border-r border-white/5 flex flex-col">
                        <div class="p-3 border-b border-white/5">
                            <input type="text" placeholder="Search Global Radio..." class="w-full bg-white/5 border border-white/10 text-[9px] p-2 outline-none text-white">
                        </div>
                        <div class="flex-1 overflow-y-auto" id="radio-list">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                    <div class="flex-1 p-6 flex flex-col items-center justify-between text-center">
                        <div class="w-full">
                            <div class="w-24 h-24 rounded-full border-4 border-red-500/20 mx-auto flex items-center justify-center relative mb-4">
                                <i id="radio-main-icon" class="fas fa-broadcast-tower text-3xl text-red-500"></i>
                                <div class="absolute inset-0 flex items-end justify-center gap-1 pb-4" id="eq-container"></div>
                            </div>
                            <h2 id="current-station" class="text-sm font-bold uppercase text-white tracking-widest truncate">Idle...</h2>
                            <p id="current-status-text" class="text-[9px] text-red-500/60 uppercase mt-1">Ready for Sync</p>
                        </div>
                        
                        <div class="w-full space-y-6">
                            <div class="flex items-center gap-4">
                                <i class="fas fa-volume-down text-[10px] text-slate-500"></i>
                                <input type="range" min="0" max="1" step="0.01" value="0.5" class="volume-slider" id="radio-volume">
                                <i class="fas fa-volume-up text-[10px] text-slate-500"></i>
                            </div>
                            <div class="flex justify-center gap-8 items-center">
                                <i class="fas fa-step-backward cursor-pointer hover:text-red-500"></i>
                                <div onclick="toggleRadioPlay()" class="w-12 h-12 bg-red-500/10 border border-red-500/30 rounded-full flex items-center justify-center cursor-pointer hover:bg-red-500/20">
                                    <i id="play-pause-icon" class="fas fa-play text-red-500"></i>
                                </div>
                                <i class="fas fa-step-forward cursor-pointer hover:text-red-500"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- APP STORE -->
            <div id="app-store" class="glass-panel hidden" style="width: 800px; height: 500px; left: 150px; top: 80px;">
                <div class="window-header">
                    <span class="text-[10px] font-bold text-amber-400 uppercase">Dathu Marketplace</span>
                    <i class="fas fa-times text-xs text-red-500 cursor-pointer" onclick="closeApp('store')"></i>
                </div>
                <div class="flex-1 overflow-y-auto p-4">
                    <div class="store-grid" id="app-grid"></div>
                </div>
            </div>

            <!-- TERMINAL -->
            <div id="app-terminal" class="glass-panel hidden" style="width: 500px; height: 350px; left: 100px; top: 100px;">
                <div class="window-header">
                    <span class="text-[10px] font-bold text-cyan-500 uppercase">Shell</span>
                    <i class="fas fa-times text-xs text-red-500 cursor-pointer" onclick="closeApp('terminal')"></i>
                </div>
                <div id="term-out" class="flex-1 p-3 font-mono text-[10px] overflow-y-auto bg-black/40"></div>
                <div class="p-2 border-t border-white/5 flex gap-2">
                    <span class="text-cyan-600 text-[10px]">root@dathu:~$</span>
                    <input type="text" onkeydown="handleTerm(event, this)" class="bg-transparent border-none outline-none text-[10px] text-white flex-1">
                </div>
            </div>

        </div>

        <!-- Taskbar -->
        <div class="fixed bottom-0 w-full h-10 bg-black/90 backdrop-blur-md border-t border-white/10 flex items-center px-2 gap-2 z-[9999]">
            <div class="w-8 h-8 bg-cyan-600 flex items-center justify-center font-black text-black">D</div>
            <div class="flex-1"></div>
            <div id="os-clock-taskbar" class="px-4 text-slate-500 text-[10px] font-bold">00:00:00</div>
        </div>
    </div>

    <script>
        // --- RADIO ENGINE ---
        const radioPlayer = new Audio();
        let isPlaying = false;
        let eqInterval;

        const liveStations = [
            { name: "Slay Radio (Synth/Retro)", url: "https://www.slayradio.org/tune_in.php/128kbps.m3u", genre: "SID / SYNTH" },
            { name: "Nightride FM", url: "https://stream.nightride.fm/nightride.mp3", genre: "SYNTHWAVE" },
            { name: "Lofi Girl (Global)", url: "https://icecast.lofigirl.com/lofigirl.mp3", genre: "LO-FI" },
            { name: "Deep Space One", url: "https://ice6.somafm.com/deepspaceone-128-mp3", genre: "AMBIENT" },
            { name: "DEF CON Radio", url: "https://ice6.somafm.com/defcon-128-mp3", genre: "TECH / NEWS" }
        ];

        function initFrequency() {
            const list = document.getElementById('radio-list');
            const eq = document.getElementById('eq-container');
            
            // Setup Equalizer
            for(let i=0; i<12; i++) {
                const bar = document.createElement('div');
                bar.className = 'eq-bar';
                eq.appendChild(bar);
            }

            liveStations.forEach(s => {
                const div = document.createElement('div');
                div.className = 'radio-station-item p-3 cursor-pointer';
                div.innerHTML = `
                    <h4 class="text-[10px] font-bold text-white uppercase">${s.name}</h4>
                    <p class="text-[8px] text-red-500/50 uppercase">${s.genre}</p>
                `;
                div.onclick = () => streamStation(s);
                list.appendChild(div);
            });

            // Volume sync
            document.getElementById('radio-volume').addEventListener('input', (e) => {
                radioPlayer.volume = e.target.value;
            });

            // Audio Events
            radioPlayer.onplaying = () => {
                isPlaying = true;
                updateRadioUI('playing');
                startEQ();
            };
            radioPlayer.onpause = () => {
                isPlaying = false;
                updateRadioUI('paused');
                stopEQ();
            };
            radioPlayer.onloadstart = () => updateRadioUI('buffering');
            radioPlayer.onerror = () => updateRadioUI('error');
        }

        function streamStation(station) {
            radioPlayer.src = station.url;
            radioPlayer.play().catch(e => console.log("Stream failed: " + e));
            document.getElementById('current-station').textContent = station.name;
        }

        function toggleRadioPlay() {
            if(!radioPlayer.src) return;
            if(isPlaying) radioPlayer.pause();
            else radioPlayer.play();
        }

        function updateRadioUI(status) {
            const icon = document.getElementById('play-pause-icon');
            const statusText = document.getElementById('current-status-text');
            const mainIcon = document.getElementById('radio-main-icon');

            switch(status) {
                case 'playing':
                    icon.className = "fas fa-pause text-red-500";
                    statusText.textContent = "SIGNAL ACQUIRED - STREAMING";
                    mainIcon.classList.add('animate-pulse');
                    break;
                case 'paused':
                    icon.className = "fas fa-play text-red-500";
                    statusText.textContent = "SIGNAL ON STANDBY";
                    mainIcon.classList.remove('animate-pulse');
                    break;
                case 'buffering':
                    statusText.textContent = "SYNCHRONIZING DATA NODES...";
                    break;
                case 'error':
                    statusText.textContent = "SIGNAL LOST - TRY ANOTHER FREQUENCY";
                    break;
            }
        }

        function startEQ() {
            clearInterval(eqInterval);
            const bars = document.querySelectorAll('.eq-bar');
            eqInterval = setInterval(() => {
                bars.forEach(bar => {
                    bar.style.height = (Math.random() * 25 + 2) + 'px';
                });
            }, 100);
        }

        function stopEQ() {
            clearInterval(eqInterval);
            document.querySelectorAll('.eq-bar').forEach(b => b.style.height = '2px');
        }

        // --- CORE OS LOGIC ---
        function startLoading() {
            document.getElementById('mobile-loader').classList.remove('hidden');
            let p = 0;
            const interval = setInterval(() => {
                p += 5;
                document.getElementById('load-progress').style.width = p + '%';
                if(p >= 100) {
                    clearInterval(interval);
                    document.getElementById('mobile-init-container').classList.add('hidden');
                    document.getElementById('desktop-environment').style.display = 'block';
                    initFrequency();
                    renderStore();
                    startClock();
                }
            }, 100);
        }

        function startClock() {
            setInterval(() => {
                const time = new Date().toLocaleTimeString('no-NO');
                document.getElementById('os-clock').textContent = time;
                document.getElementById('os-clock-taskbar').textContent = time;
            }, 1000);
        }

        function openApp(id) {
            const app = document.getElementById(`app-${id}`);
            app.classList.remove('hidden');
            app.style.zIndex = 1000;
        }

        function closeApp(id) {
            document.getElementById(`app-${id}`).classList.add('hidden');
            if(id === 'radio') {
                radioPlayer.pause();
            }
        }

        function renderStore() {
            const grid = document.getElementById('app-grid');
            for(let i=0; i<20; i++) {
                const card = document.createElement('div');
                card.className = 'app-card';
                card.innerHTML = `<i class="fas fa-cube text-cyan-500 text-xl mb-2"></i><p class="text-[8px] uppercase">D-App ${i+1}</p>`;
                grid.appendChild(card);
            }
        }

        // Window Dragger
        let activeWin = null, isDragging = false, dx, dy;
        document.addEventListener('mousedown', e => {
            const h = e.target.closest('.window-header');
            if(h) {
                activeWin = h.parentElement;
                isDragging = true;
                dx = e.clientX - activeWin.offsetLeft;
                dy = e.clientY - activeWin.offsetTop;
                document.querySelectorAll('.glass-panel').forEach(w => w.style.zIndex = 500);
                activeWin.style.zIndex = 1000;
            }
        });
        document.addEventListener('mousemove', e => {
            if(isDragging && activeWin) {
                activeWin.style.left = (e.clientX - dx) + 'px';
                activeWin.style.top = (e.clientY - dy) + 'px';
            }
        });
        document.addEventListener('mouseup', () => isDragging = false);

        function handleTerm(e, input) {
            if(e.key === 'Enter') {
                const out = document.getElementById('term-out');
                out.innerHTML += `<p class="text-cyan-500">> ${input.value}</p>`;
                input.value = '';
                out.scrollTop = out.scrollHeight;
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barnas Spillunivers - 30 i 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;700&display=swap');
        
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --bg: #F7FFF7;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg);
            overflow-x: hidden;
        }

        h1, h2, .font-kids {
            font-family: 'Fredoka One', cursive;
        }

        .game-card {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .game-card:hover {
            transform: scale(1.05) rotate(2deg);
        }

        .bounce { animation: bounce 2s infinite; }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        #ai-response {
            max-height: 200px;
            overflow-y: auto;
        }

        .canvas-container {
            touch-action: none;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Header Section -->
    <header class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <div class="text-center md:text-left">
            <h1 class="text-4xl md:text-5xl text-red-500 drop-shadow-md">Barnas Spillunivers 🚀</h1>
            <p class="text-gray-600 text-lg">30 kule spill og simulatorer!</p>
        </div>
        
        <div class="bg-white p-4 rounded-3xl shadow-lg border-4 border-yellow-300 flex items-center gap-4">
            <div class="text-right">
                <p class="text-sm font-bold text-gray-400">DIN POENGUM:</p>
                <p id="total-score" class="text-2xl font-kids text-blue-500">0</p>
            </div>
            <div class="w-12 h-12 bg-yellow-400 rounded-full flex items-center justify-center text-white text-2xl">
                ⭐
            </div>
        </div>
    </header>

    <!-- AI Sidekick Section -->
    <section class="max-w-4xl mx-auto mb-12 bg-white rounded-3xl p-6 shadow-xl border-4 border-teal-400 relative">
        <div class="absolute -top-10 left-10 text-5xl bounce">🤖</div>
        <h2 class="text-2xl mb-4 text-teal-600">Spør din Barne-AI!</h2>
        <div class="flex gap-2">
            <input id="ai-input" type="text" placeholder="Spør om en vits eller et dyr..." class="flex-1 p-3 border-2 border-teal-200 rounded-2xl focus:outline-none focus:border-teal-500">
            <button onclick="askAI()" id="ai-btn" class="bg-teal-500 text-white px-6 py-3 rounded-2xl hover:bg-teal-600 transition">Spør!</button>
        </div>
        <div id="ai-response" class="mt-4 p-4 bg-teal-50 rounded-xl hidden italic text-gray-700">
            <!-- AI Svar her -->
        </div>
    </section>

    <!-- Games Grid -->
    <main class="max-w-6xl mx-auto grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6" id="game-grid">
        <!-- JS genererer 30 kort her -->
    </main>

    <!-- Game Overlay / Modal -->
    <div id="game-modal" class="fixed inset-0 bg-black bg-opacity-80 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-3xl overflow-hidden relative shadow-2xl">
            <button onclick="closeGame()" class="absolute top-4 right-4 bg-red-500 text-white w-10 h-10 rounded-full text-xl z-50">×</button>
            <div id="game-content" class="p-8 text-center">
                <!-- Spillinnhold her -->
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; // Miljøet håndterer dette automatisk
        let totalScore = parseInt(localStorage.getItem('kidScore')) || 0;
        document.getElementById('total-score').innerText = totalScore;

        const games = [
            { id: 1, name: "Piano", icon: "🎹", color: "bg-pink-400", desc: "Spill musikk!" },
            { id: 2, name: "Tegnebrett", icon: "🎨", color: "bg-orange-400", desc: "Tegn et mesterverk" },
            { id: 3, name: "Dyrelyder", icon: "🦁", color: "bg-yellow-400", desc: "Hva sier dyret?" },
            { id: 4, name: "Boblesprekk", icon: "🫧", color: "bg-blue-400", desc: "Klikk på boblene!" },
            { id: 5, name: "Klikker", icon: "🍪", color: "bg-amber-600", desc: "Samle poeng!" },
            { id: 6, name: "Romskip", icon: "🚀", color: "bg-indigo-500", desc: "Unngå asteroider" },
            { id: 7, name: "Matte-lek", icon: "➕", color: "bg-green-400", desc: "Enkel pluss og minus" },
            { id: 8, name: "Farge-miks", icon: "🧪", color: "bg-purple-400", desc: "Lag nye farger" },
            { id: 9, name: "Bil-sim", icon: "🚗", color: "bg-red-400", desc: "Tut og kjør!" },
            { id: 10, name: "Været", icon: "☀️", color: "bg-sky-400", desc: "Lag storm eller sol" },
            { id: 11, name: "Xylofon", icon: "🎵", color: "bg-lime-400", desc: "Fargerike toner" },
            { id: 12, name: "Huskespill", icon: "🧩", color: "bg-emerald-400", desc: "Finn like bilder" },
            { id: 13, name: "Dino-hop", icon: "🦖", color: "bg-stone-500", desc: "Hopp over hinder" },
            { id: 14, name: "Snakkis", icon: "🦜", color: "bg-cyan-400", desc: "Papegøyen hermer" },
            { id: 15, name: "Ball-bingo", icon: "⚽", color: "bg-white border-2", desc: "Skyt i mål" },
            { id: 16, name: "Emoji-quiz", icon: "🤔", color: "bg-yellow-200", desc: "Gjett emojien" },
            { id: 17, name: "Brannbil", icon: "🚒", color: "bg-red-600", desc: "Slukk brannen" },
            { id: 18, name: "Stjerner", icon: "✨", color: "bg-slate-800 text-white", desc: "Lag stjernebilder" },
            { id: 19, name: "Snøball", icon: "❄️", color: "bg-blue-100", desc: "Kast snøballer" },
            { id: 20, name: "Sjøstjerne", icon: "⭐", color: "bg-teal-300", desc: "Finn skatten" },
            { id: 21, name: "Mat-maskin", icon: "🍕", color: "bg-orange-300", desc: "Lag din egen pizza" },
            { id: 22, name: "Tog-tur", icon: "🚂", color: "bg-zinc-400", desc: "Kjør toget" },
            { id: 23, name: "Robot-dans", icon: "🤖", color: "bg-gray-300", desc: "Lag kule moves" },
            { id: 24, name: "Jungel-hopp", icon: "🐒", color: "bg-green-600", desc: "Sving i lianer" },
            { id: 25, name: "Badesim", icon: "🛀", color: "bg-sky-200", desc: "Lek med ender" },
            { id: 26, name: "Is-bil", icon: "🍦", color: "bg-pink-200", desc: "Server iskrem" },
            { id: 27, name: "Hage-lek", icon: "🌻", color: "bg-green-300", desc: "Plant en blomst" },
            { id: 28, name: "Fisker", icon: "🐠", color: "bg-blue-600", desc: "Mating i akvariet" },
            { id: 29, name: "Ballonger", icon: "🎈", color: "bg-red-400", desc: "Ikke la dem lande" },
            { id: 30, name: "God natt", icon: "🌙", color: "bg-indigo-900 text-white", desc: "Finn månen" }
        ];

        // Render spillkort
        const grid = document.getElementById('game-grid');
        games.forEach(game => {
            const card = document.createElement('div');
            card.className = `${game.color} game-card p-6 rounded-3xl shadow-lg text-center flex flex-col items-center justify-center gap-2`;
            card.onclick = () => openGame(game.id);
            card.innerHTML = `
                <div class="text-5xl mb-2">${game.icon}</div>
                <h3 class="font-kids text-xl">${game.name}</h3>
                <p class="text-xs opacity-80">${game.desc}</p>
            `;
            grid.appendChild(card);
        });

        // AI Funksjon
        async function askAI() {
            const input = document.getElementById('ai-input').value;
            if (!input) return;
            
            const btn = document.getElementById('ai-btn');
            const responseDiv = document.getElementById('ai-response');
            
            btn.disabled = true;
            btn.innerText = "Tenker...";
            
            const systemPrompt = "Du er en snill spill-maskot for barn. Svar kort, morsomt og med mange emojis. Hvis barnet spør om en vits, fortell en enkel barnevits. Hvis de spør om fakta, gjør det spennende!";
            
            try {
                let delay = 1000;
                let success = false;
                let data;

                for (let i = 0; i < 5; i++) {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: input }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    
                    if (response.ok) {
                        data = await response.json();
                        success = true;
                        break;
                    }
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }

                if (success) {
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    responseDiv.innerText = text;
                    responseDiv.classList.remove('hidden');
                }
            } catch (err) {
                responseDiv.innerText = "Ops! Robot-hjernen min trenger en pause. Prøv igjen snart! 🛠️";
                responseDiv.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerText = "Spør!";
            }
        }

        // Spill-logikk
        function openGame(id) {
            const modal = document.getElementById('game-modal');
            const content = document.getElementById('game-content');
            modal.classList.remove('hidden');
            
            const game = games.find(g => g.id === id);
            
            // Eksempel på spill-innhold basert på ID
            if (id === 5) { // Klikker
                content.innerHTML = `
                    <h2 class="text-3xl font-kids mb-4">Kjeksklix! 🍪</h2>
                    <button id="cookie" class="text-9xl transition-transform active:scale-90 select-none">🍪</button>
                    <p class="mt-4 text-xl">Klikk for å få poeng!</p>
                    <p id="game-score" class="text-4xl font-kids text-amber-600 mt-2">0</p>
                `;
                let score = 0;
                document.getElementById('cookie').onclick = () => {
                    score++;
                    updateScore(1);
                    document.getElementById('game-score').innerText = score;
                };
            } else if (id === 4) { // Bobler
                content.innerHTML = `
                    <h2 class="text-3xl font-kids mb-4">Boblesprekk! 🫧</h2>
                    <div id="bubble-area" class="h-64 bg-blue-50 rounded-2xl relative overflow-hidden cursor-crosshair"></div>
                `;
                const area = document.getElementById('bubble-area');
                setInterval(() => {
                    if(modal.classList.contains('hidden')) return;
                    const b = document.createElement('div');
                    b.className = "absolute bg-white bg-opacity-40 border-2 border-blue-200 rounded-full cursor-pointer transition-all hover:scale-125";
                    const size = Math.random() * 40 + 20;
                    b.style.width = size + "px";
                    b.style.height = size + "px";
                    b.style.left = Math.random() * 90 + "%";
                    b.style.bottom = "-50px";
                    area.appendChild(b);
                    
                    let pos = -50;
                    const anim = setInterval(() => {
                        pos += 2;
                        b.style.bottom = pos + "px";
                        if(pos > 300) { clearInterval(anim); b.remove(); }
                    }, 20);

                    b.onclick = () => {
                        updateScore(5);
                        b.innerHTML = "✨";
                        setTimeout(() => b.remove(), 100);
                        clearInterval(anim);
                    };
                }, 800);
            } else if (id === 2) { // Tegnebrett
                content.innerHTML = `
                    <h2 class="text-3xl font-kids mb-4">Tegnestudio 🎨</h2>
                    <canvas id="paint" class="border-4 border-gray-200 bg-white rounded-xl w-full h-64"></canvas>
                    <div class="flex justify-center gap-2 mt-4">
                        <button onclick="ctx.strokeStyle='#f00'" class="w-8 h-8 bg-red-500 rounded-full"></button>
                        <button onclick="ctx.strokeStyle='#0f0'" class="w-8 h-8 bg-green-500 rounded-full"></button>
                        <button onclick="ctx.strokeStyle='#00f'" class="w-8 h-8 bg-blue-500 rounded-full"></button>
                        <button onclick="ctx.strokeStyle='#000'" class="w-8 h-8 bg-black rounded-full"></button>
                    </div>
                `;
                const canvas = document.getElementById('paint');
                window.ctx = canvas.getContext('2d');
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;
                let painting = false;

                canvas.onmousedown = canvas.ontouchstart = (e) => { painting = true; draw(e); };
                canvas.onmouseup = canvas.ontouchend = () => { painting = false; ctx.beginPath(); };
                canvas.onmousemove = canvas.ontouchmove = draw;

                function draw(e) {
                    if (!painting) return;
                    e.preventDefault();
                    const rect = canvas.getBoundingClientRect();
                    const x = (e.clientX || e.touches[0].clientX) - rect.left;
                    const y = (e.clientY || e.touches[0].clientY) - rect.top;
                    ctx.lineWidth = 5;
                    ctx.lineCap = "round";
                    ctx.lineTo(x, y);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                }
            } else {
                content.innerHTML = `
                    <div class="text-8xl mb-4">${game.icon}</div>
                    <h2 class="text-3xl font-kids mb-2">${game.name}</h2>
                    <p class="text-gray-600 mb-6">Dette spillet er under utvikling, men du fikk 10 poeng for å besøke det!</p>
                    <button onclick="closeGame()" class="bg-blue-500 text-white px-8 py-3 rounded-2xl font-bold">Kult!</button>
                `;
                updateScore(10);
            }
        }

        function closeGame() {
            document.getElementById('game-modal').classList.add('hidden');
            document.getElementById('game-content').innerHTML = '';
        }

        function updateScore(points) {
            totalScore += points;
            localStorage.setItem('kidScore', totalScore);
            document.getElementById('total-score').innerText = totalScore;
        }

        // Velkomstmelding
        window.onload = () => {
            console.log("Spillunivers lastet!");
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Din Nettsidetittel</title>
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Enkel styling for å komme i gang */
        body {
            font-family: sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Velkommen til min nettside</h1>
            <nav>
                <ul>
                    <li><a href="#">Hjem</a></li>
                    <li><a href="#">Om oss</a></li>
                    <li><a href="#">Kontakt</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <article>
                <h2>Overskrift</h2>
                <p>Her kan du begynne å skrive innholdet ditt.</p>
            </article>
        </main>

        <footer>
            <p>&copy; 2024 Mitt Navn</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>

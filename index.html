<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mobil GUI - Auto-Arkivering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #030508;
            color: #f1f5f9;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at 50% 50%, #1a1033 0%, #030508 100%);
        }

        .glass {
            background: rgba(10, 14, 20, 0.7);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .code-font { font-family: 'Fira Code', monospace; }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(168, 85, 247, 0.2); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(168, 85, 247, 0.4); }

        .chat-bubble {
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .ai-status-dot { 
            animation: pulse-dot 2s infinite; 
        }

        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.6; }
        }

        .app-container {
            width: 100%;
            height: 100%;
            max-width: 1000px;
            max-height: 95vh;
            display: flex;
            flex-direction: column;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(0,0,0,0.5);
            position: relative;
        }

        #storagePanel {
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateY(100%);
        }

        #storagePanel.open {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .app-container {
                max-height: 100vh;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>

    <div class="app-container glass flex flex-col relative">
        <!-- Header -->
        <header class="p-6 border-b border-white/5 bg-white/5 flex justify-between items-center z-20">
            <div class="flex items-center gap-5">
                <div class="relative">
                    <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-purple-500 to-indigo-700 flex items-center justify-center shadow-2xl">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                    </div>
                    <div class="absolute -top-1 -right-1 w-5 h-5 bg-green-500 border-4 border-[#030508] rounded-full ai-status-dot"></div>
                </div>
                <div>
                    <h1 class="text-xl font-black text-white tracking-tight italic">AI MOBIL GUI</h1>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] text-purple-400 font-black uppercase tracking-[0.2em]">Auto-Archive System</span>
                    </div>
                </div>
            </div>
            
            <div class="flex gap-3">
                <button onclick="toggleStorage()" class="px-4 py-2 bg-white/5 hover:bg-white/10 rounded-xl text-xs font-bold text-slate-300 transition border border-white/5 flex items-center gap-2 uppercase tracking-widest">
                    <span>📁</span> Bibliotek
                </button>
                <button onclick="clearChat()" class="p-2 text-slate-500 hover:text-red-400 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                </button>
            </div>
        </header>

        <!-- Chat Area -->
        <div id="chatBox" class="flex-1 overflow-y-auto p-6 md:p-10 flex flex-col gap-6 custom-scrollbar bg-black/20">
            <!-- Meldinger rendres her -->
        </div>

        <!-- Input Area -->
        <div class="p-6 md:p-8 bg-black/40 border-t border-white/5 backdrop-blur-xl z-10">
            <div class="max-w-4xl mx-auto relative group">
                <textarea id="chatInput" rows="1" oninput="autoResize(this)" 
                          placeholder="Lim inn kode og avslutt med 'lagre som filnavn.html'..." 
                          class="w-full bg-white/[0.04] border border-white/10 rounded-3xl px-6 py-5 outline-none focus:border-purple-500/50 focus:ring-4 focus:ring-purple-500/5 transition text-base code-font resize-none pr-16 custom-scrollbar placeholder:text-slate-600"></textarea>
                
                <button onclick="handleChatSubmit()" class="absolute right-3 top-3 bg-purple-600 text-white p-4 rounded-2xl hover:bg-purple-500 transition-all shadow-xl active:scale-90 hover:shadow-purple-500/40">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7-7 7M5 5l7 7-7 7"/>
                    </svg>
                </button>
            </div>
            <div class="flex justify-center mt-6 gap-8">
                <p class="text-[10px] text-slate-600 font-bold uppercase tracking-widest flex items-center gap-2">
                    <span class="w-1 h-1 rounded-full bg-purple-500"></span> Gjenkjenner Imports
                </p>
                <p class="text-[10px] text-slate-600 font-bold uppercase tracking-widest flex items-center gap-2">
                    <span class="w-1 h-1 rounded-full bg-purple-500"></span> Auto-snippet tags
                </p>
            </div>
        </div>

        <!-- Local Storage Interface Panel -->
        <div id="storagePanel" class="absolute inset-0 z-30 bg-[#030508] flex flex-col">
            <header class="p-6 border-b border-white/5 bg-white/5 flex justify-between items-center">
                <div>
                    <h2 class="text-xl font-black text-white italic tracking-tight">KODE BIBLIOTEK</h2>
                    <p class="text-[9px] text-purple-400 font-black uppercase tracking-[0.2em]">Automatisk Arkiverte Filer</p>
                </div>
                <button onclick="toggleStorage()" class="px-5 py-2.5 bg-white/10 hover:bg-white/20 rounded-2xl text-xs font-bold text-white transition uppercase tracking-widest">Lukk</button>
            </header>
            
            <div class="p-6 flex flex-col md:flex-row gap-4 items-center justify-between border-b border-white/5 bg-black/20">
                <div class="relative w-full md:w-96">
                    <input type="text" id="storageSearch" oninput="renderStorageItems()" placeholder="Søk i snippets..." class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-purple-500/50 transition">
                </div>
                <div class="flex gap-3 w-full md:w-auto">
                    <button onclick="exportData('json')" class="flex-1 md:flex-none px-4 py-3 bg-indigo-600/20 text-indigo-400 rounded-xl text-[10px] font-black uppercase tracking-widest border border-indigo-500/20 hover:bg-indigo-600/30 transition">Full Backup</button>
                    <button onclick="clearAllData()" class="flex-1 md:flex-none px-4 py-3 bg-red-600/20 text-red-400 rounded-xl text-[10px] font-black uppercase tracking-widest border border-red-500/20 hover:bg-red-600/30 transition">Tøm alt</button>
                </div>
            </div>

            <div id="storageItemsContainer" class="flex-1 overflow-y-auto p-6 grid grid-cols-1 md:grid-cols-2 gap-4 custom-scrollbar">
                <!-- Lagrede elementer her -->
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-purple-600 text-white px-8 py-4 rounded-2xl text-xs font-black opacity-0 transition-all duration-300 pointer-events-none z-50 shadow-2xl uppercase tracking-widest">Kopiert!</div>

    <script>
        let chatHistory = JSON.parse(localStorage.getItem('codebrain_fullgui_chat')) || [
            { role: 'ai', content: '🤖 <b>System Oppdatert.</b><br><br>Jeg skanner nå automatisk etter kodesnutter (HTML tags, imports, libraries) og lagrer dem.<br><br>Eksempel: Skriv <i>"&lt;div&gt;Hei&lt;/div&gt; lagre som test.html"</i>' }
        ];

        window.onload = () => {
            renderChat();
            document.getElementById('chatInput').addEventListener('keydown', (e) => { 
                if (e.key === 'Enter' && !e.shiftKey) { 
                    e.preventDefault(); 
                    handleChatSubmit(); 
                } 
            });
        };

        function toggleStorage() {
            const panel = document.getElementById('storagePanel');
            panel.classList.toggle('open');
            if(panel.classList.contains('open')) renderStorageItems();
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
        }

        function handleChatSubmit() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            chatHistory.push({ role: 'user', content: text });
            input.value = '';
            input.style.height = 'auto';
            renderChat();

            setTimeout(() => {
                const results = processSmartContent(text);
                if (results.saved) {
                    chatHistory.push({ 
                        role: 'ai', 
                        content: `✅ <b>Automatisk Arkivert:</b> <span class="text-purple-300 font-bold">${results.filename}</span><br>Koden er gjenkjent som ${results.lang} og lagret i biblioteket.` 
                    });
                    renderChat();
                }
            }, 500);
        }

        function processSmartContent(text) {
            const low = text.toLowerCase();
            let filename = "";
            let cleanContent = text;
            
            // 1. Sjekk for "lagre som [navn]" på slutten av strengen
            const saveMatch = text.match(/(?:lagre\s+(?:dette\s+)?som\s+)([a-zA-Z0-9._-]+)/i);
            if (saveMatch) {
                filename = saveMatch[1];
                // Fjern instruksjonen fra innholdet som skal lagres
                cleanContent = text.replace(saveMatch[0], "").trim();
            }

            // 2. Gjenkjenn teknologi/språk
            let type = 'text';
            let lang = 'Notat';
            let ext = 'txt';

            const hasHtml = /<[a-z][\s\S]*>/i.test(cleanContent);
            const hasImport = low.includes('import ') || low.includes('@import') || low.includes('require(');
            const hasJs = low.includes('const ') || low.includes('function') || low.includes('=>');
            const hasCss = low.includes('{') && low.includes(':') && (low.includes('color:') || low.includes('margin:'));

            if (hasHtml) { type = 'html'; lang = 'HTML/XML'; ext = 'html'; }
            else if (hasImport || hasJs) { type = 'javascript'; lang = 'JavaScript/Logic'; ext = 'js'; }
            else if (hasCss) { type = 'css'; lang = 'CSS Styles'; ext = 'css'; }
            else if (cleanContent.trim().startsWith('{')) { type = 'json'; lang = 'JSON Data'; ext = 'json'; }

            if (!filename) {
                filename = `snippet_${Date.now()}.${ext}`;
            } else if (!filename.includes('.')) {
                filename += `.${ext}`;
            }

            saveToLibrary(cleanContent, filename, type, lang, ext);
            return { saved: true, filename, lang };
        }

        function saveToLibrary(content, filename, type, lang, ext) {
            let nodes = JSON.parse(localStorage.getItem('codebrain_nodes_v10')) || [];
            nodes.unshift({
                id: Date.now(),
                content: content,
                filename: filename,
                category: type,
                lang: lang,
                ext: ext,
                timestamp: new Date().toISOString()
            });
            localStorage.setItem('codebrain_nodes_v10', JSON.stringify(nodes));
        }

        function renderChat() {
            const box = document.getElementById('chatBox');
            box.innerHTML = '';
            chatHistory.forEach((msg) => {
                const isAi = msg.role === 'ai';
                const div = document.createElement('div');
                div.className = `chat-bubble p-6 rounded-[2rem] text-sm leading-relaxed max-w-[90%] md:max-w-[80%] ${
                    isAi ? 'bg-white/5 mr-auto border border-white/10 text-slate-200 rounded-bl-none' : 'bg-purple-600 ml-auto text-white shadow-2xl rounded-br-none'
                }`;
                div.innerHTML = `<div class="break-words">${msg.content}</div>`;
                box.appendChild(div);
            });
            box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
            localStorage.setItem('codebrain_fullgui_chat', JSON.stringify(chatHistory));
        }

        function renderStorageItems() {
            const container = document.getElementById('storageItemsContainer');
            const searchTerm = document.getElementById('storageSearch').value.toLowerCase();
            let nodes = JSON.parse(localStorage.getItem('codebrain_nodes_v10')) || [];
            
            container.innerHTML = '';
            const filtered = nodes.filter(n => 
                (n.filename || '').toLowerCase().includes(searchTerm) || 
                n.content.toLowerCase().includes(searchTerm)
            );

            if(filtered.length === 0) {
                container.innerHTML = '<div class="col-span-full py-20 text-center text-slate-600 font-bold uppercase tracking-widest">Biblioteket er tomt</div>';
                return;
            }

            filtered.forEach(node => {
                const card = document.createElement('div');
                card.className = 'glass p-5 rounded-2xl border border-white/5 flex flex-col gap-3 group hover:border-purple-500/30 transition relative';
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="overflow-hidden">
                            <h3 class="text-white font-bold text-sm truncate">${node.filename}</h3>
                            <span class="text-[8px] font-black uppercase text-purple-400">${node.lang}</span>
                        </div>
                        <div class="flex gap-1">
                             <button onclick="downloadSnippet('${node.id}')" class="p-2 bg-white/5 rounded-lg text-green-500 hover:bg-green-500/20">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                             </button>
                             <button onclick="deleteNode('${node.id}')" class="p-2 bg-white/5 rounded-lg text-red-500 hover:bg-red-500/20">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                             </button>
                        </div>
                    </div>
                    <pre class="code-font text-[9px] bg-black/40 p-3 rounded-lg overflow-x-auto text-slate-400 max-h-24 custom-scrollbar border border-white/5">${node.content.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")}</pre>
                    <div class="flex justify-between items-center mt-1">
                        <span class="text-[7px] text-slate-600 font-bold uppercase">${new Date(node.timestamp).toLocaleTimeString()}</span>
                        <button onclick="copyToClipboard('${node.id}')" class="text-[9px] text-slate-400 hover:text-white uppercase font-bold">Kopier</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function downloadSnippet(id) {
            let nodes = JSON.parse(localStorage.getItem('codebrain_nodes_v10')) || [];
            const node = nodes.find(n => n.id.toString() === id.toString());
            if (!node) return;
            const blob = new Blob([node.content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = node.filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            showToast(`Fil lagret: ${node.filename}`);
        }

        function deleteNode(id) {
            let nodes = JSON.parse(localStorage.getItem('codebrain_nodes_v10')) || [];
            nodes = nodes.filter(n => n.id.toString() !== id.toString());
            localStorage.setItem('codebrain_nodes_v10', JSON.stringify(nodes));
            renderStorageItems();
        }

        function clearAllData() {
            if(confirm("Tømme hele biblioteket?")) {
                localStorage.removeItem('codebrain_nodes_v10');
                renderStorageItems();
            }
        }

        function clearChat() {
            if(confirm("Slette chatten?")) {
                chatHistory = [chatHistory[0]];
                localStorage.setItem('codebrain_fullgui_chat', JSON.stringify(chatHistory));
                renderChat();
            }
        }

        function copyToClipboard(id) {
            let nodes = JSON.parse(localStorage.getItem('codebrain_nodes_v10')) || [];
            const node = nodes.find(n => n.id.toString() === id.toString());
            if(node) {
                const el = document.createElement('textarea');
                el.value = node.content;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                showToast("Kopiert!");
            }
        }

        function showToast(text) {
            const t = document.getElementById('toast');
            t.innerText = text;
            t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2000);
        }

        function exportData() {
            const data = localStorage.getItem('codebrain_nodes_v10') || '[]';
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `backup_${Date.now()}.json`;
            a.click();
        }
    </script>
</body>
</html>

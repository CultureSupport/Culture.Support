<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaStore - Future Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.4);
            --accent-purple: #8b5cf6;
            --deep-purple: #4c1d95;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 50%, #ddd6fe 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #1e1b4b;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 15px 35px rgba(139, 92, 246, 0.1);
        }

        .product-card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 3rem;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .product-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 30px 60px rgba(76, 29, 149, 0.15);
            background: rgba(255, 255, 255, 0.8);
        }

        .purple-gradient-bg {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
        }

        .gradient-text {
            background: linear-gradient(135deg, #4c1d95, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .cart-sidebar {
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(30px);
        }

        .cart-hidden { transform: translateX(100%); }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .float { animation: float 4s ease-in-out infinite; }

        .btn-primary {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(124, 58, 237, 0.4);
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- Navigasjon -->
    <nav class="fixed top-0 w-full z-50 glass border-b border-white/40">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center space-x-12">
                <h1 class="text-3xl font-extrabold tracking-tighter gradient-text cursor-pointer" onclick="location.reload()">NOVA</h1>
                <div class="hidden lg:flex space-x-8 text-sm font-semibold text-slate-600">
                    <a href="#" class="hover:text-violet-600 transition">Utforsk</a>
                    <a href="#" class="hover:text-violet-600 transition">Nyheter</a>
                    <a href="#" class="hover:text-violet-600 transition">Bestsellere</a>
                </div>
            </div>
            
            <div class="flex items-center space-x-6">
                <div class="relative hidden sm:block">
                    <input type="text" id="searchInput" placeholder="Søk i 300+ gadgets..." 
                           class="bg-white/50 border-white border rounded-full py-2.5 px-6 text-sm focus:ring-2 focus:ring-violet-400 w-64 outline-none transition-all focus:bg-white shadow-sm">
                </div>
                <button id="cartBtn" class="relative p-3 bg-white/60 hover:bg-white rounded-full transition shadow-soft border border-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-violet-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                    </svg>
                    <span id="cartCount" class="absolute -top-1 -right-1 bg-violet-600 text-white text-[10px] font-bold px-2 py-1 rounded-full hidden shadow-lg">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <header class="pt-48 pb-24 px-6 text-center">
        <div class="inline-block px-4 py-1.5 mb-6 glass rounded-full text-violet-600 text-xs font-bold tracking-widest uppercase">Kolleksjon 2024</div>
        <h2 class="text-6xl md:text-8xl font-black tracking-tight mb-6 leading-tight">Morgendagens <br><span class="gradient-text">design i dag.</span></h2>
        <p class="text-xl text-slate-500 max-w-2xl mx-auto font-medium">Oppdag en verden av lilla-inspirert estetikk og premium teknologi som føles like bra som den ser ut.</p>
    </header>

    <!-- Filter Bar -->
    <main class="max-w-7xl mx-auto px-6 pb-32">
        <div class="flex items-center justify-center space-x-3 mb-16 overflow-x-auto no-scrollbar py-4">
            <button class="filter-btn active purple-gradient-bg text-white px-8 py-3 rounded-full text-sm font-bold transition shadow-lg" data-category="all">Alle</button>
            <button class="filter-btn glass hover:bg-white px-8 py-3 rounded-full text-sm font-bold text-slate-600 transition" data-category="Elektronikk">Elektronikk</button>
            <button class="filter-btn glass hover:bg-white px-8 py-3 rounded-full text-sm font-bold text-slate-600 transition" data-category="Tilbehør">Tilbehør</button>
            <button class="filter-btn glass hover:bg-white px-8 py-3 rounded-full text-sm font-bold text-slate-600 transition" data-category="Audio">Audio</button>
            <button class="filter-btn glass hover:bg-white px-8 py-3 rounded-full text-sm font-bold text-slate-600 transition" data-category="Smart Hjem">Smart</button>
        </div>

        <!-- Grid -->
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10">
            <!-- Dynamisk innhold -->
        </div>

        <!-- Pagination -->
        <div class="mt-24 text-center">
            <p id="productStatus" class="text-slate-400 text-sm mb-6 font-medium tracking-wide">Viser 20 av 300 fantastiske produkter</p>
            <button id="loadMoreBtn" class="glass px-12 py-5 rounded-full font-bold text-violet-700 hover:bg-violet-600 hover:text-white transition-all shadow-xl hover:scale-105 active:scale-95">
                Last flere produkter
            </button>
        </div>
    </main>

    <!-- Cart Sidebar -->
    <aside id="cartSidebar" class="fixed top-0 right-0 w-full md:w-[480px] h-full z-[60] border-l border-white/40 cart-sidebar cart-hidden flex flex-col shadow-2xl">
        <div class="p-8 flex items-center justify-between">
            <h3 class="text-2xl font-black gradient-text">Handlekurv</h3>
            <button id="closeCart" class="p-3 bg-slate-100 hover:bg-violet-100 rounded-full transition group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-600 group-hover:text-violet-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <div id="cartItems" class="flex-1 overflow-y-auto px-8 space-y-6 no-scrollbar">
            <!-- Cart Items -->
        </div>

        <div class="p-10 bg-white/50 border-t border-white/60">
            <div class="flex justify-between items-center mb-8">
                <span class="text-slate-500 font-bold uppercase tracking-widest text-xs">Totalbeløp</span>
                <span id="cartTotal" class="text-3xl font-black text-violet-700">0 kr</span>
            </div>
            <button id="checkoutBtn" class="w-full btn-primary text-white py-5 rounded-[2rem] font-bold text-lg active:scale-95">
                Fullfør bestilling
            </button>
            <div class="flex justify-center space-x-4 mt-6">
                <div class="w-8 h-5 bg-slate-200 rounded-sm opacity-50"></div>
                <div class="w-8 h-5 bg-slate-200 rounded-sm opacity-50"></div>
                <div class="w-8 h-5 bg-slate-200 rounded-sm opacity-50"></div>
            </div>
        </div>
    </aside>

    <!-- Elements -->
    <div id="overlay" class="fixed inset-0 bg-violet-900/10 backdrop-blur-md z-[55] hidden transition-opacity"></div>
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 glass px-8 py-4 rounded-full text-sm font-bold transform translate-y-40 transition-all duration-700 z-[100] flex items-center space-x-3 shadow-2xl border-violet-200">
        <div class="w-8 h-8 bg-violet-600 rounded-full flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
            </svg>
        </div>
        <span id="toastMsg" class="text-slate-700">Lagt til i kurven</span>
    </div>

    <script>
        // Data & Logic
        const categories = ["Elektronikk", "Tilbehør", "Audio", "Smart Hjem"];
        const baseNames = ["Pods", "Hub", "Pad", "Book", "Watch", "Lens", "Drive", "Mouse", "Keyboard"];
        const adjectives = ["Pro", "Ultra", "Neon", "Void", "Zen", "Pulse", "Quantum"];
        
        const generateProducts = (count) => {
            return Array.from({length: count}, (_, i) => ({
                id: i + 1,
                name: `Nova ${baseNames[i % baseNames.length]} ${adjectives[i % adjectives.length]}`,
                price: Math.floor(Math.random() * 12000) + 999,
                category: categories[i % categories.length],
                image: `https://picsum.photos/seed/nova${i+4}/800/800`,
                description: "Fremtidig teknologi med et vakkert lilla uttrykk."
            }));
        };

        const allProducts = generateProducts(300);
        let displayedCount = 20;
        let cart = [];
        let activeFilter = 'all';

        // UI Core
        const render = () => {
            const grid = document.getElementById('productGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = allProducts.filter(p => 
                (activeFilter === 'all' || p.category === activeFilter) &&
                p.name.toLowerCase().includes(search)
            ).slice(0, displayedCount);

            grid.innerHTML = filtered.map(p => `
                <div class="product-card p-5 group flex flex-col h-full">
                    <div class="relative aspect-square rounded-[2.5rem] overflow-hidden mb-6 bg-slate-200 shadow-inner">
                        <img src="${p.image}" class="w-full h-full object-cover group-hover:scale-110 transition duration-1000">
                        <div class="absolute inset-0 bg-gradient-to-t from-violet-900/20 to-transparent opacity-0 group-hover:opacity-100 transition duration-500"></div>
                    </div>
                    <div class="flex-1 px-2">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] font-black uppercase tracking-widest text-violet-500">${p.category}</span>
                            <span class="text-sm font-black text-slate-800">${p.price.toLocaleString()} kr</span>
                        </div>
                        <h4 class="text-xl font-extrabold text-slate-900 mb-2 leading-tight">${p.name}</h4>
                        <p class="text-xs text-slate-500 mb-6 font-medium leading-relaxed">${p.description}</p>
                    </div>
                    <button onclick="addToCart(${p.id})" class="w-full bg-slate-900 text-white py-4 rounded-[1.8rem] font-bold text-sm hover:purple-gradient-bg transition-all shadow-lg active:scale-95 flex items-center justify-center space-x-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        <span>Legg i kurv</span>
                    </button>
                </div>
            `).join('');

            document.getElementById('productStatus').innerText = `Viser ${filtered.length} av 300 håndplukkede produkter`;
        };

        // Cart Actions
        window.addToCart = (id) => {
            const product = allProducts.find(p => p.id === id);
            const item = cart.find(i => i.id === id);
            if (item) item.quantity++;
            else cart.push({...product, quantity: 1});
            
            updateCart();
            showToast(`${product.name} er lagt til!`);
        };

        window.updateQty = (id, delta) => {
            const item = cart.find(i => i.id === id);
            item.quantity += delta;
            if (item.quantity <= 0) cart = cart.filter(i => i.id !== id);
            updateCart();
        };

        const updateCart = () => {
            const container = document.getElementById('cartItems');
            const badge = document.getElementById('cartCount');
            const total = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
            const count = cart.reduce((s, i) => s + i.quantity, 0);

            badge.innerText = count;
            badge.classList.toggle('hidden', count === 0);
            document.getElementById('cartTotal').innerText = `${total.toLocaleString()} kr`;

            if (cart.length === 0) {
                container.innerHTML = `<div class="text-center py-20 opacity-30 font-bold">Kurven din venter på deg...</div>`;
                return;
            }

            container.innerHTML = cart.map(i => `
                <div class="flex items-center space-x-4 bg-white/60 p-4 rounded-[2rem] border border-white shadow-sm">
                    <img src="${i.image}" class="w-20 h-20 rounded-2xl object-cover shadow-md">
                    <div class="flex-1">
                        <h5 class="font-bold text-slate-800 text-sm">${i.name}</h5>
                        <p class="text-violet-600 font-extrabold text-xs mt-1">${i.price.toLocaleString()} kr</p>
                    </div>
                    <div class="flex items-center bg-slate-100 rounded-full p-1 border border-white shadow-inner">
                        <button onclick="updateQty(${i.id}, -1)" class="w-8 h-8 flex items-center justify-center hover:bg-white rounded-full transition font-bold">-</button>
                        <span class="text-xs font-black w-6 text-center">${i.quantity}</span>
                        <button onclick="updateQty(${i.id}, 1)" class="w-8 h-8 flex items-center justify-center hover:bg-white rounded-full transition font-bold">+</button>
                    </div>
                </div>
            `).join('');
        };

        const showToast = (msg) => {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            t.style.transform = 'translate(-50%, -20px)';
            setTimeout(() => t.style.transform = 'translate(-50%, 200px)', 3000);
        };

        // Events
        document.getElementById('cartBtn').onclick = () => {
            document.getElementById('cartSidebar').classList.remove('cart-hidden');
            document.getElementById('overlay').classList.remove('hidden');
        };

        document.getElementById('closeCart').onclick = document.getElementById('overlay').onclick = () => {
            document.getElementById('cartSidebar').classList.add('cart-hidden');
            document.getElementById('overlay').classList.add('hidden');
        };

        document.getElementById('loadMoreBtn').onclick = () => {
            displayedCount += 20;
            render();
            if (displayedCount >= 300) document.getElementById('loadMoreBtn').style.display = 'none';
        };

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.remove('purple-gradient-bg', 'text-white', 'shadow-lg');
                    b.classList.add('glass', 'text-slate-600');
                });
                btn.classList.add('purple-gradient-bg', 'text-white', 'shadow-lg');
                btn.classList.remove('glass', 'text-slate-600');
                activeFilter = btn.dataset.category;
                render();
            };
        });

        document.getElementById('searchInput').oninput = render;

        document.getElementById('checkoutBtn').onclick = () => {
            if (cart.length === 0) return showToast("Kurven er tom!");
            alert("Bestilling mottatt! Takk for at du valgte Nova.");
            cart = [];
            updateCart();
            document.getElementById('closeCart').click();
        };

        window.onload = render;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D3.js Hyperloop & Tensor Visualizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #020205;
            color: #e0e0e0;
            overflow: hidden;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #viz {
            width: 100%;
            height: 100%;
        }
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 20, 0.85);
            padding: 24px;
            border-radius: 16px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            pointer-events: auto;
            max-width: 320px;
            z-index: 100;
        }
        .node {
            stroke: rgba(255, 255, 255, 0.8);
            stroke-width: 2px;
            filter: drop-shadow(0 0 8px currentColor);
        }
        .link {
            stroke-opacity: 0.4;
            stroke-dasharray: 4;
            animation: dash 5s linear infinite;
        }
        @keyframes dash {
            to { stroke-dashoffset: -20; }
        }
        .hyperloop-particle {
            fill: #00f2ff;
            filter: blur(1px) drop-shadow(0 0 3px #00f2ff);
        }
        .math-overlay {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: rgba(0, 242, 255, 0.5);
            pointer-events: none;
            text-align: right;
        }
    </style>
</head>
<body>

<div class="canvas-container">
    <svg id="viz"></svg>

    <div class="ui-panel shadow-2xl">
        <h1 class="text-2xl font-black mb-1 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 italic">HYPERLOOP V2</h1>
        <p class="text-[10px] text-cyan-300 uppercase tracking-[0.2em] mb-4 opacity-70">Tensor Field Simulation</p>
        
        <div class="space-y-5">
            <div class="bg-black/40 p-3 rounded-lg border border-white/5">
                <label class="text-[9px] uppercase tracking-wider text-gray-500 block mb-1">Kalkulert Tensor Rank</label>
                <div id="stats-rank" class="font-mono text-lg text-cyan-400 font-bold">--</div>
                <div id="stats-dim" class="font-mono text-[10px] text-gray-400">Dimensjon: Initialiserer...</div>
            </div>

            <div class="bg-black/40 p-3 rounded-lg border border-white/5">
                <label class="text-[9px] uppercase tracking-wider text-gray-500 block mb-1">Vektorkomponenter (λ)</label>
                <div id="math-stream" class="font-mono text-[10px] text-green-400 h-12 overflow-hidden leading-tight"></div>
            </div>

            <button id="refreshBtn" class="w-full bg-gradient-to-br from-cyan-600 to-blue-700 hover:from-cyan-500 hover:to-blue-600 text-white font-bold py-3 rounded-xl shadow-lg shadow-cyan-900/20 transition-all active:scale-95 border border-cyan-400/30">
                RE-COMPUTE TENSOR
            </button>
        </div>
    </div>

    <div class="math-overlay" id="math-overlay">
        ∇ × B = μ₀(J + ε₀ ∂E/∂t)<br>
        R_μν - 1/2 R g_μν = 8πG T_μν<br>
        Ψ(x,t) = e^{i(kx - ωt)}
    </div>
</div>

<script>
    const svg = d3.select("#viz");
    let width = window.innerWidth;
    let height = window.innerHeight;
    
    // Konfigurasjon
    const particleCount = 150;
    const tensorNodesCount = 20;
    
    svg.attr("width", width).attr("height", height);

    // Definer gradienter og filter
    const defs = svg.append("defs");
    const glow = defs.append("filter").attr("id", "glow");
    glow.append("feGaussianBlur").attr("stdDeviation", "3").attr("result", "coloredBlur");
    const merge = glow.append("feMerge");
    merge.append("feMergeNode").attr("in", "coloredBlur");
    merge.append("feMergeNode").attr("in", "SourceGraphic");

    // Grupper
    const gHyperloop = svg.append("g").attr("class", "hyperloop");
    const gLinks = svg.append("g").attr("class", "links");
    const gNodes = svg.append("g").attr("class", "nodes");

    // --- Hyperloop Animasjon ---
    function initHyperloop() {
        const particles = Array.from({length: particleCount}, (_, i) => ({
            id: i,
            angle: Math.random() * Math.PI * 2,
            radiusOffset: Math.random() * 0.5 + 0.5,
            speed: 0.01 + Math.random() * 0.03,
            depth: Math.random(),
            color: i % 2 === 0 ? "#00f2ff" : "#3b82f6"
        }));

        const pElements = gHyperloop.selectAll(".hyperloop-particle")
            .data(particles)
            .enter()
            .append("circle")
            .attr("class", "hyperloop-particle")
            .attr("r", d => 0.5 + d.depth * 2.5)
            .attr("fill", d => d.color);

        d3.timer((elapsed) => {
            pElements.each(function(d) {
                d.angle += d.speed;
                // Skaper spiral-bevegelse innover/utover
                const wave = Math.sin(elapsed * 0.0005 + d.depth * 10) * 30;
                const currentRadius = (d.depth * (width * 0.8)) + wave;
                
                const x = width / 2 + Math.cos(d.angle) * currentRadius;
                const y = height / 2 + Math.sin(d.angle) * currentRadius;
                
                d3.select(this)
                    .attr("cx", x)
                    .attr("cy", y)
                    .attr("opacity", Math.max(0.1, d.depth * 0.6));
            });
            
            // Oppdater tilfeldig matematisk strøm i UI
            if (Math.random() > 0.9) {
                const stream = document.getElementById('math-stream');
                const val = (Math.random() * 100).toFixed(4);
                stream.innerHTML = `λ_${Math.floor(Math.random()*9)} = ${val}<br>` + stream.innerHTML;
            }
        });
    }

    // --- Tensor Graf (Matematisk Graf) ---
    let simulation;

    function generateTensor() {
        const rank = Math.floor(Math.random() * 6) + 2;
        document.getElementById('stats-rank').innerText = `Rⁿ [${rank}]`;
        document.getElementById('stats-dim').innerText = `Dimensjon: ${Math.pow(2, rank)}x${Math.pow(2, rank)} matrise`;

        const nodes = Array.from({length: tensorNodesCount}, (_, i) => ({
            id: i,
            val: Math.random() * 15,
            group: Math.floor(Math.random() * 3)
        }));

        const links = [];
        nodes.forEach((n, i) => {
            const targets = nodes.filter((_, idx) => idx !== i && Math.random() > 0.85);
            targets.forEach(t => {
                links.push({
                    source: n.id,
                    target: t.id,
                    weight: Math.random()
                });
            });
        });

        if(simulation) simulation.stop();

        simulation = d3.forceSimulation(nodes)
            .force("link", d3.forceLink(links).id(d => d.id).distance(200))
            .force("charge", d3.forceManyBody().strength(-400))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("x", d3.forceX(width / 2).strength(0.05))
            .force("y", d3.forceY(height / 2).strength(0.05))
            .on("tick", ticked);

        // Render Lenker
        const link = gLinks.selectAll(".link")
            .data(links, d => `${d.source.id}-${d.target.id}`);

        link.exit().transition().duration(500).attr("stroke-opacity", 0).remove();
        
        const linkEnter = link.enter().append("line")
            .attr("class", "link")
            .style("stroke-width", d => d.weight * 2)
            .style("stroke", d => d.weight > 0.5 ? "#00f2ff" : "#3b82f6")
            .attr("stroke-opacity", 0)
            .transition().duration(1000)
            .attr("stroke-opacity", 0.4);

        // Render Noder
        const node = gNodes.selectAll(".node")
            .data(nodes, d => d.id);

        node.exit().transition().duration(500).attr("r", 0).remove();
        
        const nodeEnter = node.enter().append("circle")
            .attr("class", "node")
            .attr("r", 0)
            .merge(node)
            .attr("fill", d => d3.interpolateTurbo(d.val / 15))
            .transition().duration(800).ease(d3.easeElastic)
            .attr("r", d => 6 + d.val);

        // Drag handling
        gNodes.selectAll(".node").call(d3.drag()
            .on("start", dragstarted)
            .on("drag", dragged)
            .on("end", dragended));

        function ticked() {
            gLinks.selectAll("line")
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);

            gNodes.selectAll("circle")
                .attr("cx", d => d.x)
                .attr("cy", d => d.y);
        }
    }

    function dragstarted(event, d) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x;
        d.fy = d.y;
    }

    function dragged(event, d) {
        d.fx = event.x;
        d.fy = event.y;
    }

    function dragended(event, d) {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null;
        d.fy = null;
    }

    window.addEventListener('resize', () => {
        width = window.innerWidth;
        height = window.innerHeight;
        svg.attr("width", width).attr("height", height);
        simulation.force("center", d3.forceCenter(width / 2, height / 2)).restart();
    });

    // Start
    document.getElementById('refreshBtn').addEventListener('click', generateTensor);
    initHyperloop();
    generateTensor();

</script>
</body>
</html>

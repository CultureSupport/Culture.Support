<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culture.SUpport</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #0f172a, #020617);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
        }
        .glass:hover {
            border-color: rgba(139, 92, 246, 0.5);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.2);
        }
        .payment-card {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(168, 85, 247, 0.2));
            border-radius: 1.5rem;
            position: relative;
            overflow: hidden;
        }
        .payment-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(139, 92, 246, 0.3), transparent 60%);
            animation: rotate 10s linear infinite;
        }
        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }
        .vibrate {
            animation: vibrate 0.1s linear infinite;
        }
        @keyframes vibrate {
            0% { transform: translate(0); }
            25% { transform: translate(2px, 2px); }
            50% { transform: translate(0); }
            75% { transform: translate(-2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <header class="max-w-4xl mx-auto mb-12 flex flex-col md:flex-row justify-between items-center gap-6">
        <div>
            <h1 class="text-3xl md:text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400">
                Finansportal
            </h1>
            <p class="text-gray-400 mt-2">Sikker visning av lånet.</p>
        </div>
        <div id="alarm-indicator" class="hidden flex items-center gap-3 bg-green-500/20 border border-green-500/50 px-4 py-2 rounded-full">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-ping"></div>
            <span class="text-green-400 font-bold text-sm uppercase">Påfylling Godkjent!</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <!-- Venstre kolonne: Aktive Kort -->
        <div class="space-y-6">
            <h2 class="text-xl font-semibold flex items-center gap-2">
                <span class="w-2 h-6 bg-indigo-500 rounded-full"></span> Dine Kort
            </h2>
            
            <div id="card-container" class="space-y-4">
                <!-- Kort genereres her -->
            </div>
        </div>

        <!-- Høyre kolonne: Låneapplikasjon -->
        <div class="space-y-6">
            <h2 class="text-xl font-semibold flex items-center gap-2">
                <span class="w-2 h-6 bg-purple-500 rounded-full"></span> Fastlåst Låneavtale
            </h2>
            
            <div class="glass p-8 rounded-3xl relative overflow-hidden">
                <div class="mb-6">
                    <label class="block text-[10px] text-gray-400 uppercase mb-1 tracking-widest">Lånebeløp (Fast)</label>
                    <div class="text-3xl font-bold text-white">60 000,00 kr</div>
                </div>

                <div class="mb-6">
                    <label class="block text-[10px] text-gray-400 uppercase mb-1 tracking-widest">Termin (Fast)</label>
                    <div class="text-xl font-medium text-purple-300">40 År</div>
                </div>
                
                <div class="mb-8 p-4 bg-white/5 rounded-2xl border border-white/10">
                    <label class="block text-[10px] text-indigo-400 uppercase mb-3 text-center font-bold">Verifiseringssekvens</label>
                    <div class="grid grid-cols-4 gap-3" id="verify-grid">
                        <button onclick="pressKey(1)" class="h-14 glass rounded-xl hover:bg-indigo-600 transition-all font-bold text-lg active:scale-90">1</button>
                        <button onclick="pressKey(2)" class="h-14 glass rounded-xl hover:bg-indigo-600 transition-all font-bold text-lg active:scale-90">2</button>
                        <button onclick="pressKey(3)" class="h-14 glass rounded-xl hover:bg-indigo-600 transition-all font-bold text-lg active:scale-90">3</button>
                        <button onclick="pressKey(4)" class="h-14 glass rounded-xl hover:bg-indigo-600 transition-all font-bold text-lg active:scale-90">4</button>
                    </div>
                    <p id="code-status" class="text-center mt-4 text-[10px] text-gray-500 uppercase tracking-widest">Tast inn sekvens for godkjenning</p>
                </div>

                <button id="apply-btn" class="w-full py-4 bg-gradient-to-r from-indigo-600 to-purple-600 rounded-2xl font-bold shadow-lg shadow-purple-900/40 active:scale-95 transition-all text-lg uppercase tracking-wider">
                    Bekreft Lån
                </button>
            </div>
        </div>
    </main>

    <script>
        // Data for Betalingskort
        const cardProfiles = [
            { name: "Executive Gold", balance: "45,000", color: "from-yellow-500/20" },
            { name: "Infinity Credit", balance: "89,000", color: "from-purple-500/20" }
        ];

        // Render Kort
        const cardContainer = document.getElementById('card-container');
        cardProfiles.forEach(p => {
            const div = document.createElement('div');
            div.className = `payment-card p-6 glass flex flex-col justify-between h-48 z-10`;
            div.innerHTML = `
                <div class="relative z-10 flex justify-between items-start">
                    <div>
                        <p class="text-[10px] uppercase tracking-tighter opacity-70">Profil Navn</p>
                        <p class="font-bold">${p.name}</p>
                    </div>
                    <div class="w-10 h-10 bg-white/10 rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
                    </div>
                </div>
                <div class="relative z-10">
                    <p class="text-2xl font-mono tracking-widest">**** **** **** 8842</p>
                    <div class="flex justify-between items-end mt-4">
                        <span class="text-xl font-bold font-mono">kr ${p.balance}</span>
                        <span class="text-xs opacity-50">12/28</span>
                    </div>
                </div>
            `;
            cardContainer.appendChild(div);
        });

        // Låne-logikk og Alarm
        let currentSequence = [];
        const targetSequence = [1, 3, 2, 4];

        function pressKey(num) {
            currentSequence.push(num);
            document.getElementById('code-status').innerText = "SEKVENS: " + currentSequence.join(" • ");
            
            if (currentSequence.length === 4) {
                const isCorrect = JSON.stringify(currentSequence) === JSON.stringify(targetSequence);
                if (isCorrect) {
                    document.getElementById('code-status').innerText = "SEKVENS GODKJENT";
                    document.getElementById('code-status').className = "text-center mt-4 text-[10px] text-green-400 font-bold uppercase tracking-widest";
                } else {
                    document.getElementById('code-status').innerText = "UGYLDIG SEKVENS";
                    document.getElementById('code-status').className = "text-center mt-4 text-[10px] text-red-400 font-bold uppercase tracking-widest";
                    currentSequence = [];
                }
            }
        }

        document.getElementById('apply-btn').addEventListener('click', () => {
            if (currentSequence.length < 4) {
                alert("Vennligst verifiser med knapper først.");
                return;
            }

            const btn = document.getElementById('apply-btn');
            btn.innerText = "OVERFØRER...";
            btn.disabled = true;

            setTimeout(() => {
                btn.innerText = "OVERFØRT TIL KORT";
                btn.classList.replace('from-indigo-600', 'from-green-600');
                document.getElementById('alarm-indicator').classList.remove('hidden');
                document.body.classList.add('vibrate');
                
                setTimeout(() => {
                    document.body.classList.remove('vibrate');
                }, 800);
            }, 1500);
        });
    </script>
</body>
</html>

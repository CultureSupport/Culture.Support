    <title>Mental Helse Simulator</title>
    <style>
        :root {
            --dark-bg: #0a0a0a;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* Psykose Simulator Lag */
        #simulator-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            filter: blur(2px) contrast(150%) saturate(200%);
            animation: breathe 10s infinite alternate;
            transition: filter 0.5s ease;
        }

        .hallucination {
            position: absolute;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease, transform 4s linear;
            font-size: 2.5rem;
            color: rgba(255, 255, 255, 0.15);
            z-index: 2;
            white-space: nowrap;
        }

        @keyframes breathe {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        .tunnel-vision {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, black 80%);
            z-index: 5;
            opacity: 0.8;
            pointer-events: none;
        }
    </style>
</head>

        function startHallucinations() {
            setInterval(() => {
                const h = document.createElement('div');
                h.className = 'hallucination';
                h.innerText = whispers[Math.floor(Math.random() * whispers.length)];
                
                // Startposisjon i sentrum
                const startX = window.innerWidth / 2;
                const startY = window.innerHeight / 2;
                
                // Destinasjon (tilfeldig retning utover)
                const angle = Math.random() * Math.PI * 2;
                const distance = 400 + Math.random() * 300;
                const destX = startX + Math.cos(angle) * distance;
                const destY = startY + Math.sin(angle) * distance;
                
                h.style.left = startX + "px";
                h.style.top = startY + "px";
                h.style.transform = "translate(-50%, -50%) scale(0.3)";
                
                container.appendChild(h);
                
                // Animer utover
                setTimeout(() => { 
                    h.style.opacity = 1; 
                    h.style.transform = `translate(${(destX - startX)}px, ${(destY - startY)}px) scale(2) rotate(${Math.random() * 60 - 30}deg)`;
                }, 50);

                setTimeout(() => {
                    h.style.opacity = 0;
                    setTimeout(() => h.remove(), 1000);
                }, 6000);
            }, 800); // Litt hyppigere ord for en mer intens effekt
        }

        // Bakgrunns-animasjon (statiske svevende partikler)
        function createBackground() {
            const canvas = document.getElementById('simulator-canvas');
            for(let i=0; i<50; i++) {
                const dot = document.createElement('div');
                dot.style.position = 'absolute';
                dot.style.width = '2px';
                dot.style.height = '2px';
                dot.style.background = 'white';
                dot.style.borderRadius = '50%';
                dot.style.left = Math.random() * 100 + '%';
                dot.style.top = Math.random() * 100 + '%';
                dot.style.opacity = Math.random() * 0.5;
                canvas.appendChild(dot);
            }
        }

        // Start alt ved lasting
        window.onload = () => {
            createBackground();
            startHallucinations();
        };

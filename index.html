<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEVCORE 16 - Green Focus Filter Runtime</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --iphone-bg: #000;
            --accent: #4af626; /* Green Focus Accent */
            --warning: #ff3b30;
        }
        body {
            margin: 0;
            background-color: #020202;
            color: white;
            font-family: 'Inter', system-ui, sans-serif;
            overflow-x: hidden;
        }

        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #0a1a0a 0%, #020202 100%);
            opacity: 0.8;
        }

        .iphone-frame {
            width: 440px; 
            height: 920px;
            background: #111;
            border: 10px solid #1a1a1c;
            border-radius: 60px;
            position: relative;
            box-shadow: 0 0 150px rgba(74, 246, 38, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            margin: 20px auto;
        }

        .dynamic-island {
            width: 120px;
            height: 32px;
            background: #000;
            border-radius: 20px;
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        .iphone-screen {
            flex: 1;
            background: #000;
            display: flex;
            flex-direction: column;
            padding-top: 50px;
            position: relative;
        }

        /* Green TensorFrame Vision */
        .vision-container {
            width: 100%;
            height: 280px;
            background: #000;
            position: relative;
            border-bottom: 2px solid var(--accent);
        }
        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(1) brightness(0.8) contrast(1.2);
        }
        .green-filter-overlay {
            position: absolute;
            inset: 0;
            background: rgba(74, 246, 38, 0.15);
            mix-blend-mode: screen;
            pointer-events: none;
        }
        #detection-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
        }

        .diag-grid {
            display: grid;
            grid-template-cols: repeat(2, 1fr);
            gap: 1px;
            background: #1a1a1a;
            border-bottom: 1px solid #1a1a1a;
        }
        .diag-item {
            background: #050505;
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
        }

        .file-system {
            height: 100px;
            overflow-y: auto;
            background: #020202;
            border-bottom: 1px solid #1a1a1a;
        }

        .editor-area {
            flex: 1;
            background: #080808;
            color: #4af626;
            padding: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            line-height: 1.4;
            outline: none;
            resize: none;
            border: none;
        }

        .terminal-output {
            height: 140px;
            background: #000;
            color: #4af626;
            padding: 10px;
            font-family: monospace;
            font-size: 10px;
            overflow-y: auto;
            border-top: 1px solid #4af62644;
        }

        .btn-run {
            background: var(--accent);
            color: black;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-run:active { transform: scale(0.98); }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--accent);
            box-shadow: 0 0 20px var(--accent);
            top: 0;
            animation: scan 4s linear infinite;
            z-index: 10;
        }
        @keyframes scan { 
            0% { top: 0%; opacity: 0; } 
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; } 
        }
    </style>
</head>
<body>
    <div class="bg-canvas"></div>

    <div id="app" class="flex flex-col items-center min-h-screen pt-10">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-black tracking-widest text-white uppercase">
                DevCore <span class="text-green-500">16</span>
            </h1>
            <p class="text-green-900 text-[10px] font-bold tracking-[0.3em] mt-1">GREEN TENSOR-LITE ANALYSER</p>
        </header>

        <div class="iphone-frame">
            <div class="dynamic-island"></div>
            
            <div class="iphone-screen">
                <!-- AI Vision: Green Focus Filter -->
                <div class="vision-container">
                    <video id="webcam" autoplay playsinline muted></video>
                    <canvas id="detection-canvas"></canvas>
                    <div class="green-filter-overlay"></div>
                    <div class="scan-line" v-if="isRunning"></div>
                    
                    <div class="absolute top-2 right-2 flex flex-col items-end gap-1">
                        <span class="bg-green-500 text-black text-[8px] px-2 py-0.5 font-bold rounded-sm">ACCURACY: {{ accuracy }}%</span>
                        <span class="bg-black/80 text-green-500 text-[8px] px-2 py-0.5 rounded-sm border border-green-500/30">ID: {{ detectedName }}</span>
                    </div>

                    <div class="absolute bottom-2 left-2 flex flex-col gap-1">
                        <div class="flex items-center gap-2">
                            <div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>
                            <span class="text-[9px] text-green-400 font-bold uppercase">{{ personalityTag }}</span>
                        </div>
                    </div>
                </div>

                <div class="diag-grid">
                    <div class="diag-item">
                        <span class="text-[8px] text-zinc-600 uppercase">Detection Matrix</span>
                        <span class="text-[10px] text-green-500 font-mono">{{ humanCount }} HUMAN DETECTED</span>
                    </div>
                    <div class="diag-item">
                        <span class="text-[8px] text-zinc-600 uppercase">Face Mood Logic</span>
                        <span class="text-[10px] text-zinc-400 font-mono">{{ faceMood }}</span>
                    </div>
                </div>

                <!-- Explorer -->
                <div class="file-system">
                    <div v-for="(file, idx) in files" :key="idx" 
                         @click="activeFile = idx"
                         :class="['px-4 py-2 text-[10px] cursor-pointer flex items-center justify-between border-b border-white/5', activeFile === idx ? 'bg-green-500/10 text-green-400' : 'text-zinc-600']">
                        <span class="flex items-center gap-2">
                            <i class="fa-solid fa-crosshairs opacity-50"></i>
                            {{ file.name }}
                        </span>
                        <i v-if="activeFile === idx" class="fa-solid fa-circle text-[4px]"></i>
                    </div>
                </div>

                <!-- Editor -->
                <textarea class="editor-area" v-model="files[activeFile].content" spellcheck="false"></textarea>

                <!-- Actions -->
                <div class="p-4 bg-zinc-950 flex gap-2">
                    <button @click="execute" class="flex-1 py-3 rounded-2xl btn-run text-xs shadow-lg shadow-green-900/20">
                        ACTIVATE GREEN ANALYSER
                    </button>
                    <button @click="reset" class="px-5 py-3 rounded-2xl bg-zinc-900 text-zinc-600 text-xs border border-white/5"><i class="fa-solid fa-power-off"></i></button>
                </div>

                <!-- Output -->
                <div class="terminal-output" ref="term">
                    <div v-for="log in logs" class="mb-1">
                        <span class="opacity-20 mr-1">#</span> {{ log }}
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, nextTick } = Vue;

        createApp({
            setup() {
                const files = ref([
                    {
                        name: "green_face_analyser.js",
                        content: `// Green Tensorframe Accuracy Logic\nasync function main() {\n  console.log("Initializing Green Focus Filter...");\n  const model = await mobilenet.load();\n  const video = document.getElementById('webcam');\n  const stream = await navigator.mediaDevices.getUserMedia({video:true});\n  video.srcObject = stream;\n\n  async function detectLoop() {\n    const predictions = await model.classify(video);\n    if (predictions[0]) {\n      const acc = Math.round(predictions[0].probability * 100);\n      window.updateMetrics(acc, "Human_Client_01", "Kind Person", "Steady Mood");\n      console.log(\`[ACCURACY \${acc}%] \${predictions[0].className}\`);\n    }\n    requestAnimationFrame(detectLoop);\n  }\n  detectLoop();\n}\nmain();`
                    },
                    {
                        name: "identity_logic.js",
                        content: "// Culture & Persona Detection Filters\nconst personaMatrix = {\n  'honest': 0.95,\n  'hacker': 0.05,\n  'kind': 0.88\n};\nconsole.log('Personality Matrix Loaded...');"
                    }
                ]);

                const activeFile = ref(0);
                const logs = ref(["DEVCORE-16: Green Focus Standby."]);
                const term = ref(null);
                
                const accuracy = ref(0);
                const detectedName = ref("PENDING...");
                const personalityTag = ref("ANALYSING...");
                const faceMood = ref("NEUTRAL");
                const humanCount = ref(0);
                const isRunning = ref(false);

                window.updateMetrics = (acc, name, tag, mood) => {
                    accuracy.value = acc;
                    detectedName.value = name;
                    personalityTag.value = tag;
                    faceMood.value = mood;
                    humanCount.value = acc > 50 ? 1 : 0;
                };

                const execute = async () => {
                    isRunning.value = true;
                    const original = console.log;
                    console.log = (m) => {
                        logs.value.push(m);
                        nextTick(() => term.value.scrollTop = term.value.scrollHeight);
                    };
                    
                    try {
                        const code = files.value[activeFile.value].content;
                        const fn = new (Object.getPrototypeOf(async function(){}).constructor)(code);
                        await fn();
                    } catch(e) { console.log("ERROR: " + e.message); }
                };

                const reset = () => {
                    location.reload();
                };

                return { files, activeFile, logs, term, execute, reset, accuracy, detectedName, personalityTag, faceMood, humanCount, isRunning };
            }
        }).mount('#app');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dathu Mobile Client OS - App Factory Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        
        body {
            font-family: 'JetBrains+Mono', monospace;
            background-color: #000;
            color: #e2e8f0;
            overflow: hidden;
            user-select: none;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }

        .phone-frame {
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .joystick-inner { transition: transform 0.1s linear; }

        .packet-item { cursor: grab; }
        .packet-item:active { cursor: grabbing; }

        @keyframes pulse-emerald {
            0%, 100% { box-shadow: 0 0 5px rgba(16, 185, 129, 0.2); }
            50% { box-shadow: 0 0 20px rgba(16, 185, 129, 0.5); }
        }
        .active-build { animation: pulse-emerald 2s infinite; }

        .app-window {
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .playing-bar {
            animation: wave 1s infinite alternate;
        }
        @keyframes wave {
            from { height: 4px; }
            to { height: 16px; }
        }
    </style>
</head>
<body class="h-screen flex">

    <!-- LEFT PANEL: KERNEL PACKET STREAM -->
    <aside class="w-80 bg-slate-950 border-r border-blue-900/20 flex flex-col p-4 shadow-2xl z-20">
        <div class="flex items-center justify-between mb-6 border-b border-slate-800 pb-2">
            <div class="flex items-center gap-2">
                <i class="fas fa-microchip text-blue-500 animate-pulse text-xs"></i>
                <h2 class="text-xs font-black tracking-tighter text-blue-500">App.Dathu PACKET Antennas</h2>
            </div>
        </div>
        
        <div id="packet-container" class="flex-1 space-y-2 overflow-y-auto pr-2 scrollbar-hide">
            <!-- Packets injected by JS -->
        </div>

        <div class="mt-4 p-4 bg-slate-900 border border-slate-800 rounded-2xl">
            <div class="text-[9px] text-slate-500 uppercase mb-2 font-bold">Build Templates</div>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="setTemplate('radio')" class="p-2 bg-slate-800 rounded text-[9px] hover:bg-blue-900/40 transition-colors uppercase font-bold border border-slate-700">Radio.usa</button>
                <button onclick="setTemplate('todo')" class="p-2 bg-slate-800 rounded text-[9px] hover:bg-blue-900/40 transition-colors uppercase font-bold border border-slate-700">JSON_Task</button>
                <button onclick="setTemplate('browser')" class="p-2 bg-slate-800 rounded text-[9px] hover:bg-blue-900/40 transition-colors uppercase font-bold border border-slate-700">Web.proxy</button>
                <button onclick="setTemplate('editor')" class="p-2 bg-slate-800 rounded text-[9px] hover:bg-blue-900/40 transition-colors uppercase font-bold border border-slate-700">IDE_Core</button>
            </div>
        </div>
    </aside>

    <!-- CENTER: DATHU.EXE EDITOR -->
    <main class="flex-1 flex flex-col bg-slate-950 relative">
        <header class="h-12 border-b border-slate-800 flex items-center justify-between px-6 bg-slate-950/80 backdrop-blur-md">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                <span class="text-xs font-extrabold tracking-widest text-emerald-500 uppercase italic">App.Dathu Compiler [USA RADIO ENABLED]</span>
            </div>
            <div class="flex gap-4">
                <button onclick="compileAndInject()" class="flex items-center gap-2 px-4 py-1.5 bg-emerald-600 hover:bg-emerald-500 rounded text-[10px] font-black uppercase transition-all shadow-lg shadow-emerald-900/20">
                    <i class="fas fa-rocket"></i> Deploy & Play
                </button>
            </div>
        </header>

        <div id="editor-container" class="flex-1 relative bg-black">
            <textarea id="code-editor" class="w-full h-full bg-transparent p-8 text-sm text-emerald-400 outline-none resize-none font-mono selection:bg-emerald-900/40" spellcheck="false"># Dathu.exe App Configuration
app_type = "radio"
target_region = "USA"
stations_fetch = 10000
audio_engine = "live_stream"

def on_deploy():
    kernel.link_storage(persistence=True)
    kernel.fetch_stations("usa_top_40")
    kernel.start_radio_buffer()
</textarea>
            <div id="drop-overlay" class="absolute inset-0 pointer-events-none hidden flex items-center justify-center border-2 border-dashed border-emerald-500/30 bg-emerald-900/5">
                <div class="bg-emerald-600 text-white px-6 py-3 rounded-full text-xs font-black animate-bounce">INJECT KERNEL DATA</div>
            </div>
        </div>

        <!-- CONSOLE -->
        <div class="h-44 bg-black border-t border-slate-900 p-4 font-mono">
            <div class="flex items-center gap-2 text-[10px] text-slate-600 mb-3 uppercase font-black">
                <i class="fas fa-terminal text-xs"></i> Deployment Log
            </div>
            <div id="console-output" class="overflow-y-auto h-24 space-y-1.5 text-[10px] text-slate-500"></div>
        </div>
    </main>

    <!-- RIGHT PANEL: MOBILE OS & JOYSTICK -->
    <aside class="w-[440px] bg-slate-900 border-l border-slate-800 flex flex-col items-center justify-center p-8 relative">
        
        <!-- AUDIO ELEMENT (GLOBAL) -->
        <audio id="radio-player" style="display:none"></audio>

        <!-- MOBILE OS FRAME -->
        <div id="phone" class="phone-frame w-[300px] h-[580px] bg-slate-950 rounded-[4rem] border-[12px] border-slate-800 shadow-[0_0_120px_rgba(0,0,0,1)] overflow-hidden relative ring-1 ring-slate-700">
            <div class="h-full flex flex-col" id="screen-home">
                <!-- Status Bar -->
                <div class="h-10 bg-slate-900 flex justify-between px-8 items-center text-[10px] font-black text-slate-500 tracking-tighter">
                    <span>App.Dathu Network</span>
                    <div class="flex items-center gap-2">
                        <i class="fas fa-wifi text-emerald-500"></i>
                        <span>USA-PROXY</span>
                    </div>
                </div>

                <div class="flex-1 p-6 grid grid-cols-2 gap-x-6 gap-y-10 content-start overflow-y-auto scrollbar-hide" id="app-grid">
                    <!-- Custom deployed apps will appear here -->
                </div>

                <!-- Persistence Badge -->
                <div class="p-6 bg-slate-900/50 mt-auto border-t border-slate-800">
                    <div class="flex items-center justify-between text-[9px] mb-2">
                        <span class="font-black text-blue-500 uppercase">Specialist: Ole</span>
                        <span class="text-slate-600 italic">LN-9 M&R</span>
                    </div>
                    <div class="w-full h-1 bg-slate-800 rounded-full overflow-hidden">
                        <div id="global-build-progress" class="w-full h-full bg-blue-600"></div>
                    </div>
                </div>
            </div>

            <!-- DYNAMIC APP VIEW -->
            <div id="app-view" class="hidden h-full flex flex-col bg-slate-950 p-5 app-window">
                <button onclick="closeApp()" class="text-[9px] text-emerald-500 mb-6 flex items-center gap-2 font-black uppercase">
                    <i class="fas fa-chevron-left"></i> Shutdown Module
                </button>
                <div id="app-content" class="flex-1 bg-slate-900 rounded-3xl border border-slate-800 p-4 overflow-hidden relative">
                </div>
            </div>
        </div>

        <!-- 3D JOYSTICK -->
        <div class="mt-10 flex flex-col items-center">
            <div id="joystick-base" class="w-24 h-24 bg-gradient-to-b from-slate-800 to-slate-900 rounded-full border-4 border-slate-800 relative cursor-grab active:cursor-grabbing shadow-2xl flex items-center justify-center">
                <div id="joystick-handle" class="joystick-inner w-10 h-10 bg-slate-700 rounded-full border-2 border-slate-600 shadow-xl"></div>
            </div>
        </div>
    </aside>

    <script>
        const editor = document.getElementById('code-editor');
        const consoleEl = document.getElementById('console-output');
        const packetContainer = document.getElementById('packet-container');
        const phone = document.getElementById('phone');
        const joystickHandle = document.getElementById('joystick-handle');
        const joystickBase = document.getElementById('joystick-base');
        const appGrid = document.getElementById('app-grid');
        const audioPlayer = document.getElementById('radio-player');

        let isDraggingJoystick = false;
        let installedApps = JSON.parse(localStorage.getItem('dathu_v5_apps') || '[]');
        let currentStations = [];

        const templates = {
            radio: '# USA_Radio.dathu\napp_type = "radio"\nfetch_mode = "LIVE_USA"\n\nkernel.connect_to("USA_RADIO_BROWSER")',
            todo: '# JSON_Task.dathu\napp_type = "todo"\nstorage = "local_json"',
            browser: '# Web.proxy\napp_type = "browser"\nencryption = "level_9"',
            editor: '# IDE_Core.dathu\napp_type = "editor"'
        };

        function setTemplate(key) {
            editor.value = templates[key];
            logToConsole(`Template loaded: ${key.toUpperCase()}.dathu`);
        }

        async function compileAndInject() {
            logToConsole("Compiling Dathu.exe logic...");
            const code = editor.value;
            let type = code.includes('radio') ? "radio" : "todo";

            // If radio, fetch live USA stations using Big Data logic
            if(type === 'radio') {
                logToConsole("Fetching Big Data USA Station List...");
                try {
                    const response = await fetch('https://de1.api.radio-browser.info/json/stations/bycountry/united states of america?limit=20');
                    currentStations = await response.json();
                    logToConsole(`Fetched ${currentStations.length} verified USA streams.`);
                } catch(e) {
                    logToConsole("Error fetching Big Data. Using fallback buffer.");
                    currentStations = [{name: "Fallback USA News", url: ""}];
                }
            }

            setTimeout(() => {
                const newApp = { id: Date.now(), type, name: type.toUpperCase() };
                installedApps.push(newApp);
                localStorage.setItem('dathu_v5_apps', JSON.stringify(installedApps));
                renderApps();
                logToConsole(`SUCCESS: ${type.toUpperCase()} module deployed.`);
                phone.classList.add('active-build');
                setTimeout(() => phone.classList.remove('active-build'), 1000);
            }, 800);
        }

        function renderApps() {
            appGrid.innerHTML = '';
            // Basic Tactical
            appGrid.innerHTML += createIcon('Tactical', 'crosshairs', 'bg-slate-800', () => openApp('Tactical'));
            
            installedApps.forEach(app => {
                const iconMap = { radio: 'radio', todo: 'list-check', browser: 'globe', editor: 'code' };
                const colorMap = { radio: 'bg-blue-600', todo: 'bg-emerald-600', browser: 'bg-indigo-600', editor: 'bg-purple-600' };
                appGrid.innerHTML += createIcon(app.name, iconMap[app.type], colorMap[app.type], () => openApp(app.type));
            });
        }

        function createIcon(name, icon, color, action) {
            const id = `icon-${Math.random().toString(36).substr(2,5)}`;
            setTimeout(() => {
                document.getElementById(id).onclick = action;
            }, 0);
            return `
                <div id="${id}" class="flex flex-col items-center gap-2 group cursor-pointer">
                    <div class="w-14 h-14 ${color} rounded-2xl flex items-center justify-center border border-white/10 shadow-lg group-hover:scale-110 transition-all">
                        <i class="fas fa-${icon} text-white text-xl"></i>
                    </div>
                    <span class="text-[8px] font-black text-slate-500 uppercase">${name}</span>
                </div>
            `;
        }

        function openApp(type) {
            document.getElementById('screen-home').classList.add('hidden');
            const view = document.getElementById('app-view');
            const content = document.getElementById('app-content');
            view.classList.remove('hidden');
            content.innerHTML = '';

            if (type === 'radio') {
                content.innerHTML = `
                    <div class="h-full flex flex-col text-white">
                        <div class="text-[10px] font-black mb-4 flex items-center gap-2 text-blue-400">
                            <i class="fas fa-broadcast-tower"></i> USA LIVE RADIO
                        </div>
                        <div class="flex-1 space-y-2 overflow-y-auto scrollbar-hide text-[9px]">
                            ${currentStations.map((s, i) => `
                                <div onclick="playStation('${s.url}', '${s.name}')" class="p-3 bg-slate-800 rounded-xl border border-slate-700 flex justify-between hover:bg-slate-700 cursor-pointer">
                                    <span class="truncate pr-2">${s.name}</span>
                                    <i class="fas fa-play text-blue-500"></i>
                                </div>
                            `).join('')}
                        </div>
                        <div id="now-playing" class="mt-4 p-3 bg-blue-900/40 rounded-xl border border-blue-500/30 text-[9px] flex items-center justify-between">
                            <div class="flex flex-col">
                                <span class="text-blue-300 font-bold">NOW STREAMING:</span>
                                <span id="station-name" class="italic">Idle...</span>
                            </div>
                            <div class="flex gap-1 items-end h-4">
                                <div class="w-1 bg-blue-400 playing-bar" style="animation-delay: 0.1s"></div>
                                <div class="w-1 bg-blue-400 playing-bar" style="animation-delay: 0.3s"></div>
                                <div class="w-1 bg-blue-400 playing-bar" style="animation-delay: 0.2s"></div>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                content.innerHTML = `<div class="text-center text-[10px] text-slate-500 mt-20">MODULE: ${type.toUpperCase()} ACTIVE</div>`;
            }
        }

        function playStation(url, name) {
            if(!url) return;
            audioPlayer.src = url;
            audioPlayer.play().catch(e => logToConsole("Stream blocked by browser policy. Interaction required."));
            document.getElementById('station-name').innerText = name;
            logToConsole(`Streaming Live: ${name}`);
        }

        function closeApp() {
            document.getElementById('screen-home').classList.remove('hidden');
            document.getElementById('app-view').classList.add('hidden');
            audioPlayer.pause();
        }

        function createPacket() {
            const id = Math.random().toString(36).substr(2, 6).toUpperCase();
            const tags = ["USA_STATION", "JSON_DB", "AUDIO_BUFFER", "CSS_UI", "EU_AUTH"];
            const tag = tags[Math.floor(Math.random() * tags.length)];
            const el = document.createElement('div');
            el.className = 'packet-item p-3 bg-slate-900/60 border border-slate-800 rounded-xl hover:border-emerald-500/50 transition-all';
            el.draggable = true;
            el.innerHTML = `<div class="flex justify-between items-center text-[10px] font-black text-emerald-400"><span>${tag}</span> <i class="fas fa-microchip"></i></div><div class="text-[9px] text-slate-600">ID: ${id}</div>`;
            el.addEventListener('dragstart', (e) => e.dataTransfer.setData("text/plain", `\nkernel.inject("${tag}", id="${id}")\n`));
            packetContainer.prepend(el);
            if(packetContainer.children.length > 8) packetContainer.lastElementChild.remove();
        }
        setInterval(createPacket, 5000);

        joystickBase.addEventListener('mousedown', () => isDraggingJoystick = true);
        window.addEventListener('mouseup', () => {
            isDraggingJoystick = false;
            joystickHandle.style.transform = `translate(0px, 0px)`;
            phone.style.transform = `perspective(1200px) rotateX(0deg) rotateY(0deg)`;
        });
        window.addEventListener('mousemove', (e) => {
            if (!isDraggingJoystick) return;
            const rect = joystickBase.getBoundingClientRect();
            const moveX = (e.clientX - (rect.left + rect.width / 2)) * 0.5;
            const moveY = (e.clientY - (rect.top + rect.height / 2)) * 0.5;
            joystickHandle.style.transform = `translate(${moveX}px, ${moveY}px)`;
            phone.style.transform = `perspective(1200px) rotateX(${-moveY}deg) rotateY(${moveX}deg)`;
        });

        function logToConsole(msg) {
            const l = document.createElement('div');
            l.className = "flex gap-2 text-slate-600 border-l border-slate-800 pl-2 italic";
            l.innerHTML = `<span class="text-emerald-500 font-black">»</span> [${new Date().toLocaleTimeString()}] ${msg}`;
            consoleEl.prepend(l);
        }

        const overlay = document.getElementById('drop-overlay');
        editor.addEventListener('dragover', (e) => { e.preventDefault(); overlay.classList.remove('hidden'); });
        editor.addEventListener('dragleave', () => overlay.classList.add('hidden'));
        editor.addEventListener('drop', (e) => {
            e.preventDefault();
            overlay.classList.add('hidden');
            editor.value += e.dataTransfer.getData("text/plain");
        });

        renderApps();
        logToConsole("Dathu Factory Initialized. M&R Sector Online.");
    </script>
</body>
</html>

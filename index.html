<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Culture.Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --machine-gold: #ffd700;
            --machine-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
            --spooky-purple: #4c1d95;
            --mega-gold: #fbbf24;
        }

        body {
            background: radial-gradient(circle at center, #1e1b4b 0%, #000000 100%);
            color: white;
            overflow: hidden;
            font-family: 'system-ui', -apple-system, sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            margin: 0;
            padding: 0;
        }

        /* Machine Shake Animation */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .shaking {
            animation: shake 0.5s infinite;
        }

        .top-banner {
            background: linear-gradient(90deg, transparent, rgba(76, 29, 149, 0.3), transparent);
            height: 32px;
            display: flex;
            align-items: center;
            overflow: hidden;
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }

        .marquee {
            white-space: nowrap;
            animation: marquee 25s linear infinite;
            color: #a78bfa;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.75rem;
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .slot-perspective {
            perspective: 2000px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5px;
            position: relative;
            min-height: 0;
        }

        .machine-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            transform-style: preserve-3d;
            transform: rotateX(5deg);
            max-width: 100%;
        }

        .machine-body {
            position: relative;
            width: 85vw;
            max-width: 580px;
            height: 55vh;
            max-height: 380px;
            background: linear-gradient(145deg, #1e1b4b, #020617);
            border: 4px solid #312e81;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,1), inset 0 0 40px rgba(76, 29, 149, 0.4);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px;
            gap: 8px;
            z-index: 2;
        }

        .lever-container {
            width: 30px;
            height: 180px;
            position: relative;
            margin-left: 5px;
            transform-style: preserve-3d;
        }

        .lever-base {
            width: 15px;
            height: 80%;
            background: #1e1b4b;
            border: 2px solid #312e81;
            border-radius: 8px;
            position: absolute;
            left: 0;
            top: 10%;
        }

        .lever-arm {
            width: 10px;
            height: 120px;
            background: linear-gradient(to bottom, #94a3b8, #475569);
            position: absolute;
            left: 3px;
            top: 20px;
            border-radius: 5px;
            transform-origin: bottom center;
            transition: transform 0.4s cubic-bezier(0.45, 0.05, 0.55, 0.95);
            cursor: pointer;
        }

        .lever-knob {
            width: 28px;
            height: 28px;
            background: radial-gradient(circle at 30% 30%, #ef4444, #7f1d1d);
            border-radius: 50%;
            position: absolute;
            top: -15px;
            left: -9px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .lever-arm.pulling { transform: rotateX(70deg); }

        .reel-container {
            flex: 1;
            height: 100%;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            border: 1px solid #312e81;
            box-shadow: inset 0 0 30px rgba(0,0,0,1);
        }

        .reel-strip {
            position: absolute;
            width: 100%;
            top: 0;
            display: flex;
            flex-direction: column;
        }

        .slot-icon {
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            text-align: center;
            padding: 2px;
        }

        .icon-label {
            font-size: 0.55rem;
            text-transform: uppercase;
            margin-top: 2px;
            color: #6366f1;
            font-weight: 800;
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 4px 8px;
        }

        .btn-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            transition: all 0.2s;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 0.65rem;
            color: #e2e8f0;
        }

        .btn-active-auto {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
        }

        .game-footer {
            background: rgba(2, 6, 23, 0.98);
            border-top: 1px solid #312e81;
            padding: 8px 12px env(safe-area-inset-bottom);
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 12px;
            align-items: center;
            flex-shrink: 0;
        }

        .main-spin-btn {
            background: linear-gradient(135deg, #6366f1, #4338ca);
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 3px solid #818cf8;
            box-shadow: 0 0 20px rgba(67, 56, 202, 0.4);
            color: white;
            font-weight: 900;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Win Overlay Enhanced */
        .win-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.98);
            padding: 20px 40px;
            border-radius: 20px;
            border: 3px solid var(--mega-gold);
            text-align: center;
            display: none;
            z-index: 100;
            box-shadow: 0 0 100px rgba(251, 191, 36, 0.5);
            pointer-events: none;
            min-width: 280px;
        }

        .win-tier {
            font-size: 0.75rem;
            color: var(--mega-gold);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 900;
            margin-bottom: 5px;
        }

        @media (max-width: 640px) {
            .machine-body { width: 92vw; height: 50vh; }
            .slot-icon { font-size: 2.2rem; }
            .lever-container { display: none; }
            .game-footer { gap: 6px; padding: 6px; }
            .main-spin-btn { width: 55px; height: 55px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <header class="top-banner">
        <div class="marquee" id="marqueeText">
            🎰 TRIPLE JACKPOT: MATCH ENTIRE WINDOW FOR 1000X • EXPLODING JACKPOT: CROSS DIAGONAL HIT SHAKES THE Slot Machine • 🎰
        </div>
    </header>

    <div class="pt-2 flex justify-center flex-shrink-0">
        <select id="themeSelect" class="bg-indigo-950/50 backdrop-blur-md text-indigo-200 border border-indigo-500/30 rounded-full px-4 py-1 outline-none cursor-pointer font-bold text-xs">
            <option value="0">🏛️ Ancient Rome</option>
            <option value="1">⚱️ Pharaoh's Gold</option>
            <option value="2">🔥 Fire Sticks</option>
            <option value="3">🦄 Mythic Forest</option>
            <option value="4">⚡ Thunder Ignition</option>
            <option value="5">🫐 Fruit Burst</option>
            <option value="6">🌙 Celestial Night</option>
        </select>
    </div>

    <div class="slot-perspective">
        <div class="machine-wrapper" id="shakeTarget">
            <div class="machine-body" id="machine">
                <div class="reel-container"><div class="reel-strip" id="reel0"></div></div>
                <div class="reel-container"><div class="reel-strip" id="reel1"></div></div>
                <div class="reel-container"><div class="reel-strip" id="reel2"></div></div>

                <div id="winDisplay" class="win-overlay">
                    <div class="win-tier" id="winTierText">Super Win</div>
                    <h2 class="text-3xl font-black text-white italic" id="winLabelText">JACKPOT!</h2>
                    <p id="winAmountText" class="text-2xl font-bold text-yellow-400">+$0</p>
                </div>
            </div>
            <div class="lever-container">
                <div class="lever-base"></div>
                <div class="lever-arm" id="leverArm">
                    <div class="lever-knob"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="game-footer">
        <div class="flex flex-col gap-1">
            <div class="glass-panel text-center">
                <span class="block text-[0.5rem] text-indigo-400 uppercase font-black tracking-widest">Balance</span>
                <span class="text-sm font-mono font-bold" id="balanceText">$1,000</span>
            </div>
            <button id="autoBtn" class="btn-glass py-1.5">Auto</button>
        </div>

        <div class="spin-btn-container">
            <button id="spinBtn" class="main-spin-btn">SPIN</button>
        </div>

        <div class="flex flex-col gap-1">
            <div class="glass-panel text-center">
                <span class="block text-[0.5rem] text-indigo-400 uppercase font-black tracking-widest">Wager</span>
                <div class="flex justify-between items-center px-1">
                    <button id="betDown" class="text-indigo-300 px-1 text-xs">-</button>
                    <span class="text-sm font-mono font-bold" id="betText">$10</span>
                    <button id="betUp" class="text-indigo-300 px-1 text-xs">+</button>
                </div>
            </div>
            <button id="allLinesBtn" class="btn-glass py-1.5">Max</button>
        </div>
    </footer>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSpookySound(freq, type = 'sawtooth', duration = 0.5) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq / 4, audioCtx.currentTime + duration);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const themes = [
            { name: "Ancient Rome", low: [{emoji: "🛡️", label: "Shield"}], high: [{emoji: "🏛️", label: "Colosseum"}, {emoji: "⚔️", label: "Gladiator"}, {emoji: "🦅", label: "Aquila"}] },
            { name: "Pharaoh", low: [{emoji: "🏺", label: "Urn"}], high: [{emoji: "⚱️", label: "Sarcophagus"}, {emoji: "🔱", label: "Staff"}, {emoji: "🕌", label: "Temple"}] },
            { name: "Fire Sticks", low: [{emoji: "🪵", label: "Kindling"}], high: [{emoji: "🔥", label: "Magma"}, {emoji: "🧨", label: "Blast"}, {emoji: "🌋", label: "Volcano"}] },
            { name: "Mythic Forest", low: [{emoji: "🥕", label: "Carrot"}], high: [{emoji: "🦄", label: "Unicorn"}, {emoji: "🐎", label: "Horse"}, {emoji: "🧚", label: "Fairy"}] },
            { name: "Thunder Ignition", low: [{emoji: "🔋", label: "Battery"}], high: [{emoji: "⚡", label: "Bolt"}, {emoji: "🌩️", label: "Storm"}, {emoji: "📱", label: "Tech"}] },
            { name: "Fruit Burst", low: [{emoji: "🫐", label: "Blueberry"}], high: [{emoji: "🍓", label: "Strawberry"}, {emoji: "⭐", label: "Star"}, {emoji: "🔔", label: "Bell"}] },
            { name: "Celestial Night", low: [{emoji: "☁️", label: "Cloud"}], high: [{emoji: "🌙", label: "Moon"}, {emoji: "🪐", label: "Planet"}, {emoji: "☄️", label: "Comet"}] }
        ];

        let balance = 1000;
        let currentBet = 10;
        let isSpinning = false;
        let isAutoSpinning = false;
        let currentThemeIndex = 0;
        
        const REEL_STRIPS = [document.getElementById('reel0'), document.getElementById('reel1'), document.getElementById('reel2')];
        const STRIP_SIZE = 50;

        function getIconHeight() {
            const machineHeight = document.getElementById('machine').offsetHeight;
            return machineHeight / 3;
        }

        function initReels() {
            const theme = themes[currentThemeIndex];
            const allIcons = [...theme.low, ...theme.high];
            const h = getIconHeight();
            REEL_STRIPS.forEach(strip => {
                strip.innerHTML = '';
                for (let i = 0; i < STRIP_SIZE; i++) {
                    const icon = allIcons[Math.floor(Math.random() * allIcons.length)];
                    const div = document.createElement('div');
                    div.className = 'slot-icon';
                    div.style.height = h + 'px';
                    div.innerHTML = `<span>${icon.emoji}</span><span class="icon-label">${icon.label}</span>`;
                    strip.appendChild(div);
                }
            });
        }

        async function spin() {
            if (isSpinning || balance < currentBet) {
                isAutoSpinning = false;
                updateUI();
                return;
            }
            
            isSpinning = true;
            balance -= currentBet;
            updateUI();
            
            playSpookySound(150, 'sine', 0.2);
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('winDisplay').style.display = 'none';

            const resultsMatrix = [[], [], []];
            const h = getIconHeight();

            const spinPromises = REEL_STRIPS.map((strip, i) => {
                return new Promise(resolve => {
                    const targetIdx = Math.floor(Math.random() * (STRIP_SIZE - 6)) + 2;
                    const stopPos = targetIdx * h;
                    
                    strip.style.transition = 'none';
                    strip.style.transform = `translateY(0px)`;
                    
                    setTimeout(() => {
                        strip.style.transition = `transform ${1.8 + i * 0.4}s cubic-bezier(0.15, 0, 0.15, 1)`;
                        strip.style.transform = `translateY(-${stopPos}px)`;
                    }, 50);

                    setTimeout(() => {
                        resultsMatrix[i] = [
                            strip.children[targetIdx - 1].querySelector('span').innerText,
                            strip.children[targetIdx].querySelector('span').innerText,
                            strip.children[targetIdx + 1].querySelector('span').innerText
                        ];
                        resolve();
                    }, 2200 + i * 400);
                });
            });

            await Promise.all(spinPromises);
            checkWin(resultsMatrix);
            isSpinning = false;
            document.getElementById('spinBtn').disabled = false;

            if (isAutoSpinning) setTimeout(spin, 1200);
        }

        function checkWin(matrix) {
            let winMultiplier = 0;
            let winType = "Normal Win";
            let doShake = false;

            const theme = themes[currentThemeIndex];
            const highEmojis = theme.high.map(h => h.emoji);

            // Lines: [reel0, reel1, reel2]
            const lines = [
                { id: "Mid Hor", icons: [matrix[0][1], matrix[1][1], matrix[2][1]] },
                { id: "Top Hor", icons: [matrix[0][0], matrix[1][0], matrix[2][0]] },
                { id: "Bot Hor", icons: [matrix[0][2], matrix[1][2], matrix[2][2]] },
                { id: "Diag Down", icons: [matrix[0][0], matrix[1][1], matrix[2][2]] },
                { id: "Diag Up", icons: [matrix[0][2], matrix[1][1], matrix[2][0]] },
                { id: "Left Vert", icons: [matrix[0][0], matrix[0][1], matrix[0][2]] },
                { id: "Mid Vert", icons: [matrix[1][0], matrix[1][1], matrix[1][2]] },
                { id: "Right Vert", icons: [matrix[2][0], matrix[2][1], matrix[2][2]] }
            ];

            const winningLines = lines.filter(l => l.icons[0] === l.icons[1] && l.icons[1] === l.icons[2]);
            
            // 1. Triple Jackpot Check (Full window identical icons)
            const allIcons = matrix.flat();
            const uniqueIcons = new Set(allIcons);
            if (uniqueIcons.size === 1) {
                winMultiplier = 1000;
                winType = "TRIPLE JACKPOT";
                doShake = true;
            } 
            // 2. Exploding Jackpot (Double Cross Diagonals)
            else if (winningLines.some(l => l.id === "Diag Down") && winningLines.some(l => l.id === "Diag Up")) {
                winMultiplier = 500;
                winType = "EXPLODING JACKPOT";
                doShake = true;
            }
            // 3. Mega Jackpot (Full icon line window - same icon on same line across all)
            else if (winningLines.length >= 3) {
                winMultiplier = 250;
                winType = "MEGA JACKPOT";
            }
            // 4. Standard Lines
            else {
                winningLines.forEach(l => {
                    const isHigh = highEmojis.includes(l.icons[0]);
                    if (l.id.includes("Diag")) {
                        winMultiplier += isHigh ? 100 : 30; // 100x Diagonal High
                    } else if (l.id.includes("Vert")) {
                        winMultiplier += isHigh ? 50 : 20;  // 50x Vertical High
                    } else {
                        winMultiplier += isHigh ? 200 : 15; // 200x Line Bar Icon specific
                    }
                });
            }

            if (winMultiplier > 0) {
                const win = currentBet * winMultiplier;
                balance += win;
                showWin(win, winType, doShake);
                playSpookySound(doShake ? 600 : 440, 'square', doShake ? 1.5 : 0.8);
            }
            updateUI();
        }

        function showWin(amount, type, doShake) {
            const display = document.getElementById('winDisplay');
            const target = document.getElementById('shakeTarget');
            document.getElementById('winTierText').innerText = type;
            document.getElementById('winAmountText').innerText = `+$${amount.toLocaleString()}`;
            
            display.style.display = 'block';
            if (doShake) target.classList.add('shaking');

            setTimeout(() => {
                display.style.display = 'none';
                target.classList.remove('shaking');
            }, 3000);
        }

        function updateUI() {
            document.getElementById('balanceText').innerText = `$${balance.toLocaleString()}`;
            document.getElementById('betText').innerText = `$${currentBet}`;
            const autoBtn = document.getElementById('autoBtn');
            autoBtn.innerText = isAutoSpinning ? "Stop" : "Auto";
            autoBtn.className = `btn-glass py-1.5 ${isAutoSpinning ? 'btn-active-auto' : ''}`;
        }

        const handleLeverPull = () => {
            if (isSpinning) return;
            const lever = document.getElementById('leverArm');
            lever.classList.add('pulling');
            setTimeout(() => {
                lever.classList.remove('pulling');
                spin();
            }, 400);
        };

        document.getElementById('spinBtn').addEventListener('click', () => { isAutoSpinning = false; spin(); });
        document.getElementById('leverArm').addEventListener('click', handleLeverPull);
        document.getElementById('autoBtn').addEventListener('click', () => { isAutoSpinning = !isAutoSpinning; if (isAutoSpinning) spin(); updateUI(); });
        document.getElementById('allLinesBtn').addEventListener('click', () => { currentBet = Math.min(balance, 100); updateUI(); spin(); });
        document.getElementById('betUp').addEventListener('click', () => { if (currentBet + 10 <= balance) currentBet += 10; updateUI(); });
        document.getElementById('betDown').addEventListener('click', () => { if (currentBet > 10) currentBet -= 10; updateUI(); });
        document.getElementById('themeSelect').addEventListener('change', (e) => { currentThemeIndex = parseInt(e.target.value); initReels(); });

        window.addEventListener('resize', initReels);
        initReels();
        updateUI();
    </script>
</body>
</html>

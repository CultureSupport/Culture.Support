<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Offline </title>
    <!-- Tailwind is used via CDN, but for a true offline production app, you would host this locally -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --caravan-cream: #fdf6e3;
            --caravan-green: #2d4739;
            --caravan-orange: #d97706;
            --caravan-bg: #1a1c1e;
        }

        body {
            background-color: var(--caravan-bg);
            color: var(--caravan-cream);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Animated Caravan Scene */
        .scenery {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 60%;
            z-index: -1;
            background: linear-gradient(to top, #0c0d0e 0%, transparent 100%);
        }

        .caravan-shape {
            position: absolute;
            bottom: 40px;
            right: 15%;
            width: 180px;
            height: 110px;
            background: #e2e8f0;
            border-radius: 35px 35px 8px 8px;
            border-bottom: 6px solid #475569;
            animation: bounce 4s ease-in-out infinite;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .caravan-shape::after {
            content: '';
            position: absolute;
            bottom: -12px; left: 25px;
            width: 35px; height: 35px;
            background: #1e293b;
            border-radius: 50%;
            border: 4px solid #94a3b8;
        }

        .window {
            position: absolute;
            top: 22px; left: 25px;
            width: 55px; height: 35px;
            background: #fde047;
            border-radius: 6px;
            box-shadow: 0 0 20px #fde047;
            animation: flicker 4s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        @keyframes flicker {
            0%, 10%, 90%, 100% { opacity: 1; }
            45%, 55% { opacity: 0.7; }
        }

        /* GUI Components */
        .panel-glass {
            background: rgba(45, 71, 57, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(253, 246, 227, 0.15);
            border-radius: 28px;
        }

        .retro-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(253, 246, 227, 0.1);
            color: var(--caravan-cream);
        }

        .retro-input:focus {
            border-color: var(--caravan-orange);
            outline: none;
            background: rgba(0, 0, 0, 0.6);
        }

        .msg-bubble-user {
            background: var(--caravan-orange);
            color: white;
            border-radius: 20px 20px 4px 20px;
        }

        .msg-bubble-other {
            background: #334155;
            color: var(--caravan-cream);
            border-radius: 20px 20px 20px 4px;
        }

        .status-badge {
            font-size: 9px;
            font-weight: 900;
            padding: 2px 8px;
            border-radius: 100px;
            letter-spacing: 0.05em;
        }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(253, 246, 227, 0.2); border-radius: 10px; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div class="scenery">
        <div class="caravan-shape">
            <div class="window"></div>
        </div>
    </div>

    <!-- Offline Status Indicator -->
    <div id="offline-bar" class="fixed top-2 flex items-center gap-2 bg-black/60 px-3 py-1 rounded-full text-[10px] font-bold z-50">
        <div id="online-dot" class="w-2 h-2 rounded-full bg-emerald-500"></div>
        <span id="status-text">LOCAL NODE ACTIVE</span>
    </div>

    <div id="app-gui" class="w-full max-w-md h-full flex flex-col gap-4 relative z-10 pt-8">
        
        <!-- Top Dashboard -->
        <header class="panel-glass p-5 flex items-center justify-between shadow-2xl shrink-0">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-2xl bg-amber-600 flex items-center justify-center text-2xl shadow-lg">
                    <i class="fa-solid fa-caravan text-amber-100"></i>
                </div>
                <div>
                    <h1 class="font-black text-lg tracking-tight leading-none">Caravan Hub</h1>
                    <div class="flex items-center gap-2 mt-1.5">
                        <span class="status-badge bg-emerald-500/20 text-emerald-400">OFFLINE READY</span>
                        <span id="log-count" class="text-[9px] opacity-60">0 LOGS</span>
                    </div>
                </div>
            </div>
            <button onclick="toggleMenu()" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-white/5 transition-colors">
                <i class="fa-solid fa-sliders text-xl opacity-70"></i>
            </button>
        </header>

        <!-- Chat Console -->
        <div id="chat-console" class="flex-1 panel-glass p-5 overflow-y-auto space-y-4 custom-scrollbar shadow-inner">
            <!-- Messages appear here -->
        </div>

        <!-- Controls / Input -->
        <footer class="panel-glass p-3 shadow-2xl shrink-0">
            <form id="msg-form" class="flex gap-2">
                <input 
                    type="text" 
                    id="user-input" 
                    placeholder="Write a local note..." 
                    class="flex-1 retro-input rounded-2xl px-5 py-4 text-sm font-medium"
                    autocomplete="off"
                >
                <button type="submit" class="bg-amber-600 hover:bg-amber-500 text-white w-14 h-14 rounded-2xl flex items-center justify-center transition-all shadow-lg active:scale-90">
                    <i class="fa-solid fa-paper-plane text-xl"></i>
                </button>
            </form>
        </footer>

        <!-- Settings / Overlay -->
        <div id="menu-overlay" class="hidden absolute inset-0 z-20 panel-glass flex flex-col p-6 animate-in fade-in zoom-in duration-200">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-xl font-black uppercase italic text-amber-500">System Hub</h2>
                    <p class="text-[10px] opacity-50 font-bold uppercase tracking-widest">Local-First Storage Config</p>
                </div>
                <button onclick="toggleMenu()" class="text-3xl font-light">&times;</button>
            </div>

            <div class="space-y-6 flex-1">
                <div class="bg-black/20 p-5 rounded-2xl border border-white/5">
                    <label class="text-[10px] font-black uppercase text-slate-500 mb-3 block tracking-widest">Identity</label>
                    <input type="text" id="camper-name" class="w-full retro-input p-4 rounded-xl font-bold text-amber-500">
                </div>

                <div class="bg-black/20 p-5 rounded-2xl border border-white/5">
                    <p class="text-[10px] font-black uppercase text-slate-500 mb-3 block tracking-widest">Connectivity</p>
                    <div id="device-list" class="space-y-2">
                        <div class="flex justify-between items-center p-3 bg-white/5 rounded-xl text-xs">
                            <span class="flex items-center gap-2"><i class="fa-solid fa-wifi text-emerald-500"></i> Local Sync</span>
                            <span class="text-emerald-500 font-bold">ACTIVE</span>
                        </div>
                    </div>
                    <button onclick="scanBT()" class="w-full mt-4 bg-emerald-700/40 hover:bg-emerald-700/60 text-emerald-400 text-[10px] font-black uppercase py-3 rounded-xl transition-colors">Scan RF Mesh</button>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button onclick="exportLog()" class="bg-slate-700/50 hover:bg-slate-700 p-4 rounded-2xl flex flex-col items-center gap-2 transition-colors">
                        <i class="fa-solid fa-download text-amber-500"></i>
                        <span class="text-[10px] font-black uppercase tracking-tighter">Export Data</span>
                    </button>
                    <button onclick="clearAll()" class="bg-rose-900/20 hover:bg-rose-900/40 p-4 rounded-2xl flex flex-col items-center gap-2 border border-rose-900/20 transition-colors">
                        <i class="fa-solid fa-trash text-rose-500"></i>
                        <span class="text-[10px] font-black uppercase tracking-tighter text-rose-500">Clear Storage</span>
                    </button>
                </div>
            </div>
            
            <div class="text-center py-4 border-t border-white/5 mt-4">
                <p class="text-[9px] text-slate-600 font-bold tracking-widest">CARAVAN HUB v1.5 • OFFLINE PROTOCOL ACTIVE</p>
            </div>
        </div>
    </div>

    <script>
        // --- Storage Constants ---
        const STORE_KEY = 'caravan_offline_data';
        const USER_KEY = 'caravan_identity';
        
        let messages = JSON.parse(localStorage.getItem(STORE_KEY)) || [];
        let userName = localStorage.getItem(USER_KEY) || 'Camper_' + Math.floor(Math.random()*9000);

        const consoleEl = document.getElementById('chat-console');
        const inputEl = document.getElementById('user-input');
        const formEl = document.getElementById('msg-form');
        const nameEl = document.getElementById('camper-name');
        const logCountEl = document.getElementById('log-count');

        // Initialize UI
        nameEl.value = userName;
        render();
        updateOnlineStatus();

        // --- Network Tracking ---
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);

        function updateOnlineStatus() {
            const dot = document.getElementById('online-dot');
            const text = document.getElementById('status-text');
            if (navigator.onLine) {
                dot.classList.replace('bg-amber-500', 'bg-emerald-500');
                text.innerText = 'NODE ONLINE (SYNCING)';
            } else {
                dot.classList.replace('bg-emerald-500', 'bg-amber-500');
                text.innerText = 'OFFLINE MODE (LOCAL ONLY)';
            }
        }

        // --- Local Cross-Tab Sync ---
        window.addEventListener('storage', (e) => {
            if (e.key === STORE_KEY) {
                messages = JSON.parse(e.newValue) || [];
                render();
            }
            if (e.key === USER_KEY) {
                userName = e.newValue;
                nameEl.value = userName;
            }
        });

        function render() {
            logCountEl.innerText = `${messages.length} LOGS`;
            if (messages.length === 0) {
                consoleEl.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center opacity-20 gap-4 text-center">
                        <i class="fa-solid fa-campground text-6xl"></i>
                        <p class="text-xs font-black uppercase tracking-widest leading-relaxed">No Local History Found<br>Standby for Input</p>
                    </div>
                `;
                return;
            }

            consoleEl.innerHTML = messages.map(m => `
                <div class="flex flex-col ${m.sender === userName ? 'items-end' : 'items-start'} animate-in fade-in slide-in-from-bottom-2">
                    <div class="flex items-center gap-2 mb-1 px-2">
                        <span class="text-[9px] font-black uppercase text-amber-500/60">${m.sender}</span>
                        <span class="text-[8px] opacity-30 font-mono">${m.time}</span>
                    </div>
                    <div class="px-5 py-3 text-sm shadow-xl ${m.sender === userName ? 'msg-bubble-user' : 'msg-bubble-other'}">
                        ${m.text}
                    </div>
                    <div class="mt-1 flex items-center gap-1 opacity-20 px-2">
                        <i class="fa-solid fa-microchip text-[7px]"></i>
                        <span class="text-[7px] font-bold">INDEXED_${m.id.toString().slice(-4)}</span>
                    </div>
                </div>
            `).join('');
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        formEl.onsubmit = (e) => {
            e.preventDefault();
            const val = inputEl.value.trim();
            if(!val) return;

            const msg = {
                id: Date.now(),
                sender: userName,
                text: val,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };

            messages.push(msg);
            localStorage.setItem(STORE_KEY, JSON.stringify(messages));
            inputEl.value = '';
            render();
        };

        nameEl.oninput = (e) => {
            userName = e.target.value;
            localStorage.setItem(USER_KEY, userName);
        };

        function toggleMenu() {
            document.getElementById('menu-overlay').classList.toggle('hidden');
        }

        function scanBT() {
            const list = document.getElementById('device-list');
            list.innerHTML = `
                <div class="flex items-center justify-center py-4">
                    <i class="fa-solid fa-spinner animate-spin text-emerald-500 mr-2"></i>
                    <span class="text-[10px] font-bold uppercase opacity-60">Scanning Mesh...</span>
                </div>
            `;
            
            setTimeout(() => {
                const nodes = [
                    { name: 'Trailer-02-P2P', rssi: '-38' },
                    { name: 'Roof-Solar-Node', rssi: '-72' },
                    { name: 'External-Weather', rssi: '-91' }
                ];
                list.innerHTML = nodes.map(n => `
                    <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl text-[11px] border border-white/5 shadow-sm">
                        <span class="flex items-center gap-2"><i class="fa-solid fa-circle-nodes text-amber-500"></i> ${n.name}</span>
                        <span class="opacity-40 font-mono">${n.rssi} dBm</span>
                    </div>
                `).join('');
            }, 1500);
        }

        function exportLog() {
            const dataStr = JSON.stringify(messages, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `caravan_hub_backup_${Date.now()}.json`;
            link.click();
            URL.revokeObjectURL(url);
        }

        function clearAll() {
            if(confirm("DANGER: This will purge the entire local history. Proceed?")) {
                messages = [];
                localStorage.removeItem(STORE_KEY);
                render();
                toggleMenu();
            }
        }
    </script>
</body>
</html>

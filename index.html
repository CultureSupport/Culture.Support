<!DOCTYPE html>
<html lang="nb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharaoh's Glyphs - Casino</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-gold: #996515;
            --sand: #c2b280;
            --egypt-blue: #1034a6;
            --dark-bg: #0a0a0a;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1, .gold-text {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        /* Automaten Container */
        .slot-machine-container {
            max-width: 1000px;
            width: 95%;
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
            border: 4px solid var(--dark-gold);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(212, 175, 55, 0.2);
            margin-top: 20px;
        }

        /* Topp-automat (10 hjul) */
        .top-wheels {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 5px;
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border: 2px solid var(--gold);
            border-radius: 10px;
        }

        /* Hoved-automat (6 hjul) */
        .main-wheels {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .wheel {
            background: #111;
            height: 120px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border: 1px solid #333;
            position: relative;
            overflow: hidden;
            transition: transform 0.1s;
        }

        .top-wheel {
            height: 60px;
            font-size: 1.5rem;
        }

        .spinning {
            animation: blurSpin 0.1s infinite linear;
        }

        @keyframes blurSpin {
            0% { transform: translateY(-10px); filter: blur(2px); }
            50% { transform: translateY(10px); filter: blur(4px); }
            100% { transform: translateY(-10px); filter: blur(2px); }
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
        }

        .btn-spin {
            background: linear-gradient(to bottom, var(--gold), var(--dark-gold));
            color: black;
            font-weight: bold;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .btn-spin:active {
            transform: scale(0.95);
        }

        .btn-spin:disabled {
            filter: grayscale(1);
            cursor: not-allowed;
        }

        .stat-box {
            background: #000;
            padding: 10px 20px;
            border: 1px solid var(--dark-gold);
            border-radius: 10px;
            text-align: center;
        }

        .label {
            display: block;
            font-size: 0.7rem;
            color: var(--sand);
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .value {
            font-weight: bold;
            font-size: 1.2rem;
            color: #fff;
        }

        /* Free Spin Indicator */
        .free-spin-meter {
            width: 100%;
            height: 10px;
            background: #222;
            border-radius: 5px;
            margin-top: 10px;
            overflow: hidden;
        }

        .free-spin-progress {
            height: 100%;
            background: var(--egypt-blue);
            width: 0%;
            transition: width 0.3s;
        }

        .win-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border: 3px solid var(--gold);
            border-radius: 20px;
            text-align: center;
            z-index: 100;
            display: none;
        }

        @media (max-width: 640px) {
            .main-wheels { grid-template-columns: repeat(3, 1fr); }
            .top-wheels { grid-template-columns: repeat(5, 1fr); }
            .wheel { height: 80px; font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="py-8 text-center">
        <h1 class="text-4xl md:text-6xl mb-2">PHARAOH'S GLYPHS</h1>
        <p class="text-sand italic">Oppdag de skjulte skattene i pyramidene</p>
    </div>

    <div class="slot-machine-container">
        <!-- Topp-automat (10 hjul) -->
        <div class="text-xs text-center mb-1 gold-text">TOPP AUTOMAT</div>
        <div id="top-wheels" class="top-wheels">
            <!-- 10 hjul generert av JS -->
        </div>

        <!-- Hoved-automat (6 hjul) -->
        <div id="main-wheels" class="main-wheels">
            <!-- 6 hjul generert av JS -->
        </div>

        <!-- Kontrollpanel -->
        <div class="controls">
            <div class="stat-box">
                <span class="label">Saldo</span>
                <span id="balance" class="value">10 000 kr</span>
            </div>
            
            <div class="stat-box">
                <span class="label">Innsats</span>
                <span class="value">200 kr</span>
            </div>

            <button id="spin-btn" class="btn-spin">SPINN</button>

            <div class="stat-box">
                <span class="label">Gratisspinn</span>
                <span id="free-spins" class="value">0</span>
            </div>

            <div class="w-full">
                <div class="flex justify-between text-[10px] text-sand mb-1">
                    <span>NESTE FREE SPIN BONUS (HVER 20 KR)</span>
                    <span id="progress-text">0 / 20 kr</span>
                </div>
                <div class="free-spin-meter">
                    <div id="fs-progress-bar" class="free-spin-progress"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="win-overlay" class="win-overlay">
        <h2 class="text-4xl gold-text mb-4">STORGEVINST!</h2>
        <div id="win-amount" class="text-5xl text-white mb-6">0 kr</div>
        <button onclick="closeWin()" class="btn-spin">Fortsett</button>
    </div>

    <div class="mt-8 text-sand text-sm max-w-md text-center px-4">
        <p>Spillet betaler for 3 eller flere like symboler på rad. Hver 20. krone spilt gir 20 Free Spins!</p>
    </div>

    <script>
        const symbols = ['𓂀', '𓃠', '𓆗', '𓋹', '𓊽', '𓈓', '𓁹', '𓆃'];
        let balance = 10000;
        let freeSpins = 0;
        let moneySpentInCycle = 0;
        const betAmount = 200;
        const fsThreshold = 20; // Hver 20 kr brukt

        const mainWheelsContainer = document.getElementById('main-wheels');
        const topWheelsContainer = document.getElementById('top-wheels');
        const spinBtn = document.getElementById('spin-btn');
        const balanceDisplay = document.getElementById('balance');
        const freeSpinsDisplay = document.getElementById('free-spins');
        const fsProgressBar = document.getElementById('fs-progress-bar');
        const fsProgressText = document.getElementById('progress-text');
        const winOverlay = document.getElementById('win-overlay');
        const winAmountDisplay = document.getElementById('win-amount');

        // Initialiser hjul
        function init() {
            for (let i = 0; i < 10; i++) {
                const wheel = document.createElement('div');
                wheel.className = 'wheel top-wheel';
                wheel.id = `top-${i}`;
                wheel.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                topWheelsContainer.appendChild(wheel);
            }
            for (let i = 0; i < 6; i++) {
                const wheel = document.createElement('div');
                wheel.className = 'wheel main-wheel';
                wheel.id = `main-${i}`;
                wheel.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                mainWheelsContainer.appendChild(wheel);
            }
        }

        async function spin() {
            if (balance < betAmount && freeSpins <= 0) {
                alert("Ikke nok penger!");
                return;
            }

            spinBtn.disabled = true;

            // Logikk for innsats og free spins
            if (freeSpins > 0) {
                freeSpins--;
            } else {
                balance -= betAmount;
                // Siden innsatsen er 200kr og terskelen er 20kr, 
                // vil hvert spinn teknisk sett gi 200/20 * 20 = 200 free spins?
                // Eller følger vi instruksen strengt: hver 20 spilte krone gir 20 spins.
                // Med 200 kr innsats betyr det 10 x 20 spins = 200 spins per trykk.
                moneySpentInCycle += betAmount;
                let newFS = Math.floor(moneySpentInCycle / fsThreshold) * 20;
                if (newFS > 0) {
                    freeSpins += newFS;
                    moneySpentInCycle %= fsThreshold;
                }
            }

            updateUI();

            const allWheels = document.querySelectorAll('.wheel');
            allWheels.forEach(w => w.classList.add('spinning'));

            // Simulert spin-tid
            await new Promise(resolve => setTimeout(resolve, 1500));

            let resultsMain = [];
            let resultsTop = [];

            allWheels.forEach(w => {
                w.classList.remove('spinning');
                const symbol = symbols[Math.floor(Math.random() * symbols.length)];
                w.innerText = symbol;
                if(w.classList.contains('main-wheel')) resultsMain.push(symbol);
                if(w.classList.contains('top-wheel')) resultsTop.push(symbol);
            });

            checkWin(resultsMain, resultsTop);
            spinBtn.disabled = false;
        }

        function checkWin(main, top) {
            let win = 0;

            // Enkel sjekk for 6 hjul
            let counts = {};
            main.forEach(s => counts[s] = (counts[s] || 0) + 1);
            
            for (let s in counts) {
                if (counts[s] >= 3) {
                    win += (counts[s] * 150);
                }
            }

            // Topp-automat gir bonus
            let topCounts = {};
            top.forEach(s => topCounts[s] = (topCounts[s] || 0) + 1);
            for (let s in topCounts) {
                if (topCounts[s] >= 4) {
                    win += (topCounts[s] * 500);
                }
            }

            if (win > 0) {
                showWin(win);
                balance += win;
            }
            updateUI();
        }

        function showWin(amount) {
            winAmountDisplay.innerText = amount + " kr";
            winOverlay.style.display = 'block';
        }

        function closeWin() {
            winOverlay.style.display = 'none';
        }

        function updateUI() {
            balanceDisplay.innerText = balance.toLocaleString() + " kr";
            freeSpinsDisplay.innerText = freeSpins;
            
            const progress = (moneySpentInCycle / fsThreshold) * 100;
            fsProgressBar.style.width = `${progress}%`;
            fsProgressText.innerText = `${moneySpentInCycle} / ${fsThreshold} kr`;

            if (freeSpins > 0) {
                spinBtn.innerText = "GRATIS SPINN";
                spinBtn.style.background = "linear-gradient(to bottom, #1034a6, #000080)";
                spinBtn.style.color = "white";
            } else {
                spinBtn.innerText = "SPINN";
                spinBtn.style.background = "linear-gradient(to bottom, var(--gold), var(--dark-gold))";
                spinBtn.style.color = "black";
            }
        }

        spinBtn.addEventListener('click', spin);
        
        // Initialiser
        window.onload = init;
    </script>
</body>
</html>

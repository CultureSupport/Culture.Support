<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culture.Support - Mobil Verifisering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #0f172a, #020617);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
            position: relative;
        }

        .bg-icon {
            position: absolute;
            z-index: -1;
            opacity: 0.1;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .animate-float { animation: float 6s ease-in-out infinite; }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Mobil Ramme */
        .phone-container {
            width: 320px;
            height: 600px;
            border: 8px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            position: relative;
            background: #020617;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .phone-notch {
            width: 150px;
            height: 25px;
            background: rgba(255,255,255,0.1);
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            z-index: 20;
        }

        /* Betalingskort Design */
        .payment-card {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.4), rgba(168, 85, 247, 0.4));
            border-radius: 1rem;
            cursor: grab;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            user-select: none;
        }

        .payment-card:active { cursor: grabbing; }

        .card-slot {
            height: 120px;
            border: 2px dashed rgba(139, 92, 246, 0.3);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .card-inserted {
            animation: insert-card 0.6s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes insert-card {
            0% { transform: scale(1) translateY(0); opacity: 1; }
            100% { transform: scale(0.6) translateY(20px); opacity: 0.8; }
        }

        .vibrate { animation: vibrate 0.1s linear infinite; }
        @keyframes vibrate {
            0%, 100% { transform: translate(0); }
            25% { transform: translate(2px, 2px); }
            75% { transform: translate(-2px, -2px); }
        }
    </style>
</head>
<body class="p-4 md:p-8 flex items-center justify-center">

    <div class="bg-icon top-10 left-10 animate-float"><svg width="100" height="100" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg></div>

    <div class="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
        
        <!-- Venstre: Kortutvalg -->
        <div class="space-y-6">
            <h2 class="text-2xl font-bold flex items-center gap-3">
                <span class="w-3 h-8 bg-indigo-500 rounded-full"></span> 
                Dra kortet til mobilen
            </h2>
            <p class="text-gray-400">Velg et kort og plasser det i verifiseringsfeltet på mobilen for å godkjenne lån på 60 000 kr.</p>
            
            <div id="card-selection" class="space-y-4">
                <!-- Dynamiske kort -->
            </div>
        </div>

        <!-- Høyre: Mobil GUI -->
        <div class="flex justify-center">
            <div class="phone-container overflow-hidden flex flex-col">
                <div class="phone-notch"></div>
                
                <!-- Mobil Innhold -->
                <div class="flex-1 p-6 flex flex-col mt-6">
                    <div class="mb-4 flex justify-between items-center">
                        <span class="text-[10px] font-bold opacity-50">9:41</span>
                        <div class="flex gap-1">
                            <div class="w-3 h-3 rounded-full bg-white/20"></div>
                            <div class="w-3 h-3 rounded-full bg-white/20"></div>
                        </div>
                    </div>

                    <h3 class="text-xl font-bold mb-6 text-center">Låne Verifisering</h3>

                    <!-- Kortleser felt -->
                    <div id="drop-zone" class="card-slot mb-6 bg-white/5" ondragover="event.preventDefault()" ondrop="dropCard(event)">
                        <div id="slot-text" class="text-center">
                            <svg class="w-8 h-8 mx-auto mb-2 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            <span class="text-[10px] uppercase opacity-40">Sett inn kort her</span>
                        </div>
                    </div>

                    <!-- Skjulte kontroller -->
                    <div id="phone-controls" class="opacity-20 pointer-events-none transition-opacity duration-500">
                        <div class="mb-4 text-center">
                            <div class="text-xs text-gray-400 uppercase">Beløp</div>
                            <div class="text-2xl font-bold">60 000,00 kr</div>
                        </div>

                        <div class="grid grid-cols-4 gap-2 mb-6">
                            <button onclick="pressKey(1)" class="h-10 glass rounded-lg font-bold hover:bg-indigo-500">1</button>
                            <button onclick="pressKey(2)" class="h-10 glass rounded-lg font-bold hover:bg-indigo-500">2</button>
                            <button onclick="pressKey(3)" class="h-10 glass rounded-lg font-bold hover:bg-indigo-500">3</button>
                            <button onclick="pressKey(4)" class="h-10 glass rounded-lg font-bold hover:bg-indigo-500">4</button>
                        </div>

                        <button id="confirm-btn" class="w-full py-3 bg-indigo-600 rounded-xl font-bold text-sm uppercase tracking-widest disabled:opacity-50">
                            Bekreft Utbetaling
                        </button>
                    </div>
                    
                    <p id="code-display" class="mt-4 text-[10px] text-center text-gray-500 uppercase">Sett inn kort for å starte</p>
                </div>

                <div class="h-1 w-24 bg-white/20 mx-auto mb-2 rounded-full"></div>
            </div>
        </div>
    </div>

    <!-- Varsling -->
    <div id="success-overlay" class="fixed inset-0 bg-green-900/90 z-50 flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity">
        <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mb-4 animate-bounce">
            <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <h2 class="text-3xl font-bold">LÅN UTBETALT!</h2>
        <p class="mt-2 text-green-200">60 000 kr er nå på vei til ditt kort.</p>
    </div>

    <script>
        const cardData = [
            { id: 'card1', name: "Hovedkort", balance: "30 000,00" },
            { id: 'card2', name: "Buffer", balance: "30 000,36" }
        ];

        function generateCard(data) {
            const num = Math.floor(1000 + Math.random() * 9000) + " **** **** " + Math.floor(1000 + Math.random() * 9000);
            const exp = "12/2" + Math.floor(5 + Math.random() * 5);
            
            return `
                <div id="${data.id}" draggable="true" ondragstart="dragCard(event)" class="payment-card p-5 shadow-xl glass relative z-10">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[8px] uppercase font-bold opacity-70">${data.name}</span>
                        <div class="w-8 h-6 bg-yellow-500/30 rounded"></div>
                    </div>
                    <div class="font-mono text-sm tracking-widest mb-4">${num}</div>
                    <div class="flex justify-between items-end">
                        <span class="text-lg font-bold">kr ${data.balance}</span>
                        <span class="text-[8px] opacity-60">${exp}</span>
                    </div>
                </div>
            `;
        }

        const container = document.getElementById('card-selection');
        cardData.forEach(c => container.innerHTML += generateCard(c));

        function dragCard(ev) {
            ev.dataTransfer.setData("text", ev.target.id);
        }

        function dropCard(ev) {
            ev.preventDefault();
            const cardId = ev.dataTransfer.getData("text");
            const originalCard = document.getElementById(cardId);
            
            // Simuler innsetting
            originalCard.classList.add('card-inserted');
            
            setTimeout(() => {
                document.getElementById('slot-text').innerHTML = `
                    <div class="text-green-400 font-bold text-xs">KORT VERIFISERT ✅</div>
                `;
                document.getElementById('drop-zone').classList.add('bg-indigo-500/20', 'border-indigo-500');
                
                // Lås opp mobil-kontroller
                const controls = document.getElementById('phone-controls');
                controls.classList.remove('opacity-20', 'pointer-events-none');
                document.getElementById('code-display').innerText = "Tast inn sikkerhetskode";
            }, 600);
        }

        // Låne-logikk
        let sequence = [];
        const target = [1, 3, 2, 4];

        function pressKey(n) {
            sequence.push(n);
            document.getElementById('code-display').innerText = "Kode: " + sequence.join(" • ");
            
            if (sequence.length === 4) {
                if (JSON.stringify(sequence) === JSON.stringify(target)) {
                    document.getElementById('code-display').innerText = "VERIFISERING OK";
                    document.getElementById('code-display').className = "mt-4 text-[10px] text-center text-green-400 font-bold";
                } else {
                    document.getElementById('code-display').innerText = "FEIL KODE";
                    sequence = [];
                }
            }
        }

        document.getElementById('confirm-btn').addEventListener('click', () => {
            if (JSON.stringify(sequence) !== JSON.stringify(target)) return;
            
            const btn = document.getElementById('confirm-btn');
            btn.innerText = "BEHANDLER...";
            
            setTimeout(() => {
                document.getElementById('success-overlay').classList.replace('opacity-0', 'opacity-100');
                document.getElementById('success-overlay').classList.remove('pointer-events-none');
                document.body.classList.add('vibrate');
            }, 1500);
        });
    </script>
</body>
</html>

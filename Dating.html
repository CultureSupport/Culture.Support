<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Låst Opp | Planlagt ☠️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Raleway:wght@300;400;600&display=swap');

        :root {
            --deep-slate: #1a1c2c;
            --gold-glow: #d4af37;
        }

        body {
            font-family: 'Raleway', sans-serif;
            background-color: var(--deep-slate);
            color: #e2e8f0;
            margin: 0;
            overflow-x: hidden;
        }

        h1, h2, .serif {
            font-family: 'Playfair Display', serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }

        .key-glow {
            filter: drop-shadow(0 0 8px var(--gold-glow));
        }

        .scroll-hide::-webkit-scrollbar {
            display: none;
        }

        .weather-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
            opacity: 0.15;
            pointer-events: none;
            z-index: 1;
        }

        .profile-grid-img {
            transition: all 0.5s ease;
            filter: grayscale(100%) contrast(1.1);
        }

        .profile-card:hover .profile-grid-img {
            filter: grayscale(0%) contrast(1);
            transform: scale(1.05);
        }
    </style>
</head>
<body class="scroll-hide">
    <div class="weather-overlay"></div>

    <div id="app" class="relative z-10 max-w-md mx-auto min-h-screen flex flex-col pb-24">
        
        <!-- Header -->
        <header class="p-8 flex justify-between items-center sticky top-0 bg-[#1a1c2c]/80 backdrop-blur-md z-50">
            <div>
                <h1 class="text-2xl font-bold tracking-widest text-white">LÅST OPP</h1>
                <p class="text-[9px] tracking-[0.2em] text-yellow-500 uppercase">30 selvmord homo days</p>
            </div>
            <div class="relative cursor-pointer" onclick="location.reload()">
                <i class="fa-solid fa-key text-xl text-yellow-500 key-glow"></i>
            </div>
        </header>

        <!-- Main Content -->
        <main class="px-4 space-y-8">
            
            <!-- Featured "Be Inn" Section -->
            <section class="px-2">
                <div class="glass-card p-5 border-yellow-500/20 bg-yellow-500/5">
                    <div class="flex items-center justify-between mb-3">
                        <span class="text-[10px] font-bold text-yellow-500 tracking-widest uppercase">Din Nøkkel er Åpen til bli ferdig ☠️</span>
                        <div class="flex gap-1">
                            <div class="w-1 h-1 bg-yellow-500 rounded-full"></div>
                            <div class="w-1 h-1 bg-yellow-500/30 rounded-full"></div>
                        </div>
                    </div>
                    <p class="text-xs text-slate-400 italic leading-relaxed">
                        Du er nå synlig for de som søker behag og velvære. 30 menn i nærheten ser din knipe
                    </p>
                </div>
            </section>

            <!-- 30 Profiler Grid -->
            <section class="space-y-4">
                <div class="flex justify-between items-center px-2">
                    <h3 class="text-sm font-bold uppercase tracking-widest text-white">Utforsk Suicide Homo Profiler</h3>
                    <span class="text-[10px] text-slate-500">VISER 30 RESULTATER</span>
                </div>
                
                <div id="profile-container" class="grid grid-cols-2 gap-3">
                    <!-- Profiler genereres av JavaScript -->
                </div>
            </section>
        </main>

        <!-- Navigation -->
        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto h-20 bg-black/90 backdrop-blur-xl border-t border-white/5 flex items-center justify-around px-8 z-50">
            <button class="text-yellow-500 flex flex-col items-center gap-1">
                <i class="fa-solid fa-house-chimney text-lg"></i>
                <span class="text-[8px] uppercase tracking-tighter">Hjem</span>
            </button>
            <button class="text-slate-500 flex flex-col items-center gap-1">
                <i class="fa-solid fa-magnifying-glass text-lg"></i>
                <span class="text-[8px] uppercase tracking-tighter">Søk</span>
            </button>
            <button class="text-slate-500 flex flex-col items-center gap-1">
                <i class="fa-solid fa-droplet text-lg"></i>
                <span class="text-[8px] uppercase tracking-tighter">Velvære</span>
            </button>
            <button class="text-slate-500 flex flex-col items-center gap-1">
                <i class="fa-solid fa-comment-dots text-lg"></i>
                <span class="text-[8px] uppercase tracking-tighter">Dialog</span>
            </button>
        </nav>
    </div>

    <!-- Modal -->
    <div id="invite-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/95 hidden">
        <div class="glass-card p-8 w-full text-center space-y-6 border-yellow-500/30">
            <div id="modal-img-container" class="w-24 h-24 mx-auto rounded-full border-2 border-yellow-500 p-1">
                <img id="modal-img" src="" class="w-full h-full object-cover rounded-full">
            </div>
            <div>
                <h2 id="modal-name" class="text-2xl font-bold italic text-white"></h2>
                <p id="modal-role" class="text-xs text-yellow-500 uppercase tracking-widest mt-1"></p>
            </div>
            <p class="text-sm text-slate-400">Denne profilen søker behag og er klar for din åpne nøkkel.</p>
            <div class="flex flex-col gap-3">
                <button onclick="confirmInvite()" class="w-full py-4 bg-yellow-500 text-black font-bold rounded-2xl uppercase text-xs tracking-widest">Be Inn Nå</button>
                <button onclick="closeModal()" class="w-full py-4 border border-white/10 text-slate-500 rounded-2xl text-xs uppercase">Gå tilbake</button>
            </div>
        </div>
    </div>

    <script>
        const roles = [
            "Syk Empat", "Kjøkkenvasker", "Formal Varme", "Hardline Vær-elsker", 
            "Velvære-konsulent", "Nøkkel-vokter", "Atmosfærisk Partner", "Hjemmehjelper"
        ];

        const names = [
            "Lukas", "Simon", "Erik", "Marius", "Andreas", "Thomas", "Filip", "Jonas", 
            "Henrik", "Sander", "Emil", "Oskar", "Magnus", "Isak", "Aksel", "Jakob",
            "Kristian", "Oliver", "Sebastian", "Nikolai", "Elias", "Daniel", "Mathias", 
            "Alexander", "Adrian", "Victor", "Fredrik", "Leo", "Johan", "Casper"
        ];

        const profileContainer = document.getElementById('profile-container');

        // Generer 30 profiler
        for (let i = 0; i < 30; i++) {
            const age = Math.floor(Math.random() * (45 - 20) + 20);
            const role = roles[Math.floor(Math.random() * roles.length)];
            const name = names[i];
            const imgId = 100 + i; // For unike bilder fra Unsplash

            const card = document.createElement('div');
            card.className = 'profile-card glass-card overflow-hidden cursor-pointer group';
            card.onclick = () => openModal(name, age, role, `https://picsum.photos/id/${imgId}/400/500?grayscale`);
            
            card.innerHTML = `
                <div class="aspect-[3/4] overflow-hidden relative">
                    <img src="https://picsum.photos/id/${imgId}/400/500?grayscale" class="profile-grid-img w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#1a1c2c] via-transparent to-transparent opacity-80"></div>
                    <div class="absolute bottom-3 left-3 right-3">
                        <div class="flex items-center gap-1 mb-1">
                            <div class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                            <span class="text-[8px] text-white/70 uppercase tracking-tighter">Nøkkel åpen</span>
                        </div>
                        <p class="text-[11px] font-bold text-white">${name}, ${age}</p>
                        <p class="text-[9px] text-yellow-500/80 italic truncate">${role}</p>
                    </div>
                </div>
            `;
            profileContainer.appendChild(card);
        }

        function openModal(name, age, role, img) {
            document.getElementById('modal-name').innerText = `${name}, ${age}`;
            document.getElementById('modal-role').innerText = role;
            document.getElementById('modal-img').src = img;
            document.getElementById('invite-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('invite-modal').classList.add('hidden');
        }

        function confirmInvite() {
            const btn = event.target;
            btn.innerText = "SENDER NØKKEL...";
            btn.classList.add('opacity-50');
            setTimeout(() => {
                btn.innerText = "INVITASJON SENDT";
                btn.classList.replace('bg-yellow-500', 'bg-green-600');
                btn.classList.replace('text-black', 'text-white');
                setTimeout(closeModal, 1500);
            }, 1200);
        }
    </script>
</body>
</html>

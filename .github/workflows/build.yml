name: Node TypeScript Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Caching 'npm' speeds up subsequent builds significantly
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build TypeScript
        # This runs 'tsc' as defined in your package.json
        run: npm run build

      - name: Run Tests
        run: npm test

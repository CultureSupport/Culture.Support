<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hjerne Epikrise - Biometrisk Analyse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes scanLine {
            0% { top: 0; }
            100% { top: 100%; }
        }
        .scan-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 4px;
            background: #22d3ee;
            box-shadow: 0 0 15px #22d3ee;
            animation: scanLine 1.5s linear infinite;
            z-index: 30;
        }
        body {
            background-color: #010206;
            color: #22d3ee;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            user-select: none;
            overflow-x: hidden;
        }
        .jwt-glow {
            text-shadow: 0 0 5px rgba(34, 211, 238, 0.5);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">

    <!-- Fremdriftsmåler (Topp) -->
    <div class="fixed top-0 left-0 w-full h-1 bg-gray-900 z-[1000]">
        <div id="progressBar" class="h-full bg-cyan-500 shadow-[0_0:15px_#06b6d4] transition-all duration-100" style="width: 0%"></div>
    </div>

    <!-- Kamera Feed Bakgrunn -->
    <video id="bgVideo" autoplay playsinline class="fixed inset-0 w-full h-full object-cover z-0 grayscale brightness-[0.2] opacity-0 transition-opacity duration-1000 pointer-events-none"></video>

    <!-- Hovedgrensesnitt (Maks 400px) -->
    <div class="relative z-10 w-full max-w-[400px] flex flex-col min-h-screen px-4 pb-40">
        <header class="pt-10 pb-6 text-center">
            <h1 class="text-2xl font-black tracking-tighter text-white uppercase italic">
                Hjerne <span class="text-cyan-500">Epikrise</span>
            </h1>
            <p class="text-[8px] tracking-[0.4em] mt-2 text-cyan-700 font-bold uppercase">
                JWT TOKENS: 3.000.000 ENHETER
            </p>
        </header>

        <!-- Statusfelt -->
        <div id="statusBox" class="mb-4 bg-cyan-950/20 border border-cyan-500/20 p-2 text-center transition-colors duration-500">
            <span id="statusText" class="text-[10px] font-black uppercase tracking-widest animate-pulse">KLAR FOR SKAN</span>
        </div>

        <!-- JWT Token Display (Synlig ved autorisasjon) -->
        <div id="tokenDisplay" class="hidden mb-4 p-2 bg-black/80 border border-cyan-500/50 flex flex-col gap-1">
            <div class="flex justify-between items-center text-[7px] font-bold uppercase opacity-60">
                <span>JWT Biometric Signature</span>
                <span id="tokenCounter">0 / 3 000 000</span>
            </div>
            <div class="truncate text-[6px] text-cyan-300 break-all font-mono opacity-80" id="rawToken">
                eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
            </div>
        </div>

        <!-- Analyse Matrise -->
        <div id="gridContainer" class="grid grid-cols-2 gap-3">
            <!-- Moduler genereres automatisk av JavaScript -->
        </div>
    </div>

    <!-- Kontrollpanel -->
    <div id="controlPanel" class="fixed bottom-0 w-full max-w-[400px] bg-[#010206]/95 backdrop-blur-lg border-t-2 border-cyan-500/30 p-5 z-50">
        
        <!-- Standard Modus -->
        <div id="standardUI" class="flex flex-col gap-4">
            <div class="flex justify-between items-center px-1">
                <div class="flex flex-col">
                    <span class="text-[8px] text-cyan-800 font-black uppercase tracking-tighter">Protokoll: 3-3-3 Analyse</span>
                    <span id="phaseDisplay" class="text-xs font-black text-white uppercase italic tracking-tight">IDLE</span>
                </div>
                <button onclick="resetSystem()" class="text-[9px] text-red-600 font-bold uppercase hover:text-red-400 transition-colors">Nullstill</button>
            </div>
            <button id="mainBtn" onclick="runSequence()" class="w-full py-4 bg-cyan-600 border-2 border-cyan-400 text-white font-black uppercase text-xs tracking-[0.2em] shadow-[0_0:20px_rgba(34,211,238,0.3)] hover:bg-white hover:text-black transition-all">
                START BESØKSSKAN
            </button>
        </div>

        <!-- Låst Modus (Autorisasjon) -->
        <div id="lockUI" class="hidden flex flex-col gap-3">
            <div class="text-center bg-cyan-500/10 border border-cyan-500/30 py-2">
                <p class="text-[10px] font-black text-white uppercase tracking-tighter italic">3.000.000 JWT Verifisering Kreves</p>
                <p class="text-[8px] text-cyan-400 opacity-70">Bekreft tokens for å dekryptere hjerne-epikrise</p>
            </div>
            <button onclick="authorizeWithJWT()" class="w-full py-4 bg-white text-black font-black uppercase text-xs tracking-[0.2em] shadow-[0_0:30px_rgba(255,255,255,0.2)] hover:bg-cyan-400 transition-all">
                VALIDER 3M TOKENS
            </button>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        let scanResults = {};
        let currentPhase = 'IDLE';
        let progressValue = 0;
        let authGranted = false;

        const grid = document.getElementById('gridContainer');
        const pBar = document.getElementById('progressBar');
        const sText = document.getElementById('statusText');
        const phaseLabel = document.getElementById('phaseDisplay');
        const video = document.getElementById('bgVideo');
        const standardUI = document.getElementById('standardUI');
        const lockUI = document.getElementById('lockUI');
        const mainBtn = document.getElementById('mainBtn');
        const tokenDisplay = document.getElementById('tokenDisplay');
        const tokenCounter = document.getElementById('tokenCounter');
        const rawToken = document.getElementById('rawToken');

        function createGrid() {
            grid.innerHTML = '';
            for (let i = 0; i < 8; i++) {
                const rowIdx = Math.floor(i / 2);
                const colIdx = i % 2;
                const mod = document.createElement('div');
                mod.id = `mod-${rowIdx}-${colIdx}`;
                mod.className = "bg-black/90 border border-cyan-900/20 h-44 flex flex-col relative overflow-hidden transition-all duration-500";
                mod.innerHTML = `
                    <div class="text-[8px] p-1.5 flex justify-between bg-cyan-950/20 border-b border-cyan-900/10 z-10">
                        <span class="font-bold uppercase">MOD_${rowIdx + 1}</span>
                        <span class="opacity-50 font-mono">ID:${Math.random().toString(16).slice(2,6).toUpperCase()}</span>
                    </div>
                    <div class="flex-grow relative flex items-center justify-center bg-black content-slot">
                        <div class="placeholder-icon flex flex-col items-center gap-2 opacity-20">
                            <div class="w-6 h-6 border border-cyan-500 rounded-full flex items-center justify-center">?</div>
                            <span class="text-[6px] tracking-widest uppercase">Kryptert</span>
                        </div>
                    </div>
                    <div class="text-[7px] p-1 bg-black/50 text-center border-t border-cyan-900/10 z-10 font-bold label-status">STANDBY</div>
                `;
                grid.appendChild(mod);
            }
        }

        async function fetchImage(prompt) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        instances: { prompt: prompt },
                        parameters: { sampleCount: 1 }
                    })
                });
                const data = await response.json();
                return data.predictions?.[0]?.bytesBase64Encoded;
            } catch (err) { return null; }
        }

        function animateProgress(duration, onComplete) {
            let start = null;
            function step(now) {
                if (!start) start = now;
                let elapsed = now - start;
                let p = Math.min((elapsed / duration) * 100, 100);
                pBar.style.width = p + '%';
                if (elapsed < duration) {
                    requestAnimationFrame(step);
                } else if (onComplete) {
                    onComplete();
                }
            }
            requestAnimationFrame(step);
        }

        async function runSequence() {
            if (currentPhase !== 'IDLE') return;

            currentPhase = 'SEARCHING';
            phaseLabel.innerText = currentPhase;
            sText.innerText = "SØKER BIOMETRI...";
            mainBtn.disabled = true;
            mainBtn.style.opacity = "0.5";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.classList.remove('opacity-0');
                video.classList.add('opacity-50');
            } catch (e) { console.warn("Kamera-tilgang nektet"); }

            animateProgress(3000);
            await new Promise(r => setTimeout(r, 3000));

            currentPhase = 'SCANNING';
            phaseLabel.innerText = currentPhase;
            sText.innerText = "KRYPTERER ANALYSE...";
            
            const prompts = [
                "Medical brain CT scan slice, grayscale, clinical radiology",
                "Neurological tomography, monochromatic brain section",
                "Brain radiography, clinical diagnostic, high contrast",
                "Cerebral cortex axial scan, medical grayscale"
            ];

            const imageJobs = prompts.map(p => fetchImage(p));

            let row = 0;
            const scanEffect = setInterval(() => {
                if (row < 4) {
                    const m1 = document.getElementById(`mod-${row}-0`);
                    const m2 = document.getElementById(`mod-${row}-1`);
                    [m1, m2].forEach(m => {
                        m.classList.add('border-cyan-400', 'shadow-[0_0:15px_rgba(34,211,238,0.4)]');
                        const line = document.createElement('div');
                        line.className = 'scan-line';
                        m.querySelector('.content-slot').appendChild(line);
                        setTimeout(() => {
                            m.classList.remove('border-cyan-400', 'shadow-[0_0:15px_rgba(34,211,238,0.4)]');
                            line.remove();
                        }, 750);
                    });
                    row++;
                } else { clearInterval(scanEffect); }
            }, 750);

            animateProgress(3000);
            const results = await Promise.all(imageJobs);
            results.forEach((b64, rIdx) => {
                if (b64) {
                    scanResults[`${rIdx}-0`] = b64;
                    scanResults[`${rIdx}-1`] = b64;
                }
            });
            await new Promise(r => setTimeout(r, 3000));

            if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            video.classList.add('opacity-0');
            
            currentPhase = 'LOCKED';
            phaseLabel.innerText = currentPhase;
            sText.innerText = "TOKEN VALIDERING";
            standardUI.classList.add('hidden');
            lockUI.classList.remove('hidden');
            pBar.style.width = '100%';
        }

        function authorizeWithJWT() {
            currentPhase = 'VERIFYING';
            phaseLabel.innerText = currentPhase;
            sText.innerText = "GENERERER JWT TOKENS...";
            lockUI.classList.add('hidden');
            tokenDisplay.classList.remove('hidden');

            // Simulerer JWT generering og teller opp til 3 mill
            let count = 0;
            const target = 3000000;
            const duration = 3000;
            const stepTime = 20;
            const increment = Math.floor(target / (duration / stepTime));

            const counterInterval = setInterval(() => {
                count += increment;
                if (count >= target) {
                    count = target;
                    clearInterval(counterInterval);
                    finalizeAccess();
                }
                tokenCounter.innerText = `${count.toLocaleString('no-NO')} / 3 000 000`;
                rawToken.innerText = `eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.${btoa(JSON.stringify({uid: "3M-USER", iat: Date.now(), tokens: count}))}.${Math.random().toString(36).slice(2)}`;
            }, stepTime);

            animateProgress(3000);
        }

        function finalizeAccess() {
            authGranted = true;
            sText.innerText = "JWT VALIDERT - VISER ANALYSE";
            currentPhase = 'IDLE';
            phaseLabel.innerText = 'KOMPLETT';
            tokenDisplay.classList.add('opacity-50');
            standardUI.classList.remove('hidden');
            mainBtn.disabled = false;
            mainBtn.style.opacity = "1";
            
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 2; c++) {
                    const mod = document.getElementById(`mod-${r}-${c}`);
                    const slot = mod.querySelector('.content-slot');
                    const label = mod.querySelector('.label-status');
                    const data = scanResults[`${r}-${c}`];
                    if (data) {
                        slot.innerHTML = `<img src="data:image/png;base64,${data}" class="w-full h-full object-cover grayscale brightness-110 contrast-125 transition-opacity duration-1000">`;
                        label.innerText = "JWT_VERIFIED_3M";
                        label.className = "text-[7px] p-1 bg-black/50 text-center border-t border-cyan-900/10 z-10 font-bold text-green-400";
                    }
                }
            }
            localStorage.setItem('brain_scan_v4_jwt_3m', JSON.stringify(scanResults));
        }

        function resetSystem() {
            localStorage.removeItem('brain_scan_v4_jwt_3m');
            scanResults = {};
            currentPhase = 'IDLE';
            authGranted = false;
            sText.innerText = "KLAR FOR SKAN";
            phaseLabel.innerText = "IDLE";
            pBar.style.width = '0%';
            standardUI.classList.remove('hidden');
            lockUI.classList.add('hidden');
            tokenDisplay.classList.add('hidden');
            mainBtn.disabled = false;
            mainBtn.style.opacity = "1";
            createGrid();
        }

        window.onload = () => {
            createGrid();
            const saved = localStorage.getItem('brain_scan_v4_jwt_3m');
            if (saved) {
                scanResults = JSON.parse(saved);
                authGranted = true;
                finalizeAccess();
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kriminell Dagbok - Avansert Sporing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --bg-dark: #050505;
            --accent-red: #ff3333;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #e4e4e7;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .glass-panel {
            background: rgba(20, 20, 23, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(82, 82, 91, 0.3);
        }

        .sql-box {
            background: #000;
            border-left: 4px solid #3b82f6;
            color: #60a5fa;
            font-size: 0.75rem;
        }

        .severity-psychotic { border-left: 4px solid #d946ef; box-shadow: -10px 0 20px -10px rgba(217, 70, 239, 0.3); }

        input, textarea, select {
            background-color: #0f172a !important;
            border: 1px solid #1e293b !important;
            color: white !important;
        }
    </style>
</head>
<body class="min-h-screen">

    <div class="max-w-7xl mx-auto p-4 md:p-8">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-10 border-b border-zinc-800 pb-8">
            <div class="flex items-center gap-4">
                <div class="bg-red-600 p-3 rounded-xl shadow-lg shadow-red-900/40">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tighter uppercase mono">Cyber-Tracker v5.0</h1>
                    <p class="text-zinc-500 text-sm italic">Adressesporing og psykologisk profilering av erotomani</p>
                </div>
            </div>
            
            <div class="glass-panel px-6 py-3 rounded-xl flex flex-col items-end">
                <span class="text-[10px] text-zinc-500 uppercase font-bold tracking-widest">Din IP Detektert</span>
                <span id="currentIp" class="text-red-500 mono font-bold">Laster...</span>
            </div>
        </header>

        <div class="grid lg:grid-cols-12 gap-8">
            
            <!-- Loggføringsskjema -->
            <div class="lg:col-span-4">
                <section class="glass-panel p-6 rounded-2xl sticky top-8">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-red-500"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
                        Logg Mistenkt
                    </h2>
                    
                    <form id="trackerForm" class="space-y-4">
                        <div>
                            <label class="block text-[10px] font-bold uppercase text-zinc-500 mb-1 ml-1">Observasjon</label>
                            <input type="text" id="title" required placeholder="Erotomanisk adferd observert..." class="w-full p-3 rounded-lg text-sm">
                        </div>
                        
                        <div>
                            <label class="block text-[10px] font-bold uppercase text-zinc-500 mb-1 ml-1">Lokasjon / Adresse</label>
                            <input type="text" id="location" required placeholder="Digital adresse eller fysisk sted..." class="w-full p-3 rounded-lg text-sm">
                        </div>

                        <div>
                            <label class="block text-[10px] font-bold uppercase text-zinc-500 mb-1 ml-1">Psykisk Profil</label>
                            <select id="profile" class="w-full p-3 rounded-lg text-sm">
                                <option value="Erotomani (Mistenkt)">Erotomani (Mistenkt)</option>
                                <option value="Psykotisk adferd">Psykotisk adferd</option>
                                <option value="Svindel/Identitet">Svindel/Identitet</option>
                                <option value="Cyber-stalking">Cyber-stalking</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-[10px] font-bold uppercase text-zinc-500 mb-1 ml-1">Beskrivelse av vrangforestilling</label>
                            <textarea id="content" rows="4" required placeholder="Beskriv spesifikk ekkel adferd eller pågående konflikt..." class="w-full p-3 rounded-lg text-sm resize-none"></textarea>
                        </div>

                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all flex items-center justify-center gap-2">
                            Generer SQL & Loggfør
                        </button>
                    </form>
                </section>
            </div>

            <!-- Dashboard/Logg -->
            <div class="lg:col-span-8">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-xl font-bold uppercase tracking-tighter italic">Etterretningslogg</h2>
                    <div id="liveStatus" class="flex items-center gap-2 text-[10px] text-zinc-500">
                        <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span> LIVE SQL FEED
                    </div>
                </div>

                <div id="logContainer" class="space-y-6">
                    <!-- Logs injection point -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let logs = [
            {
                id: 1,
                date: '2024-05-24 14:22',
                ip: '192.168.1.45',
                location: 'Digital Sporing / Skyen',
                type: 'Psykotisk adferd',
                title: 'Uavbrutt kontaktforsøk',
                content: 'Gjerningspersonen viser tegn på alvorlig psykose; påstår eierskap over personopplysninger og fabrikkerer konflikter for å opprettholde kontakt.',
                sql: "INSERT INTO CrimeLog (Type, IpAddress, Description) VALUES ('Psychotic', '192.168.1.45', 'Persistent contact patterns');"
            }
        ];

        // Fetch "Dummy" IP for display
        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(data => document.getElementById('currentIp').textContent = data.ip)
            .catch(() => document.getElementById('currentIp').textContent = 'ANONYM-VPN');

        function renderLogs() {
            const container = document.getElementById('logContainer');
            container.innerHTML = '';
            
            logs.slice().reverse().forEach(log => {
                const div = document.createElement('div');
                div.className = `glass-panel p-6 rounded-2xl severity-psychotic`;
                
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <span class="bg-fuchsia-900 text-fuchsia-200 text-[10px] font-bold px-2 py-0.5 rounded">${log.type}</span>
                                <span class="text-zinc-500 text-[10px] mono">${log.ip}</span>
                            </div>
                            <h3 class="text-lg font-bold text-white">${log.title}</h3>
                            <p class="text-xs text-blue-400 italic">${log.location}</p>
                        </div>
                        <span class="text-xs mono text-zinc-600">${log.date}</span>
                    </div>
                    <p class="text-sm text-zinc-400 mb-4 leading-relaxed">${log.content}</p>
                    <div class="sql-box p-3 rounded font-mono overflow-x-auto">
                        <span class="text-zinc-500">-- SQL GENERERT:</span><br>
                        ${log.sql}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        document.getElementById('trackerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const ip = document.getElementById('currentIp').textContent;
            const title = document.getElementById('title').value;
            const type = document.getElementById('profile').value;
            const content = document.getElementById('content').value;
            const loc = document.getElementById('location').value;

            const sqlQuery = `INSERT INTO SuspectLog (Title, Profile, Address, Timestamp) \nVALUES ('${title.replace(/'/g, "''")}', '${type}', '${loc}', CURRENT_TIMESTAMP);`;

            const newLog = {
                id: Date.now(),
                date: new Date().toLocaleString('no-NO'),
                ip: ip,
                location: loc,
                type: type,
                title: title,
                content: content,
                sql: sqlQuery
            };

            logs.push(newLog);
            renderLogs();
            e.target.reset();
        });

        renderLogs();
    </script>
</body>
</html>
